<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Risk assessments (staff) — clubSENsational</title>
  <style>
    :root {
      --navy: #17354d;
      --gold: #f4b942;
      --bg: #f5f7f9;
      --line: #cfd8df;
      --text: #1f2a33;
      --muted: #5f6b76;
      --white: #ffffff;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; color: var(--text); background: var(--bg); }
    .app { max-width: min(1200px, 100%); margin: 0 auto; padding: 16px 14px 28px; }
    #mainHome { min-width: 0; }

    #cs-ra-staff {
      isolation: isolate;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 100%;
      line-height: 1.45;
      text-align: left;
    }

    .cs-index {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1f2937;
      max-width: 1080px;
      margin: 0 auto;
      min-width: 0;
    }
    .cs-index .cs-idx-hero {
      background: linear-gradient(135deg, #2d3e50 0%, #1e2f40 100%);
      color: #fff;
      padding: 36px 32px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 24px;
      position: relative;
      overflow: hidden;
    }
    .cs-index .cs-idx-hero::after {
      content: "";
      position: absolute;
      top: -50%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(244, 185, 66, 0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .cs-index .cs-idx-logo {
      flex: 0 0 120px;
      width: 120px;
      height: 120px;
      background: #fff;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      position: relative;
      z-index: 1;
    }
    .cs-index .cs-idx-logo img { width: 100%; height: auto; max-height: 120px; object-fit: contain; display: block; }
    .cs-index .cs-idx-text { flex: 1; min-width: 0; position: relative; z-index: 1; }
    .cs-index .cs-idx-hero .cs-idx-sub {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f4b942;
      font-weight: 600;
      margin: 0 0 6px;
    }
    .cs-index .cs-idx-hero h1 { margin: 0 0 8px; font-size: clamp(1.35rem, 4vw, 2rem); color: #fff; font-weight: 700; line-height: 1.15; }
    .cs-index .cs-idx-hero p { margin: 0; opacity: 0.9; font-size: 15px; color: #e5e7eb; line-height: 1.45; }
    .cs-index .cs-section { margin-top: 28px; }
    .cs-index .cs-section:first-of-type { margin-top: 22px; }
    .cs-index .cs-section-title {
      font-size: 13px;
      font-weight: 700;
      color: #2d3e50;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 0 0 4px;
    }
    .cs-index .cs-section-desc { font-size: 13px; color: #6b7280; margin: 0 0 14px; line-height: 1.45; }
    .cs-index .cs-section-head { border-bottom: 2px solid #f4b942; padding-bottom: 10px; margin-bottom: 14px; }
    .cs-index .cs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
      gap: 16px;
    }
    .cs-index .cs-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      border-top: 3px solid var(--card-accent, #f4b942);
      min-width: 0;
    }
    .cs-index .cs-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(45, 62, 80, 0.15); }
    .cs-index .cs-card .cs-ic { font-size: 26px; margin-bottom: 8px; line-height: 1; }
    .cs-index .cs-card h3 { font-size: 17px; margin: 0 0 8px; color: #2d3e50; line-height: 1.25; overflow-wrap: break-word; }
    .cs-index .cs-card .meta { font-size: 12px; color: #6b7280; margin: 0 0 10px; overflow-wrap: break-word; }
    .cs-index .cs-card .ra-card-actions { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
    .cs-index .cs-card button.ra-open-btn {
      margin-top: 0;
      background: #2d3e50;
      color: #fff;
      text-align: center;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      max-width: 100%;
    }
    .cs-index .cs-card button.ra-open-btn:hover { background: #f4b942; color: #2d3e50; }

    .pc-card-completed-pill {
      display: block;
      text-align: center;
      padding: 11px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: linear-gradient(180deg, #ecfdf5 0%, #d1fae5 100%);
      color: #047857;
      border: 1px solid #6ee7b7;
      box-shadow: 0 2px 10px rgba(16, 185, 129, 0.22);
    }

    .ra-ack-log-section {
      margin-top: 36px;
      padding-top: 24px;
      border-top: 2px solid #e5e7eb;
      max-width: 1080px;
      margin-left: auto;
      margin-right: auto;
    }
    .ra-ack-log-head .cs-section-title { margin: 0; }
    .ra-ack-log-note {
      font-size: 13px;
      color: #6b7280;
      margin: 0 0 14px;
      line-height: 1.45;
    }
    .ra-ack-log-empty {
      margin: 0;
      padding: 14px 16px;
      color: #6b7280;
      font-size: 14px;
      background: #f9fafb;
      border-radius: 10px;
      border: 1px dashed #d1d5db;
    }
    .ra-ack-log-tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
    }
    .ra-ack-log-tbl th,
    .ra-ack-log-tbl td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
      min-width: 0;
      overflow-wrap: break-word;
    }
    .ra-ack-log-tbl th {
      background: #f8fafc;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #475569;
    }
    .ra-ack-log-tbl tr:last-child td { border-bottom: none; }

    .ra-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      align-items: flex-start;
      justify-content: center;
      padding: 52px 16px 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .ra-overlay.is-open { display: flex; }
    .ra-overlay-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      cursor: pointer;
    }
    .ra-sheet {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 920px;
      margin: 24px auto 40px;
      background: var(--white);
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      border: 1px solid var(--line);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 48px);
    }
    .ra-floating-close {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 12;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      font-size: 24px;
      line-height: 1;
      color: var(--navy);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .ra-floating-close:hover { background: var(--gold); border-color: var(--gold); color: #1f2937; }
    #raOverlayBody {
      max-height: calc(100vh - 48px);
      overflow: auto;
      padding: 16px 18px 22px;
      text-align: left;
      background: #fafbfc;
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
    }

    .ra-staff-doc .document-header {
      background: #d7e2e8;
      border-bottom: 2px solid var(--navy);
      padding: 15px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      border-radius: 10px 10px 0 0;
      margin: -8px -8px 0 -8px;
    }
    .ra-staff-doc .document-header h2 { margin: 0; color: var(--navy); font-size: clamp(1.1rem, 3vw, 1.35rem); overflow-wrap: break-word; }
    .ra-staff-doc .document-header p { margin: 5px 0 0; color: var(--muted); font-size: 13px; overflow-wrap: break-word; }
    .ra-staff-doc .section { padding: 16px 14px; border-bottom: 1px solid #e7edf1; background: #fff; margin: 0 -8px; }
    .ra-staff-doc .section-title {
      margin: 0 0 11px;
      color: var(--navy);
      font-size: 17px;
      font-weight: 700;
    }
    .ra-staff-doc .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .ra-staff-doc .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .ra-staff-doc .field label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.4px;
      margin-bottom: 5px;
      color: var(--muted);
    }
    .ra-staff-doc .field input,
    .ra-staff-doc .field textarea,
    .ra-staff-doc .field select {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 14px;
      background: #f1f5f8;
      color: var(--text);
      cursor: default;
    }
    .ra-staff-doc .field input#raAckReaderName,
    .ra-staff-doc .field input#raAckSignature {
      background: #fff !important;
      cursor: text !important;
    }
    .ra-staff-doc .field textarea { min-height: 2.75em; resize: none; white-space: pre-wrap; }
    .ra-staff-doc table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      margin-top: 8px;
    }
    .ra-staff-doc th,
    .ra-staff-doc td {
      border: 1px solid #7f8c96;
      font-size: 12px;
      padding: 6px;
      vertical-align: top;
      min-width: 0;
      overflow-wrap: break-word;
      word-break: normal;
    }
    .ra-staff-doc th { background: #eaf1f5; color: var(--navy); text-align: left; }
    .ra-read-bullets {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px 10px 12px;
      background: #fafcfd;
      min-height: 2.75em;
    }
    .ra-read-bullets-compact { padding: 8px 10px; min-height: 2.25em; }
    .ra-prose-bullets { margin: 0; padding-left: 1.15em; list-style-type: disc; }
    .ra-prose-bullets li { margin: 0.4em 0; line-height: 1.5; color: var(--text); }
    .ra-bullet-empty { margin: 0; color: var(--muted); font-size: 14px; }
    .ra-read-ack-panel {
      background: #f0faf4;
      border: 1px solid #b9e4c5;
      border-radius: var(--radius);
      padding: 14px 16px;
      margin: 14px 0 18px;
    }
    .ra-read-ack-panel h3 { margin: 0 0 8px; font-size: 15px; color: #14532d; }
    .ra-read-ack-panel p { margin: 0 0 10px; font-size: 13px; color: var(--muted); }
    .ra-read-ack-panel .ra-read-ack-fields label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .ra-read-ack-panel .ra-read-ack-fields input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
    }
    .ra-read-done { margin: 0; font-size: 14px; color: #166534; font-weight: 700; }
    .btn-primary {
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 14px;
      cursor: pointer;
    }
    .btn-light {
      background: #e8edf1;
      color: var(--navy);
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 14px;
      cursor: pointer;
    }
    .ra-staff-doc-wrap { background: #fff; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; padding: 8px; }

    #raOverlayBody .cs-staff-sign.pc-staff-ack-injected {
      margin-top: 28px;
      padding: 24px 0 8px;
      border-top: 2px solid #f4b942;
      background: linear-gradient(180deg, #fffef8 0%, #fff 45%);
    }
    #raOverlayBody .cs-staff-sign.pc-staff-ack-injected > h2 {
      font-size: 20px;
      color: #2d3e50;
      margin: 0 0 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid #f4b942;
      font-weight: 700;
    }
    #raOverlayBody .cs-staff-sign-lead {
      font-size: 14px;
      color: #4b5563;
      margin: 0 0 14px;
      line-height: 1.5;
    }
    #raOverlayBody .ra-signer-detected {
      margin: 0 0 14px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      background: #f8fafc;
      font-size: 14px;
      color: #374151;
      line-height: 1.5;
    }
    #raOverlayBody .ra-signer-detected strong { color: #1e293b; }
    #raOverlayBody .ra-signer-warn {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #fbbf24;
      background: #fffbeb;
      font-size: 13px;
      color: #92400e;
    }
    #raOverlayBody .cs-staff-sign-date-row { margin-bottom: 14px; }
    #raOverlayBody .cs-staff-sign-date-row label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    #raOverlayBody .cs-staff-sign-date-row input[type="date"] {
      max-width: 280px;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
      background: #fff;
    }
    #raOverlayBody .cs-staff-canvas-wrap { margin: 12px 0 10px; }
    #raOverlayBody #hs-staff-sign-canvas {
      display: block;
      width: 100%;
      max-width: 520px;
      height: min(44vw, 200px);
      background: #fafafa;
      border: 2px dashed #2d3e50;
      border-radius: 8px;
      touch-action: none;
      cursor: crosshair;
      box-sizing: border-box;
    }
    #raOverlayBody .cs-staff-sign-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }
    #raOverlayBody .cs-staff-sign-clear,
    #raOverlayBody .cs-staff-sign-submit {
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      cursor: pointer;
    }
    #raOverlayBody .cs-staff-sign-clear { background: #fff; color: #374151; }
    #raOverlayBody .cs-staff-sign-submit {
      background: #2d3e50;
      color: #fff;
      border-color: #2d3e50;
    }
    #raOverlayBody .cs-staff-sign-submit:hover {
      background: #f4b942;
      color: #1f2937;
      border-color: #f4b942;
    }
    #raOverlayBody .ra-ack-sig-thumb {
      margin-top: 10px;
      max-width: 280px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
    }

    /* RA overlay: full viewport on phones/tablets (portrait + landscape) */
    @media (max-width: 1024px) {
      #raStaffOverlay.ra-overlay {
        padding: 0;
        align-items: stretch;
        justify-content: stretch;
        overflow: hidden;
        height: 100dvh;
        max-height: 100dvh;
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }
      #raStaffOverlay .ra-sheet {
        margin: 0;
        width: 100%;
        max-width: none;
        min-width: 0;
        min-height: 100%;
        flex: 1 1 auto;
        border-radius: 0;
        border: none;
        box-shadow: none;
        max-height: none;
      }
      #raStaffOverlay #raOverlayBody {
        flex: 1 1 auto;
        min-height: 0;
        min-width: 0;
        max-height: none;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
        padding-top: max(56px, calc(14px + env(safe-area-inset-top, 0px)));
        padding-bottom: calc(22px + env(safe-area-inset-bottom, 0px));
        padding-left: max(14px, env(safe-area-inset-left, 0px));
        padding-right: max(14px, env(safe-area-inset-right, 0px));
      }
      #raStaffOverlay .ra-floating-close {
        position: fixed;
        top: max(10px, env(safe-area-inset-top, 0px));
        right: max(10px, env(safe-area-inset-right, 0px));
        z-index: 10002;
      }
    }
    @media (max-width: 1024px) and (orientation: landscape) {
      #raStaffOverlay #raOverlayBody {
        padding-top: max(52px, calc(10px + env(safe-area-inset-top, 0px)));
      }
      #raOverlayBody #hs-staff-sign-canvas {
        max-height: min(42dvh, 200px);
        height: auto;
        aspect-ratio: 8 / 3;
        max-width: min(520px, 100%);
      }
    }

    @media (max-width: 1180px) {
      .ra-staff-doc .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .ra-staff-doc .grid-4,
      .ra-staff-doc .grid-2 { grid-template-columns: 1fr; }
      .cs-index .cs-idx-hero { flex-direction: column; text-align: center; align-items: center; }
      .ra-ack-log-tbl thead { display: none; }
      .ra-ack-log-tbl, .ra-ack-log-tbl tbody, .ra-ack-log-tbl tr, .ra-ack-log-tbl td { display: block; width: 100%; }
      .ra-ack-log-tbl tr {
        margin-bottom: 14px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        overflow: hidden;
        background: #fff;
      }
      .ra-ack-log-tbl td {
        text-align: center;
        border-bottom: 1px solid #e5e7eb;
        padding: 10px 12px;
      }
      .ra-ack-log-tbl td:last-child { border-bottom: none; }
      .ra-ack-log-tbl td[data-label]:not([data-label=""])::before {
        content: attr(data-label);
        display: block;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #64748b;
        margin-bottom: 4px;
      }
    }
    @media print {
      .no-print, .ra-overlay { display: none !important; }
      body { background: #fff; }
    }
  </style>
</head>
<body>
  <div id="cs-ra-staff">
    <div class="app">
      <div id="mainHome"></div>
    </div>
    <div id="raStaffOverlay" class="ra-overlay no-print" aria-hidden="true">
      <div class="ra-overlay-backdrop" data-ra-close="1" aria-label="Close"></div>
      <div class="ra-sheet" role="dialog" aria-modal="true" aria-label="Risk assessment">
        <button type="button" class="ra-floating-close no-print" id="raBtnClose" data-ra-close="1" aria-label="Close">×</button>
        <div id="raOverlayBody"></div>
      </div>
    </div>
  </div>

ion":"1.0","lastReviewDate":"2025-10-15","nextReviewDate":"2026-04-15","approvedBy":"Raul Salvador Gallego","documentStatus":"Active"},"riskSummary":{"typeOfVenue":"Aquatic Venue / Hydrotherapy Pool","generalRiskLevel":"Medium to High depending on swimmer profile","supervisionModel":"1:1 supervision where required","emergencyProcedureReference":"Venue EAP / NOP / Accident and Incident Reporting","mainRisks":"Unsafe pool entry and exit, slippery pool tank floor and poolside, suction and grill entrapment, damaged tiles, collision with equipment or fixed objects, diving into insufficient depth, microbiological contamination, electrical hazards near water, visibility issues, unsafe steps or access points, and unsecured observation equipment.","generalControlApproach":"Venue controls are supported by trained staff, 1:1 supervision where required, Safety Award training, swimming instructor training, individual risk assessments, monthly or session start briefings, induction content, session procedures, equipment checks, and accident and incident reporting."},"hazards":[{"hazard":"Pool access into hydrotherapy pool","whoMayBeHarmed":"Customers\nEmployees","howMayBeHarmed":"Slips, loss of balance or unsafe entry and exit may cause injury, distress or a fall into the water.","venueControls":"Wall mounted depth marker signs are clearly visible to bathers in and out of the water.\nSwimFarm hydrotherapy pool has a uniform shallow depth of 0.8m and no direct access into deep water.\nEntry and exit are controlled by staff and users are supported according to individual need and risk assessment.\nTrained and competent staff supervise all entries into the water.","clubControls":"1:1 supervision where required\nSafety Award training to swimming teachers\nSwimming instructor training to all staff\nIndividual Risk Assessment\nBriefings with instructors to be completed monthly\nInformation added to the induction sessions\nSwimming session procedure completed\nAccident and Incident repor uction sessions\nSwimming session procedure completed\nAccident and Incident report in place","actionByWhom":"Session Lead","actionByWhen":"Before each session"},{"hazard":"Damaged pool tank tiles","whoMayBeHarmed":"Customers\nEmployees","howMayBeHarmed":"Broken or lifted tiles may cause cuts, trips or damage to feet and hands.","venueControls":"Checks pool tiles for signs of visible damage or tile lifting.","clubControls":"121 Supervision\nReporting System in place","actionByWhom":"Session Lead","actionByWhen":"Before each session"},{"hazard":"Collision with objects or therapy equipment in pool tank","whoMayBeHarmed":"Customers\nEmployees","howMayBeHarmed":"Swimmers may collide with equipment or fixed objects, causing impact injuries, distress or loss of balance.","venueControls":"Ensure floats, noodles, mats and therapy equipment are suitable for hydrotherapy use and removed when not in use.\nEnsure all underwater lights, rails and fixed fittings are flush and in safe condition.\nKeep the pool tank clear of unnecessary equipment during sessions.","clubControls":"1:1 supervision\nReporting System in place\nEquipment checks completed before sessions","actionByWhom":"Swimming Instructor","actionByWhen":"During each session"},{"hazard":"Diving into insufficient depth of water","whoMayBeHarmed":"Customers\nEmployees","howMayBeHarmed":"Diving into 0.8m water may result in serious head, neck or spinal injury.","venueControls":"Ensure all users are prevented from diving and are supported to enter the water safely in line with the pool depth and individual needs.","clubControls":"1:1 supervision\nSafety Award training to swimming teachers\nSwimming instructor training to all staff\nIndividual Risk Assessment\nBriefings with instructors to be completed monthly\nInformation added to the induction sessions\nSwimming session procedure completed\nAccident and Incident report in place","actionByWhom":"All staff on duty","actionByWhen":"Throughout the session"},{"hazard":"Infecti   function expandLineToSentenceFragments(line) {
    line = String(line || "").trim();
    if (!line) return [];
    if (line.indexOf(". ") === -1) return [line];
    var chunks = line.split(". ").map(function (c) {
      return c.trim();
    }).filter(Boolean);
    if (chunks.length < 2) return [line];
    var minLen = 12;
    var shortParts = 0;
    for (var i = 0; i < chunks.length; i++) {
      if (chunks[i].length < minLen) shortParts++;
    }
    if (shortParts > 1) return [line];
    if (chunks.length === 2 && (chunks[0].length < 20 || chunks[1].length < 20)) return [line];
    return chunks.map(function (c, j, arr) {
      if (j < arr.length - 1 && c.slice(-1) !== ".") return c + ".";
      return c;
    });
  }

  function proseToBulletHtml(raw) {
    var text = String(raw == null ? "" : raw).replace(/\r\n/g, "\n");
    var rawLines = text.split("\n");
    var parts = [];
    for (var i = 0; i < rawLines.length; i++) {
      var trimmed = rawLines[i].trim();
      if (!trimmed) continue;
      var frags = expandLineToSentenceFragments(trimmed);
      for (var j = 0; j < frags.length; j++) parts.push(frags[j]);
    }
    if (!parts.length) return '<p class="ra-bullet-empty">—</p>';
    return (
      '<ul class="ra-prose-bullets">' +
      parts
        .map(function (p) {
          return "<li>" + escapeHtml(p) + "</li>";
        })
        .join("") +
      "</ul>"
    );
  }

  function splitLineForVenueClubBullets(line) {

    if (line.indexOf(", ") !== -1) {
      var commaParts = line.split(", ").map(function (p) {

      if (
        commaParts.length >= 2 &&
        commaParts.every(function (p) {

    return expandLineToSentenceFragments(line);

  function raCanvasHasInk(ctx, canvas) {

        if (a < 40) continue;
        var r = img[p];
        var g = img[p + 1];
        var b = img[p + 2];
        if (r < 245 || g < 245 || b < 245) return true;
      }
    } catch (e) {}
    return false;
  }

  function initRaStaffSignOverlay(ra) {
    var readAgain = document.getElementById("raConfirmReadAgainBtn");
    if (readAgain) {
      readAgain.addEventListener("click", function () {
        if (!window.confirm("Replace your saved acknowledgement? You will need to sign again.")) return;
        var all = loadReadAcks();
        delete all[ra.id];
        saveReadAcks(all);
        renderHome();
        raOverlayBody.innerHTML = buildOverlayHtml(ra);
        initRaStaffSignOverlay(ra);
      });
    }

    if (isRaAcknowledgedForUi(ra.id)) return;

    var canvas = raOverlayBody.querySelector("#hs-staff-sign-canvas");
    var dateEl = raOverlayBody.querySelector("#hs-staff-sign-date");
    var btnClear = raOverlayBody.querySelector("#hs-staff-sign-clear");
    if (!canvas || !canvas.getContext || !dateEl || !btnClear) return;
    var ctx = canvas.getContext("2d");
    if (!ctx) return;

    function pad2(n) {
      return (n < 10 ? "0" : "") + n;
    }
    function todayIso() {
      var d = new Date();
      return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
    }
    if (!dateEl.value) dateEl.value = todayIso();

    function fillWhite() {
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    fillWhite();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#1f2937";
    ctx.lineWidth = 2.5;
    var drawing = false;
    function posFromEvent(e) {
      var r = canvas.getBoundingClientRect();
      var sx = canvas.width / r.width;
      var sy = canvas.height / r.height;
      return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
    }
    canvas.addEventListener("pointerdown", function (e) {
      if (e.pointerType === "mouse" && e.buttons !== 1) return;
      drawing = true;
      try {
        canvas.setPointerCapture(e.pointerId);
      } catch (ex2) {}
      var pt = posFromEvent(e);
      ctx.beginPath();
      ctx.moveTo(pt.x, pt.y);
    });
    canvas.addEventListener("pointermove", function (e) {
      if (!drawing) return;
      var pt = posFromEvent(e);
      ctx.lineTo(pt.x, pt.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(pt.x, pt.y);
    });
    function endStroke(e) {
      if (!drawing) return;
      drawing = false;
      try {
        canvas.releasePointerCapture(e.pointerId);
      } catch (ex3) {}
    }
    canvas.addEventListener("pointerup", endStroke);
    canvas.addEventListener("pointercancel", endStroke);
    canvas.addEventListener("pointerleave", function (e) {
      if (e.buttons === 0) drawing = false;
    });
    btnClear.addEventListener("click", function () {
      fillWhite();
    });
    var btnSubmit = raOverlayBody.querySelector("#hs-staff-sign-submit");
    if (btnSubmit) {
      btnSubmit.addEventListener("click", function () {
        submitRaStaffAck(ra, canvas, dateEl, btnSubmit);
      });
    }
  }

    var rows = [];
    for (var k in all) {
      if (Object.prototype.hasOwnProperty.call(all, k)) rows.push({ id: k, row: all[k] });
    }
    rows.sort(function (a, b) {
      return String(b.row.readAt || "").localeCompare(String(a.row.readAt || ""));
    });
    if (!rows.length) {
      logHost.innerHTML = '<p class="ra-ack-log-empty">No completed risk assessments yet.</p>';
      return;
    }
    var head =
      '<table class="ra-ack-log-tbl" role="grid" aria-label="Signed risk assessments"><thead><tr>' +
      "<th>Assessment</th><th>Venue</th><th>Reference</th><th>Version</th><th>Date signed</th><th>Signer</th><th>Role</th><th>Saved</th>" +
      "</tr></thead><tbody>";
    var body = rows
      .map(function (x) {
        var r = x.row;
        var sn = escapeHtml(r.readerName || "—");
        var roleCell = escapeHtml(r.signerRole || r.role || "—");
        var at = r.readAt || "";
        var dateSignedCell = r.dateSigned ? formatDispDate(r.dateSigned) : formatAckWhen(at);
        return (
          "<tr><td data-label=\"Assessment\">" +
          escapeHtml(r.title || "—") +
          "</td><td data-label=\"Venue\">" +
          escapeHtml(r.venue || "—") +
          "</td><td data-label=\"Reference\">" +
          escapeHtml(r.ref || x.id) +
          "</td><td data-label=\"Version\">" +
          escapeHtml(r.version || "—") +
          "</td><td data-label=\"Date signed\">" +
          escapeHtml(dateSignedCell) +
          "</td><td data-label=\"Signer\">" +
          sn +
          "</td><td data-label=\"Role\">" +
          roleCell +
          "</td><td data-label=\"Saved\">" +
          escapeHtml(formatAckWhen(at)) +
          "</td></tr>"
        );
      })
      .join("");
    logHost.innerHTML = head + body + "</tbody></table>";
  }

  function renderHome() {
    if (!mainHome) return;
    var cards = ras
      .map(function (ra) {
        var vis = CARD_VIS[ra.id] || { ic: "📋", ac: "#f4b942" };
        var ack = isRaAcknowledgedForUi(ra.id);
        var pill = ack
          ? '<span class="pc-card-completed-pill" aria-label="Completed">Completed</span>'
          : "";
        var btnLabel = ack ? "Read again →" : "Open & read →";
        return (
          '<div class="cs-card" style="--card-accent:' +
          vis.ac +
          '">' +
          '<div class="cs-ic" aria-hidden="true">' +
          vis.ic +
          "</div>" +
          "<h3>" +
          escapeHtml(ra.documentControl.title || "Risk assessment") +
          "</h3>" +
          '<p class="meta">' +
          escapeHtml(ra.category) +
          " · " +
          escapeHtml(ra.documentControl.documentReference || ra.id) +
          "</p>" +
          '<div class="ra-card-actions">' +
          '<button type="button" class="ra-open-btn" data-ra-id="' +
          escapeAttr(ra.id) +
          '">' +
          btnLabel +
          "</button>" +
          pill +
          "</div></div>"
        );
      })
      .join("");
    mainHome.innerHTML =
      '<div class="cs-index">' +
      '<div class="cs-idx-hero">' +
      '<div class="cs-idx-logo">' +
      '<img src="ELEMENTOR/MEDIOS/F-02-1.png" alt="clubSENsational" width="200" height="200" loading="lazy" decoding="async" />' +
      "</div>" +
      '<div class="cs-idx-text">' +
      '<p class="cs-idx-sub">clubSENsational · Autism Consultancy Services</p>' +
      "<h1>Risk assessments</h1>" +
      "<p>Open each venue risk assessment, read the content, then sign to confirm. Six assessments are listed below.</p>" +
      "</div></div>" +
      '<section class="cs-section" aria-labelledby="ra-sec-list">' +
      '<div class="cs-section-head">' +
      '<h2 id="ra-sec-list" class="cs-section-title">Venue &amp; activity risk assessments</h2>' +
      '<p class="cs-section-desc">Same content as the admin register; this page is read-only for staff with local signing.</p>' +
      "</div>" +
      '<div class="cs-grid">' +
      cards +
      "</div></section></div>";
    renderAckLog(mainHome);
    var btns = mainHome.querySelectorAll("button[data-ra-id]");
    for (var b = 0; b < btns.length; b++) {
      btns[b].addEventListener("click", function () {
        var id = this.getAttribute("data-ra-id");
        if (id) openOverlay(id);
      });
    }
  }

  var raBtnClose = document.getElementById("raBtnClose");
  if (raBtnClose) raBtnClose.addEventListener("click", closeOverlay);
  raOverlay.addEventListener("click", function (e) {
    if (e.target.getAttribute("data-ra-close")) closeOverlay();
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && raOverlay.classList.contains("is-open")) closeOverlay();
  });

  renderHome();
  try {
    window.addEventListener("portal:supabase-ready", function __portalRaSupReady() {
      try {
        portalRaMergeRemoteComplianceAcks();
      } catch (ePr) {}
    });
  } catch (ePre) {}
  setTimeout(function () {
    try {
      portalRaMergeRemoteComplianceAcks();
    } catch (ePrz) {}
  }, 0);
})();
</script>
</body>
</html>
