<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Submit invoice</title>
  <script>
    (function () { try { document.documentElement.classList.add("portal-app-shell"); } catch (_) {} })();
  </script>
  <style>
    body{font-family:Open Sans,Arial,sans-serif;background:#f4f7fb;color:#102238;margin:0}
    .page{max-width:560px;margin:0 auto;padding:16px;padding-bottom:max(16px, env(safe-area-inset-bottom))}
    .card{background:#fff;border:1px solid #e6ecf4;border-radius:14px;box-shadow:0 8px 24px rgba(17,24,39,.06)}
    .head{padding:16px;border-bottom:1px solid #e6ecf4}
    .head-back{display:inline-flex;align-items:center;gap:6px;margin:0 0 10px;padding:0;border:0;background:none;color:#2d84b3;font-size:14px;font-weight:700;cursor:pointer;font:inherit}
    .head h1{margin:0;font-size:22px;color:#0b2a5b}
    .head-intro{margin:8px 0 0;font-size:13px;line-height:1.45;color:#62758a;overflow-wrap:break-word}
    .body{padding:16px;display:grid;gap:14px}
    label{display:block;font-size:12px;font-weight:700;color:#62758a;margin:0 0 6px}
    .inp{width:100%;box-sizing:border-box;border:1px solid #cfd9e8;border-radius:10px;padding:10px 12px;font:inherit;font-size:15px}
    .btn{border:0;border-radius:10px;padding:12px 16px;font-weight:700;font:inherit;cursor:pointer;background:#0b2a5b;color:#fff;width:100%}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .status{font-size:13px;line-height:1.45;min-width:0;overflow-wrap:break-word}
    .status.is-error{color:#b42318}
    .list{margin:0;padding:0;list-style:none}
    .list li{border:1px solid #e6ecf4;border-radius:10px;padding:10px 12px;margin-bottom:8px;min-width:0}
    .list .title{font-weight:700;overflow-wrap:break-word}
    .list .meta{font-size:12px;color:#62758a;margin-top:4px}
    *,*::before,*::after{box-sizing:border-box}
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="head">
        <button type="button" class="head-back" id="backBtn">← Back</button>
        <h1>Submit invoice</h1>
        <p class="head-intro">Upload your monthly contractor invoice (PDF). Payroll will see it in Admin → Payslips for payment.</p>
      </div>
      <form class="body" id="invoiceForm">
        <div>
          <label for="invoiceMonth">Invoice month</label>
          <input class="inp" id="invoiceMonth" name="month" type="month" required />
        </div>
        <div>
          <label for="invoiceFile">Invoice PDF</label>
          <input class="inp" id="invoiceFile" name="file" type="file" accept="application/pdf,.pdf" required />
        </div>
        <p class="status" id="status" hidden></p>
        <button type="submit" class="btn" id="submitBtn">Upload invoice</button>
      </form>
    </div>
    <div class="card" style="margin-top:14px">
      <div class="head"><h1 style="font-size:16px">Your uploaded invoices</h1></div>
      <div class="body" id="historyWrap">
        <p class="status">Loading…</p>
      </div>
    </div>
  </div>
  <script type="module">
    import { bootstrapDashboardSupabase, portalIsOperationsAdminUser } from "/portal/auth-handler.js?v=20260704-ops-admin-invoice";
    import { portalRequireUser, portalUploadPdfAndCreateDocument } from "/portal/portal_documents.js?v=20260423-3";

    const backBtn = document.getElementById("backBtn");
    const form = document.getElementById("invoiceForm");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");
    const historyWrap = document.getElementById("historyWrap");
    const monthInput = document.getElementById("invoiceMonth");

    function setStatus(msg, isError) {
      if (!statusEl) return;
      statusEl.hidden = !msg;
      statusEl.textContent = msg || "";
      statusEl.className = "status" + (isError ? " is-error" : "");
    }

    function monthLabel(ym) {
      if (!/^\d{4}-\d{2}$/.test(String(ym || ""))) return ym || "Invoice";
      const d = new Date(ym + "-01T12:00:00");
      if (Number.isNaN(d.getTime())) return ym;
      return d.toLocaleDateString("en-GB", { month: "long", year: "numeric" });
    }

    function goBack() {
      const params = new URLSearchParams(location.search);
      const from = String(params.get("from") || "").trim().toLowerCase();
      if (from === "staff") {
        location.href = "staff_dashboard.html";
        return;
      }
      if (history.length > 1) {
        history.back();
        return;
      }
      location.href = "staff_dashboard.html";
    }

    backBtn.addEventListener("click", goBack);

    try {
      const now = new Date();
      monthInput.value = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
    } catch (_) {}

    let supabase = null;
    let user = null;

    async function ensureAuth() {
      await bootstrapDashboardSupabase({ page: "staff" });
      const auth = await portalRequireUser();
      supabase = auth.supabase;
      user = auth.user;
      const prof = window.__PORTAL_SUPABASE__ && window.__PORTAL_SUPABASE__.staff_profile;
      const email = user && user.email ? user.email : "";
      if (!portalIsOperationsAdminUser(prof, email)) {
        setStatus("This page is for operations admin (contractor invoices) only.", true);
        submitBtn.disabled = true;
        return false;
      }
      return true;
    }

    async function loadHistory() {
      if (!supabase || !user) return;
      const resp = await supabase
        .from("documents")
        .select("id, title, related_date, created_at, document_type")
        .eq("user_id", user.id)
        .eq("category", "payslips")
        .eq("document_type", "contractor_invoice")
        .order("related_date", { ascending: false })
        .order("created_at", { ascending: false })
        .limit(24);
      if (resp.error) {
        historyWrap.innerHTML = '<p class="status is-error">Could not load invoices.</p>';
        return;
      }
      const rows = resp.data || [];
      if (!rows.length) {
        historyWrap.innerHTML = '<p class="status">No invoices uploaded yet.</p>';
        return;
      }
      historyWrap.innerHTML =
        '<ul class="list">' +
        rows
          .map(function (row) {
            const mk = String(row.related_date || "").slice(0, 7);
            return (
              '<li><div class="title">' +
              (row.title || monthLabel(mk) + " invoice") +
              '</div><div class="meta">' +
              (mk ? monthLabel(mk) : "—") +
              " · uploaded " +
              new Date(row.created_at).toLocaleDateString("en-GB") +
              "</div></li>"
            );
          })
          .join("") +
        "</ul>";
    }

    form.addEventListener("submit", async function (ev) {
      ev.preventDefault();
      if (submitBtn.disabled) return;
      setStatus("");
      const monthVal = String(monthInput.value || "").trim();
      const fileInput = document.getElementById("invoiceFile");
      const file = fileInput && fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
      if (!/^\d{4}-\d{2}$/.test(monthVal)) {
        setStatus("Choose the invoice month.", true);
        return;
      }
      if (!file) {
        setStatus("Choose a PDF file.", true);
        return;
      }
      if (file.type && file.type !== "application/pdf") {
        setStatus("PDF only — choose a .pdf invoice.", true);
        return;
      }
      submitBtn.disabled = true;
      setStatus("Uploading…");
      try {
        const title = "Invoice (" + monthLabel(monthVal) + ")";
        await portalUploadPdfAndCreateDocument({
          blob: file,
          document_type: "contractor_invoice",
          category: "payslips",
          title: title,
          related_date: monthVal + "-01",
          source_page: "contractor_invoice",
          reuseAuth: { supabase, user },
        });
        if (fileInput) fileInput.value = "";
        setStatus("Uploaded. Payroll can view it in Admin → Payslips.");
        await loadHistory();
      } catch (err) {
        console.error(err);
        setStatus(String(err && err.message ? err.message : err || "Upload failed"), true);
      } finally {
        submitBtn.disabled = false;
      }
    });

    void ensureAuth()
      .then(function (ok) {
        if (ok) return loadHistory();
        historyWrap.innerHTML = "";
      })
      .catch(function (err) {
        console.error(err);
        setStatus("Sign in from the staff portal first.", true);
        historyWrap.innerHTML = "";
      });
  </script>
</body>
</html>
