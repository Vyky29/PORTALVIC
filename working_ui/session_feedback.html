<style>
:root{
  --blue:#2d84b3;
  --blueSoft:#e9f3f5;
  --fieldBg:#fff6df;

  --text:#0b1220;
  --muted:#5b6473;
  --line:rgba(11,18,32,0.14);

  --radius:18px;
  --focus:0 0 0 4px rgba(45,132,179,0.18);

  --engBlueBg: rgba(45,132,179,0.14);
  --engBlueBd: rgba(45,132,179,0.45);
  --engBlueTx: #155a7f;

  --engYellowBg: rgba(244,183,64,0.22);
  --engYellowBd: rgba(244,183,64,0.60);
  --engYellowTx: #7a4e00;

  --engGreenBg: rgba(34,197,94,0.18);
  --engGreenBd: rgba(34,197,94,0.55);
  --engGreenTx: #0f5a2a;

  --engGreen2Bg: rgba(16,185,129,0.18);
  --engGreen2Bd: rgba(16,185,129,0.55);
  --engGreen2Tx: #065f46;
}

*{ box-sizing:border-box; }
html, body{ height:100%; }

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(900px 350px at 20% -10%, var(--blueSoft), transparent 60%),
    radial-gradient(700px 300px at 85% 0%, rgba(244,183,64,0.18), transparent 55%),
    #fff;
  padding:24px;
}

.wrap{ max-width:900px; margin:0 auto; width:100%; }
.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:0 10px 30px rgba(11,18,32,0.08);
}

form{ padding:20px; }
.grid{ display:grid; grid-template-columns:1fr; gap:14px; }

.field{
  border:1px solid rgba(11,18,32,0.12);
  border-radius:14px;
  padding:12px;
  background:var(--fieldBg);
}

.field > label:first-child,
.field .fieldLabel{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  font-weight:900;
  margin:0 0 8px;
  color:rgba(11,18,32,0.92);
  line-height:1.2;
}

.sym{
  width:22px;
  height:22px;
  display:inline-grid;
  place-items:center;
  border-radius:8px;
  background:rgba(45,132,179,0.10);
  border:1px solid rgba(45,132,179,0.18);
  color:var(--blue);
  font-size:13px;
  flex:0 0 22px;
}

input, select, textarea{
  width:100%;
  border:1px solid rgba(11,18,32,0.14);
  border-radius:10px;
  padding:10px 12px;
  font-size:16px;
  background:#fff;
}

textarea{ min-height:100px; resize:vertical; }

input:focus, select:focus, textarea:focus{
  outline:none;
  border-color:rgba(45,132,179,0.55);
  box-shadow:var(--focus);
}

.options{
  display:flex;
  flex-wrap:nowrap;
  justify-content:flex-start;
  align-items:flex-start;
  gap:12px;
  overflow-x:auto;
  padding-bottom:6px;
  -webkit-overflow-scrolling:touch;
}

.pill{
  display:inline-flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  padding:12px 16px;
  border-radius:999px;
  border:1px solid rgba(11,18,32,0.16);
  background:#fff;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
  user-select:none;
  min-width:0;
  white-space:normal;
  overflow-wrap:break-word;
  flex:0 0 auto;
}

.options--independence{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  width:100%;
}
.options--independence .pill{
  width:100%;
  min-width:0;
  line-height:1.3;
}

.pill input{
  margin:0;
  accent-color:var(--blue);
  width:18px;
  height:18px;
  flex-shrink:0;
}

.pill:hover{ border-color:rgba(45,132,179,0.45); }

/* Engagement 1–5 colour hint */
.pill.rate.isSelected[data-value="1"],
.pill.rate.isSelected[data-value="2"]{
  background:var(--engBlueBg);
  border-color:var(--engBlueBd);
  color:var(--engBlueTx);
}
.pill.rate.isSelected[data-value="3"]{
  background:var(--engYellowBg);
  border-color:var(--engYellowBd);
  color:var(--engYellowTx);
}
.pill.rate.isSelected[data-value="4"]{
  background:var(--engGreenBg);
  border-color:var(--engGreenBd);
  color:var(--engGreenTx);
}
.pill.rate.isSelected[data-value="5"]{
  background:var(--engGreen2Bg);
  border-color:var(--engGreen2Bd);
  color:var(--engGreen2Tx);
}

.pill.emotion.isSelected[data-value="Withdrawn"]{
  background:var(--engBlueBg);
  border-color:var(--engBlueBd);
  color:var(--engBlueTx);
}
.pill.emotion.isSelected[data-value="Happy/Excited"]{
  background:var(--engGreen2Bg);
  border-color:var(--engGreen2Bd);
  color:var(--engGreen2Tx);
}
.pill.emotion.isSelected[data-value="Anxious"]{
  background:var(--engYellowBg);
  border-color:var(--engYellowBd);
  color:var(--engYellowTx);
}
.pill.emotion.isSelected[data-value="Out of control"]{
  background:rgba(239,68,68,0.16);
  border-color:rgba(220,38,38,0.45);
  color:#991b1b;
}

.patternGrid{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.patternGrid .pill{
  white-space:normal;
  flex:1 1 calc(50% - 6px);
  min-width:140px;
}

.patternGrid .pill.isSelected{
  background:rgba(45,132,179,0.12);
  border-color:rgba(45,132,179,0.45);
  color:var(--engBlueTx);
}

.note{
  margin-top:10px;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(244,183,64,0.45);
  background:rgba(244,183,64,0.20);
  color:rgba(11,18,32,0.88);
  font-size:13px;
  line-height:1.4;
  display:none;
}

.actions{
  margin-top:18px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
  border-top:1px solid rgba(11,18,32,0.10);
  padding-top:16px;
}

button{
  padding:12px 16px;
  border-radius:12px;
  border:none;
  font-weight:900;
  font-size:14px;
  cursor:pointer;
}

.btnPrimary{
  background:var(--blue);
  color:#fff;
  box-shadow:0 10px 22px rgba(45,132,179,0.22);
}

.btnGhost{
  background:rgba(11,18,32,0.04);
  border:1px solid rgba(11,18,32,0.10);
}

.small{
  font-size:12px;
  color:var(--muted);
  line-height:1.4;
  margin-top:6px;
}

.req{ color:#b91c1c; font-weight:900; margin-left:4px; }

.session-feedback-summary{
  margin:0 0 18px;
  padding:0 0 14px;
  border-bottom:1px solid var(--line);
  font-size:15px;
  line-height:1.55;
  color:var(--text);
}
.session-feedback-summary__line{
  margin:0 0 6px;
}
.session-feedback-summary__line:last-child{
  margin-bottom:0;
}

@media (max-width:720px){
  body{ padding:14px; }
  form{ padding:16px; }
  .actions{ flex-wrap:wrap; }
  .actions button{ flex:1 1 160px; }
}

@media (max-width:520px){
  .options{
    flex-wrap:wrap;
    overflow-x:visible;
    padding-bottom:0;
  }
  .pill{ flex:1 1 calc(50% - 6px); justify-content:flex-start; }
  .patternGrid .pill{ flex:1 1 100%; }
  .options--independence{ grid-template-columns:1fr; }
}
</style>

<body>
<div class="wrap">
  <div class="card">
    <!-- Answers are not saved until Submit succeeds; closing the tab mid-form leaves no draft in storage. -->
    <form id="feedbackForm" novalidate>
      <div id="sessionFeedbackSummary" class="session-feedback-summary" hidden aria-live="polite"></div>
      <div class="grid">

        <div class="field">
          <label><span class="sym">⭐</span> Engagement <span class="req">*</span></label>
          <div class="options" role="radiogroup" aria-label="Engagement rating">
            <label class="pill rate" data-kind="rating" data-value="1"><input type="radio" name="engagementRating" value="1" required> 1</label>
            <label class="pill rate" data-kind="rating" data-value="2"><input type="radio" name="engagementRating" value="2"> 2</label>
            <label class="pill rate" data-kind="rating" data-value="3"><input type="radio" name="engagementRating" value="3"> 3</label>
            <label class="pill rate" data-kind="rating" data-value="4"><input type="radio" name="engagementRating" value="4"> 4</label>
            <label class="pill rate" data-kind="rating" data-value="5"><input type="radio" name="engagementRating" value="5"> 5</label>
          </div>
        </div>

        <div class="field">
          <label><span class="sym">🌈</span> Participant Emotions / Regulation <span class="req">*</span></label>
          <p class="small" style="margin:0 0 8px;font-weight:600;color:var(--muted)">Select all that apply.</p>
          <div class="options" role="group" aria-label="Participant emotions and regulation (multiple selection)">
            <label class="pill emotion" data-kind="emotion" data-value="Withdrawn"><input type="checkbox" name="clientEmotions" value="Withdrawn"> Withdrawn</label>
            <label class="pill emotion" data-kind="emotion" data-value="Happy/Excited"><input type="checkbox" name="clientEmotions" value="Happy/Excited"> Happy/Excited</label>
            <label class="pill emotion" data-kind="emotion" data-value="Anxious"><input type="checkbox" name="clientEmotions" value="Anxious"> Anxious</label>
            <label class="pill emotion" data-kind="emotion" data-value="Out of control"><input type="checkbox" name="clientEmotions" value="Out of control"> Out of control</label>
          </div>
        </div>

        <div class="field">
          <label><span class="sym">🧭</span> Independence <span class="req">*</span></label>
          <div class="options options--independence" role="radiogroup" aria-label="Independence">
            <label class="pill" data-kind="independence" data-value="Independent during activities"><input type="radio" name="independenceLevel" value="Independent during activities" required> Independent during activities</label>
            <label class="pill" data-kind="independence" data-value="Mostly independent with minimal prompts"><input type="radio" name="independenceLevel" value="Mostly independent with minimal prompts"> Mostly independent with minimal prompts</label>
            <label class="pill" data-kind="independence" data-value="Required regular support"><input type="radio" name="independenceLevel" value="Required regular support"> Required regular support</label>
            <label class="pill" data-kind="independence" data-value="Required full support"><input type="radio" name="independenceLevel" value="Required full support"> Required full support</label>
            <label class="pill" data-kind="independence" data-value="Not applicable today"><input type="radio" name="independenceLevel" value="Not applicable today"> Not applicable today</label>
          </div>
        </div>

        <div class="field">
          <label><span class="sym">📝</span> Positive feedback <span class="small" style="display:inline;margin:0;font-weight:700;color:var(--muted);">(optional)</span></label>
          <textarea name="positiveFeedback" placeholder="What went well"></textarea>
        </div>

        <div class="field">
          <label><span class="sym">ℹ️</span> Relevant information <span class="small" style="display:inline;margin:0;font-weight:700;color:var(--muted);">(optional)</span></label>
          <textarea name="relevantInformation" placeholder="Session notes, parent updates, or context for follow-up"></textarea>
        </div>

        <div class="actions">
          <button type="button" class="btnGhost" id="clearBtn">Clear</button>
          <button type="submit" class="btnPrimary" id="submitBtn">Submit</button>
        </div>

      </div>
    </form>
  </div>
</div>

<script>
(function(){
  const PORTAL_AUTH_MODULE = "https://www.clubsensational.org/wp-content/uploads/2026/05/auth-handler.js?v=20260506-portal-interactions";
  const PORTAL_SESSION_REVIEW_MAP_STORAGE = "portalSessionReviewMap_v1";
  const PORTAL_CLIENTS_INFO_SCRIPT = "https://www.clubsensational.org/wp-content/uploads/2026/05/clients_info_embed.js?v=20260506-portal-interactions";
  const PORTAL_SPREADSHEET_BUNDLE_SCRIPT = "https://www.clubsensational.org/wp-content/uploads/2026/05/staff_dashboard_spreadsheet_bundle.js?v=20260506-portal-interactions";

  const qs = new URLSearchParams(typeof window !== "undefined" && window.location ? window.location.search : "");
  const portalSessionKey = (qs.get("sessionKey") || "").trim();
  let portalName = (qs.get("name") || qs.get("clientName") || qs.get("client") || "").trim();
  let portalDate = (qs.get("date") || "").trim();
  let portalService = (qs.get("service") || "").trim();
  let portalTime = (qs.get("time") || qs.get("sessionTime") || "").trim();
  let portalClientId = (qs.get("clientId") || "").trim();
  try{
    if(portalName.indexOf("%") !== -1) portalName = decodeURIComponent(portalName);
  }catch(_){}
  try{
    if(portalService.indexOf("%") !== -1) portalService = decodeURIComponent(portalService);
  }catch(_){}
  try{
    if(portalTime.indexOf("%") !== -1) portalTime = decodeURIComponent(portalTime);
  }catch(_){}
  try{
    if(portalClientId.indexOf("%") !== -1) portalClientId = decodeURIComponent(portalClientId);
  }catch(_){}

  const form = document.getElementById("feedbackForm");
  const clearBtn = document.getElementById("clearBtn");
  const submitBtn = document.getElementById("submitBtn");
  const summaryEl = document.getElementById("sessionFeedbackSummary");

  function clearPhase2RadiosOnly(){
    form.querySelectorAll('input[name="engagementRating"]').forEach(function(inp){ inp.checked = false; });
    form.querySelectorAll('input[name="clientEmotions"]').forEach(function(inp){ inp.checked = false; });
    form.querySelectorAll('input[name="independenceLevel"]').forEach(function(inp){ inp.checked = false; });
  }

  function loadPortalScriptOnce(src){
    return new Promise(function(resolve, reject){
      const nodes = document.getElementsByTagName("script");
      for(let i = 0; i < nodes.length; i++){
        if(nodes[i].src === src){ resolve(); return; }
      }
      const s = document.createElement("script");
      s.src = src;
      s.async = true;
      s.onload = function(){ resolve(); };
      s.onerror = function(){ reject(new Error("load failed: " + src)); };
      document.head.appendChild(s);
    });
  }

  function slugifyPortal(value){
    return String(value || "")
      .toLowerCase()
      .trim()
      .replace(/[^a-z0-9]+/g, "_")
      .replace(/^_+|_+$/g, "");
  }

  function parseHmPortal(token){
    const t = String(token || "").trim();
    const parts = t.split(".");
    const h = parseInt(parts[0], 10) || 0;
    const m = parts.length > 1 ? (parseInt(parts[1], 10) || 0) : 0;
    return { h: h, m: m };
  }

  function hourTo24Portal(hour, day){
    if(day !== "Sunday" && hour < 8) return hour + 12;
    if(day === "Sunday" && hour >= 1 && hour <= 3) return hour + 12;
    return hour;
  }

  function parseTimeSlotPortal(timeSlot, day){
    const normalized = String(timeSlot || "")
      .replace(/\s*-\s*/g, " to ")
      .replace(/\s+/g, " ")
      .trim();
    const parts = normalized.split(/\s+to\s+/i);
    if(parts.length < 2){
      return { start: "16:00", end: "16:30" };
    }
    const a = parseHmPortal(parts[0]);
    const b = parseHmPortal(parts[1]);
    const ah = hourTo24Portal(a.h, day);
    const bh = hourTo24Portal(b.h, day);
    const start = String(ah).padStart(2, "0") + ":" + String(a.m).padStart(2, "0");
    const end = String(bh).padStart(2, "0") + ":" + String(b.m).padStart(2, "0");
    return { start: start, end: end };
  }

  function weekdayLongFromIso(iso){
    const s = String(iso || "").trim();
    if(!/^\d{4}-\d{2}-\d{2}$/.test(s)) return "";
    const p = s.split("-").map(Number);
    const d = new Date(p[0], p[1] - 1, p[2]);
    if(Number.isNaN(d.getTime())) return "";
    return d.toLocaleDateString("en-GB", { weekday: "long" });
  }

  async function enrichPortalSessionContext(){
    const fromKey = parseSessionKey(portalSessionKey);
    const cid = String(portalClientId || fromKey.client_id || "").trim();
    if(!cid || cid === "available" || cid === "closed") return;
    const sessionDate = portalDate && /^\d{4}-\d{2}-\d{2}$/.test(portalDate) ? portalDate : fromKey.session_date;
    const startKey = String(fromKey.session_time || "").trim();
    const wd = weekdayLongFromIso(sessionDate);

    if(!portalName.replace(/\+/g, " ").trim()){
      try{
        if(!Array.isArray(window.PORTAL_CLIENTS_INFO_ROWS)){
          await loadPortalScriptOnce(PORTAL_CLIENTS_INFO_SCRIPT);
        }
        const rows = window.PORTAL_CLIENTS_INFO_ROWS;
        if(Array.isArray(rows)){
          for(let i = 0; i < rows.length; i++){
            const r = rows[i];
            const nm = String(r && r.client_name != null ? r.client_name : "").trim();
            if(nm && slugifyPortal(nm) === cid){
              portalName = nm;
              break;
            }
          }
        }
      }catch(_){}
    }

    const needService = !portalService.trim();
    const needTime = !portalTime.trim();
    if(needService || needTime){
      try{
        if(!window.STAFF_DASHBOARD_SOURCE || !Array.isArray(window.STAFF_DASHBOARD_SOURCE.rows)){
          await loadPortalScriptOnce(PORTAL_SPREADSHEET_BUNDLE_SCRIPT);
        }
        const src = window.STAFF_DASHBOARD_SOURCE;
        const rows = src && Array.isArray(src.rows) ? src.rows : [];
        for(let i = 0; i < rows.length; i++){
          const r = rows[i];
          const nameRaw = String(r.client_name || "").trim();
          const nameLower = nameRaw.toLowerCase();
          if(!nameRaw || nameLower === "closed") continue;
          if(slugifyPortal(nameRaw) !== cid) continue;
          if(wd && String(r.day || "").trim() !== wd) continue;
          if(startKey){
            const t = parseTimeSlotPortal(r.time_slot, String(r.day || "").trim());
            if(t.start !== startKey) continue;
          }
          if(needService && r.service) portalService = String(r.service).trim();
          if(needTime && r.time_slot) portalTime = String(r.time_slot).trim();
          if(!portalName.replace(/\+/g, " ").trim()) portalName = nameRaw;
          break;
        }
      }catch(_){}
    }
  }

  function parseSessionKey(sk){
    const raw = String(sk || "").trim();
    const parts = raw.split("|");
    const d0 = (parts[0] || "").trim();
    return {
      session_date: /^\d{4}-\d{2}-\d{2}$/.test(d0) ? d0 : "",
      session_time: (parts[1] || "").trim(),
      client_id: (parts[2] || "").trim()
    };
  }

  function buildResolvedContext(){
    const fromKey = parseSessionKey(portalSessionKey);
    let session_date = portalDate && /^\d{4}-\d{2}-\d{2}$/.test(portalDate) ? portalDate : fromKey.session_date;
    const session_time = (portalTime || fromKey.session_time || "").trim() || null;
    const client_id = (portalClientId || fromKey.client_id || "").trim() || null;
    let client_name = portalName.replace(/\+/g, " ").trim();
    const service = portalService.trim();
    return { session_date, session_time, client_id, client_name, service };
  }

  function isPlaceholderClientName(name, clientId){
    const n = String(name || "").trim();
    const id = String(clientId || "").trim();
    if(!n || !id) return true;
    if(n === "Client " + id) return true;
    if(/^Client\s+[a-z0-9_]+$/i.test(n)) return true;
    return false;
  }

  function validateContextForSubmit(ctx){
    const missing = [];
    if(!ctx.session_date) missing.push("session date (needs a valid sessionKey date segment YYYY-MM-DD)");
    if(!clean(ctx.service)) missing.push("service (add ?service=… or ensure roster bundle can match this session)");
    if(!ctx.client_name || isPlaceholderClientName(ctx.client_name, ctx.client_id)){
      missing.push("participant name (add ?name=… or ensure clients_info embed lists this participant id)");
    }
    return missing;
  }

  function formatSessionDateForDisplay(iso){
    const s = String(iso || "").trim();
    if(!/^\d{4}-\d{2}-\d{2}$/.test(s)) return "";
    const p = s.split("-").map(Number);
    const d = new Date(p[0], p[1] - 1, p[2]);
    if(Number.isNaN(d.getTime())) return "";
    return d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  }

  function syncSessionSummary(){
    if(!summaryEl) return;
    summaryEl.replaceChildren();
    const ctx = buildResolvedContext();
    const nameDisp = portalName.replace(/\+/g, " ").trim();
    if(nameDisp && !isPlaceholderClientName(nameDisp, ctx.client_id)){
      const row = document.createElement("div");
      row.className = "session-feedback-summary__line";
      row.textContent = "Participant: " + nameDisp;
      summaryEl.appendChild(row);
    }
    const svc = clean(ctx.service);
    if(svc){
      const row = document.createElement("div");
      row.className = "session-feedback-summary__line";
      row.textContent = "Service: " + svc;
      summaryEl.appendChild(row);
    }
    const dateLine = formatSessionDateForDisplay(ctx.session_date);
    if(dateLine){
      const row = document.createElement("div");
      row.className = "session-feedback-summary__line";
      row.textContent = "Date: " + dateLine;
      summaryEl.appendChild(row);
    }
    const timeDisp = clean(portalTime) || clean(ctx.session_time || "");
    if(timeDisp){
      const row = document.createElement("div");
      row.className = "session-feedback-summary__line";
      row.textContent = "Time: " + timeDisp;
      summaryEl.appendChild(row);
    }
    summaryEl.hidden = summaryEl.childElementCount === 0;
  }

  function persistPortalSessionFeedbackDone(){
    if(!portalSessionKey) return;
    try{
      const raw = localStorage.getItem(PORTAL_SESSION_REVIEW_MAP_STORAGE) || "{}";
      const o = JSON.parse(raw);
      const base = o && typeof o === "object" ? o : {};
      const prev = base[portalSessionKey] && typeof base[portalSessionKey] === "object" ? base[portalSessionKey] : {};
      base[portalSessionKey] = {
        feedbackDone: true,
        incident: !!prev.incident,
        absent: !!prev.absent,
        cancelled: !!prev.cancelled,
      };
      localStorage.setItem(PORTAL_SESSION_REVIEW_MAP_STORAGE, JSON.stringify(base));
    }catch(_){}
  }

  function portalRedirectAfterFeedbackSubmit(){
    try{
      if(typeof portalGetPortalReturnUrl === "function" && typeof portalRedirectToPortalReturn === "function"){
        if(portalGetPortalReturnUrl()){
          portalRedirectToPortalReturn();
          return;
        }
      }
    }catch(_){}
    const params = new URLSearchParams(window.location.search);
    const returnUrl = params.get("return");
    const storedReturn = sessionStorage.getItem("__portal_feedback_return_v1");
    const baseTarget = returnUrl || storedReturn || "/p1/";
    let origin = "dashboard";
    try{
      const probe = new URL(baseTarget, window.location.href);
      origin = probe.searchParams.get("portalReviewOrigin") || sessionStorage.getItem("__portal_feedback_origin_v1") || "dashboard";
    }catch(_){
      origin = sessionStorage.getItem("__portal_feedback_origin_v1") || "dashboard";
    }
    try{ sessionStorage.removeItem("__portal_feedback_origin_v1"); }catch(_){}
    if(origin !== "this_week" && origin !== "term" && origin !== "dashboard") origin = "dashboard";
    let target = baseTarget;
    try{
      const u = new URL(baseTarget, window.location.href);
      u.searchParams.delete("portalPostFeedback");
      u.searchParams.delete("portalReviewDay");
      u.searchParams.delete("portalReviewDate");
      u.searchParams.set("portalAfterFeedback", "1");
      u.searchParams.set("portalReviewOrigin", origin);
      target = u.href;
    }catch(_){}
    window.location.href = target;
  }

  function clean(t){ return (t || "").replace(/\s+/g, " ").trim(); }

  /** Same rota key as dashboard `portalStaffKeyForRotaFromProfile` — used only to restore spreadsheet user after feedback return. */
  function portalStaffKeyForRotaFromProfileMirror(p){
    var raw = String((p && p.username) || "").trim();
    if(!raw) raw = String((p && p.full_name) || "").trim();
    if(!raw) return "";
    var first = (raw.split(/\s+/).filter(Boolean)[0] || raw);
    return String(first)
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9]+/g, "");
  }

  /**
   * @param {string} appRole from staff_profiles.app_role
   * @returns {"staff"|"lead"}
   */
  function feedbackRoleFromProfile(appRole){
    return String(appRole || "").toLowerCase() === "lead" ? "lead" : "staff";
  }

  function syncPillSelection(){
    const fd = new FormData(form);
    ["rating","independence"].forEach(kind => {
      form.querySelectorAll('.pill[data-kind="' + kind + '"]').forEach(p => {
        const val = p.getAttribute("data-value") || "";
        let selected = "";
        if(kind === "rating") selected = (fd.get("engagementRating") || "").toString();
        if(kind === "independence") selected = (fd.get("independenceLevel") || "").toString();
        p.classList.toggle("isSelected", val === selected);
      });
    });
    form.querySelectorAll('.pill[data-kind="emotion"]').forEach(p => {
      const inp = p.querySelector('input[type="checkbox"][name="clientEmotions"]');
      p.classList.toggle("isSelected", !!(inp && inp.checked));
    });
  }

  form.addEventListener("change", (ev) => {
    syncPillSelection();
  });

  form.addEventListener("input", () => {
    syncPillSelection();
  });

  clearBtn.addEventListener("click", () => {
    form.reset();
    clearPhase2RadiosOnly();
    syncPillSelection();
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    if(!form.checkValidity()){
      form.reportValidity();
      return;
    }

    const emotionChecked = Array.from(form.querySelectorAll('input[name="clientEmotions"]:checked'));
    if(!emotionChecked.length){
      alert("Please select at least one option under Participant Emotions / Regulation.");
      return;
    }

    try{
      await enrichPortalSessionContext();
    }catch(_){}

    const ctx = buildResolvedContext();
    const missingCtx = validateContextForSubmit(ctx);
    if(missingCtx.length){
      alert("Cannot submit feedback yet. Missing or unresolved:\n• " + missingCtx.join("\n• "));
      return;
    }

    const data = new FormData(form);
    const positiveFeedback = (data.get("positiveFeedback") || "").toString();
    const relevantInformation = (data.get("relevantInformation") || "").toString();

    const hasPositiveFeedback = clean(positiveFeedback).length > 0;
    const hasRelevantInformation = clean(relevantInformation).length > 0;
    const attendanceVal = "Yes";
    const engagementRatingRaw = (data.get("engagementRating") || "").toString();
    const engagementRatingParsed = parseInt(engagementRatingRaw, 10);
    const engagementRating = engagementRatingRaw && Number.isFinite(engagementRatingParsed)
      ? engagementRatingParsed
      : null;
    const clientEmotionsVal = emotionChecked.map(function(inp){ return String(inp.value || "").trim(); }).filter(Boolean).join("; ");
    const independenceLevel = (data.get("independenceLevel") || "").toString();

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting";

    try{
      const { getSupabaseClient } = await import(PORTAL_AUTH_MODULE);
      const supabase = getSupabaseClient();
      const { data: authData, error: authUserErr } = await supabase.auth.getUser();
      if(authUserErr) throw authUserErr;
      const authUser = authData && authData.user;
      const submittedByUserId = authUser && authUser.id ? String(authUser.id).trim() : "";
      if(!submittedByUserId){
        alert("User not authenticated");
        return;
      }

      const { data: profileRow, error: profileErr } = await supabase
        .from("staff_profiles")
        .select("app_role, full_name, username")
        .eq("id", submittedByUserId)
        .maybeSingle();
      if(profileErr) throw profileErr;
      const appRole = profileRow && profileRow.app_role ? String(profileRow.app_role) : "";
      const feedbackRole = feedbackRoleFromProfile(appRole);
      const completedByName = clean(profileRow && (profileRow.full_name || profileRow.username) ? String(profileRow.full_name || profileRow.username) : "");
      if(!completedByName){
        alert("Your staff profile is missing a display name. Ask an admin to set full_name on your profile, then try again.");
        return;
      }

      const row = {
        submitted_by_user_id: submittedByUserId,
        feedback_role: feedbackRole,
        portal_session_key: portalSessionKey || null,
        client_id: ctx.client_id,
        client_name: ctx.client_name,
        session_date: ctx.session_date,
        session_time: ctx.session_time,
        service: ctx.service,
        attendance: attendanceVal,
        engagement_rating: engagementRating,
        engagement_patterns: independenceLevel ? [independenceLevel] : [],
        positive_feedback: positiveFeedback || null,
        client_emotions: clientEmotionsVal || null,
        relevant_information: relevantInformation || null,
        exceptional_challenges: null,
        incidents: null,
        completed_by_name: completedByName,
        has_positive_feedback: hasPositiveFeedback,
        has_relevant_information: hasRelevantInformation,
        has_exceptional_challenges: false
      };

      const { error: insertErr } = await supabase.from("session_feedback").insert([row]);
      if(insertErr) throw insertErr;

      try{
        var _rotaReturn = portalStaffKeyForRotaFromProfileMirror(profileRow);
        if(_rotaReturn) sessionStorage.setItem("__portal_feedback_staff_rota_key_v1", _rotaReturn);
      }catch(_){}

      persistPortalSessionFeedbackDone();
      portalRedirectAfterFeedbackSubmit();
      return;
    }catch(err){
      console.error(err);
      const msg = err && err.message ? String(err.message) : "";
      const hint = err && err.code ? " (" + err.code + ")" : "";
      alert("Submission failed. Please try again." + (msg ? "\n" + msg + hint : ""));
    }finally{
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit";
    }
  });

  enrichPortalSessionContext().then(function(){
    syncSessionSummary();
  }).catch(function(){
    syncSessionSummary();
  });
  syncPillSelection();
})();
</script>
