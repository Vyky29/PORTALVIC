<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Risk assessments — clubSENsational</title>
  <style>
    :root {
      --navy: #17354d;
      --gold: #f4b942;
      --bg: #f5f7f9;
      --line: #cfd8df;
      --text: #1f2a33;
      --muted: #5f6b76;
      --white: #ffffff;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; color: var(--text); background: var(--bg); }
    .app { max-width: min(1200px, 100%); margin: 0 auto; padding: 16px 14px 28px; }
    #mainHome { min-width: 0; }
    #mainHome .ra-page-load-hint { margin: 0; color: #5f6b76; font-size: 14px; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; line-height: 1.45; }

    #cs-ra-staff {
      isolation: isolate;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 100%;
      line-height: 1.45;
      text-align: left;
    }

    .cs-index {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1f2937;
      max-width: 1080px;
      margin: 0 auto;
      min-width: 0;
    }
    .cs-index .cs-idx-hero {
      background: linear-gradient(135deg, #2d3e50 0%, #1e2f40 100%);
      color: #fff;
      padding: 40px 32px 36px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 22px;
      position: relative;
      overflow: hidden;
    }
    .cs-index .cs-idx-hero::after {
      content: "";
      position: absolute;
      top: -50%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(244, 185, 66, 0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .cs-index .cs-idx-logo {
      flex: 0 0 auto;
      width: 200px;
      height: 200px;
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      position: relative;
      z-index: 1;
    }
    .cs-index .cs-idx-logo img {
      width: 100%;
      height: auto;
      max-height: 168px;
      object-fit: contain;
      object-position: center;
      display: block;
    }
    .cs-index .cs-idx-text {
      flex: 1;
      min-width: 0;
      max-width: 38rem;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .cs-index .cs-idx-hero .cs-idx-sub {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f4b942;
      font-weight: 600;
      margin: 0 0 6px;
    }
    .cs-index .cs-idx-hero h1 { margin: 0 0 8px; font-size: clamp(1.35rem, 4vw, 2rem); color: #fff; font-weight: 700; line-height: 1.15; }
    .cs-index .cs-idx-hero p { margin: 0; opacity: 0.9; font-size: 15px; color: #e5e7eb; line-height: 1.45; }
    .cs-index .cs-section { margin-top: 28px; }
    .cs-index .cs-section:first-of-type { margin-top: 22px; }
    .cs-index .cs-section-title {
      font-size: 13px;
      font-weight: 700;
      color: #2d3e50;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 0 0 4px;
    }
    .cs-index .cs-section-desc { font-size: 13px; color: #6b7280; margin: 0 0 14px; line-height: 1.45; }
    .cs-index .cs-section-head { border-bottom: 2px solid #f4b942; padding-bottom: 10px; margin-bottom: 14px; }
    .cs-index .cs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
      gap: 16px;
    }
    .cs-index .cs-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      border-top: 3px solid var(--card-accent, #f4b942);
      min-width: 0;
    }
    .cs-index .cs-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(45, 62, 80, 0.15); }
    .cs-index .cs-card .cs-ic { font-size: 26px; margin-bottom: 8px; line-height: 1; }
    .cs-index .cs-card h3 { font-size: 17px; margin: 0 0 8px; color: #2d3e50; line-height: 1.25; overflow-wrap: break-word; }
    .cs-index .cs-card .meta { font-size: 12px; color: #6b7280; margin: 0 0 10px; overflow-wrap: break-word; }
    .cs-index .cs-card .ra-card-actions { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
    .cs-index .cs-card button.ra-open-btn {
      margin-top: 0;
      background: #2d3e50;
      color: #fff;
      text-align: center;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      max-width: 100%;
    }
    .cs-index .cs-card button.ra-open-btn:hover { background: #f4b942; color: #2d3e50; }

    .ra-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      align-items: flex-start;
      justify-content: center;
      padding: 52px 16px 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .ra-overlay.is-open { display: flex; }
    .ra-overlay-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      cursor: pointer;
    }
    .ra-sheet {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 920px;
      margin: 24px auto 40px;
      background: var(--white);
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      border: 1px solid var(--line);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 48px);
    }
    .ra-floating-close {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 12;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      font-size: 24px;
      line-height: 1;
      color: var(--navy);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .ra-floating-close:hover { background: var(--gold); border-color: var(--gold); color: #1f2937; }
    .ra-sheet-toolbar {
      position: relative;
      z-index: 11;
      flex-shrink: 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      padding: 12px 56px 10px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .ra-sheet-toolbar .ra-btn-pdf {
      background: #17354d;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .ra-sheet-toolbar .ra-btn-pdf:hover:not(:disabled) {
      background: #f4b942;
      color: #1f2937;
    }
    .ra-sheet-toolbar .ra-btn-pdf:disabled {
      opacity: 0.65;
      cursor: wait;
    }
    #raOverlayBody {
      max-height: calc(100vh - 48px);
      overflow: auto;
      padding: 16px 18px 22px;
      text-align: left;
      background: #fafbfc;
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
    }

    .ra-staff-doc .document-header {
      background: #d7e2e8;
      border-bottom: 2px solid var(--navy);
      padding: 15px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      border-radius: 10px 10px 0 0;
      margin: -8px -8px 0 -8px;
    }
    .ra-staff-doc .document-header h2 { margin: 0; color: var(--navy); font-size: clamp(1.1rem, 3vw, 1.35rem); overflow-wrap: break-word; }
    .ra-staff-doc .document-header p { margin: 5px 0 0; color: var(--muted); font-size: 13px; overflow-wrap: break-word; }
    .ra-staff-doc .section { padding: 16px 14px; border-bottom: 1px solid #e7edf1; background: #fff; margin: 0 -8px; }
    .ra-staff-doc .section-title {
      margin: 0 0 11px;
      color: var(--navy);
      font-size: 17px;
      font-weight: 700;
    }
    .ra-staff-doc .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .ra-staff-doc .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .ra-staff-doc .field label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.4px;
      margin-bottom: 5px;
      color: var(--muted);
    }
    .ra-staff-doc .field input,
    .ra-staff-doc .field textarea,
    .ra-staff-doc .field select {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 14px;
      background: #f1f5f8;
      color: var(--text);
      cursor: default;
    }
    .ra-staff-doc .field textarea { min-height: 2.75em; resize: none; white-space: pre-wrap; }
    .ra-staff-doc table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
      margin-top: 8px;
    }
    .ra-staff-doc th,
    .ra-staff-doc td {
      border: 1px solid #7f8c96;
      font-size: 12px;
      padding: 6px;
      vertical-align: top;
      min-width: 0;
      overflow-wrap: break-word;
      word-break: normal;
      hyphens: none;
      -webkit-hyphens: none;
    }
    .ra-staff-doc th { background: #eaf1f5; color: var(--navy); text-align: left; }
    .ra-read-bullets {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px 10px 12px;
      background: #fafcfd;
      min-height: 2.75em;
    }
    .ra-read-bullets-compact { padding: 8px 10px; min-height: 2.25em; }
    .ra-prose-bullets { margin: 0; padding-left: 1.15em; list-style-type: disc; }
    .ra-prose-bullets li { margin: 0.4em 0; line-height: 1.5; color: var(--text); }
    .ra-bullet-empty { margin: 0; color: var(--muted); font-size: 14px; }
    .ra-staff-doc-wrap { background: #fff; border: 1px solid var(--line); border-radius: 10px; overflow: visible; padding: 8px; }
    /* Wide risk table: horizontal scroll instead of squashed columns */
    .ra-hazard-scroll-hint {
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }
    .ra-hazard-table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
      max-width: 100%;
      margin: 4px 0 0;
      padding-bottom: 8px;
      border-radius: 8px;
    }
    .ra-staff-doc #hazardTable {
      width: 100%;
      min-width: 1180px;
      table-layout: auto;
      margin-top: 4px;
    }
    .ra-staff-doc #hazardTable th,
    .ra-staff-doc #hazardTable td {
      font-size: 13px;
      line-height: 1.5;
      padding: 10px 12px;
      hyphens: none;
      -webkit-hyphens: none;
      word-break: normal;
      overflow-wrap: break-word;
      vertical-align: top;
    }
    .ra-staff-doc #hazardTable th {
      white-space: normal;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.02em;
    }
    .ra-staff-doc #hazardTable .ra-hazard-read-cell {
      min-width: 7.5rem;
    }
    .ra-staff-doc #hazardTable .ra-hazard-read-cell:nth-child(1) {
      min-width: 10.5rem;
    }
    .ra-staff-doc #hazardTable .ra-hazard-read-cell:nth-child(4),
    .ra-staff-doc #hazardTable .ra-hazard-read-cell:nth-child(5),
    .ra-staff-doc #hazardTable .ra-hazard-read-cell:nth-child(6) {
      min-width: 11rem;
    }
    .ra-staff-doc #hazardTable .ra-read-bullets.ra-read-bullets-compact {
      border: 0;
      background: #f4f7f9;
      border-radius: 6px;
      padding: 8px 10px;
      min-height: 0;
    }
    .ra-staff-doc #hazardTable .ra-prose-bullets li {
      margin: 0.35em 0;
      line-height: 1.55;
    }

    /* RA overlay: full viewport on phones/tablets (portrait + landscape) */
    @media (max-width: 1024px) {
      .ra-sheet-toolbar {
        padding-top: max(12px, env(safe-area-inset-top, 0px));
        padding-right: max(56px, calc(48px + env(safe-area-inset-right, 0px)));
      }
      #raStaffOverlay.ra-overlay {
        padding: 0;
        align-items: stretch;
        justify-content: stretch;
        overflow: hidden;
        height: 100dvh;
        max-height: 100dvh;
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }
      #raStaffOverlay .ra-sheet {
        margin: 0;
        width: 100%;
        max-width: none;
        min-width: 0;
        min-height: 100%;
        flex: 1 1 auto;
        border-radius: 0;
        border: none;
        box-shadow: none;
        max-height: none;
      }
      #raStaffOverlay #raOverlayBody {
        flex: 1 1 auto;
        min-height: 0;
        min-width: 0;
        max-height: none;
        overflow-y: auto;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
        padding-top: max(56px, calc(14px + env(safe-area-inset-top, 0px)));
        padding-bottom: calc(22px + env(safe-area-inset-bottom, 0px));
        padding-left: max(14px, env(safe-area-inset-left, 0px));
        padding-right: max(14px, env(safe-area-inset-right, 0px));
      }
      #raStaffOverlay .ra-floating-close {
        position: fixed;
        top: max(10px, env(safe-area-inset-top, 0px));
        right: max(10px, env(safe-area-inset-right, 0px));
        z-index: 10002;
      }
    }
    @media (max-width: 1024px) and (orientation: landscape) {
      #raStaffOverlay #raOverlayBody {
        padding-top: max(52px, calc(10px + env(safe-area-inset-top, 0px)));
      }
    }

    @media (max-width: 1180px) {
      .ra-staff-doc .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .ra-staff-doc .grid-4,
      .ra-staff-doc .grid-2 { grid-template-columns: 1fr; }
      .cs-index .cs-idx-logo {
        width: 176px;
        height: 176px;
        padding: 14px;
      }
      .cs-index .cs-idx-logo img { max-height: 148px; }
    }
    .ra-staff-doc .ra-sig-in-doc {
      margin-top: 0;
      padding-top: 10px;
      padding-bottom: 10px;
    }
    .ra-staff-doc .ra-sig-in-doc .section-title {
      font-size: 14px;
      margin: 0 0 8px;
      letter-spacing: 0.04em;
    }
    .ra-sig-compact {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      max-width: 288px;
      padding: 12px 14px;
      background: #fff;
      border: 1px solid #dce3e8;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(45, 62, 80, 0.06);
    }
    .ra-sig-compact-meta {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      color: var(--text);
    }
    .ra-sig-compact-meta strong {
      font-weight: 700;
      color: var(--navy);
      display: block;
    }
    .ra-sig-compact-date {
      display: block;
      margin: 4px 0 0;
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .ra-sig-wrap {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fafbfc;
      line-height: 0;
      max-width: 268px;
    }
    .ra-sig-fixed-img {
      display: block;
      width: 100%;
      max-width: 268px;
      max-height: 78px;
      height: auto;
      object-fit: contain;
      object-position: left center;
    }
    .ra-sig-placeholder {
      margin: 0;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
      max-width: 268px;
    }
    .ra-sig-placeholder code {
      font-size: 10px;
      word-break: break-all;
    }

    @media print {
      .no-print, .ra-overlay { display: none !important; }
      body { background: #fff; }
      .ra-hazard-scroll-hint { display: none !important; }
      .ra-staff-doc #hazardTable { min-width: 0; }
    }

    /* Off-screen PDF export — width set in JS from table.scrollWidth (no max cap here) */
    #raPdfHost {
      position: fixed;
      left: -20000px;
      top: 0;
      width: 6000px;
      min-width: 3200px;
      overflow: visible;
      opacity: 1;
      pointer-events: none;
      z-index: -1;
    }
    .ra-pdf-brand-header {
      border-bottom: 3px solid #f4b942;
      padding: 18px 20px 16px;
      margin-bottom: 14px;
      background: linear-gradient(180deg, #f8fafb 0%, #fff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .ra-pdf-brand-header img {
      display: block;
      width: auto;
      max-width: min(520px, 96%);
      height: auto;
      max-height: 132px;
      object-fit: contain;
      object-position: center;
      margin: 0 auto;
    }
    .ra-pdf-brand-header .ra-pdf-brand-sub {
      margin: 12px 0 0;
      width: 100%;
      font-size: 11px;
      color: #5f6b76;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 600;
      text-align: center;
    }
    /* Portrait bundle: A4-like width, single-column document control */
    .ra-pdf-portrait-bundle {
      width: 720px;
      max-width: 720px;
      background: #fff;
      color: #1f2a33;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
      padding: 0 0 16px;
      box-sizing: border-box;
    }
    .ra-pdf-portrait-bundle .ra-staff-doc-wrap,
    .ra-pdf-portrait-bundle .document-header,
    .ra-pdf-portrait-bundle .section {
      margin-left: 0;
      margin-right: 0;
    }
    .ra-pdf-portrait-bundle .ra-staff-doc-wrap {
      border: none;
      box-shadow: none;
      padding: 0 12px;
    }
    .ra-pdf-portrait-bundle .grid-4 {
      grid-template-columns: 1fr !important;
      gap: 12px;
    }
    .ra-pdf-portrait-bundle .field input,
    .ra-pdf-portrait-bundle .field textarea {
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .ra-pdf-portrait-bundle .ra-sig-compact {
      max-width: 100%;
    }
    .ra-pdf-portrait-bundle .ra-sig-wrap {
      min-width: 160px;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }
    .ra-pdf-portrait-bundle .ra-sig-fixed-img {
      max-height: 96px;
      min-height: 48px;
    }
    /* Landscape table-only: natural wide table, one page scaled to fit */
    .ra-pdf-table-bundle {
      width: max-content;
      max-width: none;
      background: #fff;
      padding: 12px 16px 16px;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }
    .ra-pdf-table-bundle .ra-hazard-scroll-hint {
      display: none !important;
    }
    .ra-pdf-table-bundle .ra-hazard-table-scroll {
      overflow: visible;
      max-width: none;
    }
    .ra-pdf-table-bundle #hazardTable,
    .ra-pdf-table-bundle #hazardTablePartner {
      width: max-content;
      max-width: none;
      table-layout: auto;
    }
    .ra-pdf-table-bundle #hazardTable {
      min-width: 1180px;
    }
    .ra-pdf-table-bundle #hazardTablePartner {
      min-width: 1500px;
    }
    .ra-pdf-table-bundle #hazardTable th,
    .ra-pdf-table-bundle #hazardTable td {
      font-size: 12px;
      line-height: 1.5;
      padding: 9px 10px;
    }
    .ra-pdf-table-bundle #hazardTablePartner th,
    .ra-pdf-table-bundle #hazardTablePartner td {
      font-size: 12px;
      line-height: 1.5;
      padding: 9px 10px;
    }
    .ra-pdf-table-bundle #hazardTable th {
      font-size: 11px;
      font-weight: 700;
    }
    .ra-pdf-table-bundle #hazardTablePartner th {
      font-size: 11px;
      font-weight: 700;
    }
    .ra-pdf-table-bundle .ra-partner-pdf-note {
      margin: 0 0 10px;
      font-size: 11px;
      line-height: 1.45;
      color: #5f6b76;
      max-width: 56rem;
    }
    .ra-pdf-table-bundle .section-title {
      margin-bottom: 8px;
      font-size: 18px;
    }
    /* Partner-only landscape: large type, fixed column widths, high-contrast header */
    .ra-pdf-table-bundle.ra-pdf-table-bundle--partner {
      width: auto;
      max-width: none;
    }
    .ra-pdf-table-bundle--partner {
      --ra-partner-font-scale: 1;
      font-size: calc(16px * var(--ra-partner-font-scale));
      padding: 16px 22px 24px;
    }

ving Cryptosporidiosis are requested not to swim as per admission policy.\nEnsure the Centre Safety Operating Procedures detail the procedure for discovery of faeces or vomit in pool as per PWTAG guidelines.","clubControls":"121 supervision\nPre Session Client Screening","actionByWhom":"- Instructor on duty\n- Management Team","actionByWhen":"01/09/2026","furtherControls":"Introduction of an online staff portal enabling instant access to risk assessments; session procedures; and reporting tools during service delivery.\nOngoing staff training programme focusing on risk awareness, behaviour management, and safe activity delivery."},{"hazard":"Slips, trips, and falls on poolside due to poor cleaning, housekeeping, damaged or raised floor surface","whoMayBeHarmed":"Customers\nEmployees","howMayBeHarmed":"Wet or obstructed poolside surfaces may cause slips, trips, falls, and impact injuries.","venueControls":"Swimming pool floor and surround is slip resistant.\nEnsure poolside cleaning tasks as set out in the daily cleaning rota are carried out.\nEnsure poolside surround is free from debris and litter, free from any slip or trip hazard and that tiles or floor surface is free from damage.\nEnsure that running is prohibited on the poolside.\nEnsures pool edge is clearly highlighted.\nPool surround is a minimum of 2 metres in width.\nPool surround, steps, and tank floors have slip resistant tiles.\nThe gradient on the access ramps does not exceed 1:15 and has handrails on both sides.\nDrainage gullies are highlighted and covered by grating to prevent a tripping hazard.\nCompletes mapping of all poolside accidents to highlight any accident trends and identify additional measures to prevent reoccurrence.\nBarrier in place to prevent access from a freeboard greater than 380mm.","clubControls":"121 supervision\nEnsure appropriate footwear is used when outside of the pool\nClear rules on walking and not rushing\nBriefings with instructors to be completed quarterly\nInformation   function escapeHtml(str) {
    return String(str == null ? "" : str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function escapeAttr(str) {
    return String(str == null ? "" : str)
      .replace(/&/g, "&amp;")
      .replace(/"/g, "&quot;")
      .replace(/</g, "&lt;");
  }

  /** Strip manual bullet / dot characters when <ul class="ra-prose-bullets"> already shows list markers. */
  function stripLeadingListMarkers(str) {
    var s = String(str == null ? "" : str).trim();
    while (s.length) {
      var c = s.charAt(0);
      if (
        c === "\u2022" ||
        c === "\u2023" ||
        c === "\u2219" ||
        c === "\u00B7" ||
        c === "*" ||
        c === "\u25E6" ||
        c === "\u25AA"
      ) {
        s = s.substring(1).trim();
        continue;
      }
      if (c === "-" || c === "\u2013") {
        if (s.length === 1 || s.charAt(1) === " " || s.charAt(1) === "\t") {
          s = s.substring(1).trim();
          continue;
        }
      }
      break;
    }
    return s;
  }

  /** Ensure each bullet line starts with an uppercase letter at the first a–z (skip digits/symbols/spaces). */
  function capitalizeFirstAlphaForBullet(str) {
    var s = String(str == null ? "" : str);
    if (!s) return s;
    for (var i = 0; i < s.length; i++) {
      var ch = s.charAt(i);
      if (ch >= "a" && ch <= "z") {
        return s.slice(0, i) + ch.toUpperCase() + s.slice(i + 1);
      }
      if (ch >= "A" && ch <= "Z") {
        return s;
      }
    }
    return s;
  }

  function expandLineToSentenceFragments(line) {
    line = String(line || "").trim();
    if (!line) return [];
    if (line.indexOf(". ") === -1) return [line];
    var chunks = line.split(". ").map(function (c) {
      return c.trim();
    }).filter(Boolean);
    if (chunks.length < 2) return [line];
    var minLen = 12;
    var shortParts = 0;
    for (var i = 0; i < chunks.length; i++) {
      if (chunks[i].length < minLen) shortParts++;
    }
    if (shortParts > 1) return [line];
    if (chunks.length === 2 && (chunks[0].length < 20 || chunks[1].length < 20)) return [line];
    return chunks.map(function (c, j, arr) {
      if (j < arr.length - 1 && c.slice(-1) !== ".") return c + ".";
      return c;
    });
  }

  function proseToBulletHtml(raw) {
    var text = String(raw == null ? "" : raw).replace(/\r\n/g, "\n");
    var rawLines = text.split("\n");
    var parts = [];
    for (var i = 0; i < rawLines.length; i++) {
      var trimmed = rawLines[i].trim();
      if (!trimmed) continue;
      var frags = expandLineToSentenceFragments(trimmed);
      for (var j = 0; j < frags.length; j++) parts.push(frags[j]);
    }
    if (!parts.length) return '<p class="ra-bullet-empty">—</p>';
    var lis = parts
      .map(function (p) {
        var cleaned = stripLeadingListMarkers(p);
        cleaned = capitalizeFirstAlphaForBullet(cleaned);
        return cleaned ? "<li>" + escapeHtml(cleaned) + "</li>" : "";
      })
      .filter(Boolean)
      .join("");
    if (!lis) return '<p class="ra-bullet-empty">—</p>';
    return '<ul class="ra-prose-bullets">' + lis + "</ul>";
  }

  function readBlock(label, value) {
    return (
      '<div class="field ra-staff-read-field">' +
      '<label>' + escapeHtml(label) + "</label>" +
      '<div class="ra-read-bullets">' +
      proseToBulletHtml(value) +
      "</div></div>"
    );
  }

  function splitLineForVenueClubBullets(line) {
    line = String(line || "").trim();
    if (!line) return [];
    if (

    ) {

    }
    if (line.indexOf(", ") !== -1) {

    for (i = 0; i < scales.length; i++) {
      tableBundle.style.setProperty(
        "--ra-partner-font-scale",
        String(scales[i])
      );
      layoutPdfHostForPartnerTable(host, tableBundle, targetCssW);
      try {
        void tableBundle.offsetHeight;
      } catch (eAdj) {}
      if (partnerTableBundleFitsWidthFirstPlacement(tableBundle, pdf, marginMm)) {
        return;
      }
    }
  }

  /** Lock landscape bundle and host to one CSS width so every partner PDF page matches. */
  function layoutPdfHostForPartnerTable(host, tableBundle, targetCssW) {
    var extra = 96;
    var hostW = targetCssW + extra;
    var inner = tableBundle.querySelector(".ra-staff-doc-wrap") || tableBundle;
    tableBundle.style.width = targetCssW + "px";
    tableBundle.style.maxWidth = targetCssW + "px";
    tableBundle.style.minWidth = targetCssW + "px";
    tableBundle.style.boxSizing = "border-box";
    inner.style.width = "100%";
    inner.style.maxWidth = "100%";
    inner.style.boxSizing = "border-box";
    try {
      void inner.offsetWidth;
    } catch (e0) {}
    host.style.width = hostW + "px";
    host.style.minWidth = hostW + "px";
    host.style.maxWidth = hostW + "px";
    try {
      void host.offsetWidth;
    } catch (e2) {}
  }

  /**
   * Slice hazards into ranges that each fit one A3 landscape page when the raster
   * is scaled to full printable width (height must fit at that scale; min text scale).
   */
  function computePartnerLandscapeChunks(
    ra,
    tableInner,
    tableBundle,
    host,
    pdf,
    marginMm,
    targetCssW
  ) {
    var hz = ra.hazards || [];
    var n = hz.length;
    var chunks = [];
    var start = 0;
    function setSlice(s, e, continuation) {
      tableInner.innerHTML = buildPartnerExportTableSection(ra, s, e, {
        continuation: continuation
      });
      layoutPdfHostForPartnerTable(host, tableBundle, targetCssW);
      try {
        void tableBundle.offsetHeight;
      } catch (e1) {}
    }
    while (start < n) {
      setSlice(start, n, chunks.length > 0);
      if (partnerTableBundleFitsLandscapePage(tableBundle, pdf, marginMm)) {
        chunks.push({ start: start, end: n });
        break;
      }
      var lo = start + 1;
      var hi = n;
      setSlice(start, lo, chunks.length > 0);
      if (!partnerTableBundleFitsLandscapePage(tableBundle, pdf, marginMm, 0.08)) {
        chunks.push({ start: start, end: lo });
        start = lo;
        continue;
      }
      var best = lo;
      var L = lo;
      var R = hi;
      while (L <= R) {
        var mid = Math.floor((L + R) / 2);
        setSlice(start, mid, chunks.length > 0);
        if (partnerTableBundleFitsLandscapePage(tableBundle, pdf, marginMm)) {
          best = mid;
          L = mid + 1;
        } else {
          R = mid - 1;
        }
      }
      if (best <= start) {
        best = start + 1;
      }
      setSlice(start, best, chunks.length > 0);
      while (
        best > start + 1 &&
        !partnerTableBundleFitsLandscapePage(tableBundle, pdf, marginMm)
      ) {
        best--;
        setSlice(start, best, chunks.length > 0);
      }
      chunks.push({ start: start, end: best });
      start = best;
    }
    return chunks;
  }

  /**
   * @param {boolean} partnerExport If true, landscape table omits internal action owner and date columns only.
   */
  function downloadCurrentRaPdf(partnerExport) {
    partnerExport = !!partnerExport;
    var btn = document.getElementById("raBtnPdf");
    var btnPartner = document.getElementById("raBtnPdfPartner");
    if (!overlayOpenId || !raOverlayBody) {
      if (btn) btn.disabled = false;
      if (btnPartner) btnPartner.disabled = false;
      return;
    }
    var wrap = raOverlayBody.querySelector(".ra-staff-doc-wrap");
    if (!wrap) return;
    var ra = getCurrentRaForOverlay();
    var ref =
      (ra && ra.documentControl && ra.documentControl.documentReference) ||
      overlayOpenId ||
      "risk-assessment";
    var safeName = String(ref).replace(/[^\w\-.]+/g, "_");
    if (!safeName) safeName = "risk-assessment";

    var JsPDF = getJsPdfConstructor();
    if (!JsPDF || typeof window.html2canvas !== "function") {
      window.alert(
        "PDF libraries did not load. Check your internet connection and try again."
      );
      return;
    }

    var hdr = wrap.querySelector(".ra-pdf-source-header");
    var doc = wrap.querySelector(".ra-pdf-source-doc");
    var tblSection = wrap.querySelector(".ra-pdf-source-table");
    var sig = wrap.querySelector(".ra-pdf-source-sig");
    if (!hdr || !doc) {
      window.alert("Could not find document sections to export.");
      return;
    }
    if (!partnerExport && !tblSection) {
      window.alert("Could not find document sections to export.");
      return;
    }
    if (partnerExport && (!ra || !ra.hazards || !ra.hazards.length)) {
      window.alert("No hazard data to export for the partner summary.");
      return;
    }

    var host = ensurePdfHost();
    host.innerHTML = "";

    function makeBrandBlock() {
      var brand = document.createElement("div");
      brand.className = "ra-pdf-brand-header";
      var logo = document.createElement("img");
      logo.src = RA_PDF_HEADER_LOGO_URL;
      logo.alt = "clubSENsational";
      logo.crossOrigin = "anonymous";
      brand.appendChild(logo);
      var sub = document.createElement("p");
      sub.className = "ra-pdf-brand-sub";
      sub.textContent = partnerExport
        ? "Risk assessment — partner / venue summary (clubSENsational)"
        : "Risk assessment — clubSENsational";
      brand.appendChild(sub);
      return brand;
    }

    var portraitBundle = document.createElement("div");
    portraitBundle.className = "ra-pdf-portrait-bundle";
    portraitBundle.appendChild(makeBrandBlock());
    var portraitInner = document.createElement("div");
    portraitInner.className = "ra-staff-doc-wrap ra-staff-doc";
    portraitInner.appendChild(hdr.cloneNode(true));
    portraitInner.appendChild(doc.cloneNode(true));
    if (sig) portraitInner.appendChild(sig.cloneNode(true));
    portraitBundle.appendChild(portraitInner);

    var tableBundle = document.createElement("div");
    tableBundle.className = "ra-pdf-table-bundle";
    if (partnerExport) tableBundle.classList.add("ra-pdf-table-bundle--partner");
    var tableInner = document.createElement("div");
    tableInner.className = "ra-staff-doc-wrap ra-staff-doc";
    if (partnerExport) {
      tableInner.innerHTML = buildPartnerExportTableSection(ra);
    } else {
      tableInner.appendChild(tblSection.cloneNode(true));
    }
    tableBundle.appendChild(tableInner);

    host.appendChild(portraitBundle);
    host.appendChild(tableBundle);
    raPdfHostParkVisible(host, partnerExport ? 2240 : 1720);
    prepareImagesForCanvas(host);

    if (btn) {
      btn.disabled = true;
      btn.textContent = "Generating…";
    }
    if (btnPartner) {
      btnPartner.disabled = true;
      btnPartner.textContent = "Generating…";
    }

    var pdfScalePortrait = 2.25;
    var pdfScaleTable = partnerExport ? 2.55 : 2.25;
    var tablePageFormat = "a3";
    var pdf = new JsPDF({ unit: "mm", format: "a4", orientation: "portrait", compress: true });
    var fileName = (partnerExport ? safeName + "-partner" : safeName) + ".pdf";

    function finishPdfUi() {
      raPdfHostRestore(host);
      host.innerHTML = "";
      if (btn) {
        btn.disabled = false;
        btn.textContent = "Download PDF";
      }
      if (btnPartner) {
        btnPartner.disabled = false;
        btnPartner.textContent = "PDF — partners / venue";
      }
    }

    whenImagesReady(host)
      .then(function () {
        var sigImg = portraitBundle.querySelector(".ra-sig-fixed-img");
        return raWaitSignatureDecoded(sigImg).then(function () {
          try {
            void portraitBundle.offsetHeight;
          } catch (eR) {}
          var slot =
            measureElementRelative(portraitBundle, sigImg) ||
            measureElementRelative(
              portraitBundle,
              portraitBundle.querySelector(".ra-sig-wrap")
            );
          var pbW = Math.max(
            1,
            portraitBundle.scrollWidth || portraitBundle.offsetWidth
          );
          var pbH = Math.max(
            1,
            portraitBundle.scrollHeight || portraitBundle.offsetHeight
          );
          return captureDomToCanvas(portraitBundle, pdfScalePortrait, 720).then(function (canvasP) {
            return { canvasP: canvasP, slot: slot, pbW: pbW, pbH: pbH };
          });
        });
      })
      .then(function (portraitPack) {
        var canvasP = portraitPack.canvasP;
        var pl = addCanvasFittedMm(pdf, canvasP, 10, pdfScalePortrait);
        raAddSignaturePdfMm(
          pdf,
          pl,
          portraitPack.slot,
          portraitPack.pbW,
          portraitPack.pbH,
          RAUL_SIGNATURE_DATA_URL
        );
        pdf.addPage(tablePageFormat, "l");
        /* Tight margins on partner A3 landscape so the table raster uses almost the full sheet width. */
        var lmTable = partnerExport ? 3 : 8;
        if (!partnerExport) {
          layoutPdfHostForTableWidth(host, tableBundle, 160);
          var tblEl0 = tableBundle.querySelector("table");
          var tw0 = Math.max(
            tableBundle.scrollWidth,
            tblEl0 ? tblEl0.scrollWidth : 0,
            1600
          );
          return captureDomToCanvas(tableBundle, pdfScaleTable, tw0).then(
            function (canvasL) {
              addCanvasFittedMm(pdf, canvasL, lmTable, pdfScaleTable);
            }
          );
        }
        var drawable = raPdfPageDrawableCssPx(pdf, lmTable);
        var chunks = computePartnerLandscapeChunks(
          ra,
          tableInner,
          tableBundle,
          host,
          pdf,
          lmTable,
          drawable.w
        );
        function capturePartnerLandscapePage(ci) {
          var ch = chunks[ci];
          tableBundle.style.setProperty("--ra-partner-font-scale", "1");
          tableInner.innerHTML = buildPartnerExportTableSection(
            ra,
            ch.start,
            ch.end,
            { continuation: ci > 0 }
          );
          layoutPdfHostForPartnerTable(host, tableBundle, drawable.w);
          try {
            void tableBundle.offsetHeight;
          } catch (eR) {}
          raAdjustPartnerLandscapeFontForWidthFirst(
            host,
            tableBundle,
            pdf,
            lmTable,
            drawable.w
          );
          return whenImagesReady(host).then(function () {
            var laidW = Math.max(
              tableBundle.offsetWidth || 0,
              tableBundle.scrollWidth || 0,
              drawable.w
            );
            var twP = Math.max(1680, laidW + 48);
            return captureDomToCanvas(
              tableBundle,
              pdfScaleTable,
              twP
            ).then(function (canvasL) {
              addCanvasFittedMmWidthFirst(pdf, canvasL, lmTable, pdfScaleTable);
              if (ci + 1 < chunks.length) {
                pdf.addPage(tablePageFormat, "l");
                return capturePartnerLandscapePage(ci + 1);
              }
            });
          });
        }
        return capturePartnerLandscapePage(0);
      })
      .then(function () {
        pdf.save(fileName);
      })
      .then(function () {
        finishPdfUi();
      })
      .catch(function (err) {
        try {
          console.error("RA PDF export failed", err);
        } catch (eLog) {}
        finishPdfUi();
        window.alert(
          "Could not create the PDF (often a network or image security issue). Try Chrome or Safari with internet access."
        );
      });
  }

  function renderHome() {
    if (!mainHome) return;
    if (!ras || !ras.length) {
      mainHome.innerHTML =
        '<p class="ra-page-load-hint">No risk assessment data could be loaded. The embedded register may be missing or invalid — check the browser console for details.</p>';
      return;
    }
    var cards = ras
      .map(function (ra) {
        var vis = CARD_VIS[ra.id] || { ic: "📋", ac: "#f4b942" };
        return (
          '<div class="cs-card" style="--card-accent:' +
          vis.ac +
          '">' +
          '<div class="cs-ic" aria-hidden="true">' +
          vis.ic +
          "</div>" +
          "<h3>" +
          escapeHtml(ra.documentControl.title || "Risk assessment") +
          "</h3>" +
          '<p class="meta">' +
          escapeHtml(ra.documentControl.documentReference || ra.id) +
          "</p>" +
          '<div class="ra-card-actions">' +
          '<button type="button" class="ra-open-btn" data-ra-id="' +
          escapeAttr(ra.id) +
          '">' +
          "Open →" +
          "</button>" +
          "</div></div>"
        );
      })
      .join("");
    mainHome.innerHTML =
      '<div class="cs-index">' +
      '<div class="cs-idx-hero">' +
      '<div class="cs-idx-logo">' +
      '<img src="https://www.clubsensational.org/wp-content/uploads/2026/03/F-02-1.png" alt="clubSENsational" width="200" height="200" loading="lazy" decoding="async" />' +
      "</div>" +
      '<div class="cs-idx-text">' +
      '<p class="cs-idx-sub">clubSENsational · Autism Consultancy Services</p>' +
      "<h1>Risk assessments</h1>" +
      "<p>Open each venue risk assessment to read the full content. Six assessments are listed below.</p>" +
      "</div></div>" +
      '<section class="cs-section" aria-labelledby="ra-sec-list">' +
      '<div class="cs-section-head">' +
      '<h2 id="ra-sec-list" class="cs-section-title">Venue &amp; activity risk assessments</h2>' +
      '<p class="cs-section-desc">Same content as the admin register; this page is read-only for reference.</p>' +
      "</div>" +
      '<div class="cs-grid">' +
      cards +
      "</div></section></div>";
    var btns = mainHome.querySelectorAll("button[data-ra-id]");
    for (var b = 0; b < btns.length; b++) {
      btns[b].addEventListener("click", function () {
        var id = this.getAttribute("data-ra-id");
        if (id) openOverlay(id);
      });
    }
  }

  renderHome();

  var raBtnClose = document.getElementById("raBtnClose");
  if (raBtnClose) raBtnClose.addEventListener("click", closeOverlay);
  var raBtnPdf = document.getElementById("raBtnPdf");
  if (raBtnPdf) {
    raBtnPdf.addEventListener("click", function () {
      downloadCurrentRaPdf(false);
    });
  }
  var raBtnPdfPartner = document.getElementById("raBtnPdfPartner");
  if (raBtnPdfPartner) {
    raBtnPdfPartner.addEventListener("click", function () {
      downloadCurrentRaPdf(true);
    });
  }
  if (raOverlay) {
    raOverlay.addEventListener("click", function (e) {
      if (e.target.getAttribute("data-ra-close")) closeOverlay();
    });
  }
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && raOverlay && raOverlay.classList.contains("is-open")) closeOverlay();
  });
})();
</script>
