<div class="cs-policy" id="cs-policy-mental-health-policy">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="https://www.clubsensational.org/wp-content/uploads/2026/03/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Mental Health Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · www.clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Created</strong>2026-04-21</div>
  </div>

  <div class="cs-body">
<h2><span class="cs-num">1.</span>Policy Statement</h2>
<p>At clubSENsational, we are committed to protecting and promoting the mental health and wellbeing of all staff. We recognise that good mental health is essential to individual and organisational success, and we will work to create a culture that promotes psychological safety, dignity, inclusion, and support. We understand that workplace stress and poor mental health can affect performance, morale, and relationships. Our aim is to provide a supportive environment where concerns can be raised and addressed early, and where everyone feels empowered to thrive.</p>
<h2><span class="cs-num">2.</span>Policy Aims</h2>
<p><strong>This policy seeks to:</strong></p>
<ul class="policy-list"><li>Create a working culture that promotes positive mental health and</li></ul>
<p>wellbeing.</p>
<ul class="policy-list"><li>Prevent work-related stress through effective risk management.</li><li>Promote open and supportive conversations about mental health.</li><li>Provide targeted and specialist support when required.</li><li>Comply with relevant legal and regulatory duties.</li></ul>
<h2><span class="cs-num">3.</span>Scope</h2>
<p>This policy applies to all staff working at clubSENsational, including volunteers and contractors. It sits alongside our Health and Safety Policy and forms part of our commitment to ensuring a safe and inclusive working environment.</p>
<h2><span class="cs-num">4.</span>Responsibilities</h2>
<p><strong>Javier Arranz Escorial</strong></p>
<ul class="policy-list"><li>Holds overall responsibility for implementing this policy.</li><li>Monitors compliance, reviews incidents, and ensures escalation</li></ul>
<p>procedures are followed when mental health concerns arise.</p>
<ul class="policy-list"><li>Oversees emergency planning and supports the coordination of return-</li></ul>
<p>to-work processes related to mental ill health.</p>
<p><strong>Victor Matilla Casanova</strong></p>
<ul class="policy-list"><li>Leads on mental health risk assessments and ensures appropriate</li></ul>
<p>controls are in place.</p>
<ul class="policy-list"><li>Supports wellbeing promotion efforts across the organisation in</li></ul>
<p>collaboration with team leaders and staff.</p>
<p><strong>Raul Salvador Gallego</strong></p>
<ul class="policy-list"><li>Ensures the working environment, including equipment and facilities,</li></ul>
<p>supports staff wellbeing.</p>
<ul class="policy-list"><li>Embeds mental health awareness into training, supervision, and</li></ul>
<p>induction processes for all new and existing staff.</p>
<p><strong>Team Leaders</strong></p>
<ul class="policy-list"><li>Model positive behaviours and create an open, respectful culture.</li><li>Monitor team wellbeing.</li><li>Be approachable and take early action when concerns arise.</li><li>Encourage the use of wellbeing resources and reporting systems.</li></ul>
<p><strong>Employees</strong></p>
<ul class="policy-list"><li>Take care of their own mental health and support others where possible</li><li>Follow wellbeing-related procedures and training</li><li>Raise concerns early and engage with any reviews or support offered</li></ul>
<h2><span class="cs-num">5.</span>Prevention and Early Intervention</h2>
<p><strong>clubSENsational will:</strong></p>
<ul class="policy-list"><li>Conduct regular risk assessments to identify stressors or mental wellbeing</li></ul>
<p>issues</p>
<ul class="policy-list"><li>Consult staff before and after major changes to working conditions</li><li>Promote open communication and psychological safety</li><li>Provide training for managers to recognise early signs of mental ill health</li><li>Monitor workloads, hours, and leave to prevent burnout.</li></ul>
<h2><span class="cs-num">6.</span>Support for Staff</h2>
<p><strong>Universal Support</strong></p>
<ul class="policy-list"><li>Regular wellbeing check-ins</li><li>Wellbeing surveys and feedback opportunities</li><li>Scheduled breaks and fair workload planning</li><li>Access to quiet workspaces</li></ul>
<p><strong>Targeted Support</strong></p>
<ul class="policy-list"><li>One-to-one support with line managers or wellbeing leads</li><li>Adjustments to duties or hours when necessary</li><li>Referral to support resources</li></ul>
<p><strong>Specialist Support</strong></p>
<ul class="policy-list"><li>Help accessing professional mental health services</li><li>Return-to-work plans for those absent due to mental ill health</li><li>Access to trained mental health first aiders</li></ul>
<h2><span class="cs-num">7.</span>Communication and Training</h2>
<p><strong>All staff will:</strong></p>
<ul class="policy-list"><li>Be introduced to this policy during induction</li><li>Be reminded regularly about available support</li><li>Receive role-appropriate training on mental health and wellbeing</li></ul>
<h2><span class="cs-num">8.</span>Monitoring and Review</h2>
<p>This policy will be reviewed annually or earlier if there are significant changes. Javier Arranz Escorial will lead the review process with input from staff and stakeholders.</p>
  </div>

<div class="cs-policy" id="cs-policy-first-aid-policy">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="https://www.clubsensational.org/wp-content/uploads/2026/03/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>First Aid Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · www.clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Created</strong>2026-04-21</div>
  </div>

  <div class="cs-body">
<h2><span class="cs-num">1.</span>Purpose</h2>
<p>In an emergency situation, first aid aims to maintain life, prevent further harm/injury, ease pain and prevent deterioration of the person's condition until professional medical help can be obtained.</p>
<p>To provide immediate care to an injured or ill person, carried out within a limited range of skills, until the injury or illness is managed or a higher level of care is required, such as a doctor, a paramedic, or a nurse.</p>
<h2><span class="cs-num">2.</span>Policy</h2>
<p>clubSENsational is committed to providing timely and appropriate first aid care to staff, clients, and visitors. clubSENsational will endeavour to have a suitable number of trained first aid officers for each site and provide first aid facilities to administer appropriate and adequate first aid treatment in the event of a person sustaining an injury or illness.</p>
<h2><span class="cs-num">3.</span>Procedure</h2>
<p>The First Aid Audit must be completed bi-annually:</p>
<ul class="policy-list"><li>In an emergency, first aid at ClubSensational aims to maintain life,</li></ul>
<p>prevent further harm, ease pain, and prevent deterioration until professional medical help can be obtained. Given the presence of children, physical activities, and the use of varied equipment, immediate care is critical to support an injured or ill person until managed by a paramedic, nurse, or doctor.</p>
<ul class="policy-list"><li>Selected staff will attend training for certification</li><li>Once the injured or ill person has been assisted, contact the relevant</li></ul>
<p>person.</p>
<ul class="policy-list"><li>If required, the most senior ClubSensational employee should prepare a</li></ul>
<p>Critical Incident Report.</p>
<ul class="policy-list"><li>All injuries will be recorded on the incident register for incidents or injuries.</li><li>Data will be reviewed on a regular basis to ensure there are no trends in</li></ul>
<p>injuries that need to be minimised.</p>
<h2><span class="cs-num">4.</span>First Aid Kits</h2>
<p>clubSENsational First Aid Kits are reviewed and restocked by the person responsible for Health and Safety management.</p>
<p>The responsible person must ensure there is a first aid sign above every first aid box, and a review will be completed each time the First Aid Kit is restocked.</p>
<h2><span class="cs-num">5.</span>Responsibility</h2>
<p>It is the responsibility of clubSENsational to ensure that:</p>
<ul class="policy-list"><li>Adequate and appropriate First Aid Facilities are provided.</li><li>Appropriate and adequate First Aid Officers training is arranged for staff.</li><li>First Aid Officers&rsquo; training is up to date, and the certificate is current.</li></ul>
<p>It is the responsibility of First Aid Officers to:</p>
<ul class="policy-list"><li>Assess if medical assistance is required.</li><li>Administer appropriate First Aid in accordance with their training.</li><li>Maintain First Aid records as outlined in this procedure.</li><li>Maintain confidentiality regarding information obtained as part of their</li></ul>
<p>role.</p>

<div class="cs-policy" id="cs-policy-health-and-safety">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="https://www.clubsensational.org/wp-content/uploads/2026/03/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Health and Safety Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · www.clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Effective from</strong><span class="pc-meta-effective-from">—</span></div>
  </div>

  <div class="cs-body">
<div class="cs-intro"><p>At ClubSENsational, we are committed to ensuring the health, safety, and well- being of our employees, contractors, customers, and third parties. Our approach is rooted in accident prevention, hazard identification, and risk reduction to create a safe working environment for all. This policy outlines our commitment to complying with all applicable health and safety regulations, laws, and obligations while aligning with best industry practices and relevant safety standards.</p></div>
<h2><span class="cs-num">1.</span>Our Commitments</h2>
<p>To uphold our commitment to health and safety, we will:</p>
<ul class="policy-list">
<li><strong>Prevent accidents and cases of work-related ill health</strong> by identifying and eliminating hazards and reducing occupational health and safety risks as low as reasonably achievable.</li>
<li><strong>Manage health and safety risks in our workplace</strong> through systematic risk assessments and the implementation of effective control measures.</li>
<li><strong>Provide clear instructions, information, and adequate training</strong> to ensure all employees are competent to perform their roles safely.</li>
<li><strong>Provide personal protective equipment (PPE)</strong> to employees where necessary and ensure it is properly maintained and used correctly.</li>
<li><strong>Consult with employees on matters affecting their health and safety</strong> by fostering a culture of participation and encouraging open communication through efficient consultation channels.</li>
<li><strong>Provide and maintain safe plant and equipment</strong> by implementing regular inspections, maintenance, and necessary upgrades.</li>
<li><strong>Maintain safe and healthy working conditions</strong> by ensuring compliance with all safety standards and continuously improving workplace environments.</li>
<li><strong>Implement emergency procedures, including evacuation plans</strong> in case of fire or other significant incidents, ensuring all employees are trained and prepared for emergencies.</li>
<li><strong>Integrate health and safety into top management decision-making</strong> by embedding H&amp;S considerations into strategic goals and operational planning.</li>
<li><strong>Invest in learning from accidents and incidents</strong> by conducting thorough investigations, taking corrective actions, and preventing recurrence.</li>
<li><strong>Define individual health and safety responsibilities and competencies</strong> to ensure everyone understands their role in maintaining a safe workplace and encourage personal responsibility for one&rsquo;s own safety and that of colleagues.</li>
<li><strong>Increase health and safety awareness</strong> by providing the necessary equipment, resources, and training to promote safer behaviours.</li>
<li><strong>Foster continuous improvement</strong> in all health and safety aspects through proactive review, monitoring, and collaboration with employees.</li>
<li><strong>Review and revise this policy regularly, at least every year, or sooner if required,</strong> to ensure it remains relevant and effective.</li>
</ul>
<section class="cs-director-signoff" aria-label="Policy signatories">
<img class="cs-director-sign-img" src="https://www.clubsensational.org/wp-content/uploads/2026/04/Screenshot-2026-04-28-at-4.00.26-pm.jpg" alt="Signatures: Victor Matilla Casanova, Javier Arranz Escorial, Raul Salvador Gallego" loading="lazy" decoding="async" />
<p class="cs-director-policy-date"><strong>21st April 2026</strong></p>
</section>
<h2><span class="cs-num">2.</span>Responsibilities for Health and Safety</h2>
<p><strong>Overall and Final Responsibility</strong></p>
<p>The overall and final responsibility for health and safety lies with Victor Matilla Casanova. He is accountable for ensuring that all aspects of this policy are effectively implemented and that ClubSensational maintains a safe and compliant working environment.</p>
<p><strong>Day-to-Day Responsibility</strong></p>
<p>The day-to-day responsibility for ensuring this policy is put into practice rests with Javier Arranz Escorial. He is responsible for overseeing daily health and safety operations, ensuring that procedures are followed, and addressing any concerns as they arise.</p>
<p><strong>Specific Responsibilities</strong></p>
<p>To ensure health and safety standards are maintained and improved, the following individuals have designated responsibilities:</p>
<ul class="policy-list"><li><strong>Victor Matilla Casanova &amp; Javier Arranz Escorial</strong> &ndash; Safety management,</li></ul>
<p>conducting risk assessments, consulting employees, handling accident reports, first aid coordination, and managing work-related ill health.</p>
<ul class="policy-list"><li><strong>Javier Arranz Escorial</strong> &ndash; Monitoring health and safety compliance, investigating</li></ul>
<p>accidents and ill-health incidents, implementing emergency procedures, and overseeing fire safety and evacuation protocols.</p>
<ul class="policy-list"><li><strong>Raul Salvador Gallego</strong> &ndash; Maintaining equipment, providing information and</li></ul>
<p>instruction, supervising health and safety practices, recruitment and organising training programs.</p>
<p>Team Leaders &ndash; Actively promote a safe working environment by leading by example, identifying potential hazards, ensuring team members follow safety procedures, and addressing safety concerns promptly. They must also support employees in understanding health and safety expectations, encourage reporting of hazards, and foster a culture of safety within their teams.</p>
<p><strong>Employees Responsibilities</strong></p>
<ul class="policy-list"><li>Understand H&amp;S responsibilities</li><li>Follow training and only use equipment trained to use (and how)</li><li>Report accidents, incidents and near misses.</li><li>Ensure individual risk assessments for those being supported are understood</li></ul>
<p>and followed.</p>
<h2><span class="cs-num">3.</span>Implementation</h2>
<p>ClubSENsational Director, Victor Matilla Casanova, is responsible for overseeing the implementation of this policy and ensuring compliance across all operations. However, all employees, contractors, and management have a shared responsibility to adhere to health and safety guidelines and contribute to a safe working environment.</p>
<p>All employees should:</p>
<ul class="policy-list"><li>Co-operate with team leaders and directors on health and safety</li></ul>
<p>matters.</p>
<ul class="policy-list"><li>Take reasonable care of their own health and safety; and</li><li>Report all health and safety concerns to an appropriate person (as</li></ul>
<p>detailed above). This policy will be communicated to all employees and made available to stakeholders as required.</p>
<h2><span class="cs-num">4.</span>Risk Assessments</h2>
<ul class="policy-list"><li>We will conduct thorough risk assessments relevant to our work activities,</li></ul>
<p>identifying potential hazards, evaluating risks, and implementing appropriate control measures to mitigate them.</p>
<ul class="policy-list"><li>Risk assessments will be completed before work begins and will be</li></ul>
<p>documented to ensure transparency and accountability.</p>
<ul class="policy-list"><li>If there are changes in working habits, conditions, equipment, or</li></ul>
<p>legislation, we will review and update our risk assessments to reflect new risks and ensure ongoing compliance with health and safety standards.</p>
<ul class="policy-list"><li>Employees will be encouraged to report hazards and unsafe conditions</li></ul>
<p>to facilitate continuous improvement in risk management.</p>
<ul class="policy-list"><li>Risk assessments will be reviewed annually or earlier if there are</li></ul>
<p>significant changes such as new legislation, modifications to work processes, the introduction of new equipment, or incidents that highlight deficiencies in existing controls.</p>
<h2><span class="cs-num">5.</span>Training</h2>
<ul class="policy-list"><li>All staff and subcontractors will receive a structured health and safety</li></ul>
<p>induction upon joining the company, covering key workplace hazards, emergency procedures, and company policies.</p>
<ul class="policy-list"><li>A training needs analysis will be conducted to assess the skills,</li></ul>
<p>knowledge, and qualifications required for different roles. This will help identify any gaps and ensure employees receive the appropriate training.</p>
<ul class="policy-list"><li>We will maintain a training matrix to track completed training, upcoming</li></ul>
<p>refresher courses, and any overdue training requirements. This matrix will be reviewed annually to ensure accuracy and compliance with regulatory and industry standards.</p>
<ul class="policy-list"><li>If training has lapsed or is found to be insufficient, the affected employee</li></ul>
<p>will be identified and prioritised for retraining. Until training is completed, temporary restrictions may be placed on tasks requiring the lapsed qualification, with additional support such as mentoring or supervision provided to ensure safe working practices. If systemic issues are identified, the training programme will be reviewed and adjusted to improve effectiveness.</p>
<ul class="policy-list"><li>Remote workers will have access to health and safety guidance and</li></ul>
<p>resources tailored to their working environment, ensuring they are supported in maintaining a safe and healthy workspace.</p>
<ul class="policy-list"><li>Training needs and the training matrix will be reviewed annually or earlier</li></ul>
<p>if there are regulatory changes, new operational risks, significant incidents, updates to industry best practices, or employee feedback indicating gaps in knowledge or competency.</p>
<h2><span class="cs-num">6.</span>Consultation</h2>
<ul class="policy-list"><li>We will actively engage with staff on health and safety matters through</li></ul>
<p>open communication channels, safety meetings, and regular briefings to ensure their concerns and insights are considered.</p>
<ul class="policy-list"><li>Formal health and safety consultations will take place periodically,</li></ul>
<p>especially during policy reviews, risk assessment updates, or the introduction of new procedures, ensuring employee feedback shapes our approach.</p>
<ul class="policy-list"><li>Employees will be encouraged to contribute to discussions on</li></ul>
<p>workplace safety improvements and report concerns.</p>
<h2><span class="cs-num">7.</span>Evacuation</h2>
<p>We will ensure that all staff are familiar with the evacuation and emergency procedures of the venues we use, including designated escape routes, assembly points, and any specific safety protocols in place.</p>
<h2><span class="cs-num">8.</span>Reviewing and Updating the Policy</h2>
<p>This policy will be reviewed and updated annually or earlier if there are regulatory changes, new operational risks, significant incidents, updates to industry best practices, or employee feedback indicating gaps in knowledge or competency.</p>
  </div>

  <p class="cs-foot">© clubSENsational LTD · This policy is formally reviewed and re-signed annually. Contact: info@clubsensational.org</p>
</div>

<div class="cs-policy" id="cs-policy-equipment-uniform">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="https://www.clubsensational.org/wp-content/uploads/2026/03/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Equipment and Uniform Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · www.clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Created</strong>2026-04-21</div>
  </div>

  <div class="cs-body">
<h2><span class="cs-num">1.</span>Purpose</h2>
<p>This policy outlines the terms and conditions regarding the provision, use, and return of work uniforms and equipment at ClubSENsational. Instructors are required to adhere to these guidelines to ensure the proper management and maintenance of company property.</p>
<h2><span class="cs-num">2.</span>Issuance of Uniform and Equipment</h2>
<p>Upon commencement of employment, ClubSENsational provides instructors with the necessary uniform and equipment relevant to their role. This equipment is issued on a loan basis and must be returned upon termination of employment or when requested by the company. The provided equipment is strictly for use while working with ClubSENsational and should not be used for any other purpose.</p>
<p>Equipment Provided:</p>
<p>Support Worker conducting dry sessions (Total cost: £50)</p>
<ul class="policy-list"><li>1x Jacket</li><li>1x Sweatshirt</li><li>1x Polo shirt</li><li>1x T-shirt</li></ul>
<p>Climbing instructors (Total cost: £120)</p>
<ul class="policy-list"><li>1x harness</li><li>1x large Grigri</li><li>3x carabiners</li><li>1x keyring</li><li>Set of Toys</li><li>1x timer</li></ul>
<p>Swimming instructors (Total cost: £380)</p>
<ul class="policy-list"><li>1x wetsuit</li><li>1x swimming shirt</li><li>1x swimming cap</li><li>1x Pixtolearn Swimming Full Pack</li></ul>
<p>Pixtolearn Full Pack (Total cost: £350)</p>
<ul class="policy-list"><li>6 x plastic folders with 160 A5 PVC flashcards (printed on both sides) &ndash; It</li></ul>
<p>is the instructor's duty of care to dry the flashcards used during sessions to help prolong their durability.</p>
<ul class="policy-list"><li>Conference bag (polyester).</li><li>1 x small blue bag.</li><li>Pink highlighter.</li><li>6 x plastic folders.</li><li>1x mini microfibre towel.</li></ul>
<h2><span class="cs-num">3.</span>Responsibility and Care of Equipment</h2>
<p>Instructors are responsible for ensuring that all equipment and uniforms:</p>
<ul class="policy-list"><li>Remain in good condition.</li><li>Are used solely for their intended purposes.</li><li>Are returned upon request or at the termination of employment.</li></ul>
<p>Instructors must promptly report any damage, loss, or malfunction of equipment to the company. They must not attempt any unauthorised repairs or modifications.</p>
<h2><span class="cs-num">4.</span>Loss or Damage of Equipment</h2>
<p>If an instructor loses any equipment, the following deductions will apply:</p>
<ul class="policy-list"><li>First occurrence: 70% of the item's value will be deducted from the</li></ul>
<p>instructor's salary.</p>
<ul class="policy-list"><li>Subsequent occurrences: The full cost of the lost items will be deducted</li></ul>
<p>from the instructor's salary.</p>
<h2><span class="cs-num">5.</span>Damage During Sessions</h2>
<p>If equipment is damaged during sessions due to normal wear and tear, ClubSENsational will cover the cost of replacement. Instructors must report how the material was damaged and provide details of the incident. However, if the equipment has been damaged due to the instructor failing to follow proper procedures or neglecting their responsibilities, a penalty may be applied.</p>
<p>Additionally, if any equipment is deemed unsafe or the uniform becomes unwearable due to usage, the company will provide a replacement.</p>
<h2><span class="cs-num">6.</span>Compliance and Consequences</h2>
<p>Failure to adhere to this policy may result in disciplinary action. Instructors may also be held financially liable for costs associated with damage caused by negligence or misuse.</p>
<p>By accepting company-issued equipment and uniform, instructors agree to comply with the terms of this policy.</p>
  </div>

<h2><span class="cs-num">1.</span>Session Feedback-Register &amp;</h2>
<p>INCIDENT REPORT PROCEDURE</p>
<p>Session Feedback-Register &amp; Incident Report Procedure</p>
<h2><span class="cs-num">2.</span>Purpose</h2>
<p>The Session Feedback - Register Form and Incident Report Procedure are essential for documenting each session, ensuring staff protection, and addressing any incidents appropriately.</p>
<h2><span class="cs-num">3.</span>Completion of the Feedback-Registration form</h2>
<p>Why It&rsquo;s Important</p>
<p>Completing the Feedback Form serves three key purposes:</p>
<h2><span class="cs-num">4.</span>Session Documentation &ndash; Records details of what occurred during the</h2>
<p>session. If everything went smoothly, the form should take no more than 1 minute per client to complete.</p>
<h2><span class="cs-num">5.</span>Staff Protection &ndash; Provides a written record that can clarify situations and</h2>
<p>protect staff in case of complaints or disputes.</p>
<h2><span class="cs-num">6.</span>Incident Reporting &ndash; Ensures that any unusual occurrences, such as</h2>
<p>accidents or unexpected challenges, are addressed appropriately.</p>
<p>When to Complete the Feedback- Registration Form</p>
<ul class="policy-list"><li>At the End of Your Working Day &ndash; Ideally, complete the form before</li></ul>
<p>leaving your shift. If not possible, submit it no later than 9:00 AM the following day. This ensures that the admin team is aware of session details to address any family inquiries.</p>
<ul class="policy-list"><li>Immediately After a Session if an Incident Occurs &ndash; If any incident takes</li></ul>
<p>place, the Feedback Form must be completed before finishing your shift.</p>
<ul class="policy-list"><li>If a Client Does Not Attend &ndash; Use the available time to complete any</li></ul>
<p>outstanding Feedback Forms.</p>
<p>Session Feedback-Register Link:</p>
<p>https://forms.gle/kMgvL71oiEMgied28</p>
<p>Session Feedback-Register &amp; Incident Report Procedure</p>
<h2><span class="cs-num">7.</span>Incident Reporting Procedure</h2>
<p>If an incident occurs, whether it involves an injury or not, follow these steps:</p>
<h2><span class="cs-num">8.</span>Complete an Incident Form &ndash; Mandatory for logging all details.</h2>

<h2><span class="cs-num">9.</span>Report the Incident &ndash; Notify the relevant manager immediately.</h2>

<h2><span class="cs-num">10.</span>Debriefing &amp; Prevention &ndash; Discuss the incident and implement strategies</h2>
<p>to prevent future occurrences.</p>
<p>Incident Report Form Link: https://forms.gle/uxfWWjJGsnxdvdR68</p>
<h2><span class="cs-num">11.</span>Any Other Relevant Information Section</h2>
<p>Complete this section only if:</p>
<ul class="policy-list"><li>A parent raises a complaint.</li></ul>
<ul class="policy-list"><li>A behavioral issue arises during the session.</li></ul>
<ul class="policy-list"><li>The client presents a new challenge not previously identified.</li></ul>
<p>Your cooperation is vital in maintaining a professional and safe environment for both staff and clients. Please ensure all forms are completed promptly after each session.</p>
<p>Thank you for your support.</p>

<section class="sf-block" aria-labelledby="sf-h-when">

    <h2>When to Use This Procedure</h2>
  </div>
  <p>This procedure must be completed:</p>

<li>After every session</li>
<li>For every service user</li>
<li>By the staff member delivering the session</li>
  </ul>
</section>

<section class="sf-block" aria-labelledby="sf-h-principles">
  <div class="sf-sec-head" id="sf-h-principles">
    <span class="sf-sec-icon" aria-hidden="true">✓</span>
    <h2>Key Principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
<li>Feedback is mandatory for every session.</li>
<li>Records must be accurate, clear and professional.</li>
<li>Feedback supports progress tracking and decision-making.</li>
<li>If any concern arises, it must be escalated as an incident.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="sf-h-procedure">

  <p>After each session:</p>
  <div class="sf-steps">
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">1</span><div class="sf-step-body"><strong>Access the Staff Portal.</strong></div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">2</span><div class="sf-step-body"><strong>Open the assigned session.</strong></div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">3</span><div class="sf-step-body"><strong>Complete all required fields</strong>, including:
      <ul class="sf-nested">

<li>Activities completed</li>
<li>Progress observed</li>
<li>Any challenges or behaviours</li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">4</span><div class="sf-step-body"><strong>Submit the feedback</strong> before leaving the venue, or as instructed by management.</div></div>

<li>Complete feedback immediately after the session.</li>
<li>Be objective and factual.</li>
<li>Include relevant observations.</li>
      </ul>
    </div>
    <div class="sf-rule-card sf-rule-card--dont">
      <h3>Do not</h3>
      <ul>
<li>Skip session feedback.</li>
<li>Use vague or unclear language.</li>
<li>Delay submission without reason.</li>
      </ul>
    </div>
  </div>
</section>

    <ul class="policy-list">
<li>Safety concerns</li>
<li>Safeguarding concerns</li>
<li>Injuries</li>
<li>Incidents</li>
<li>Significant changes in presentation or behaviour</li>
    </ul>
    <p>You must complete an Incident Report through the Staff Portal and notify the appropriate manager.</p>
  </div>
</section>

    <h2>System Action</h2>
  </div>
  <div class="sf-panel">

<li>All feedback must be completed via the Staff Portal.</li>
<li>Forms must be fully submitted and not left incomplete.</li>
<li>Submitted records are reviewed by management to monitor quality, progress and safety.</li>
    </ul>
  </div>
</section>

  <div class="cs-body">

<section class="sf-block" aria-labelledby="ir-h-purpose">
  <div class="sf-sec-head" id="ir-h-purpose">
    <span class="sf-sec-icon" aria-hidden="true">📄</span>
    <h2>Purpose</h2>
  </div>
  <div class="sf-panel">
    <p>This procedure ensures that all incidents are recorded, escalated and managed appropriately to maintain safety, safeguarding and operational standards across all services.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="ir-h-when">
  <div class="sf-sec-head" id="ir-h-when">
    <span class="sf-sec-icon" aria-hidden="true">🕐</span>
    <h2>When to Use This Procedure</h2>
  </div>
  <p>This procedure must be followed whenever an incident occurs, including:</p>
  <ul class="policy-list">
    <li>Injury or accident</li>
    <li>Safeguarding concern</li>
    <li>Behavioural incident</li>
    <li>Medical event (e.g. seizure, asthma)</li>
    <li>Near miss</li>
    <li>Missing service user</li>
    <li>Any situation that compromises safety</li>
  </ul>
</section>

<section class="sf-block" aria-labelledby="ir-h-principles">
  <div class="sf-sec-head" id="ir-h-principles">
    <span class="sf-sec-icon" aria-hidden="true">✓</span>
    <h2>Key Principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
      <li>Safety always comes first.</li>
      <li>Act immediately before recording.</li>
      <li>All incidents must be reported.</li>
      <li>Be factual, clear and objective.</li>
      <li>Do not delay reporting.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="ir-h-procedure">
  <div class="sf-sec-head" id="ir-h-procedure">
    <span class="sf-sec-icon" aria-hidden="true">📋</span>
    <h2>Procedure</h2>
  </div>
  <div class="sf-steps">
    <div class="sf-step sf-step--priority">
      <div class="sf-priority-row">
        <span class="sf-step-num" aria-hidden="true">1</span>
        <div class="sf-step-body">
          <div class="sf-priority-intro">Priority</div>
          <strong>Immediate action</strong>
          <ul class="sf-nested">
            <li>Ensure the service user is safe.</li>
            <li>Stop the activity if required.</li>
            <li>Provide first aid or appropriate support.</li>
            <li>Call emergency services if necessary.</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">2</span><div class="sf-step-body"><strong>Notify relevant staff</strong>
      <ul class="sf-nested">
        <li>Inform the Duty Manager or Service Manager.</li>
        <li>In safeguarding cases, contact management immediately.</li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">3</span><div class="sf-step-body"><strong>Record the incident</strong>
      <ul class="sf-nested">
        <li>Access the Staff Portal.</li>
        <li>Open the Incident Report form.</li>
        <li>Complete all required fields, including:
          <ul class="sf-nested">
            <li>What happened</li>
            <li>Who was involved</li>
            <li>Time and location</li>
            <li>Actions taken</li>
            <li>Outcome</li>
          </ul>
        </li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">4</span><div class="sf-step-body"><strong>Submit the report</strong>
      <ul class="sf-nested">
        <li>Submit the report as soon as possible.</li>
        <li>Do not leave the venue without reporting (unless an emergency prevents it).</li>
      </ul>
    </div></div>
  </div>
</section>

<section class="sf-block" aria-labelledby="ir-h-rules">
  <h3 class="sf-rules-h" id="ir-h-rules">Important Rules</h3>
  <div class="sf-rules-grid">
    <div class="sf-rule-card sf-rule-card--do">
      <h3>Do</h3>
      <ul>
        <li>Act immediately to ensure safety.</li>
        <li>Report all incidents, even if minor.</li>
        <li>Be accurate and objective.</li>
        <li>Follow instructions from management.</li>
      </ul>
    </div>
    <div class="sf-rule-card sf-rule-card--dont">
      <h3>Do not</h3>
      <ul>
        <li>Ignore or minimise incidents.</li>
        <li>Delay reporting.</li>
        <li>Leave out key details.</li>
        <li>Share incident information inappropriately.</li>
      </ul>
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="ir-h-escalation">
  <div class="sf-callout" role="note">
    <div class="sf-sec-head" id="ir-h-escalation">
      <span class="sf-sec-icon" aria-hidden="true">⚠️</span>
      <h2>Escalation</h2>
    </div>
    <p class="sf-subh">Escalate immediately if</p>
    <ul class="policy-list">
      <li>There is a safeguarding concern</li>
      <li>Emergency services are involved</li>
      <li>A service user is at risk</li>
      <li>The situation is unclear or serious</li>
    </ul>
    <p class="sf-subh">Contact</p>
    <ul class="policy-list">
      <li>Duty Manager / Service Manager</li>
      <li>Safeguarding Lead (via management email or direct contact)</li>
      <li>Emergency services (999) if required</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="ir-h-system">
  <div class="sf-sec-head" id="ir-h-system">
    <span class="sf-sec-icon" aria-hidden="true">🖥</span>
    <h2>System Action</h2>
  </div>
  <div class="sf-panel">
    <ul class="policy-list">
      <li>All incidents must be recorded via the Staff Portal.</li>
      <li>Incident Reports are separate from session feedback.</li>
      <li>Reports are reviewed by management for safeguarding, compliance and follow-up actions.</li>
    </ul>
  </div>
</section>

  </div>

</div>

  <div class="cs-body">

<section class="sf-block" aria-labelledby="sg-h-purpose">
  <div class="sf-sec-head" id="sg-h-purpose">
    <span class="sf-sec-icon" aria-hidden="true">📄</span>
    <h2>Purpose</h2>
  </div>
  <div class="sf-panel">
    <p>This procedure ensures that all safeguarding concerns are identified, reported and managed appropriately to protect the safety and wellbeing of all service users.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="sg-h-when">
  <div class="sf-sec-head" id="sg-h-when">
    <span class="sf-sec-icon" aria-hidden="true">🕐</span>
    <h2>When to Use This Procedure</h2>
  </div>
  <p>This procedure must be followed whenever there is a safeguarding concern, including:</p>
  <ul class="policy-list">
    <li>Suspicion or disclosure of abuse</li>
    <li>Unexplained injuries</li>
    <li>Significant changes in behaviour or presentation</li>
    <li>Concerns raised by a service user, parent or staff member</li>
    <li>Inappropriate behaviour from staff, peers or others</li>
    <li>Any situation where a service user may be at risk</li>
  </ul>
</section>

<section class="sf-block" aria-labelledby="sg-h-principles">
  <div class="sf-sec-head" id="sg-h-principles">
    <span class="sf-sec-icon" aria-hidden="true">✓</span>
    <h2>Key Principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
      <li>Safeguarding is everyone&rsquo;s responsibility.</li>
      <li>Always act in the best interest of the service user.</li>
      <li>Do not ignore concerns.</li>
      <li>Do not investigate yourself.</li>
      <li>Record and report immediately.</li>
      <li>Maintain confidentiality.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="sg-h-procedure">
  <div class="sf-sec-head" id="sg-h-procedure">
    <span class="sf-sec-icon" aria-hidden="true">🛡️</span>
    <h2>Procedure</h2>
  </div>
  <div class="sf-steps">
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">1</span><div class="sf-step-body"><strong>Recognise the Concern</strong>
      <ul class="sf-nested">
        <li>Be aware of signs of abuse, neglect or risk.</li>
        <li>Take all concerns seriously, even if uncertain.</li>
      </ul>
    </div></div>
    <div class="sf-step sf-step--priority">
      <div class="sf-priority-row">
        <span class="sf-step-num" aria-hidden="true">2</span>
        <div class="sf-step-body">
          <div class="sf-priority-intro">Immediate Action</div>
          <ul class="sf-nested">
            <li>Ensure the service user is safe.</li>
            <li>Stay calm and supportive.</li>
            <li>Do not ask leading questions.</li>
            <li>Do not promise confidentiality.</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">3</span><div class="sf-step-body"><strong>Report the Concern</strong>
      <ul class="sf-nested">
        <li>Inform the Safeguarding Lead or management immediately.</li>
        <li>Use the designated safeguarding contact route (management email or direct contact).</li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">4</span><div class="sf-step-body"><strong>Record the Concern</strong>
      <ul class="sf-nested">
        <li>Access the Staff Portal.</li>
        <li>Complete an Incident Report.</li>
        <li>Record only factual information:
          <ul class="sf-nested">
            <li>What was seen or said</li>
            <li>Date, time and location</li>
            <li>Who was involved</li>
          </ul>
        </li>
      </ul>
    </div></div>

<section class="sf-block" aria-labelledby="er-h-purpose">
  <div class="sf-sec-head" id="er-h-purpose">
    <span class="sf-sec-icon" aria-hidden="true">📄</span>
    <h2>Purpose</h2>
  </div>
  <div class="sf-panel">
    <p>This procedure outlines the core principles all staff must follow when responding to any emergency situation across all services and venues.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="er-h-when">
  <div class="sf-sec-head" id="er-h-when">
    <span class="sf-sec-icon" aria-hidden="true">🕐</span>
    <h2>When to Use This Procedure</h2>
  </div>
  <p>These principles apply in any emergency situation, including:</p>
  <ul class="policy-list">
    <li>Injury or accident</li>
    <li>Medical emergency</li>
    <li>Safeguarding concern</li>
    <li>Missing service user</li>
    <li>Behavioural crisis</li>
    <li>Fire or evacuation</li>
    <li>Any situation where safety is at risk</li>
  </ul>
</section>

<section class="sf-block" aria-labelledby="er-h-principles">
  <div class="sf-sec-head" id="er-h-principles">
    <span class="sf-sec-icon" aria-hidden="true">🛡️</span>
    <h2>Key Principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
      <li>Safety is always the priority.</li>
      <li>Stay calm and in control.</li>
      <li>Act immediately.</li>
      <li>Follow clear steps.</li>
      <li>Communicate effectively.</li>
      <li>Record and report after the situation is safe.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="er-h-procedure">
  <div class="sf-sec-head" id="er-h-procedure">
    <span class="sf-sec-icon" aria-hidden="true">🚨</span>
    <h2>Procedure</h2>
  </div>
  <p class="sf-flow-hint">Follow these steps in order.</p>
  <div class="sf-steps sf-steps--flow">
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">1</span><div class="sf-step-body"><strong>Assess the Situation</strong>
      <ul class="sf-nested">
        <li>Quickly identify what is happening.</li>
        <li>Determine the level of risk.</li>
        <li>Prioritise immediate safety.</li>
      </ul>
    </div></div>
    <div class="sf-step sf-step--priority">
      <div class="sf-priority-row">
        <span class="sf-step-num" aria-hidden="true">2</span>
        <div class="sf-step-body">
          <div class="sf-priority-intro">Ensure Safety</div>
          <ul class="sf-nested">
            <li>Remove or reduce risk where possible.</li>
            <li>Stop the activity if needed.</li>
            <li>Move the service user to a safe area if appropriate.</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">3</span><div class="sf-step-body"><strong>Take Immediate Action</strong>
      <ul class="sf-nested">
        <li>Provide first aid or appropriate support.</li>
        <li>Use de-escalation strategies if behavioural.</li>
        <li>Follow venue-specific emergency procedures if required (e.g. evacuation).</li>
      </ul>
    </div></div>
    <div class="sf-step sf-step--priority">
      <div class="sf-priority-row">
        <span class="sf-step-num" aria-hidden="true">4</span>
        <div class="sf-step-body">
          <div class="sf-priority-intro">Call for Support</div>
          <ul class="sf-nested">
            <li>Alert the Duty Manager or Service Manager.</li>
            <li>Contact venue staff if applicable.</li>
            <li>Call emergency services (999) if required.</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">5</span><div class="sf-step-body"><strong>Supervise and Control the Environment</strong>
      <ul class="sf-nested">
        <li>Maintain supervision of all service users.</li>
        <li>Keep the environment as calm and controlled as possible.</li>
        <li>Ensure other participants are safe.</li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">6</span><div class="sf-step-body"><strong>Follow Instructions</strong>
      <ul class="sf-nested">
        <li>Follow guidance from management or emergency services.</li>
        <li>Do not take unnecessary or untrained actions.</li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">7</span><div class="sf-step-body"><strong>Record the Incident</strong>
      <ul class="sf-nested">
        <li>Once the situation is under control, complete an Incident Report via the Staff Portal.</li>
      </ul>
    </div></div>
  </div>
</section>

<section class="sf-block" aria-labelledby="er-h-rules">
  <h3 class="sf-rules-h" id="er-h-rules">Important Rules</h3>
  <div class="sf-rules-grid">
    <div class="sf-rule-card sf-rule-card--do">
      <h3>Do</h3>
      <ul>
        <li>Stay calm and act quickly.</li>
        <li>Prioritise safety at all times.</li>
        <li>Follow your training.</li>
        <li>Communicate clearly with others.</li>
      </ul>
    </div>
    <div class="sf-rule-card sf-rule-card--dont">
      <h3>Do not</h3>
      <ul>
        <li>Panic or delay action.</li>
        <li>Leave service users unattended.</li>
        <li>Attempt actions you are not trained for.</li>
        <li>Ignore signs of risk.</li>
      </ul>
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="er-h-escalation">
  <div class="sf-callout" role="note">
    <div class="sf-sec-head" id="er-h-escalation">
      <span class="sf-sec-icon" aria-hidden="true">⚠️</span>
      <h2>Escalation</h2>
    </div>
    <p class="sf-subh">Escalate immediately if</p>
    <ul class="policy-list">
      <li>There is a risk to life or serious harm</li>
      <li>Emergency services are required</li>
      <li>A safeguarding concern is identified</li>
      <li>The situation is beyond your control</li>
    </ul>
    <p class="sf-subh">Contact</p>
    <ul class="policy-list">
      <li>Duty Manager / Service Manager</li>
      <li>Venue staff (if applicable)</li>
      <li>Emergency services (999)</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="er-h-system">
  <div class="sf-sec-head" id="er-h-system">
    <span class="sf-sec-icon" aria-hidden="true">🖥</span>
    <h2>System Action</h2>
  </div>
  <div class="sf-panel">
    <ul class="policy-list">
      <li>All emergencies must be recorded via an Incident Report in the Staff Portal.</li>
      <li>Emergency response actions must always be followed by proper documentation.</li>
      <li>Management will review and take further action where required.</li>
    </ul>
  </div>
</section>

  </div>

</div>

      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Missing Service User Procedure (Global)</h1>
      <p class="cs-sub">Registered Company No. 13755417 · www.clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Status</strong>Reference</div>
    <div><strong>Document type</strong>Procedure</div>
    <div><strong>Last updated</strong>2026-04-28</div>
  </div>

  <div class="cs-body">

<section class="sf-block" aria-labelledby="msu-h-purpose">
  <div class="sf-sec-head" id="msu-h-purpose">
    <span class="sf-sec-icon" aria-hidden="true">📄</span>
    <h2>Purpose</h2>
  </div>
  <div class="sf-panel">
    <p>This procedure ensures a rapid, coordinated and safe response when a service user is unaccounted for, reducing risk and ensuring appropriate escalation.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="msu-h-when">
  <div class="sf-sec-head" id="msu-h-when">
    <span class="sf-sec-icon" aria-hidden="true">📍</span>
    <h2>When to Use This Procedure</h2>
  </div>
  <p>This procedure must be followed when:</p>
  <ul class="policy-list">
    <li>A service user cannot be located</li>
    <li>A service user leaves a designated area without supervision</li>
    <li>A service user fails to arrive at an expected location during a session</li>
    <li>There is any uncertainty about a service user&rsquo;s whereabouts</li>
  </ul>
</section>

<section class="sf-block" aria-labelledby="msu-h-principles">
  <div class="sf-sec-head" id="msu-h-principles">
    <span class="sf-sec-icon" aria-hidden="true">⏱️</span>
    <h2>Key Principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
      <li>Act immediately.</li>
      <li>Time is critical.</li>
      <li>Maintain supervision of other service users.</li>
      <li>Follow a structured and coordinated response.</li>
      <li>Escalate without delay.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="msu-h-procedure">
  <div class="sf-sec-head" id="msu-h-procedure">
    <span class="sf-sec-icon" aria-hidden="true">🔎</span>
    <h2>Procedure</h2>
  </div>
  <p class="sf-flow-hint">Follow these steps in order.</p>
  <div class="sf-steps sf-steps--flow">
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">1</span><div class="sf-step-body"><strong>Confirm the Situation</strong>
      <ul class="sf-nested">
        <li>Quickly check the immediate area.</li>
        <li>Confirm the service user is not with another staff member.</li>
        <li>Do not assume &mdash; verify.</li>
      </ul>
    </div></div>
    <div class="sf-step sf-step--priority">
      <div class="sf-priority-row">
        <span class="sf-step-num" aria-hidden="true">2</span>
        <div class="sf-step-body">
          <div class="sf-priority-intro">Immediate Alert</div>
          <ul class="sf-nested">
            <li>Inform the Duty Manager or Service Manager immediately.</li>
            <li>Alert all available staff.</li>
            <li>Provide clear description:
              <ul class="sf-nested">
                <li>Name</li>
                <li>Age</li>
                <li>Appearance</li>
                <li>Last known location</li>
                <li>Time last seen</li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <div class="sf-step sf-step--priority">
      <div class="sf-priority-row">
        <span class="sf-step-num" aria-hidden="true">3</span>
        <div class="sf-step-body">
          <div class="sf-priority-intro">Secure the Environment</div>
          <ul class="sf-nested">
            <li>Monitor exits and entrances if possible.</li>
            <li>Ensure other service users remain supervised and safe.</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">4</span><div class="sf-step-body"><strong>Search the Area</strong>
      <ul class="sf-nested">
        <li>Conduct a coordinated search of all relevant zones.</li>
        <li>Follow venue-specific procedures if applicable.</li>
        <li>Do not search alone in large or high-risk areas.</li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">5</span><div class="sf-step-body"><strong>Escalate</strong>
      <ul class="sf-nested">
        <li>If the service user is not found quickly:
          <ul class="sf-nested">
            <li>Inform venue management (if applicable)</li>
            <li>Contact parents/carers</li>
            <li>Contact emergency services (999) if required</li>
          </ul>
        </li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">6</span><div class="sf-step-body"><strong>Continue Supervision</strong>
      <ul class="sf-nested">
        <li>Maintain control of the group at all times.</li>
        <li>Reallocate staff if needed.</li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">7</span><div class="sf-step-body"><strong>Once Located</strong>
      <ul class="sf-nested">
        <li>Ensure the service user is safe and well.</li>
        <li>Inform all staff and relevant parties immediately.</li>
        <li>Review how the situation occurred.</li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">8</span><div class="sf-step-body"><strong>Record the Incident</strong>
      <ul class="sf-nested">
        <li>Complete an Incident Report via the Staff Portal as soon as possible.</li>
      </ul>
    </div></div>
  </div>
</section>

<section class="sf-block" aria-labelledby="msu-h-rules">
  <h3 class="sf-rules-h" id="msu-h-rules">Important Rules</h3>
  <div class="sf-rules-grid">
    <div class="sf-rule-card sf-rule-card--do">
      <h3>Do</h3>
      <ul>
        <li>Act immediately.</li>
        <li>Communicate clearly and calmly.</li>
        <li>Work as a team.</li>
        <li>Follow venue procedures where relevant.</li>
      </ul>
    </div>
    <div class="sf-rule-card sf-rule-card--dont">
      <h3>Do not</h3>
      <ul>
        <li>Delay action.</li>
        <li>Leave other service users unsupervised.</li>
        <li>Assume someone else is handling it.</li>
        <li>Panic or create confusion.</li>
      </ul>
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="msu-h-escalation">
  <div class="sf-callout" role="note">
    <div class="sf-sec-head" id="msu-h-escalation">
      <span class="sf-sec-icon" aria-hidden="true">⚠️</span>
      <h2>Escalation</h2>
    </div>
    <p class="sf-subh">Escalate immediately if</p>
    <ul class="policy-list">
      <li>The service user is not located within a short time</li>
      <li>The service user is vulnerable or at risk</li>
      <li>The service user may have left the premises</li>
      <li>There is any doubt about safety</li>
    </ul>
    <p class="sf-subh">Contact</p>
    <ul class="policy-list">
      <li>Duty Manager / Service Manager</li>
      <li>Venue staff (if applicable)</li>
      <li>Parents or carers</li>
      <li>Emergency services (999)</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="msu-h-system">
  <div class="sf-sec-head" id="msu-h-system">
    <span class="sf-sec-icon" aria-hidden="true">🖥</span>
    <h2>System Action</h2>
  </div>
  <div class="sf-panel">
    <ul class="policy-list">
      <li>All missing service user incidents must be recorded via an Incident Report in the Staff Portal.</li>
      <li>This procedure must always be followed by full documentation.</li>
      <li>Management will review and escalate where required.</li>
    </ul>
  </div>
</section>

</div>

<section class="sf-block" aria-labelledby="sds-h-purpose">
  <div class="sf-sec-head" id="sds-h-purpose">
    <span class="sf-sec-icon" aria-hidden="true">📄</span>
    <h2>Purpose</h2>
  </div>
  <div class="sf-panel">
    <p>This procedure defines the expected standards for delivering all ClubSENsational sessions, ensuring consistency, safety, engagement and quality across all services and venues.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="sds-h-when">
  <div class="sf-sec-head" id="sds-h-when">
    <span class="sf-sec-icon" aria-hidden="true">📋</span>
    <h2>When to Use This Procedure</h2>
  </div>
  <p>These standards apply to all staff delivering any session, including:</p>
  <ul class="policy-list">
    <li>Aquatic Activity</li>
    <li>Climbing Activity</li>
    <li>Physical Activity</li>
    <li>Active Play &amp; Movement</li>
    <li>Multi Activity</li>
  </ul>
</section>

<section class="sf-block" aria-labelledby="sds-h-principles">
  <div class="sf-sec-head" id="sds-h-principles">
    <span class="sf-sec-icon" aria-hidden="true">🛡️</span>
    <h2>Key Principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
      <li>Safety and regulation come first.</li>
      <li>Sessions must be structured but flexible.</li>
      <li>Engagement is essential.</li>
      <li>Promote independence where appropriate.</li>
      <li>Adapt to individual needs at all times.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="sds-h-procedure">
  <div class="sf-sec-head" id="sds-h-procedure">
    <span class="sf-sec-icon" aria-hidden="true">🎯</span>
    <h2>Procedure</h2>
  </div>
  <p class="sf-flow-hint">Session flow: before, during and after. Follow the steps in order within each phase.</p>
  <div class="sf-phases">
    <div class="sf-phase">
      <p class="sf-phase-label">Before the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step sf-step--priority">
          <div class="sf-priority-row">
            <span class="sf-step-num" aria-hidden="true">1</span>
            <div class="sf-step-body">
              <div class="sf-priority-intro">Preparation</div>
              <ul class="sf-nested">
                <li>Review session information and relevant notes.</li>
                <li>Prepare equipment and resources.</li>
                <li>Ensure the environment is safe and ready.</li>
                <li>Be aware of any specific needs or risks.</li>
              </ul>
            </div>
          </div>
        </div>
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">2</span><div class="sf-step-body"><strong>Start of the Session</strong>
          <ul class="sf-nested">
            <li>Greet the service user.</li>
            <li>Establish a positive and calm environment.</li>
            <li>Check readiness (emotional, physical and communication level).</li>
            <li>Set clear expectations using appropriate communication methods.</li>
          </ul>
        </div></div>
      </div>
    </div>
    <div class="sf-phase">
      <p class="sf-phase-label">During the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step sf-step--priority">
          <div class="sf-priority-row">
            <span class="sf-step-num" aria-hidden="true">3</span>
            <div class="sf-step-body">
              <div class="sf-priority-intro">During the Session</div>
              <ul class="sf-nested">
                <li>Maintain continuous supervision.</li>
                <li>Deliver structured activities with flexibility.</li>
                <li>Adapt tasks based on engagement and response.</li>
                <li>Support regulation and avoid escalation.</li>
                <li>Use appropriate resources (e.g. visual aids) where required.</li>
                <li>Encourage participation without forcing.</li>
              </ul>
            </div>
          </div>
        </div>
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">4</span><div class="sf-step-body"><strong>Engagement and Behaviour Support</strong>
          <ul class="sf-nested">
            <li>Use positive reinforcement.</li>
            <li>Offer structured choices.</li>
            <li>Apply de-escalation strategies when needed.</li>
            <li>Maintain a calm and supportive approach.</li>
          </ul>
        </div></div>
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">5</span><div class="sf-step-body"><strong>Transitions Within the Session</strong>
          <ul class="sf-nested">
            <li>Prepare service users for changes.</li>
            <li>Use clear communication and cues.</li>
            <li>Maintain supervision during movement between areas.</li>
          </ul>
        </div></div>
      </div>
    </div>
    <div class="sf-phase">
      <p class="sf-phase-label">End of the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step sf-step--priority">
          <div class="sf-priority-row">
            <span class="sf-step-num" aria-hidden="true">6</span>
            <div class="sf-step-body">
              <div class="sf-priority-intro">End of the Session</div>
              <ul class="sf-nested">
                <li>Use clear closure (e.g. countdown, finished signals).</li>
                <li>Support transition out of the activity.</li>
                <li>Ensure safe handover to parent or carer.</li>
                <li>Provide brief, professional feedback if required.</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="sds-h-rules">
  <h3 class="sf-rules-h" id="sds-h-rules">Important Rules</h3>
  <div class="sf-rules-grid">
    <div class="sf-rule-card sf-rule-card--do">
      <h3>Do</h3>
      <ul>
        <li>Prioritise safety at all times.</li>
        <li>Adapt to each service user.</li>
        <li>Maintain professionalism.</li>
        <li>Follow structure and routines.</li>
      </ul>
    </div>
    <div class="sf-rule-card sf-rule-card--dont">
      <h3>Do not</h3>
      <ul>
        <li>Leave service users unattended.</li>
        <li>Force participation.</li>
        <li>Ignore signs of distress or dysregulation.</li>
        <li>Use unsafe or inappropriate practices.</li>
      </ul>
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="sds-h-escalation">
  <div class="sf-callout" role="note">
    <div class="sf-sec-head" id="sds-h-escalation">
      <span class="sf-sec-icon" aria-hidden="true">⚠️</span>
      <h2>Escalation</h2>
    </div>
    <p class="sf-subh">Escalate if</p>
    <ul class="policy-list">
      <li>A safety concern arises</li>
      <li>A safeguarding concern is identified</li>
      <li>Behaviour becomes unmanageable</li>
      <li>The session cannot be delivered safely</li>
    </ul>
    <p class="sf-subh">Follow</p>
    <ul class="policy-list">
      <li>Incident Reporting Procedure</li>
      <li>Safeguarding Reporting Procedure</li>
      <li>Emergency Response Principles</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="sds-h-system">
  <div class="sf-sec-head" id="sds-h-system">
    <span class="sf-sec-icon" aria-hidden="true">🖥</span>
    <h2>System Action</h2>
  </div>
  <div class="sf-panel">
    <ul class="policy-list">
      <li>All sessions must be recorded via Session Feedback in the Staff Portal.</li>
      <li>Any concerns must be escalated through an Incident Report.</li>
      <li>Session quality and delivery are monitored by management.</li>
    </ul>
  </div>
</section>

  <div class="cs-body">

<section class="sf-block" aria-labelledby="sr-h-purpose">
  <div class="sf-sec-head" id="sr-h-purpose">
    <span class="sf-sec-icon" aria-hidden="true">📄</span>
    <h2>Purpose</h2>
  </div>
  <div class="sf-panel">
    <p>This procedure defines the required supervision standards and staffing ratios to ensure the safety, wellbeing and effective delivery of all sessions across services and venues.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="sr-h-when">
  <div class="sf-sec-head" id="sr-h-when">
    <span class="sf-sec-icon" aria-hidden="true">🕐</span>
    <h2>When to Use This Procedure</h2>
  </div>
  <p>These standards apply to all staff, at all times, during:</p>
  <ul class="policy-list">
    <li>All sessions</li>
    <li>Transitions between activities or areas</li>
    <li>Waiting periods</li>
    <li>Arrival and handover</li>
  </ul>
</section>

<section class="sf-block" aria-labelledby="sr-h-principles">
  <div class="sf-sec-head" id="sr-h-principles">
    <span class="sf-sec-icon" aria-hidden="true">👥</span>
    <h2>Key Principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
      <li>Service users must never be left unattended.</li>
      <li>Supervision must be active, not passive.</li>
      <li>Staff must always maintain visual awareness.</li>
      <li>Ratios must reflect risk, not just numbers.</li>
      <li>Safety always overrides session delivery.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="sr-h-standards">
  <div class="sf-sec-head" id="sr-h-standards">
    <span class="sf-sec-icon" aria-hidden="true">👁️</span>
    <h2>Supervision Standards</h2>
  </div>
  <div class="sf-steps sf-steps--flow">
    <div class="sf-step sf-step--priority">
      <div class="sf-priority-row">
        <span class="sf-step-num" aria-hidden="true">1</span>
        <div class="sf-step-body">
          <div class="sf-priority-intro">Active Supervision</div>
          <ul class="sf-nested">
            <li>Maintain constant visual contact with service users.</li>
            <li>Be positioned to respond immediately.</li>
            <li>Stay engaged and aware at all times.</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="sf-step sf-step--priority">
      <div class="sf-priority-row">
        <span class="sf-step-num" aria-hidden="true">2</span>
        <div class="sf-step-body">
          <div class="sf-priority-intro">Positioning</div>
          <ul class="sf-nested">
            <li>Position yourself based on the activity and risk level.</li>
            <li>In higher-risk environments (e.g. water, climbing), remain close and ready to intervene.</li>
            <li>Ensure clear sightlines at all times.</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">3</span><div class="sf-step-body"><strong>Transitions</strong>
      <ul class="sf-nested">
        <li>Supervise closely during movement between areas.</li>
        <li>Maintain control of all service users.</li>
        <li>Adjust positioning to reduce risk.</li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">4</span><div class="sf-step-body"><strong>Shared Spaces</strong>
      <ul class="sf-nested">
        <li>Be aware of other users of the venue.</li>
        <li>Maintain supervision even in busy or public environments.</li>
      </ul>
    </div></div>
  </div>
</section>

<section class="sf-block sf-block--ratios" aria-labelledby="sr-h-ratios">
  <div class="sf-sec-head" id="sr-h-ratios">
    <span class="sf-sec-icon" aria-hidden="true">⚖️</span>
    <h2>Ratios</h2>
  </div>
  <div class="sf-ratios-wrap">
    <h3 class="sf-subsec-h">General rule</h3>
    <p class="sf-ratios-lead">Ratios must always allow for safe and effective supervision.</p>
    <h3 class="sf-subsec-h">Standard ratios</h3>
    <ul class="policy-list">
      <li>1:1 (high support needs or high-risk activities)</li>
      <li>2:1 or small group (only where safe and appropriate)</li>
      <li>Group ratios must be approved and risk-assessed</li>
    </ul>
    <h3 class="sf-subsec-h">Adjust ratios based on</h3>
    <ul class="policy-list">
      <li>Level of need</li>
      <li>Behaviour and regulation</li>
      <li>Environment and activity</li>
      <li>Transitions and movement between spaces</li>
    </ul>
    <div class="sf-important" role="note">
      <strong>Important</strong>
      If safe supervision cannot be maintained, the session must not continue.
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="sr-h-rules">
  <h3 class="sf-rules-h" id="sr-h-rules">Important Rules</h3>
  <div class="sf-rules-grid">

  <div class="cs-body">

<section class="sf-block" aria-labelledby="th-h-purpose">
  <div class="sf-sec-head" id="th-h-purpose">
    <span class="sf-sec-icon" aria-hidden="true">📄</span>
    <h2>Purpose</h2>
  </div>
  <div class="sf-panel">
    <p>This procedure ensures that all transitions and handovers are managed safely, clearly and consistently, reducing risk and maintaining continuity of care across all services and venues.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="th-h-when">
  <div class="sf-sec-head" id="th-h-when">
    <span class="sf-sec-icon" aria-hidden="true">🔀</span>
    <h2>When to Use This Procedure</h2>
  </div>
  <p>This procedure applies during:</p>
  <ul class="policy-list">
    <li>Arrival and collection</li>
    <li>Movement between areas (e.g. changing rooms, pool, gym, climbing)</li>
    <li>Transitions between activities</li>
    <li>Handover between staff</li>
    <li>Handover to parents or carers</li>
  </ul>
</section>

<section class="sf-block" aria-labelledby="th-h-principles">
  <div class="sf-sec-head" id="th-h-principles">
    <span class="sf-sec-icon" aria-hidden="true">👁️</span>
    <h2>Key Principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
      <li>Transitions are high-risk moments and require full attention.</li>
      <li>Supervision must be continuous.</li>
      <li>Communication must be clear and structured.</li>
      <li>Never assume responsibility has been transferred.</li>
      <li>Safety takes priority over timing.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="th-h-procedure">
  <div class="sf-sec-head" id="th-h-procedure">
    <span class="sf-sec-icon" aria-hidden="true">🤝</span>
    <h2>Procedure</h2>
  </div>
  <p class="sf-flow-hint">Follow these steps in order from preparation through to after the transition.</p>
  <div class="sf-steps sf-steps--flow">
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">1</span><div class="sf-step-body"><strong>Preparing for Transition</strong>
      <ul class="sf-nested">
        <li>Inform the service user in advance.</li>
        <li>Use clear communication (verbal, visual or cues).</li>
        <li>Ensure the next environment is ready.</li>
        <li>Check staffing and supervision.</li>
      </ul>
    </div></div>
    <div class="sf-step sf-step--priority">
      <div class="sf-priority-row">
        <span class="sf-step-num" aria-hidden="true">2</span>
        <div class="sf-step-body">
          <div class="sf-priority-intro">During Transitions</div>
          <ul class="sf-nested">
            <li>Maintain full supervision at all times.</li>
            <li>Position yourself to control movement safely.</li>
            <li>Support regulation and reduce anxiety.</li>
            <li>Move in a controlled and structured way.</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">3</span><div class="sf-step-body"><strong>Moving Between Areas</strong>
      <ul class="sf-nested">
        <li>Ensure safe pathways (e.g. no running, appropriate footwear if required).</li>
        <li>Provide physical support if needed (e.g. hand holding).</li>
        <li>Keep the group together and under control.</li>
      </ul>
    </div></div>
    <div class="sf-step sf-step--priority">
      <div class="sf-priority-row">
        <span class="sf-step-num" aria-hidden="true">4</span>
        <div class="sf-step-body">
          <div class="sf-priority-intro">Handover Between Staff</div>
          <ul class="sf-nested">
            <li>Clearly confirm who is responsible.</li>
            <li>Share relevant information:
              <ul class="sf-nested">
                <li>Behaviour or incidents</li>
                <li>Emotional state</li>
                <li>Any concerns or risks</li>
              </ul>
            </li>
            <li>Do not leave until responsibility is clearly transferred.</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="sf-step sf-step--priority">
      <div class="sf-priority-row">
        <span class="sf-step-num" aria-hidden="true">5</span>
        <div class="sf-step-body">
          <div class="sf-priority-intro">Handover to Parents or Carers</div>
          <ul class="sf-nested">
            <li>Ensure the service user is safely returned.</li>
            <li>Provide brief, clear and professional feedback if required.</li>
            <li>Do not leave the service user unattended while waiting.</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">6</span><div class="sf-step-body"><strong>Managing Delays or Issues</strong>
      <ul class="sf-nested">
        <li>If a parent is late, maintain supervision.</li>
        <li>Do not start a new session if it compromises safety.</li>
        <li>Inform management if needed.</li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">7</span><div class="sf-step-body"><strong>After Transition</strong>
      <ul class="sf-nested">
        <li>Confirm all service users are accounted for.</li>
        <li>Resume structured supervision.</li>
      </ul>
    </div></div>
  </div>
</section>

<section class="sf-block" aria-labelledby="th-h-rules">
  <h3 class="sf-rules-h" id="th-h-rules">Important Rules</h3>
  <div class="sf-rules-grid">
    <div class="sf-rule-card sf-rule-card--do">
      <h3>Do</h3>
      <ul>
        <li>Maintain supervision throughout transitions.</li>
        <li>Communicate clearly and consistently.</li>
        <li>Prepare service users in advance.</li>
        <li>Confirm responsibility before leaving.</li>
      </ul>
    </div>
    <div class="sf-rule-card sf-rule-card--dont">
      <h3>Do not</h3>
      <ul>
        <li>Leave service users unattended at any point.</li>
        <li>Assume someone else is responsible.</li>
        <li>Rush transitions in an unsafe way.</li>
        <li>Allow uncontrolled movement between areas.</li>
      </ul>
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="th-h-escalation">
  <div class="sf-callout" role="note">
    <div class="sf-sec-head" id="th-h-escalation">
      <span class="sf-sec-icon" aria-hidden="true">⚠️</span>
      <h2>Escalation</h2>
    </div>
    <p class="sf-subh">Escalate immediately if</p>
    <ul class="policy-list">
      <li>A service user is missing or unaccounted for</li>
      <li>Behaviour becomes unsafe</li>
      <li>The environment creates risk</li>
      <li>Handover cannot be completed safely</li>
    </ul>
    <p class="sf-subh">Follow</p>
    <ul class="policy-list">
      <li>Missing Service User Procedure</li>
      <li>Incident Reporting Procedure</li>
      <li>Emergency Response Principles</li>
    </ul>
    <p class="sf-subh">Contact</p>
    <ul class="policy-list">
      <li>Duty Manager / Service Manager</li>
      <li>Venue staff if required</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="th-h-system">
  <div class="sf-sec-head" id="th-h-system">
    <span class="sf-sec-icon" aria-hidden="true">🖥</span>
    <h2>System Action</h2>
  </div>
  <div class="sf-panel">
    <ul class="policy-list">
      <li>Any issues during transitions must be recorded via the Staff Portal.</li>
      <li>Incidents or risks must be logged using an Incident Report.</li>
      <li>Relevant information must be included in Session Feedback.</li>
    </ul>
  </div>
</section>

  <div class="cs-meta cs-meta--simple">
