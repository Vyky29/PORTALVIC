        if (draftHtml) {
          overlayBody.innerHTML = draftHtml;
        } else {
          overlayBody.appendChild(tpl.content.cloneNode(true));
        }
        stripAdminAcknowledgementBlocks();
        hydratePolicyMetaLastReviewed(overlayBody, eff);
        hydratePolicyMetaEffectiveFrom(overlayBody, eff);
        injectStaffAcknowledgmentBlock(policyId);
        (function initStaffPolicySignIfPresent() {
          if (policyId === "POL-000") return;
          var canvas = overlayBody.querySelector("#hs-staff-sign-canvas");
          var dateEl = overlayBody.querySelector("#hs-staff-sign-date");
          var btnClear = overlayBody.querySelector("#hs-staff-sign-clear");
          var btnSubmit = overlayBody.querySelector("#hs-staff-sign-submit");
          if (!canvas || !canvas.getContext || !dateEl || !btnClear || !btnSubmit) return;
          var ctx = canvas.getContext("2d");
          if (!ctx) return;
          function pad2(n) {
            return (n < 10 ? "0" : "") + n;
          }
          function todayIso() {
            var d = new Date();
            return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
          }
          if (!dateEl.value) dateEl.value = todayIso();
          var ackSection = overlayBody.querySelector(".pc-staff-ack-injected");
          var prevAck = getStaffAckRecord(policyId);
          if (prevAck && ackSection) {
            if (prevAck.dateSigned) dateEl.value = prevAck.dateSigned;
            btnSubmit.disabled = true;
            btnClear.disabled = true;
            dateEl.readOnly = true;
            canvas.style.pointerEvents = "none";
            canvas.style.opacity = "0.88";
            var al = document.createElement("p");
            al.className = "pc-staff-ack-already";
            al.setAttribute("role", "status");
            var dsAl = prevAck.dateSigned || (prevAck.signedAt ? String(prevAck.signedAt).slice(0, 10) : "");
            al.textContent = dsAl
              ? "You have already submitted an acknowledgment for this document (" +
                formatDispDate(dsAl) +
                "). It is shown as Completed on your dashboard."
              : "You have already submitted an acknowledgment for this document. It is shown as Completed on your dashboard.";
            var h2Ack = ackSection.querySelector("h2");
            if (h2Ack && h2Ack.nextSibling) ackSection.insertBefore(al, h2Ack.nextSibling);
            else ackSection.appendChild(al);
            return;
          }
          function fillWhite() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
          }
          fillWhite();
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.strokeStyle = "#1f2937";
          ctx.lineWidth = 2.5;
          var drawing = false;
          function posFromEvent(e) {
            var r = canvas.getBoundingClientRect();
            var sx = canvas.width / r.width;
            var sy = canvas.height / r.height;
            return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
          }
          canvas.addEventListener("pointerdown", function (e) {
            if (e.pointerType === "mouse" && e.buttons !== 1) return;
            drawing = true;
            try {
              canvas.setPointerCapture(e.pointerId);
            } catch (ex2) {}
            var p = posFromEvent(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
          });
          canvas.addEventListener("pointermove", function (e) {
            if (!drawing) return;
            var p = posFromEvent(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
          });
          function endStroke(e) {
            if (!drawing) return;
            drawing = false;
            try {
              canvas.releasePointerCapture(e.pointerId);
            } catch (ex3) {}
          }
          canvas.addEventListener("pointerup", endStroke);
          canvas.addEventListener("pointercancel", endStroke);
          canvas.addEventListener("pointerleave", function (e) {
            if (e.buttons === 0) drawing = false;
          });
          btnClear.addEventListener("click", function () {
            if (btnSubmit.disabled) return;
            fillWhite();
          });
          btnSubmit.addEventListener("click", function () {
            if (!dateEl.value || !String(dateEl.value).trim()) {
              alert("Please choose the date signed.");
              dateEl.focus();
              return;
            }
            if (!canvasHasSignature(canvas, ctx)) {
              alert("Please add your signature in the box.");
              return;
            }
            setStaffAcknowledged(policyId, {
              signedAt: new Date().toISOString(),
              dateSigned: String(dateEl.value).trim()
            });
            if (mainHome) refreshIndexStats(mainHome);
            btnSubmit.disabled = true;
            btnClear.disabled = true;
            dateEl.readOnly = true;
            canvas.style.pointerEvents = "none";
            var wrap = overlayBody.querySelector(".pc-staff-ack-injected");
            if (wrap && !wrap.querySelector(".pc-staff-ack-success")) {
              var okMsg = document.createElement("p");
              okMsg.className = "pc-staff-ack-success";
              okMsg.setAttribute("role", "status");
              okMsg.textContent =
                "Thank you. Your acknowledgment has been saved. This document is now marked as Completed on your dashboard.";
              wrap.appendChild(okMsg);
            }
          });
        })();
        overlay.classList.add("is-open");
        overlay.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
        try {
          overlay.scrollTop = 0;
          overlayBody.scrollTop = 0;
        } catch (errScroll) {}
        try {
          var closeBtn = document.getElementById("pcBtnClose");
          if (isAdminMode()) {
            setAdminAccordionOpen("pcAccAnnual");
            requestAnimationFrame(function () {
              if (overlay) overlay.scrollTop = 0;
            });
          } else if (closeBtn) closeBtn.focus();
        } catch (err) {}
      }

      function closeOverlay() {
        overlay.classList.remove("is-open");
        overlay.setAttribute("aria-hidden", "true");
        overlayBody.innerHTML = "";
        document.body.style.overflow = "";
        openPolicyId = null;
        mountHomePortal();
      }

      function reloadOverlayPolicy() {
        if (openPolicyId) mountPolicyInOverlay(openPolicyId);
      }

      function persistAdminMetaToStorage() {
        if (!openPolicyId || !isAdminMode()) return false;
        var p = getPolicyById(openPolicyId);
        if (!p) return false;
        var elEff = document.getElementById("pcAdmEffectiveFrom");
        var elOwner = document.getElementById("pcAdmOwner");
        var map = loadMetaOverrides();
        var prev = map[openPolicyId] || {};
        map[openPolicyId] = {
          version: pcAdmVersion ? pcAdmVersion.value.trim() : "",
          effectiveFrom: elEff ? elEff.value.trim() : "",
          nextReview: pcAdmNext ? pcAdmNext.value.trim() : "",
          owner: elOwner ? elOwner.value.trim() : "",
          status: "active",
          notes: pcAdmNotes ? pcAdmNotes.value.trim() : "",
          lastReviewedAt: prev.lastReviewedAt != null ? String(prev.lastReviewedAt) : "",
          lastReviewedBy: prev.lastReviewedBy != null ? String(prev.lastReviewedBy) : "",
          updatedAt: new Date().toISOString().slice(0, 19)
        };
        saveMetaOverrides(map);
        return true;
      }

      function saveAdminMeta() {
        if (!persistAdminMetaToStorage()) return;
        if (pcSaveMetaStatus) pcSaveMetaStatus.textContent = "Current policy record saved.";
      }

      function quickApproveNoChange() {
        if (!openPolicyId || !isAdminMode()) return;
        var byEl = document.getElementById("pcNoChangeReviewer");
        var dtEl = document.getElementById("pcNoChangeDate");
        var p = getPolicyById(openPolicyId);
        var eff = mergeEffective(p);
        var v = (pcAdmVersion && pcAdmVersion.value.trim()) || eff.version || "";
        var nrBase = (pcAdmNext && pcAdmNext.value.trim()) || eff.nextReview || isoDate(new Date());
        var nextY = addOneYear(nrBase);
        var today = dtEl && dtEl.value ? dtEl.value : isoDate(new Date());
        var reviewer = byEl && byEl.value.trim() ? byEl.value.trim() : DEFAULT_REVIEWER;
        var adv = collectAdvancedForEvent();
        var entry = {
          schema: 3,
          recordedAt: new Date().toISOString(),
          policyId: openPolicyId,
          reviewDate: today,
          reviewedBy: reviewer,
          reviewerRole: adv.role,
          quickMode: "approve",
          previousVersion: v,
          newVersion: v,
          summary: "",
          nextReviewDate: nextY,
          governanceNotes: adv.govNotes,
          changeType: adv.changeType || "none"
        };
        appendReviewEventV3(entry);
        var map = loadMetaOverrides();
        var prev = map[openPolicyId] || {};
        map[openPolicyId] = Object.assign({}, prev, {
          version: v,
          nextReview: nextY,
          lastReviewedAt: today,
          lastReviewedBy: reviewer,
          notes: pcAdmNotes ? pcAdmNotes.value.trim() : prev.notes || "",
          updatedAt: new Date().toISOString().slice(0, 19)
        });
        saveMetaOverrides(map);
        if (pcAdmNext) pcAdmNext.value = nextY;
        setQuickPanelsClosed();
        setAdminAccordionOpen("pcAccHistory");
        if (pcSaveMetaStatus) pcSaveMetaStatus.textContent = "Review confirmed. Next review set to " + nextY + ".";
        fillAdminForm(p, mergeEffective(p));
        focusPanelInView(document.getElementById("pcReviewHistoryCards"));
      }

      function toggleQuickNoChangePanel() {
        var noP = document.getElementById("pcQuickNoChangePanel");
        var minP = document.getElementById("pcQuickMinorPanel");
        var majP = document.getElementById("pcQuickMajorPanel");
        if (minP) minP.classList.remove("is-open");
        if (majP) majP.classList.remove("is-open");
        if (!noP) return;
        setAdminAccordionOpen("pcAccAnnual");
        noP.classList.toggle("is-open");
        if (noP.classList.contains("is-open")) {
          var byEl = document.getElementById("pcNoChangeReviewer");
          var dtEl = document.getElementById("pcNoChangeDate");
          if (byEl && !byEl.value.trim()) byEl.value = DEFAULT_REVIEWER;
          if (dtEl && !dtEl.value) dtEl.value = isoDate(new Date());
          focusPanelInView(noP);
        }
      }

      function toggleQuickMinorPanel() {
        var noP = document.getElementById("pcQuickNoChangePanel");
        var minP = document.getElementById("pcQuickMinorPanel");
        var majP = document.getElementById("pcQuickMajorPanel");
        if (noP) noP.classList.remove("is-open");
        if (majP) majP.classList.remove("is-open");
        if (!minP) return;
        setAdminAccordionOpen("pcAccAnnual");
        minP.classList.toggle("is-open");
        if (minP.classList.contains("is-open")) {
          var v = (pcAdmVersion && pcAdmVersion.value.trim()) || "";
          var mn = document.getElementById("pcMinorNewVersion");
          var mnr = document.getElementById("pcMinorNextReview");
          if (mn && !mn.value.trim()) mn.value = suggestMinorBump(v);
          var eff = mergeEffective(getPolicyById(openPolicyId));
          var baseNr = (pcAdmNext && pcAdmNext.value.trim()) || eff.nextReview || isoDate(new Date());
          if (mnr && !mnr.value) mnr.value = addOneYear(baseNr);
          focusPanelInView(minP);
        }
      }

      function toggleQuickMajorPanel() {
        var noP = document.getElementById("pcQuickNoChangePanel");
        var minP = document.getElementById("pcQuickMinorPanel");
        var majP = document.getElementById("pcQuickMajorPanel");
        if (noP) noP.classList.remove("is-open");
        if (minP) minP.classList.remove("is-open");
        if (!majP) return;
        setAdminAccordionOpen("pcAccAnnual");
        majP.classList.toggle("is-open");
        if (majP.classList.contains("is-open")) {
          var mnr = document.getElementById("pcMajorNextReview");
          var eff = mergeEffective(getPolicyById(openPolicyId));
          var baseNr = (pcAdmNext && pcAdmNext.value.trim()) || eff.nextReview || isoDate(new Date());
          if (mnr && !mnr.value) mnr.value = addOneYear(baseNr);
          focusPanelInView(majP);
        }
      }

      function saveMinorReview() {
        if (!openPolicyId || !isAdminMode()) return;
        var p = getPolicyById(openPolicyId);
        var eff = mergeEffective(p);
        var prevV = (pcAdmVersion && pcAdmVersion.value.trim()) || eff.version || "";
        var sumEl = document.getElementById("pcMinorSummary");
        var nvEl = document.getElementById("pcMinorNewVersion");
        var nrEl = document.getElementById("pcMinorNextReview");
        var byEl = document.getElementById("pcMinorReviewedBy");
        var newV = nvEl ? nvEl.value.trim() : "";
        if (!newV) newV = suggestMinorBump(prevV);
        var nextY = nrEl && nrEl.value.trim() ? nrEl.value.trim() : addOneYear((pcAdmNext && pcAdmNext.value.trim()) || eff.nextReview || isoDate(new Date()));
        var today = isoDate(new Date());
        var reviewer = byEl && byEl.value.trim() ? byEl.value.trim() : DEFAULT_REVIEWER;
        var adv = collectAdvancedForEvent();
        var entry = {
          schema: 3,
          recordedAt: new Date().toISOString(),
          policyId: openPolicyId,
          reviewDate: today,
          reviewedBy: reviewer,
          reviewerRole: adv.role,
          quickMode: "minor",
          previousVersion: prevV,
          newVersion: newV,
          summary: sumEl ? sumEl.value.trim() : "",
          nextReviewDate: nextY,
          governanceNotes: adv.govNotes,
          changeType: adv.changeType || "minor_policy"
        };
        appendReviewEventV3(entry);
        var map = loadMetaOverrides();
        var prev = map[openPolicyId] || {};
        map[openPolicyId] = Object.assign({}, prev, {
          version: newV,
          nextReview: nextY,
          lastReviewedAt: today,
          lastReviewedBy: reviewer,
          notes: pcAdmNotes ? pcAdmNotes.value.trim() : prev.notes || "",
          updatedAt: new Date().toISOString().slice(0, 19)
        });
        saveMetaOverrides(map);
        if (pcAdmVersion) pcAdmVersion.value = newV;
        if (pcAdmNext) pcAdmNext.value = nextY;
        var elEff = document.getElementById("pcAdmEffectiveFrom");
        if (elEff && newV !== prevV) elEff.value = today;
        setQuickPanelsClosed();
        setAdminAccordionOpen("pcAccHistory");
        if (pcSaveMetaStatus) pcSaveMetaStatus.textContent = "Minor update logged.";
        fillAdminForm(p, mergeEffective(p));
        focusPanelInView(document.getElementById("pcReviewHistoryCards"));
      }

      function saveMajorReview() {
        if (!openPolicyId || !isAdminMode()) return;
        var nvEl = document.getElementById("pcMajorNewVersion");
        var sumEl = document.getElementById("pcMajorSummary");
        var nrEl = document.getElementById("pcMajorNextReview");
        var byEl = document.getElementById("pcMajorReviewedBy");
        var newV = nvEl ? nvEl.value.trim() : "";
        var sum = sumEl ? sumEl.value.trim() : "";
        if (!newV) {
          if (pcSaveMetaStatus) pcSaveMetaStatus.textContent = "Enter the new version.";
          if (nvEl) nvEl.focus();
          return;
        }
        if (!sum) {
          if (pcSaveMetaStatus) pcSaveMetaStatus.textContent = "Enter a summary of changes.";
          if (sumEl) sumEl.focus();
          return;
        }
        var p = getPolicyById(openPolicyId);
        var eff = mergeEffective(p);
        var prevV = (pcAdmVersion && pcAdmVersion.value.trim()) || eff.version || "";
        if (newV === prevV) {
          if (pcSaveMetaStatus) pcSaveMetaStatus.textContent = "New version must differ from the current version.";
          return;
        }
        var nextY =
          nrEl && nrEl.value.trim()
            ? nrEl.value.trim()
            : addOneYear((pcAdmNext && pcAdmNext.value.trim()) || eff.nextReview || isoDate(new Date()));
        var today = isoDate(new Date());
        var reviewer = byEl && byEl.value.trim() ? byEl.value.trim() : DEFAULT_REVIEWER;
        var adv = collectAdvancedForEvent();
        var entry = {
          schema: 3,
          recordedAt: new Date().toISOString(),
          policyId: openPolicyId,
          reviewDate: today,
          reviewedBy: reviewer,
          reviewerRole: adv.role,
          quickMode: "major",
          previousVersion: prevV,
          newVersion: newV,
          summary: sum,
          nextReviewDate: nextY,
          governanceNotes: adv.govNotes,
          changeType: adv.changeType || "material"
        };
        appendReviewEventV3(entry);
        var map = loadMetaOverrides();
        var prev = map[openPolicyId] || {};
        map[openPolicyId] = Object.assign({}, prev, {
          version: newV,
          nextReview: nextY,
          lastReviewedAt: today,
          lastReviewedBy: reviewer,
          notes: pcAdmNotes ? pcAdmNotes.value.trim() : prev.notes || "",
          updatedAt: new Date().toISOString().slice(0, 19)
        });
        saveMetaOverrides(map);
        if (pcAdmVersion) pcAdmVersion.value = newV;
        if (pcAdmNext) pcAdmNext.value = nextY;
        var elEff = document.getElementById("pcAdmEffectiveFrom");
        if (elEff) elEff.value = today;
        setQuickPanelsClosed();
        setAdminAccordionOpen("pcAccHistory");
        if (pcSaveMetaStatus) pcSaveMetaStatus.textContent = "Major revision logged and version updated.";
        fillAdminForm(p, mergeEffective(p));
        focusPanelInView(document.getElementById("pcReviewHistoryCards"));
      }

      function exportFullReviewLog() {
        var events = loadReviewEvents().slice();
        events.sort(function (a, b) {
          return String(a.recordedAt || "").localeCompare(String(b.recordedAt || ""));
        });
        var payload = {
          schemaVersion: 3,
          exportedAt: new Date().toISOString(),
          organisation: "clubSENsational",
          reviewEvents: events
        };
        var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "clubsensational-policy-review-history.json";
        a.rel = "noopener";
        document.body.appendChild(a);
        a.click();
        setTimeout(function () {
          URL.revokeObjectURL(a.href);
          a.remove();
        }, 500);
        if (pcSaveMetaStatus) pcSaveMetaStatus.textContent = "Review history export started.";
      }

      (function initModeFromUrl() {
        if (!rootDash) return;
        rootDash.classList.remove("mode-admin", "mode-staff");
        rootDash.classList.add("mode-staff");
      })();

      applyModeBar();
      mountHomePortal();

      document.getElementById("cs-pc-dashboard").addEventListener("click", function (e) {
        var fab = e.target.closest("#cs-idx-quick-fab");
        if (fab) {
          e.preventDefault();
          setCsIdxQuickPanelOpen(true);
          return;
        }
        if (e.target.closest("[data-cs-idx-quick-close='1']")) {
          e.preventDefault();
          setCsIdxQuickPanelOpen(false);
          return;
        }
        var link = e.target.closest("a.btn[data-pc-policy]");
        if (link) {
          e.preventDefault();
          var pid = link.getAttribute("data-pc-policy");
          if (pid) {
            if (link.closest("#cs-idx-quick-panel")) setCsIdxQuickPanelOpen(false);
            mountPolicyInOverlay(pid);
          }
          return;
        }
        if (e.target.getAttribute("data-pc-close") === "1" || e.target.closest("[data-pc-close='1']")) {
          if (e.target.closest("#pcPolicyOverlay")) closeOverlay();
        }
      });

      var pcBtnApprove = document.getElementById("pcQuickApprove");
      if (pcBtnApprove) {
        pcBtnApprove.addEventListener("click", function (e) {
          e.stopPropagation();
          toggleQuickNoChangePanel();
        });
      }
      var pcBtnConfirmNoChange = document.getElementById("pcBtnConfirmNoChange");
      if (pcBtnConfirmNoChange) {
        pcBtnConfirmNoChange.addEventListener("click", function (e) {
          e.stopPropagation();
          quickApproveNoChange();
        });
      }
      var pcBtnMinor = document.getElementById("pcQuickMinor");
      if (pcBtnMinor) {
        pcBtnMinor.addEventListener("click", function (e) {
          e.stopPropagation();
          toggleQuickMinorPanel();
        });
      }
      var pcBtnMajor = document.getElementById("pcQuickMajor");
      if (pcBtnMajor) {
        pcBtnMajor.addEventListener("click", function (e) {
          e.stopPropagation();
          toggleQuickMajorPanel();
        });
      }
      var pcBtnSaveMinor = document.getElementById("pcBtnSaveMinorReview");
      if (pcBtnSaveMinor) {
        pcBtnSaveMinor.addEventListener("click", function (e) {
          e.stopPropagation();
          saveMinorReview();
        });
      }
      var pcBtnPublishMajor = document.getElementById("pcBtnPublishMajor");
      if (pcBtnPublishMajor) {
        pcBtnPublishMajor.addEventListener("click", function (e) {
          e.stopPropagation();
          saveMajorReview();
        });
      }

      document.addEventListener("keydown", function (e) {
        if (e.key !== "Escape") return;
        if (overlay.classList.contains("is-open")) {
          closeOverlay();
          return;
        }
        if (mainHome) {
          var qp = mainHome.querySelector("#cs-idx-quick-panel");
          if (qp && qp.classList.contains("is-open")) setCsIdxQuickPanelOpen(false);
        }
      });
    })();
  </script>
