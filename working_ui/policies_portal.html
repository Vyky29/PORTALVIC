  <div class="cs-body">

<section class="sf-block" aria-labelledby="rec-h-purpose">
  <div class="sf-sec-head" id="rec-h-purpose">
    <span class="sf-sec-icon" aria-hidden="true">📄</span>
    <h2>Purpose</h2>
  </div>
  <div class="sf-panel">
    <p>This procedure outlines the recruitment process to ensure all staff are safely, consistently and appropriately selected in line with ClubSENsational standards.</p>
    <p class="sf-cross-ref">See also the <strong>Recruitment Policy</strong> in the Policies section for full policy context, safeguarding requirements and legal framework.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="rec-h-when">
  <div class="sf-sec-head" id="rec-h-when">
    <span class="sf-sec-icon" aria-hidden="true">📋</span>
    <h2>When to Use This Procedure</h2>
  </div>
  <p>This procedure applies to all recruitment processes, including:</p>
  <ul class="policy-list">
    <li>New hires</li>
    <li>Replacement roles</li>
    <li>Additional staffing requirements</li>
  </ul>
</section>

<section class="sf-block" aria-labelledby="rec-h-principles">
  <div class="sf-sec-head" id="rec-h-principles">
    <span class="sf-sec-icon" aria-hidden="true">🛡️</span>
    <h2>Key Principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
      <li>Recruitment must prioritise safety and safeguarding.</li>
      <li>All candidates must go through a structured process.</li>
      <li>No staff member can start without full checks completed.</li>
      <li>Decisions must be consistent and documented.</li>
      <li>Professional standards must be maintained at all times.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="rec-h-procedure">
  <div class="sf-sec-head" id="rec-h-procedure">
    <span class="sf-sec-icon" aria-hidden="true">👤</span>
    <h2>Procedure</h2>
  </div>
  <p class="sf-flow-hint">Follow these steps in order from application through to onboarding.</p>
  <div class="sf-steps sf-steps--flow">
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">1</span><div class="sf-step-body"><strong>Application Stage</strong>
      <ul class="sf-nested">
        <li>Candidates apply via the designated application form.</li>
        <li>CVs alone are not accepted.</li>
        <li>Applications must be complete to be reviewed.</li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">2</span><div class="sf-step-body"><strong>Application Review</strong>
      <ul class="sf-nested">
        <li>Applications are reviewed against role requirements.</li>
        <li>Incomplete or unsuitable applications are filtered out.</li>
        <li>Suitable candidates are shortlisted.</li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">3</span><div class="sf-step-body"><strong>Interview Stage</strong>
      <ul class="sf-nested">
        <li>Shortlisted candidates are invited to a structured interview.</li>
        <li>Interviews assess:
          <ul class="sf-nested">
            <li>Experience</li>
            <li>Suitability for the role</li>
            <li>Understanding of working with service users</li>
          </ul>
        </li>
        <li>Notes must be recorded.</li>
      </ul>
    </div></div>
    <div class="sf-step sf-step--priority">
      <div class="sf-priority-row">
        <span class="sf-step-num" aria-hidden="true">4</span>
        <div class="sf-step-body">
          <div class="sf-priority-intro">Conditional Offer</div>
          <ul class="sf-nested">
            <li>Successful candidates receive a conditional offer subject to:
              <ul class="sf-nested">
                <li>References</li>
                <li>Enhanced DBS check</li>
                <li>Right to work verification</li>
                <li>Health questionnaire</li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <div class="sf-step sf-step--priority">
      <div class="sf-priority-row">
        <span class="sf-step-num" aria-hidden="true">5</span>
        <div class="sf-step-body">
          <div class="sf-priority-intro">Pre-Employment Checks</div>
          <ul class="sf-nested">
            <li>Identity verification must be completed.</li>
            <li>References must be obtained and reviewed.</li>
            <li>DBS check must be completed and cleared.</li>
            <li>Health information must be reviewed where required.</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">6</span><div class="sf-step-body"><strong>Final Confirmation</strong>
      <ul class="sf-nested">
        <li>Only once all checks are completed:
          <ul class="sf-nested">
            <li>Contract is issued</li>
            <li>Start date is confirmed</li>
          </ul>
        </li>
      </ul>
    </div></div>
    <div class="sf-step"><span class="sf-step-num" aria-hidden="true">7</span><div class="sf-step-body"><strong>Onboarding</strong>
      <ul class="sf-nested">
        <li>Staff complete onboarding as directed by management, including any tasks assigned via the Staff Portal where used.</li>
        <li>Staff are introduced to:
          <ul class="sf-nested">
            <li>Policies</li>
            <li>Procedures</li>
            <li>Responsibilities</li>
          </ul>
        </li>
      </ul>
    </div></div>
  </div>
</section>

<section class="sf-block" aria-labelledby="rec-h-rules">
  <h3 class="sf-rules-h" id="rec-h-rules">Important Rules</h3>
  <div class="sf-rules-grid">
    <div class="sf-rule-card sf-rule-card--do">
      <h3>Do</h3>
      <ul>
        <li>Follow all recruitment steps in order.</li>
        <li>Ensure all checks are completed before start.</li>
        <li>Keep records of decisions and communication.</li>
        <li>Maintain confidentiality.</li>
      </ul>
    </div>
    <div class="sf-rule-card sf-rule-card--dont">
      <h3>Do not</h3>
      <ul>
        <li>Allow staff to start without full checks.</li>
        <li>Skip steps in the process.</li>
        <li>Make informal or undocumented decisions.</li>
        <li>Share candidate information inappropriately.</li>
      </ul>
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="rec-h-escalation">
  <div class="sf-callout" role="note">
    <div class="sf-sec-head" id="rec-h-escalation">
      <span class="sf-sec-icon" aria-hidden="true">⚠️</span>
      <h2>Escalation</h2>
    </div>
    <p class="sf-subh">Escalate if</p>
    <ul class="policy-list">
      <li>Safeguarding concerns arise during recruitment</li>
      <li>References raise concerns</li>
      <li>Documentation is incomplete or unclear</li>
      <li>There is uncertainty about candidate suitability</li>
    </ul>
    <p class="sf-subh">Contact</p>
    <ul class="policy-list">
      <li>Recruitment Lead</li>
      <li>Management team</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="rec-h-system">
  <div class="sf-sec-head" id="rec-h-system">
    <span class="sf-sec-icon" aria-hidden="true">🖥</span>
    <h2>System Action</h2>
  </div>
  <div class="sf-panel">
    <ul class="policy-list">
      <li>Recruitment records must be stored and managed appropriately.</li>
      <li>Documentation must be complete and accessible.</li>
      <li>Recruitment decisions may be reviewed by management.</li>
      <li>Where your role includes digital tasks, complete them via the Staff Portal when instructed.</li>
    </ul>
  </div>
</section>

    <li>Urgent situations that cannot wait for email</li>

</section>

<section class="sf-block" aria-labelledby="ic-h-principles">

  <div class="cs-body">

  <p class="sf-priority-banner" role="note">Water environments are high risk. Read this procedure in full before leading aquatic sessions, and keep supervision, venue rules and escalation routes in mind at all times.</p>

<section class="sf-block" aria-labelledby="aq-purpose-head">
  <div class="sf-sec-head" id="aq-purpose-head">
    <span class="sf-sec-icon" aria-hidden="true">📄</span>
    <h2>Purpose</h2>
  </div>
  <div class="sf-panel">
    <p>This procedure defines how aquatic sessions are delivered safely, consistently and effectively, ensuring service users are supported in a structured, engaging and secure environment.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="aq-when-head">
  <div class="sf-sec-head" id="aq-when-head">
    <span class="sf-sec-icon" aria-hidden="true">🏊</span>
    <h2>When to Use This Procedure</h2>
  </div>
  <p>This procedure applies to all aquatic sessions, including:</p>
  <ul class="policy-list">
    <li>1:1 swimming sessions</li>
    <li>Hydrotherapy sessions</li>
    <li>Aquatic components within multi-activity sessions</li>
    <li>All aquatic environments (leisure centres, SwimFarm, home pools)</li>
  </ul>
</section>

<section class="sf-block" aria-labelledby="aq-principles-head">
  <div class="sf-sec-head" id="aq-principles-head">
    <span class="sf-sec-icon" aria-hidden="true">🛡️</span>
    <h2>Key Principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
      <li>Safety and supervision are the priority at all times.</li>
      <li>Regulation and comfort come before skill progression.</li>
      <li>Sessions must be structured but adaptable.</li>
      <li>Service users must never be forced into activities.</li>
      <li>Staff must remain engaged, present and responsive.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="aq-flow-head">
  <div class="sf-sec-head" id="aq-flow-head">
    <span class="sf-sec-icon" aria-hidden="true">🎯</span>
    <h2>Session Flow</h2>
  </div>
  <p class="sf-flow-hint">Structured phases: prepare, deliver safely in and around the water, then close and hand over. Step numbers follow this sequence.</p>
  <div class="sf-phases">
    <div class="sf-phase">
      <p class="sf-phase-label">Before the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">1</span><div class="sf-step-body"><strong>Preparation Before the Session</strong>
          <ul class="sf-nested">
            <li>Review session information and any relevant risk notes.</li>
            <li>Ensure pool environment is safe and ready.</li>
            <li>Prepare equipment and visual supports.</li>
            <li>Be aware of the service user&rsquo;s needs, abilities and risks.</li>
          </ul>
        </div></div>
      </div>
    </div>
    <div class="sf-phase">
      <p class="sf-phase-label">During the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">2</span><div class="sf-step-body"><strong>Start of the Session</strong>
          <ul class="sf-nested">
            <li>Greet the service user and establish trust.</li>
            <li>Check emotional and physical readiness.</li>
            <li>Use clear communication and structure.</li>
            <li>Set expectations for the session.</li>
          </ul>
        </div></div>
        <div class="sf-step sf-step--priority">
          <div class="sf-priority-row">
            <span class="sf-step-num" aria-hidden="true">3</span>
            <div class="sf-step-body">
              <div class="sf-priority-intro">During the Session</div>
              <ul class="sf-nested">
                <li>Maintain constant supervision.</li>
                <li>Stay within appropriate distance to intervene if needed.</li>
                <li>Adapt activities based on engagement and response.</li>
                <li>Support regulation and avoid escalation.</li>

  <div class="cs-header">

      <h1>Climbing Activity Procedure</h1>
      <p class="cs-sub">Registered Company No. 13755417 · www.clubsensational.org</p>

  <div class="cs-meta cs-meta--simple">

  <div class="cs-body">

  <p class="sf-priority-banner" role="note">Climbing is a high-risk activity. Equipment checks, harness fit and continuous supervision are non-negotiable. Stop the activity if control, equipment or the environment is unsafe.</p>

<section class="sf-block" aria-labelledby="ca-purpose-head">
  <div class="sf-sec-head" id="ca-purpose-head">
    <span class="sf-sec-icon" aria-hidden="true">📄</span>
    <h2>Purpose</h2>
  </div>
  <div class="sf-panel">
    <p>This procedure defines how climbing sessions are delivered safely and effectively, ensuring service users are supported in a controlled, structured and secure environment.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="ca-when-head">
  <div class="sf-sec-head" id="ca-when-head">
    <span class="sf-sec-icon" aria-hidden="true">🧗</span>
    <h2>When to Use This Procedure</h2>
  </div>
  <p>This procedure applies to all climbing sessions, including:</p>
  <ul class="policy-list">
    <li>1:1 climbing sessions</li>
    <li>Adapted climbing sessions</li>
    <li>Sessions delivered at climbing venues (e.g. Westway Sports Centre)</li>
  </ul>
</section>

<section class="sf-block" aria-labelledby="ca-principles-head">
  <div class="sf-sec-head" id="ca-principles-head">
    <span class="sf-sec-icon" aria-hidden="true">🛡️</span>
    <h2>Key Principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
      <li>Safety is the priority at all times.</li>
      <li>Supervision must be constant and active.</li>
      <li>Equipment must always be checked before use.</li>
      <li>Service users must feel safe and supported.</li>
      <li>Progression must be gradual and controlled.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="ca-session-flow-h">
  <div class="sf-sec-head" id="ca-session-flow-h">
    <span class="sf-sec-icon" aria-hidden="true">🎯</span>
    <h2>Session Flow</h2>
  </div>
  <p class="sf-flow-hint">Phases: prepare equipment and area, deliver with full supervision, then close and hand over safely.</p>
  <div class="sf-phases">
    <div class="sf-phase">
      <p class="sf-phase-label">Before the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step sf-step--priority">
          <div class="sf-priority-row">
            <span class="sf-step-num" aria-hidden="true">1</span>
            <div class="sf-step-body">
              <div class="sf-priority-intro">Equipment check &amp; preparation</div>
              <ul class="sf-nested">
                <li>Check all equipment (harness, ropes, clips).</li>
                <li>Ensure the climbing area is safe and clear.</li>
                <li>Review the service user&rsquo;s needs and abilities.</li>
                <li>Prepare a structured session plan.</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="sf-phase">
      <p class="sf-phase-label">During the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">2</span><div class="sf-step-body"><strong>Start of the Session</strong>
          <ul class="sf-nested">
            <li>Greet the service user and establish trust.</li>
            <li>Explain the activity clearly.</li>
            <li>Check readiness (emotional and physical).</li>
            <li>Fit and double-check harness and equipment.</li>
          </ul>
        </div></div>
        <div class="sf-step sf-step--priority">
          <div class="sf-priority-row">
            <span class="sf-step-num" aria-hidden="true">3</span>
            <div class="sf-step-body">
              <div class="sf-priority-intro">Supervision during climbing</div>
              <ul class="sf-nested">
                <li>Maintain continuous supervision.</li>
                <li>Stay positioned to respond immediately.</li>
                <li>Support and guide movement.</li>
                <li>Adapt tasks based on confidence and ability.</li>
                <li>Encourage participation without forcing.</li>
              </ul>
            </div>
          </div>
        </div>
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">4</span><div class="sf-step-body"><strong>Transitions Within the Session</strong>
          <ul class="sf-nested">
            <li>Control movement between climbing and waiting areas.</li>
            <li>Ensure safe turn-taking.</li>
            <li>Maintain clear supervision of all participants.</li>
          </ul>
        </div></div>
      </div>
    </div>
    <div class="sf-phase">
      <p class="sf-phase-label">After the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">5</span><div class="sf-step-body"><strong>End of the Session</strong>
          <ul class="sf-nested">
            <li>Safely assist with descent and removal of equipment.</li>
            <li>Ensure service user is calm and regulated.</li>
            <li>Support transition out of the activity.</li>
            <li>Complete safe handover.</li>
          </ul>
        </div></div>
      </div>
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="ca-safety-head">
  <div class="sf-safety-block">
    <div class="sf-sec-head" id="ca-safety-head">
      <span class="sf-sec-icon" aria-hidden="true">⚠️</span>
      <h2>Safety &amp; Risk Management</h2>
    </div>
    <ul class="policy-list">
      <li>Equipment must be checked before every use.</li>
      <li>Harness must be correctly fitted and secured.</li>
      <li>No climbing without direct supervision.</li>
      <li>Ensure fall zones are clear.</li>
      <li>Monitor behaviour that may increase risk (impulsivity, anxiety).</li>
      <li>Follow all venue safety protocols.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="ca-supervision-head">
  <div class="sf-supervision-block">
    <div class="sf-sec-head" id="ca-supervision-head">
      <span class="sf-sec-icon" aria-hidden="true">👁️</span>
      <h2>Supervision &amp; Positioning</h2>
    </div>
    <ul class="policy-list">
      <li>Maintain clear visual contact at all times.</li>
      <li>Position yourself to intervene immediately.</li>
      <li>Stay alert to changes in behaviour or environment.</li>
      <li>Supervise both active climbers and those waiting.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="ca-situations-head">
  <div class="sf-sec-head" id="ca-situations-head">
    <span class="sf-sec-icon" aria-hidden="true">💬</span>
    <h2>Common Situations (Quick Guidance)</h2>
  </div>
  <div class="sf-situations-grid">
    <div class="sf-situation-card">
      <span class="sf-situation-label">If a service user becomes anxious</span>
      <p class="sf-situation-action">&rarr; Pause activity, provide reassurance, allow time.</p>
    </div>
    <div class="sf-situation-card">
      <span class="sf-situation-label">If a service user refuses to continue</span>
      <p class="sf-situation-action">&rarr; Do not force; adapt or end the activity safely.</p>
    </div>
    <div class="sf-situation-card">
      <span class="sf-situation-label">If unsafe behaviour occurs</span>
      <p class="sf-situation-action">&rarr; Stop activity immediately and regain control.</p>
    </div>
    <div class="sf-situation-card">
      <span class="sf-situation-label">If equipment concern arises</span>
      <p class="sf-situation-action">&rarr; Stop use immediately and report.</p>
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="ca-venue-considerations-head">
  <div class="sf-sec-head" id="ca-venue-considerations-head">
    <span class="sf-sec-icon" aria-hidden="true">📍</span>
    <h2>Venue Considerations</h2>
  </div>
  <p class="sf-venue-intro">Key operational differences depending on the climbing venue. Staff must adapt supervision, positioning and control accordingly.</p>
  <div class="sf-venue-cards">
    <article class="sf-venue-card">
      <div class="sf-venue-card-head">
        <span class="sf-venue-card-icon" aria-hidden="true">🧗</span>
        <h3 class="sf-venue-card-title">Westway Sports Centre</h3>
      </div>
      <ul class="policy-list">
        <li>Climbing sessions take place in a shared public environment.</li>
        <li>Presence of other climbers may increase distraction and movement.</li>
        <li>Staff must maintain constant visual awareness of both the climber and surrounding space.</li>
        <li>Clear control of the waiting area is required between turns.</li>
        <li>Harness fitting and equipment checks must be completed in the designated area.</li>
        <li>Follow all venue safety instructions and staff guidance at all times.</li>
        <li>Be aware of fall zones and movement pathways.</li>
        <li>Ensure controlled transitions between climbing wall, waiting area and entry/exit points.</li>
      </ul>
    </article>
  </div>
  <div class="sf-venue-risks-panel" role="region" aria-labelledby="ca-venue-risks-head">
    <h4 class="sf-venue-risks-label" id="ca-venue-risks-head">Environment-Specific Risks</h4>
    <ul class="policy-list">
      <li>Shared space with public users</li>
      <li>Distraction and impulsive movement</li>
      <li>Waiting area behaviour</li>
      <li>Equipment misuse risk</li>
    </ul>
  </div>
</section>

<section class="sf-block">
  <div class="sf-emergency-block" role="region" aria-labelledby="ca-emergency-head">
    <div class="sf-sec-head" id="ca-emergency-head">
      <span class="sf-sec-icon" aria-hidden="true">🚨</span>
      <h2>Emergency Response</h2>
    </div>
    <ul class="policy-list">
      <li>Follow Emergency Response Principles.</li>
      <li>Contact venue staff immediately if required.</li>
      <li>Call emergency services (999) if necessary.</li>
      <li>Do not delay action in high-risk situations.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="ca-rules-h">
  <h3 class="sf-rules-h" id="ca-rules-h">Important Rules</h3>
  <div class="sf-rules-grid">
    <div class="sf-rule-card sf-rule-card--do">
      <h3>Do</h3>
      <ul>
        <li>Check all equipment before use.</li>
        <li>Maintain constant supervision.</li>
        <li>Support controlled and safe movement.</li>
        <li>Adapt to the service user.</li>
      </ul>
    </div>
    <div class="sf-rule-card sf-rule-card--dont">
      <h3>Do not</h3>
      <ul>
        <li>Allow unsupervised climbing.</li>
        <li>Ignore equipment checks.</li>
        <li>Force participation.</li>
        <li>Allow unsafe behaviour.</li>
      </ul>
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="ca-escalation-head">
  <div class="sf-callout" role="note">
    <div class="sf-sec-head" id="ca-escalation-head">
      <span class="sf-sec-icon" aria-hidden="true">⚠️</span>
      <h2>Escalation</h2>
    </div>
    <p class="sf-subh">Escalate immediately if</p>
    <ul class="policy-list">
      <li>Equipment failure or concern</li>
      <li>A fall or injury occurs</li>
      <li>Behaviour creates risk</li>
      <li>The environment becomes unsafe</li>
    </ul>
    <p class="sf-subh">Follow</p>
    <ul class="policy-list">
      <li>Incident Reporting Procedure</li>
      <li>Safeguarding Reporting Procedure</li>
      <li>Emergency Response Principles</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="ca-system-head">
  <div class="sf-sec-head" id="ca-system-head">
    <span class="sf-sec-icon" aria-hidden="true">🖥</span>
    <h2>System Action</h2>
  </div>
  <div class="sf-panel">
    <ul class="policy-list">
      <li>All sessions must be recorded via Session Feedback in the Staff Portal.</li>
      <li>Any incidents must be recorded via an Incident Report.</li>
      <li>Relevant concerns must be documented.</li>
    </ul>
  </div>
</section>

</div>

<div class="cs-policy" id="cs-policy-multi-activity-procedure">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="https://www.clubsensational.org/wp-content/uploads/2026/03/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Multi Activity Procedure</h1>
      <p class="cs-sub">Registered Company No. 13755417 · www.clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Status</strong>Reference</div>
    <div><strong>Document type</strong>Procedure</div>
    <div><strong>Procedure grade</strong>High complexity · High risk</div>
    <div><strong>Last updated</strong>2026-05-01</div>
  </div>

  <div class="cs-body">

  <p class="sf-priority-banner" role="note"><strong>High complexity and high risk.</strong> Mixed environments and transitions demand continuous supervision, tight group control and structured movement. Transitions are the highest-risk points. Safety always overrides timing or schedule.</p>

<section class="sf-block" aria-labelledby="ma-purpose-head">
  <div class="sf-sec-head" id="ma-purpose-head">
    <span class="sf-sec-icon" aria-hidden="true">📄</span>
    <h2>Purpose</h2>
  </div>
  <div class="sf-panel">
    <p>This procedure defines how multi-activity sessions are delivered safely and effectively, combining different environments while maintaining full supervision, structure and control. <strong>Hub (dry session)</strong> means the non-aquatic part of the session in its planned space (e.g. hub room, classroom or activity area). It covers sessions that move <strong>hub (dry session) to aquatic</strong> or <strong>aquatic to hub (dry session)</strong>, and sessions that use <strong>two sub-groups of three</strong> rotating between environments.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="ma-when-head">
  <div class="sf-sec-head" id="ma-when-head">
    <span class="sf-sec-icon" aria-hidden="true">🎯</span>
    <h2>When to Use This Procedure</h2>
  </div>
  <p>This procedure applies to all multi-activity sessions, including:</p>
  <ul class="policy-list">
    <li>Combined sessions (e.g. hub (dry session) + aquatic)</li>
    <li>Group-based sessions</li>
    <li>Sessions involving movement between environments</li>
    <li>Sessions where the order of environments may be <strong>hub (dry session) to aquatic</strong> or <strong>aquatic to hub (dry session)</strong>, depending on the session plan</li>
    <li>Sessions that use <strong>two sub-groups of three</strong> that <strong>rotate</strong> between environments (e.g. one sub-group in the pool whilst the other is in the hub (dry session), then swapping)</li>
  </ul>
</section>

<section class="sf-block" aria-labelledby="ma-principles-head">
  <div class="sf-sec-head" id="ma-principles-head">
    <span class="sf-sec-icon" aria-hidden="true">🛡️</span>
    <h2>Key Principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
      <li>Transitions are the highest risk point — in <strong>both</strong> directions (hub (dry session) to aquatic and aquatic to hub (dry session)).</li>
      <li>Supervision must be continuous at all times.</li>
      <li>Group control is essential, including when participants are split into rotating sub-groups.</li>
      <li>Sessions must be structured and predictable.</li>
      <li>Safety always overrides timing.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="ma-sessionflow-title">
  <div class="sf-sec-head" id="ma-sessionflow-title">
    <span class="sf-sec-icon" aria-hidden="true">👥</span>
    <h2>Session Flow</h2>
  </div>
  <p class="sf-flow-hint">Phased flow: <strong>first environment</strong> &rarr; <strong>controlled transition</strong> (critical) &rarr; <strong>second environment</strong> &rarr; <strong>end of session, handover &amp; departure</strong>. The first block may be <strong>hub (dry session) or aquatic</strong> and the second block is the <strong>other</strong> environment (hub&ndash;aquatic or aquatic&ndash;hub). Never rush movement between environments.</p>
  <div class="sf-route-stack" role="region" aria-label="Example session routes">
    <div>
      <p class="sf-route-caption">Example A: hub (dry session) &rarr; aquatic</p>
      <div class="sf-route" role="presentation" aria-hidden="true">
        <span class="sf-route-pill sf-route-pill--land"><span aria-hidden="true">🏃</span> Hub (dry session)</span>
        <span class="sf-route-arrow">&rarr;</span>
        <span class="sf-route-pill sf-route-pill--trans"><span aria-hidden="true">⚠️</span> Transition</span>
        <span class="sf-route-arrow">&rarr;</span>
        <span class="sf-route-pill sf-route-pill--aqua"><span aria-hidden="true">💧</span> Activity (aquatic)</span>
        <span class="sf-route-arrow">&rarr;</span>
        <span class="sf-route-pill sf-route-pill--land"><span aria-hidden="true">🚪</span> End of session, handover &amp; departure</span>
      </div>
    </div>
    <div>
      <p class="sf-route-caption">Example B: aquatic &rarr; hub (dry session)</p>
      <div class="sf-route" role="presentation" aria-hidden="true">
        <span class="sf-route-pill sf-route-pill--aqua"><span aria-hidden="true">💧</span> Activity (aquatic)</span>
        <span class="sf-route-arrow">&rarr;</span>
        <span class="sf-route-pill sf-route-pill--trans"><span aria-hidden="true">⚠️</span> Transition</span>
        <span class="sf-route-arrow">&rarr;</span>
        <span class="sf-route-pill sf-route-pill--land"><span aria-hidden="true">🏃</span> Hub (dry session)</span>
        <span class="sf-route-arrow">&rarr;</span>
        <span class="sf-route-pill sf-route-pill--land"><span aria-hidden="true">🚪</span> End of session, handover &amp; departure</span>
      </div>
    </div>
  </div>
  <div class="sf-panel sf-rotation-panel">
    <p class="sf-subh">Two sub-groups of three (rotation)</p>
    <p>Some sessions split participants into <strong>two sub-groups of three</strong> that <strong>rotate</strong> between environments (for example, Sub-group 1 in the aquatic area whilst Sub-group 2 is in the hub (dry session), then swapping according to the plan). The same supervision, ratios and transition rules apply to <strong>each</strong> sub-group whenever it moves, in <strong>either</strong> direction. Staff must always know which sub-group is in which environment and must not leave any sub-group without adequate supervision during swaps.</p>
  </div>
  <div class="sf-phases">
    <div class="sf-phase">
      <p class="sf-phase-label">Before the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">1</span><div class="sf-step-body"><strong>Preparation Before the Session</strong>
          <ul class="sf-nested">
            <li>Review session structure and timing.</li>
            <li>Ensure all environments are ready.</li>
            <li>Confirm staffing and ratios.</li>
            <li>Prepare equipment and resources.</li>
            <li>Identify individual needs and risks.</li>
          </ul>
        </div></div>
      </div>
    </div>
    <div class="sf-phase">
      <p class="sf-phase-label">Start of session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">2</span><div class="sf-step-body"><strong>Start of the Session</strong>
          <ul class="sf-nested">
            <li>Gather participants and establish structure.</li>
            <li>Clearly explain session flow.</li>
            <li>Set expectations for behaviour and transitions.</li>
            <li>Check readiness.</li>
          </ul>
        </div></div>
      </div>
    </div>
    <div class="sf-phase">
      <p class="sf-phase-label">First activity phase (first environment)</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">3</span><div class="sf-step-body"><strong>First Activity Phase (first environment &mdash; hub (dry session) or aquatic, as planned)</strong>
          <ul class="sf-nested">
            <li>Deliver structured activities (movement, learning, play).</li>
            <li>Maintain full group supervision (or per sub-group if using two rotating sub-groups of three).</li>
            <li>Support engagement and regulation.</li>
            <li>Begin preparing participants for transition.</li>
          </ul>
        </div></div>
      </div>
    </div>
    <div class="sf-phase">
      <p class="sf-phase-label">Transition phase (CRITICAL)</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step sf-step--critical">
          <div class="sf-priority-row">
            <span class="sf-step-num" aria-hidden="true">4</span>
            <div class="sf-step-body">
              <span class="sf-critical-badge">CRITICAL</span>
              <strong>Transition Phase</strong>
              <ul class="sf-nested">
                <li>Clearly prepare participants before moving.</li>
                <li>Maintain full control of the group.</li>
                <li>Supervise closely during movement (corridors, changing areas).</li>
                <li>Position staff strategically.</li>
                <li>Confirm all participants are accounted for before and after transition.</li>
                <li>Use the same controlled process whether the move is <strong>hub (dry session) to aquatic</strong> or <strong>aquatic to hub (dry session)</strong>; do not treat one direction as lower risk.</li>
                <li>If using two rotating sub-groups of three, transition and head-count <strong>each</strong> sub-group separately; never overlap swaps without clear staff roles.</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="sf-phase">
      <p class="sf-phase-label">Second activity phase (second environment)</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">5</span><div class="sf-step-body"><strong>Second Activity Phase (second environment &mdash; aquatic or hub (dry session), as planned)</strong>
          <ul class="sf-nested">
            <li>Follow the relevant <strong>Service Procedure</strong> for that environment (e.g. <strong>Aquatic Activity Procedure</strong> when the block is aquatic; hub / dry-session and non-aquatic procedures when the block is hub (dry session)).</li>
            <li>Maintain supervision and positioning.</li>
            <li>Adapt to individual needs within group context.</li>
            <li>Support engagement and regulation.</li>
          </ul>
        </div></div>
        <p class="sf-ref-note">Open the applicable <strong>Service Procedure</strong> from this portal for each environment used in the session (not only for aquatic blocks).</p>
      </div>
    </div>
    <div class="sf-phase">
      <p class="sf-phase-label">After the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">6</span><div class="sf-step-body"><strong>End of session, handover &amp; departure</strong>
          <ul class="sf-nested">
            <li>Prepare participants for session ending.</li>
            <li>Supervise safe movement out of each environment (e.g. pool, hub room, changing areas).</li>
            <li>Manage changing and movement safely.</li>
            <li>Ensure safe handover to parents, carers, school staff or transport as applicable, and controlled departure.</li>
          </ul>
        </div></div>
      </div>
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="ma-supervision-head">
  <div class="sf-supervision-block">
    <div class="sf-sec-head" id="ma-supervision-head">
      <span class="sf-sec-icon" aria-hidden="true">👁️</span>
      <h2>Supervision &amp; Group Control</h2>
    </div>
    <ul class="policy-list">
      <li>Maintain visual awareness of all participants at all times.</li>
      <li>Position staff to control both group and environment.</li>
      <li>Assign roles if multiple staff are present.</li>
      <li>Never allow uncontrolled movement.</li>
      <li>Confirm group numbers during transitions.</li>
      <li>When two sub-groups of three rotate, track <strong>which sub-group is in which environment</strong> and confirm numbers before and after every swap.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="ma-safety-head">
  <div class="sf-safety-block">
    <div class="sf-sec-head" id="ma-safety-head">
      <span class="sf-sec-icon" aria-hidden="true">⚠️</span>
      <h2>Safety &amp; Risk Management</h2>
    </div>
    <ul class="policy-list">
      <li>Mixed environments increase risk.</li>
      <li>Transitions must be structured and controlled.</li>
      <li>Behaviour that increases risk must be addressed immediately.</li>
      <li>Do not proceed if safe supervision cannot be maintained.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="ma-venue-head">
  <div class="sf-sec-head" id="ma-venue-head">
    <span class="sf-sec-icon" aria-hidden="true">📍</span>
    <h2>Venue Considerations</h2>
  </div>
  <p class="sf-venue-intro">Key operational differences depending on the environments used. Staff must adapt supervision, positioning and control accordingly.</p>
  <div class="sf-venue-cards">
    <article class="sf-venue-card">
      <div class="sf-venue-card-head">
        <span class="sf-venue-card-icon" aria-hidden="true">🏢</span>
        <h3 class="sf-venue-card-title">Acton Centre</h3>
      </div>
      <ul class="policy-list">
        <li>Sessions involve movement between activity areas and pool.</li>
        <li>Shared public environment increases distraction and risk.</li>
        <li>Transitions through corridors and changing rooms must be tightly controlled.</li>
        <li>Clear routes between areas must be followed.</li>
        <li>Staff must maintain full group awareness at all times.</li>
      </ul>
    </article>
    <article class="sf-venue-card">
      <div class="sf-venue-card-head">
        <span class="sf-venue-card-icon" aria-hidden="true">🏠</span>
        <h3 class="sf-venue-card-title">SwimFarm Centre</h3>
      </div>
      <ul class="policy-list">
        <li>More controlled environment with smaller group sizes.</li>
        <li>Easier spatial control but still requires active supervision.</li>
        <li>Transitions between zones (pool, activity areas) must be structured.</li>
        <li>Staff responsible for full environment control.</li>
      </ul>
    </article>
  </div>
  <div class="sf-venue-risks-panel" role="region" aria-labelledby="ma-venue-risks-head">
    <h4 class="sf-venue-risks-label" id="ma-venue-risks-head">Environment-Specific Risks</h4>
    <ul class="policy-list">
      <li>Group separation during transitions</li>
      <li>Uncontrolled movement between environments</li>
      <li>Distraction in public spaces</li>
      <li>Behaviour escalation during transitions</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="ma-situations-head">
  <div class="sf-sec-head" id="ma-situations-head">
    <span class="sf-sec-icon" aria-hidden="true">💬</span>
    <h2>Common Situations (Quick Guidance)</h2>
  </div>
  <div class="sf-situations-grid">
    <div class="sf-situation-card">
      <span class="sf-situation-label">If a participant becomes dysregulated</span>
      <p class="sf-situation-action">&rarr; Pause, reduce stimulation and support regulation.</p>
    </div>
    <div class="sf-situation-card">
      <span class="sf-situation-label">If a participant separates from the group</span>
      <p class="sf-situation-action">&rarr; Act immediately and follow Missing Service User Procedure.</p>
    </div>
    <div class="sf-situation-card">
      <span class="sf-situation-label">If transition becomes unsafe</span>
      <p class="sf-situation-action">&rarr; Stop movement and regain control.</p>
    </div>
    <div class="sf-situation-card">
      <span class="sf-situation-label">If environment is not ready</span>
      <p class="sf-situation-action">&rarr; Delay transition until safe.</p>
    </div>
  </div>
</section>

<section class="sf-block">
  <div class="sf-emergency-block" role="region" aria-labelledby="ma-emergency-head">
    <div class="sf-sec-head" id="ma-emergency-head">
      <span class="sf-sec-icon" aria-hidden="true">🚨</span>
      <h2>Emergency Response</h2>
    </div>
    <ul class="policy-list">
      <li>Follow Emergency Response Principles.</li>
      <li>Apply environment-specific response.</li>
      <li>Contact venue staff or emergency services if required.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="ma-rules-h">
  <h3 class="sf-rules-h" id="ma-rules-h">Important Rules</h3>
  <div class="sf-rules-grid">
    <div class="sf-rule-card sf-rule-card--do">
      <h3>Do</h3>
      <ul>
        <li>Maintain full control during transitions.</li>
        <li>Prepare participants in advance.</li>
        <li>Keep group together at all times.</li>
        <li>Adapt based on behaviour and risk.</li>
      </ul>
    </div>
    <div class="sf-rule-card sf-rule-card--dont">
      <h3>Do not</h3>
      <ul>
        <li>Allow uncontrolled transitions.</li>
        <li>Leave participants unsupervised.</li>
        <li>Rush movement between areas.</li>
        <li>Ignore early signs of risk.</li>
      </ul>
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="ma-escalation-head">
  <div class="sf-callout" role="note">
    <div class="sf-sec-head" id="ma-escalation-head">
      <span class="sf-sec-icon" aria-hidden="true">⚠️</span>
      <h2>Escalation</h2>
    </div>
    <p class="sf-subh">Escalate immediately if</p>
    <ul class="policy-list">

  <div class="cs-body">

  <p class="sf-priority-banner" role="note">Physical activity carries medium risk. Supervision, safe equipment use, environment awareness and structured delivery are essential. Stop or adapt the session if control, equipment or the space becomes unsafe.</p>

<section class="sf-block" aria-labelledby="pa-purpose-head">
  <div class="sf-sec-head" id="pa-purpose-head">
    <span class="sf-sec-icon" aria-hidden="true">📄</span>
    <h2>Purpose</h2>
  </div>
  <div class="sf-panel">
    <p>This procedure defines how physical activity sessions are delivered safely and effectively, supporting strength, coordination, regulation and engagement in a structured and controlled environment.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="pa-when-head">
  <div class="sf-sec-head" id="pa-when-head">
    <span class="sf-sec-icon" aria-hidden="true">🏃</span>
    <h2>When to Use This Procedure</h2>
  </div>
  <p>This procedure applies to all physical activity sessions, including:</p>
  <ul class="policy-list">
    <li>Gym-based sessions</li>
    <li>Hub Room sessions</li>
    <li>Structured fitness and movement sessions</li>
  </ul>
</section>

<section class="sf-block" aria-labelledby="pa-principles-head">
  <div class="sf-sec-head" id="pa-principles-head">
    <span class="sf-sec-icon" aria-hidden="true">🛡️</span>
    <h2>Key Principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
      <li>Safety and supervision are the priority at all times.</li>
      <li>Equipment must be used safely and appropriately.</li>
      <li>Sessions must be structured but adaptable.</li>
      <li>Regulation and engagement come before performance.</li>
      <li>Staff must remain present, aware and in control.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="pa-flow-head">
  <div class="sf-sec-head" id="pa-flow-head">
    <span class="sf-sec-icon" aria-hidden="true">🎯</span>
    <h2>Session Flow</h2>
  </div>
  <p class="sf-flow-hint">Structured phases: prepare the space and plan, deliver with full supervision, then close and hand over safely.</p>
  <div class="sf-phases">
    <div class="sf-phase">
      <p class="sf-phase-label">Before the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">1</span><div class="sf-step-body"><strong>Preparation Before the Session</strong>
          <ul class="sf-nested">
            <li>Prepare the space and equipment.</li>
            <li>Ensure the environment is safe and organised.</li>
            <li>Review participant needs and risks.</li>
            <li>Plan structured activities.</li>
          </ul>
        </div></div>
      </div>
    </div>
    <div class="sf-phase">
      <p class="sf-phase-label">During the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">2</span><div class="sf-step-body"><strong>Start of the Session</strong>
          <ul class="sf-nested">
            <li>Greet the participant and establish a calm environment.</li>
            <li>Set expectations clearly.</li>
            <li>Check readiness (physical and emotional).</li>
          </ul>
        </div></div>
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">3</span><div class="sf-step-body"><strong>During the Session</strong>
          <ul class="sf-nested">
            <li>Maintain continuous supervision.</li>
            <li>Deliver structured activities.</li>
            <li>Adapt tasks based on ability and response.</li>
            <li>Support regulation and engagement.</li>
            <li>Ensure safe use of equipment.</li>
          </ul>
        </div></div>
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">4</span><div class="sf-step-body"><strong>Movement Within the Session</strong>
          <ul class="sf-nested">
            <li>Supervise all movement between areas.</li>
            <li>Maintain control of space and positioning.</li>
            <li>Avoid uncontrolled transitions.</li>
          </ul>
        </div></div>
      </div>
    </div>
    <div class="sf-phase">
      <p class="sf-phase-label">After the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">5</span><div class="sf-step-body"><strong>End of the Session</strong>
          <ul class="sf-nested">
            <li>Use clear closure (routine, countdown).</li>
            <li>Support transition out of the activity.</li>
            <li>Ensure safe handover.</li>
          </ul>
        </div></div>
      </div>
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="pa-safety-head">
  <div class="sf-safety-block">
    <div class="sf-sec-head" id="pa-safety-head">
      <span class="sf-sec-icon" aria-hidden="true">⚠️</span>
      <h2>Safety &amp; Risk Management</h2>
    </div>
    <ul class="policy-list">
      <li>Do not allow unsafe use of equipment.</li>
      <li>Ensure all equipment is suitable and safe.</li>
      <li>Maintain clear and organised space.</li>
      <li>Monitor behaviour that may increase risk.</li>
      <li>Stop activity if safety is compromised.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="pa-supervision-head">
  <div class="sf-supervision-block">
    <div class="sf-sec-head" id="pa-supervision-head">
      <span class="sf-sec-icon" aria-hidden="true">👁️</span>
      <h2>Supervision &amp; Positioning</h2>
    </div>
    <ul class="policy-list">
      <li>Maintain full visual awareness at all times.</li>
      <li>Position yourself to control both participant and environment.</li>
      <li>Stay alert in shared environments.</li>
      <li>Adjust supervision based on risk level.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="pa-venue-head">
  <div class="sf-sec-head" id="pa-venue-head">
    <span class="sf-sec-icon" aria-hidden="true">📍</span>
    <h2>Venue Considerations</h2>
  </div>
  <p class="sf-venue-intro">Key operational differences depending on the physical activity environment. Staff must adapt supervision, positioning and control accordingly.</p>
  <div class="sf-venue-cards">
    <article class="sf-venue-card">
      <div class="sf-venue-card-head">
        <span class="sf-venue-card-icon" aria-hidden="true">🏋️</span>
        <h3 class="sf-venue-card-title">Westway Sports Centre (Gym &amp; Hub Room)</h3>
      </div>
      <ul class="policy-list">
        <li>Sessions take place in a shared public gym environment.</li>
        <li>Presence of other users increases movement, noise and unpredictability.</li>
        <li>Staff must maintain constant supervision and spatial awareness.</li>
        <li>Equipment must only be used when safe and appropriate for the participant.</li>
        <li>Ensure no unsupervised use of equipment.</li>
        <li>Do not allow misuse of weights or machines.</li>
        <li>Maintain control when moving between gym floor, equipment areas and Hub Room.</li>
        <li>Be aware of moving equipment and other users lifting weights.</li>
        <li>The Hub Room can be used as a more controlled space for structured activities.</li>
      </ul>
    </article>
  </div>
  <div class="sf-venue-risks-panel" role="region" aria-labelledby="pa-venue-risks-head">
    <h4 class="sf-venue-risks-label" id="pa-venue-risks-head">Environment-Specific Risks</h4>
    <ul class="policy-list">
      <li>Misuse of equipment</li>
      <li>Interaction with public users</li>
      <li>Distraction and impulsive behaviour</li>
      <li>Movement between zones</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="pa-situations-head">
  <div class="sf-sec-head" id="pa-situations-head">
    <span class="sf-sec-icon" aria-hidden="true">💬</span>
    <h2>Common Situations (Quick Guidance)</h2>
  </div>
  <div class="sf-situations-grid">
    <div class="sf-situation-card">
      <span class="sf-situation-label">If participant becomes dysregulated</span>
      <p class="sf-situation-action">&rarr; Reduce stimulation and adapt activity.</p>
    </div>
    <div class="sf-situation-card">
      <span class="sf-situation-label">If equipment is used unsafely</span>
      <p class="sf-situation-action">&rarr; Stop immediately and regain control.</p>
    </div>
    <div class="sf-situation-card">
      <span class="sf-situation-label">If environment becomes unsafe</span>
      <p class="sf-situation-action">&rarr; Pause and reorganise.</p>
    </div>

  <div class="cs-body">

  <p class="sf-priority-banner" role="note">Active Play &amp; Movement carries medium risk. Group control, continuous supervision, structured movement and safe use of space are essential. Pause or adapt the session if the group, behaviour or environment becomes unsafe.</p>

<section class="sf-block" aria-labelledby="apm-purpose-head">
  <div class="sf-sec-head" id="apm-purpose-head">
    <span class="sf-sec-icon" aria-hidden="true">📄</span>
    <h2>Purpose</h2>
  </div>
  <div class="sf-panel">
    <p>This procedure defines how Active Play &amp; Movement sessions are delivered safely and effectively, supporting coordination, engagement, social interaction and physical development in a structured environment.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="apm-when-head">
  <div class="sf-sec-head" id="apm-when-head">
    <span class="sf-sec-icon" aria-hidden="true">🤸</span>
    <h2>When to Use This Procedure</h2>
  </div>
  <p>This procedure applies to all Active Play &amp; Movement sessions, including:</p>
  <ul class="policy-list">
    <li>Structured play-based sessions</li>
    <li>Adapted PE-style sessions</li>
    <li>Sessions delivered in the Hub Room or similar environments</li>
  </ul>
</section>

<section class="sf-block" aria-labelledby="apm-principles-head">
  <div class="sf-sec-head" id="apm-principles-head">
    <span class="sf-sec-icon" aria-hidden="true">🛡️</span>
    <h2>Key Principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
      <li>Safety and supervision are always the priority.</li>
      <li>Sessions must be structured but flexible.</li>
      <li>Group control is essential.</li>
      <li>Engagement is encouraged, not forced.</li>
      <li>Regulation must be supported at all times.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="apm-flow-head">
  <div class="sf-sec-head" id="apm-flow-head">
    <span class="sf-sec-icon" aria-hidden="true">👥</span>
    <h2>Session Flow</h2>
  </div>
  <p class="sf-flow-hint">Structured phases: prepare the space and plan, deliver with supervision and group control, then close and hand over safely.</p>
  <div class="sf-phases">
    <div class="sf-phase">
      <p class="sf-phase-label">Before the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">1</span><div class="sf-step-body"><strong>Preparation Before the Session</strong>
          <ul class="sf-nested">
            <li>Prepare the space and equipment.</li>
            <li>Ensure the environment is safe, clear and organised.</li>
            <li>Plan structured activities and flow.</li>
            <li>Identify potential risks (space, behaviour, equipment).</li>
          </ul>
        </div></div>
      </div>
    </div>
    <div class="sf-phase">
      <p class="sf-phase-label">During the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">2</span><div class="sf-step-body"><strong>Start of the Session</strong>
          <ul class="sf-nested">
            <li>Gather participants and establish a calm environment.</li>
            <li>Set clear expectations and structure.</li>
            <li>Use simple communication and visual support where needed.</li>
          </ul>
        </div></div>
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">3</span><div class="sf-step-body"><strong>During the Session</strong>
          <ul class="sf-nested">
            <li>Maintain continuous supervision.</li>
            <li>Deliver structured and engaging activities.</li>
            <li>Adapt activities based on ability and engagement.</li>
            <li>Support regulation and avoid escalation.</li>
            <li>Keep clear control of the space.</li>
          </ul>
        </div></div>
        <div class="sf-step sf-step--priority">
          <div class="sf-priority-row">
            <span class="sf-step-num" aria-hidden="true">4</span>
            <div class="sf-step-body">
              <div class="sf-priority-intro">Group management focus</div>
              <strong>Group Management &amp; Engagement</strong>
              <ul class="sf-nested">
                <li>Use routines and predictable structure.</li>
                <li>Offer structured choices.</li>
                <li>Use positive reinforcement.</li>
                <li>Maintain control of group movement at all times.</li>
              </ul>
            </div>
          </div>
        </div>
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">5</span><div class="sf-step-body"><strong>Transitions Within the Session</strong>
          <ul class="sf-nested">
            <li>Prepare participants for changes.</li>
            <li>Control movement between activities or stations.</li>
            <li>Maintain supervision during all transitions.</li>
          </ul>
        </div></div>
      </div>
    </div>
    <div class="sf-phase">
      <p class="sf-phase-label">After the session</p>
      <div class="sf-steps sf-steps--flow">
        <div class="sf-step"><span class="sf-step-num" aria-hidden="true">6</span><div class="sf-step-body"><strong>End of the Session</strong>
          <ul class="sf-nested">

        <li>The environment is not controlled by staff</li>
        <li>Safety must be assessed on arrival</li>
        <li>Professional boundaries must be maintained</li>
        <li>Parents/carers remain responsible for the home environment</li>
        <li>Staff must prioritise personal and participant safety</li>
      </ul>

        <li>Review participant information and risks</li>
        <li>Ensure you have correct address and contact details</li>
        <li>Inform management of your schedule if required</li>
      </ul>
      <p class="hv-step">2. On arrival</p>
      <ul class="policy-list">
        <li>Assess the environment before starting</li>
        <li>Identify potential risks (space, objects, hazards)</li>
        <li>Confirm parent/carer presence</li>

      <ul class="policy-list">
        <li>Maintain professional boundaries at all times</li>
        <li>Deliver structured activities safely</li>
        <li>Adapt to the available space</li>
        <li>Ensure safe use of any equipment</li>
      </ul>
      <p class="hv-step">4. Environment control</p>
      <ul class="policy-list">
        <li>Use only appropriate areas of the home</li>
        <li>Avoid unsafe spaces</li>
        <li>Stop the session if the environment becomes unsafe</li>
      </ul>

      <ul class="policy-list">
        <li>Ensure safe handover to parent/carer</li>
        <li>Do not leave participant unattended</li>

<div class="cs-policy" id="cs-policy-session-disruption-procedure">
  <div class="cs-header">
    <div class="cs-logo">

    </div>

      <p class="cs-brand">clubSENsational Ltd · Autism Consultancy Services</p>
      <h1>Session Disruption Reporting Procedure</h1>
      <p class="cs-sub">Registered Company No. 13755417 · www.clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta">
    <div><strong>Document owner</strong>Administration Team</div>

  <div class="cs-body">

<section class="sf-block" aria-labelledby="sdr-h-purpose">
  <div class="sf-sec-head" id="sdr-h-purpose">
    <span class="sf-sec-icon" aria-hidden="true">📄</span>
    <h2>1. Purpose</h2>
  </div>
  <div class="sf-panel">
    <p>To ensure that any disruption affecting the delivery of a scheduled session is reported promptly, allowing participants, families and venues to be informed without unnecessary delay.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="sdr-h-scope">
  <div class="sf-sec-head" id="sdr-h-scope">
    <span class="sf-sec-icon" aria-hidden="true">👥</span>
    <h2>2. Scope</h2>
  </div>
  <div class="sf-panel">
    <p>This procedure applies to all ClubSENsational staff responsible for delivering sessions, including instructors, support staff and Service Leads.</p>
  </div>
</section>

<section class="sf-block" aria-labelledby="sdr-h-scenarios">
  <div class="sf-sec-head" id="sdr-h-scenarios">
    <span class="sf-sec-icon" aria-hidden="true">🚌</span>
    <h2>3. Disruption scenarios</h2>
  </div>

  <div class="sf-scenario" aria-labelledby="sdr-h-delay">
    <div class="sf-sec-head" id="sdr-h-delay">
      <span class="sf-sec-icon" aria-hidden="true">⏱</span>
      <h3>3.1 Delayed arrival to a scheduled session</h3>
    </div>
    <p>If you become aware that you will arrive late to a scheduled session, you must:</p>
    <div class="sf-steps">
      <div class="sf-step sf-step--urgent">
        <span class="sf-step-num" aria-hidden="true">1</span>
        <div class="sf-step-body"><strong>Contact Administration immediately</strong> by calling the ClubSENsational Main Line (<a href="tel:+447592558671">07592 558671</a>) or through the Staff Portal, where available.</div>
      </div>
      <div class="sf-step">
        <span class="sf-step-num" aria-hidden="true">2</span>
        <div class="sf-step-body"><strong>If you cannot speak to Administration,</strong> send an email to <a href="mailto:admin@clubsensational.org">admin@clubsensational.org</a> immediately.</div>
      </div>
      <div class="sf-step">
        <span class="sf-step-num" aria-hidden="true">3</span>
        <div class="sf-step-body"><strong>Follow up</strong> until your notification has been acknowledged by a member of the Administration Team.</div>
      </div>
    </div>
    <p>Your email should include:</p>
    <ul class="policy-list">
      <li>Full name</li>
      <li>Venue</li>
      <li>Estimated arrival time</li>
      <li>Brief reason for the delay (e.g. traffic, public transport disruption, vehicle breakdown, accident or other unforeseen circumstance)</li>
    </ul>
  </div>

  <div class="sf-scenario" aria-labelledby="sdr-h-sameday">
    <div class="sf-sec-head" id="sdr-h-sameday">
      <span class="sf-sec-icon" aria-hidden="true">🚫</span>
      <h3>3.2 Unable to attend a scheduled session (same-day notification)</h3>
    </div>
    <p>If, on the day of your scheduled session, you become unable to attend due to illness, a family emergency or any other unforeseen circumstance, you must:</p>
    <div class="sf-steps">
      <div class="sf-step sf-step--urgent">
        <span class="sf-step-num" aria-hidden="true">1</span>
        <div class="sf-step-body"><strong>Contact Administration immediately</strong> by calling the ClubSENsational Main Line (<a href="tel:+447592558671">07592 558671</a>) or through the Staff Portal, where available.</div>
      </div>
      <div class="sf-step">
        <span class="sf-step-num" aria-hidden="true">2</span>
        <div class="sf-step-body"><strong>If you cannot speak to Administration,</strong> send an email to <a href="mailto:admin@clubsensational.org">admin@clubsensational.org</a> immediately.</div>
      </div>
      <div class="sf-step">
        <span class="sf-step-num" aria-hidden="true">3</span>
        <div class="sf-step-body"><strong>Follow up</strong> until your notification has been acknowledged by a member of the Administration Team.</div>
      </div>
    </div>
    <p>Your email should include:</p>
    <ul class="policy-list">
      <li>Full name</li>
      <li>Venue</li>
      <li>Brief reason for your absence (e.g. illness, family emergency, medical appointment, bereavement, vehicle breakdown, transport disruption or other unforeseen circumstance)</li>
    </ul>
    <p>Following the notification, staff must complete a <strong>Session Disruption Report Form</strong> within 24 hours of the disruption, unless otherwise agreed by the Administration Team.</p>
    <div class="sf-contact-box">
      <strong>Staff Portal:</strong> open the <a href="cancellation.html">Cancellation / session disruption report</a> from your session or the staff hub menu.
    </div>
  </div>

  <div class="sf-scenario" aria-labelledby="sdr-h-planned">
    <div class="sf-sec-head" id="sdr-h-planned">
      <span class="sf-sec-icon" aria-hidden="true">📅</span>
      <h3>3.3 Planned absence (more than 24 hours&rsquo; notice)</h3>
    </div>
    <p>If you know more than 24 hours in advance that you are unable to attend a scheduled session, you must notify <a href="mailto:admin@clubsensational.org">admin@clubsensational.org</a> by email as soon as possible.</p>
    <p>Your email should include:</p>
    <ul class="policy-list">
      <li>Full name</li>
      <li>Date of the affected session(s)</li>
      <li>Venue</li>
      <li>Brief reason for your absence (e.g. annual leave, medical appointment, illness, family emergency or other planned absence)</li>
    </ul>
    <p>If you have not received confirmation that your email has been received, you must follow up by contacting the ClubSENsational Administration Team to ensure suitable cover arrangements can be made.</p>
    <p>Following the notification, staff must complete a <strong>Session Disruption Report Form</strong> within 24 hours of the disruption, unless otherwise agreed by the Administration Team.</p>
    <div class="sf-contact-box">
      <strong>Staff Portal:</strong> open the <a href="cancellation.html">Cancellation / session disruption report</a> from your session or the staff hub menu.
    </div>
  </div>
</section>

<section class="sf-block" aria-labelledby="sdr-h-principles">
  <div class="sf-sec-head" id="sdr-h-principles">
    <span class="sf-sec-icon" aria-hidden="true">✓</span>
    <h2>4. General principles</h2>
  </div>
  <div class="sf-panel">
    <ul class="sf-checklist">
      <li>Only the communication methods outlined in this procedure are recognised as official methods for reporting session disruptions.</li>
      <li>A session disruption is not considered officially reported until it has been acknowledged by the Administration Team.</li>
      <li>Staff are responsible for ensuring that their notification has been successfully received and acknowledged.</li>
    </ul>
  </div>
</section>

<section class="sf-block" aria-labelledby="sdr-h-responsibility">
  <div class="sf-sec-head" id="sdr-h-responsibility">
    <span class="sf-sec-icon" aria-hidden="true">📌</span>
    <h2>5. Staff responsibility</h2>
  </div>
  <div class="sf-panel">
    <p>It is the responsibility of each staff member to report any session disruption as soon as they become aware of it and to follow this procedure at all times.</p>
    <p>Failure to follow this procedure may delay participant communication, prevent suitable cover arrangements and affect the safe delivery of our services.</p>
  </div>
</section>

  </div>
  <p class="cs-foot">© clubSENsational Ltd · Session Disruption Reporting Procedure · Version 1.0</p>
</div>

      function isoDate(d) {
        var y = d.getFullYear();
        var m = d.getMonth() + 1;
        var day = d.getDate();
        return y + "-" + (m < 10 ? "0" : "") + m + "-" + (day < 10 ? "0" : "") + day;
      }

      function pickStr(val, fallback) {
        if (val != null && String(val).trim() !== "") return String(val).trim();
        return fallback != null ? String(fallback) : "";
      }

      function normalizeRecordFromStorage(raw, p) {
        if (!raw || typeof raw !== "object") raw = {};
        var baseV = p && p.version ? p.version : "";
        var baseN = p && p.nextReview ? p.nextReview : "";
        var defEff = p && p.id === "POL-011" ? "2026-04-21" : "";
        var st = pickStr(raw.status, "active") || "active";
        if (["active", "under_review", "superseded", "archived"].indexOf(st) < 0) st = "active";
        return {
          version: pickStr(raw.version, baseV),
          effectiveFrom: pickStr(raw.effectiveFrom, defEff),
          nextReview: pickStr(raw.nextReview, baseN),
          owner: pickStr(raw.owner, ""),
          status: st,
          notes: raw.notes != null ? String(raw.notes) : "",
          lastReviewedAt: pickStr(raw.lastReviewedAt, ""),
          lastReviewedBy: pickStr(raw.lastReviewedBy, ""),
          updatedAt: raw.updatedAt || ""
        };
      }

      function legacyOutcomeToNew(o) {
        if (o === "minor_amendment" || o === "major_revision" || o === "further_review") return o;
        if (o === "minor") return "minor_amendment";
        if (o === "major") return "major_revision";
        if (o === "approved" || o === "approved_no_change") return "approved_no_change";
        return "approved_no_change";
      }

      function migrateSchema2ToV3(e) {
        var oc = e.outcome;
        var qm = "approve";
        if (oc === "minor_amendment" || oc === "minor") qm = "minor";
        else if (oc === "major_revision" || oc === "major") qm = "major";
        var sum =
          (e.summaryAmendments || "").trim() ||
          (e.governanceNotes || "").trim() ||
          (e.summaryReview || "").trim();
        return {
          schema: 3,
          recordedAt: e.recordedAt || new Date().toISOString(),
          policyId: e.policyId,
          reviewDate: e.reviewDate || (e.recordedAt ? String(e.recordedAt).slice(0, 10) : ""),
          reviewedBy: e.reviewedBy || "",
          reviewerRole: e.reviewerRole || "",
          quickMode: qm,
          previousVersion: String(e.previousVersion || ""),
          newVersion: String(e.newVersion || e.previousVersion || ""),
          summary: sum,
          nextReviewDate: String(e.nextReviewDate || ""),
          governanceNotes: e.governanceNotes != null ? String(e.governanceNotes) : "",
          changeType: e.changeType || "none"
        };
      }

      function migrateLegacyAtToV3(e) {
        if (!e || !e.policyId) return null;
        var at = e.recordedAt || e.at || "";
        var rev = String(e.reviewer || "").trim();
        var parts = rev.split(",");
        var by = parts[0] ? parts[0].trim() : rev;
        var role = parts.length > 1 ? parts.slice(1).join(",").trim() : "";
        var leg = e.outcome;
        var newO = legacyOutcomeToNew(leg);
        var qm = "approve";
        if (newO === "minor_amendment") qm = "minor";
        else if (newO === "major_revision") qm = "major";
        return {
          schema: 3,
          recordedAt: at || new Date().toISOString(),
          policyId: e.policyId,
          reviewDate: at ? String(at).slice(0, 10) : "",
          reviewedBy: by,
          reviewerRole: role,
          quickMode: qm,
