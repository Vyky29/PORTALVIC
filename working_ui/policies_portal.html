<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>clubSENsational Policy Portal (Staff)</title>
  <style>
    :root {
      --navy: #17354d;
      --gold: #d7ab3c;
      --bg: #f5f7f9;
      --line: #cfd8df;
      --text: #1f2a33;
      --muted: #5f6b76;
      --white: #ffffff;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; color: var(--text); background: var(--bg); }
    .app { max-width: min(1200px, 100%); margin: 0 auto; padding: 16px 14px 28px; }
    #mainHome { min-height: 40vh; }
    button {
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 14px;
      cursor: pointer;
    }
    .btn-primary { background: var(--navy); color: var(--white); border: none; }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-gold { background: var(--gold); color: #1f1f1f; border: none; }
    .btn-light { background: #e8edf1; color: var(--navy); border: none; }
    .btn-outline {
      background: var(--white);
      color: #b91c1c;
      border: 2px solid #dc2626;
    }
    .btn-outline:hover { background: #fef2f2; }
    .status-badge { font-size: 11px; font-weight: 700; border-radius: 999px; padding: 4px 8px; border: 1px solid; white-space: nowrap; }
    .status-ok { color: #1f7a3e; background: #e8f7ec; border-color: #b9e4c5; }
    .status-warn { color: #996b00; background: #fff6de; border-color: #f1dfa5; }
    .status-exp { color: #a61b1b; background: #fdeaea; border-color: #f0b4b4; }
    .pc-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      align-items: flex-start;
      justify-content: center;
      padding: 52px 16px 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .pc-overlay.is-open { display: flex; }
    .pc-overlay-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      cursor: pointer;
    }
    .pc-sheet {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 920px;
      margin: 24px auto 40px;
      background: var(--white);
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      border: 1px solid var(--line);
      overflow: hidden;
    }
    #cs-pc-dashboard.mode-staff .pc-sheet {
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 48px);
    }
    #cs-pc-dashboard.mode-staff .pc-sheet-body {
      min-height: 0;
    }
    #cs-pc-dashboard.mode-admin .pc-sheet {
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 20px);
    }
    .pc-floating-close {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 12;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      font-size: 24px;
      line-height: 1;
      color: var(--navy);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .pc-floating-close:hover { background: var(--gold); border-color: var(--gold); color: #1f1f1f; }
    .pc-sheet-body {
      max-height: calc(100vh - 48px);
      overflow: auto;
      padding: 16px 18px 22px;
      text-align: left;
      background: #fafbfc;
      flex: 1 1 auto;
      min-height: 38vh;
    }
    .pc-sheet-body .cs-policy { max-width: 100% !important; }
    #pcOverlayBody .cs-staff-sign.pc-staff-ack-injected {
      margin-top: 28px;
      padding: 24px 0 8px;
      border-top: 2px solid #f4b942;
      background: linear-gradient(180deg, #fffef8 0%, #fff 45%);
    }
    #pcOverlayBody .cs-staff-sign.pc-staff-ack-injected > h2 {
      font-size: 20px;
      color: #2d3e50;
      margin: 0 0 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid #f4b942;
      font-weight: 700;
    }
    #pcOverlayBody .cs-staff-sign.pc-staff-ack-injected .cs-num {
      display: inline-block;
      min-width: 34px;
      color: #f4b942;
      font-weight: 700;
    }
    #pcOverlayBody .cs-staff-sign-lead {
      font-size: 14px;
      color: #4b5563;
      margin: 0 0 14px;
      line-height: 1.5;
    }
    #pcOverlayBody .cs-staff-sign-date-row { margin-bottom: 14px; }
    #pcOverlayBody .cs-staff-sign-date-row label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    #pcOverlayBody .cs-staff-sign-date-row input[type="date"] {
      max-width: 280px;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
      background: #fff;
    }
    #pcOverlayBody .cs-staff-sign-date-row input:focus {
      outline: none;
      border-color: #f4b942;
      box-shadow: 0 0 0 3px rgba(244, 185, 66, 0.2);
    }
    #pcOverlayBody .cs-staff-canvas-wrap { margin: 12px 0 10px; }
    #pcOverlayBody #hs-staff-sign-canvas {
      display: block;
      width: 100%;
      max-width: 520px;
      height: min(44vw, 200px);
      background: #fafafa;
      border: 2px dashed #2d3e50;
      border-radius: 8px;
      touch-action: none;
      cursor: crosshair;
      box-sizing: border-box;
    }
    #pcOverlayBody .cs-staff-sign-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }
    #pcOverlayBody .cs-staff-sign-clear,
    #pcOverlayBody .cs-staff-sign-submit {
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      cursor: pointer;
    }
    #pcOverlayBody .cs-staff-sign-clear { background: #fff; color: #374151; }
    #pcOverlayBody .cs-staff-sign-submit {
      background: #2d3e50;
      color: #fff;
      border-color: #2d3e50;
    }
    #pcOverlayBody .cs-staff-sign-submit:hover {
      background: #f4b942;
      color: #1f2937;
      border-color: #f4b942;
    }
    #cs-pc-dashboard.mode-admin .staff-only { display: none !important; }
    #cs-pc-dashboard.mode-staff .admin-only { display: none !important; }
    .pc-admin-sticky-top {
      flex: 0 0 auto;
      position: sticky;
      top: 0;
      z-index: 9;
      background: linear-gradient(180deg, #f8fafc 0%, #eef3f8 100%);
      border-bottom: 2px solid var(--line);
      padding: 10px 52px 12px 18px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
    }
    .pc-review-sep { margin: 0 8px; color: var(--muted); font-weight: 400; }
    .pc-admin-exec-header { margin: 0; }
    .pc-admin-status-line { font-size: 12px; color: var(--muted); margin: 6px 0 0; line-height: 1.45; }
    .pc-admin-status-line strong { color: var(--text); font-weight: 700; }
    .pc-admin-review-zone {
      border-top: 1px solid var(--line);
      background: #fff;
      padding: 12px 18px 18px;
      flex: 0 0 auto;
    }
    .pc-admin-review-zone h3 { margin: 0 0 8px; font-size: 14px; color: var(--navy); }
    .pc-admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
    .pc-admin-grid label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .pc-admin-grid input, .pc-admin-grid textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
    }
    .pc-admin-grid textarea { min-height: 72px; resize: vertical; }
    .pc-admin-actions { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .pc-admin-hint { font-size: 11px; color: var(--muted); margin-top: 8px; }
    .pc-admin-main-title { margin: 0 0 4px; font-size: 15px; color: var(--navy); }
    .pc-admin-intro { margin: 0 0 10px; max-width: 720px; }
    .pc-admin-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid #c5d0da; }
    .pc-admin-section:first-of-type { border-top: none; padding-top: 0; margin-top: 6px; }
    .pc-admin-section-title { margin: 0 0 8px; font-size: 12px; font-weight: 800; color: var(--navy); text-transform: uppercase; letter-spacing: 0.05em; }
    .pc-admin-section > .pc-admin-hint { margin-top: 0; margin-bottom: 8px; }
    .pc-history-cards-wrap { max-height: 260px; overflow-y: auto; border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 8px 10px; }
    .pc-history-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: #fafbfc;
      font-size: 12px;
      line-height: 1.45;
    }
    .pc-history-card:last-child { margin-bottom: 0; }
    .pc-history-card .pc-hc-date { font-weight: 800; color: var(--navy); margin-bottom: 4px; }
    .pc-history-card .pc-hc-line { color: var(--text); margin: 2px 0; }
    .pc-history-card .pc-hc-meta { color: var(--muted); font-size: 11px; margin-top: 6px; }
    .pc-history-empty { margin: 0; padding: 14px 12px; color: var(--muted); font-size: 12px; }
    .pc-quick-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0; align-items: stretch; }
    .pc-quick-bar button { font-family: inherit; font-size: 12px; font-weight: 700; padding: 10px 14px; border-radius: 8px; cursor: pointer; border: 1px solid var(--line); }
    .pc-quick-bar--inline { gap: 6px; }
    .pc-quick-bar--inline button { padding: 8px 12px; font-size: 11px; }
    .pc-quick-approve { background: #e8f7ec; color: #166534; border-color: #b9e4c5 !important; }
    .pc-quick-minor { background: #fff6de; color: #92400e; border-color: #f1dfa5 !important; }
    .pc-quick-major { background: #fdeaea; color: #991b1b; border-color: #f0b4b4 !important; }
    .pc-quick-panel {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .pc-quick-panel.is-open { display: block; }
    .pc-admin-review-intro { margin: 0 0 10px; font-size: 12px; color: var(--muted); }
    .pc-admin-review-note { margin: 0 0 10px; font-size: 12px; color: var(--text); }
    .pc-admin-review-head { margin: 0 0 10px; }
    .pc-admin-review-footer { margin-top: 12px; font-size: 11px; color: var(--muted); }
    .pc-admin-tech-note { margin-top: 8px; font-size: 10px; color: var(--muted); display: none; }
    #cs-pc-dashboard.mode-admin .ack-wrap { display: none !important; }
    .pc-admin-accordion {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      margin-top: 10px;
      overflow: hidden;
    }
    .pc-admin-accordion:first-child { margin-top: 0; }
    .pc-admin-accordion > summary {
      list-style: none;
      display: flex;
      align-items: center;
      cursor: pointer;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
      color: var(--navy);
      letter-spacing: 0;
      text-transform: none;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }
    .pc-admin-accordion > summary::-webkit-details-marker { display: none; }
    .pc-admin-accordion > .pc-admin-accordion-body { padding: 12px 14px; }
    .pc-admin-accordion:not([open]) > summary { border-bottom: none; }
    #cs-pc-dashboard.mode-admin .pc-sheet { max-width: 1100px; }
    #cs-pc-dashboard.mode-admin .pc-sheet-body {
      max-height: none;
      min-height: 42vh;
    }
    .pc-policy-scroll-hint {
      margin: 0;
      padding: 8px 18px;
      font-size: 12px;
      color: var(--muted);
      background: #eef6ff;
      border-bottom: 1px solid var(--line);
      flex: 0 0 auto;
    }
    .pc-sheet-body[contenteditable="true"] {
      outline: 2px dashed var(--navy);
      outline-offset: -2px;
    }
    .pc-admin-toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .config-hint { font-size: 11px; color: var(--muted); margin-top: 10px; padding: 0 14px; }
    #cs-pc-dashboard {
      isolation: isolate;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 100%;
      margin: 0;
      padding: 0;
      line-height: 1.45 !important;
      text-align: left !important;
      --pc-f-10: clamp(0.625rem, 0.28rem + 1.1vw, 0.6875rem);
      --pc-f-11: clamp(0.6875rem, 0.32rem + 1.2vw, 0.75rem);
      --pc-f-12: clamp(0.75rem, 0.38rem + 1.35vw, 0.8125rem);
      --pc-f-13: clamp(0.8125rem, 0.42rem + 1.5vw, 0.875rem);
      --pc-f-14: clamp(0.875rem, 0.48rem + 1.65vw, 0.9375rem);
      --pc-f-15: clamp(0.9375rem, 0.52rem + 1.85vw, 1rem);
      --pc-f-16: clamp(1rem, 0.58rem + 2vw, 1.0625rem);
      --pc-f-18: clamp(1.0625rem, 0.62rem + 2.25vw, 1.125rem);
      --pc-f-20: clamp(1.125rem, 0.68rem + 2.5vw, 1.25rem);
      --pc-f-24: clamp(1.2rem, 0.72rem + 3vw, 1.5rem);
      --pc-f-28: clamp(1.28rem, 0.78rem + 3.5vw, 1.75rem);
      --pc-f-32: clamp(1.35rem, 0.82rem + 4.2vw, 2rem);
      --pc-box-pad: clamp(10px, 3.2vw, 28px);
    }
    .pc-card-completed-pill {
      display: block;
      text-align: center;
      margin-top: 12px;
      padding: 11px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: linear-gradient(180deg, #ecfdf5 0%, #d1fae5 100%);
      color: #047857;
      border: 1px solid #6ee7b7;
      box-shadow: 0 2px 10px rgba(16, 185, 129, 0.22);
    }
    .pc-readonly-completed-row {
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: linear-gradient(180deg, #ecfdf5 0%, #f0fdf4 100%);
      border: 1px solid #bbf7d0;
    }
    .pc-readonly-completed-btn {
      display: inline-block;
      font: inherit;
      font-weight: 700;
      font-size: 15px;
      padding: 10px 22px;
      border-radius: 999px;
      border: 1px solid #86efac;
      background: #dcfce7;
      color: #166534;
      cursor: default;
    }
    .pc-readonly-completed-note {
      margin: 10px 0 0;
      font-size: 13px;
      color: #3f6212;
      line-height: 1.45;
      max-width: 52em;
    }
    .pc-ack-log-section {
      margin-top: 36px;
      padding-top: 24px;
      border-top: 2px solid #e5e7eb;
      max-width: 1080px;
      margin-left: auto;
      margin-right: auto;
    }
    .pc-ack-log-head .cs-section-title { margin: 0; }
    .pc-ack-log-note {
      font-size: 13px;
      color: #6b7280;
      margin: 0 0 14px;
      line-height: 1.45;
    }
    .pc-ack-log-empty {
      margin: 0;
      padding: 14px 16px;
      color: #6b7280;
      font-size: 14px;
      background: #f9fafb;
      border-radius: 10px;
      border: 1px dashed #d1d5db;
    }
    .pc-ack-log-tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
    }
    .pc-ack-log-tbl th,
    .pc-ack-log-tbl td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
      min-width: 0;
      overflow-wrap: break-word;
    }
    .pc-ack-log-tbl th {
      background: #f8fafc;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #475569;
    }
    .pc-ack-log-tbl tr:last-child td {
      border-bottom: none;
    }

    /* Fluid type + mobile layout (overrides duplicate <style> blocks inside policy templates) */
    #mainHome .cs-index {
      max-width: 100%;
      width: 100%;
      padding-left: clamp(4px, 1.5vw, 8px);
      padding-right: clamp(4px, 1.5vw, 8px);
      box-sizing: border-box;
    }
    #mainHome .cs-index .cs-idx-hero {
      padding: var(--pc-box-pad);
      width: 100%;
      box-sizing: border-box;
    }
    #mainHome .cs-index .cs-idx-hero .cs-idx-sub {
      font-size: var(--pc-f-11);
    }
    #mainHome .cs-index .cs-idx-hero h1 {
      font-size: var(--pc-f-32);
      line-height: 1.15;
    }
    #mainHome .cs-index .cs-idx-hero p {
      font-size: var(--pc-f-14);
    }
    #mainHome .cs-index .cs-section-title {
      font-size: var(--pc-f-12);
    }
    #mainHome .cs-index .cs-section-desc {
      font-size: var(--pc-f-13);
    }
    #mainHome .cs-index .cs-grid {
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr));
      gap: clamp(12px, 3vw, 16px);
    }
    #mainHome .cs-index .cs-card {
      min-width: 0;
      padding: var(--pc-box-pad);
      width: 100%;
    }
    #mainHome .cs-index .cs-card h3 {
      font-size: var(--pc-f-18);
      line-height: 1.25;
      overflow-wrap: break-word;
    }
    #mainHome .cs-index .cs-card .meta {
      font-size: var(--pc-f-12);
    }
    #mainHome .cs-index .cs-card a.btn {
      font-size: var(--pc-f-14);
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }

    #pcOverlayBody .cs-policy {
      width: 100%;
      max-width: min(880px, 100%) !important;
      margin-left: auto;
      margin-right: auto;
      box-sizing: border-box;
    }
    #pcOverlayBody .cs-policy .cs-header {
      padding: var(--pc-box-pad);
      box-sizing: border-box;
    }
    #pcOverlayBody .cs-policy .cs-header .cs-brand {
      font-size: var(--pc-f-12);
    }
    #pcOverlayBody .cs-policy .cs-header h1 {
      font-size: var(--pc-f-28);
      line-height: 1.2;
      overflow-wrap: break-word;
    }
    #pcOverlayBody .cs-policy .cs-header .cs-sub {
      font-size: var(--pc-f-13);
    }
    #pcOverlayBody .cs-policy .cs-meta {
      padding: var(--pc-box-pad);
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 140px), 1fr));
      gap: clamp(10px, 2.5vw, 14px);
    }
    #pcOverlayBody .cs-policy .cs-meta div {
      font-size: var(--pc-f-13);
      min-width: 0;
      overflow-wrap: break-word;
    }
    #pcOverlayBody .cs-policy .cs-meta strong {
      font-size: var(--pc-f-11);
    }
    #pcOverlayBody .cs-policy .cs-body {
      padding: var(--pc-box-pad);
      box-sizing: border-box;
    }
    #pcOverlayBody .cs-policy .cs-body h2 {
      font-size: var(--pc-f-20);
      overflow-wrap: break-word;
    }
    #pcOverlayBody .cs-policy .cs-body p,
    #pcOverlayBody .cs-policy .cs-body li {
      font-size: var(--pc-f-14);
      overflow-wrap: break-word;
    }
    #pcOverlayBody .cs-policy .cs-sign {
      padding: var(--pc-box-pad);
      box-sizing: border-box;
    }
    #pcOverlayBody .cs-policy .cs-sign h3 {
      font-size: var(--pc-f-18);
    }
    #pcOverlayBody .cs-policy .cs-sign p.intro {
      font-size: var(--pc-f-13);
    }
    #pcOverlayBody .cs-policy .cs-sign label {
      font-size: var(--pc-f-12);
    }
    #pcOverlayBody .cs-policy .cs-sign input[type="text"],
    #pcOverlayBody .cs-policy .cs-sign input[type="date"],
    #pcOverlayBody .cs-policy .cs-sign input[type="email"] {
      font-size: var(--pc-f-14);
      max-width: 100%;
    }
    #pcOverlayBody .cs-policy .cs-sign .check label {
      font-size: var(--pc-f-13);
    }
    #pcOverlayBody .cs-policy .cs-sign button {
      font-size: var(--pc-f-14);
    }
    #pcOverlayBody .cs-policy .cs-foot {
      font-size: var(--pc-f-12);
    }
    #pcOverlayBody .cs-policy .cs-director-grid {
      gap: clamp(12px, 3vw, 18px);
    }

    #pcOverlayBody #hs-staff-sign-canvas {
      width: 100%;
      max-width: 100%;
      height: auto;
      aspect-ratio: 8 / 3;
      max-height: min(52vw, 240px);
      min-height: 128px;
    }
    #pcOverlayBody .cs-staff-canvas-wrap {
      width: 100%;
      max-width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    @media (max-width: 640px) {
      .app {

  <div class="cs-body">
<h2><span class="cs-num">1.</span>Statement</h2>
<p>Modern slavery is a crime and a violation of fundamental human rights. It takes various forms, such as slavery, servitude, forced and compulsory labour and human trafficking, all of which have in common the deprivation of a person's liberty by another in order to exploit them for personal or commercial gain.</p>
<p>We have a zero-tolerance approach to modern slavery and we are committed to acting ethically and with integrity in all our business dealings and relationships and to implementing and enforcing effective systems and controls to ensure modern slavery is not taking place anywhere in our own business or in any of our supply chains.</p>
<p>We are also committed to ensuring there is transparency in our own business and in our approach to tackling modern slavery throughout our supply chains, consistent with our obligations under the Modern Slavery Act 2015.</p>
<p>We expect the same high standards from all of our contractors, suppliers and other business partners, and as part of our contracting processes, we include (where possible) specific prohibitions against the use of forced, compulsory or trafficked labour, or anyone held in slavery or servitude, whether adults or children, and we expect that our suppliers will hold their own suppliers to the same high standards.</p>
<p>This policy applies to all persons working for us or on our behalf in any capacity, including employees at all levels, directors, officers, agency workers, seconded workers, volunteers, interns, agents, contractors, external consultants, third- party representatives and business partners.</p>
<h2><span class="cs-num">2.</span>Responsibility for the Policy</h2>
<p>ClubSENsational&rsquo;s directors have overall responsibility for ensuring this policy complies with our legal and ethical obligations, and that all those under our control comply with it.</p>
<p>Javier Arranz Escorial has primary and day-to-day responsibility for implementing this policy, monitoring its use and effectiveness, dealing with any queries about it, and auditing internal control systems and procedures to ensure they are effective in countering modern slavery.</p>
<p>Team Leaders at all levels are responsible for ensuring those reporting to them understand and comply with this policy and are given adequate and regular training on it and the issue of modern slavery in supply chains.</p>
<h2><span class="cs-num">3.</span>Compliance with the Policy</h2>
<p>The prevention, detection and reporting of modern slavery in any part of our business or supply chains is the responsibility of all those working for us or under our control. You are required to avoid any activity that might lead to, or suggest, a breach of this policy.</p>
<p>We do not tolerate slavery and human trafficking in our supply chains. You are encouraged to raise concerns about any issue or suspicion of modern slavery in any parts of our business or supply chains of any supplier tier at the earliest possible stage.</p>
<p>If you believe or suspect a breach of this policy has occurred or that it may occur, you must notify your Team Leader or report it in accordance with our Whistleblowing Policy as soon as possible.</p>
<p>If you are unsure about whether a particular act, the treatment of workers more generally, or their working conditions within any tier of our supply chains constitutes any of the various forms of modern slavery, raise it with your Team Leader.</p>
<p>We aim to encourage openness and will support anyone who raises genuine concerns in good faith under this policy, even if they turn out to be mistaken.</p>
<p>We are committed to ensuring no one suffers any detrimental treatment as a result of reporting in good faith their suspicion that modern slavery of whatever form is or may be taking place in any part of our own business or in any of our supply chains.</p>
<p>Detrimental treatment includes dismissal, disciplinary action, threats or other unfavourable treatment connected with raising a concern. If you believe that you have suffered any such treatment, you should inform immediately.</p>
<h2><span class="cs-num">4.</span>Communication and Awareness of This Policy</h2>
<p>Training on this policy, and on the risk our business faces from modern slavery in its supply chains, forms part of the induction process for all individuals who work for us, and regular training will be provided as necessary.</p>
<p>Our zero-tolerance approach to modern slavery must be communicated to all suppliers, contractors and business partners at the outset of our business relationship with them and reinforced as appropriate thereafter.</p>
<h2><span class="cs-num">5.</span>Breaches of This Policy</h2>
<p>Any employee who breaches this policy will face disciplinary action, which could result in dismissal for misconduct or gross misconduct.</p>
<p>We may terminate our relationship with other individuals and organisations working on our behalf if they breach this policy.</p>
  </div>

<div class="cs-policy" id="cs-policy-data-protection-gdpr">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="ELEMENTOR/MEDIOS/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Data Protection & GDPR Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Created</strong>2026-04-21</div>
  </div>

  <div class="cs-body">
<h2><span class="cs-num">1.</span>DATA PROTECTION PRINCIPLES</h2>
<p>ClubSENsational is committed to handling personal data in compliance with the General Data Protection Regulation (GDPR) 2016.</p>
<p>Under Article 5 of the GDPR, personal data must be:</p>
<ul class="policy-list"><li>Processed lawfully, fairly, and transparently.</li></ul>
<ul class="policy-list"><li>Collected for specified, explicit, and legitimate purposes, without further</li></ul>
<p>processing in a way that conflicts with those purposes (except for archiving, research, or statistical purposes in the public interest).</p>
<ul class="policy-list"><li>Adequate, relevant, and limited to what is necessary for its intended</li></ul>
<p>purpose.</p>
<ul class="policy-list"><li>Accurate and kept up to date, with reasonable measures taken to rectify</li></ul>
<p>or erase inaccurate data promptly.</p>
<ul class="policy-list"><li>Stored in a form that allows identification of individuals for no longer than</li></ul>
<p>necessary, except where retention is required for archiving, research, or statistical purposes with appropriate safeguards.</p>
<ul class="policy-list"><li>Processed securely, with measures in place to prevent unauthorised or</li></ul>
<p>unlawful processing, loss, destruction, or damage.</p>
<h2><span class="cs-num">2.</span>GENERAL PROVISIONS</h2>
<ul class="policy-list"><li>This policy applies to all personal data processed by ClubSENsational,</li></ul>
<p>including names, addresses (email included), and dates of birth.</p>
<ul class="policy-list"><li>The designated Data Protection Officer, Raul Salvador Gallego, is</li></ul>
<p>responsible for ensuring compliance with this policy.</p>
<ul class="policy-list"><li>This policy will be reviewed at least annually.</li></ul>
<ul class="policy-list"><li>ClubSENsational is registered with the Information Commissioner&rsquo;s Office</li></ul>
<p>(ICO) for data processing (Registration No. ZB349784).</p>
<h2><span class="cs-num">3.</span>LAWFUL, FAIR, AND TRANSPARENT PROCESSING</h2>
<ul class="policy-list"><li>ClubSENsational maintains a Register of Systems to document the types of</li></ul>
<p>data processed and ensure compliance.</p>
<ul class="policy-list"><li>This register will be reviewed annually.</li></ul>
<ul class="policy-list"><li>Individuals have the right to access their personal data, and such requests</li></ul>
<p>will be handled promptly.</p>
<h2><span class="cs-num">4.</span>LAWFUL PROCESSING</h2>
<ul class="policy-list"><li>Data will only be processed under a lawful basis: consent, contract, legal</li></ul>
<p>obligation, vital interests, public task, or legitimate interests (in line with ICO guidance).</p>
<ul class="policy-list"><li>The appropriate lawful basis will be recorded in the Register of Systems.</li></ul>
<ul class="policy-list"><li>Where processing is based on consent, evidence of opt-in consent will be</li></ul>
<p>retained.</p>
<ul class="policy-list"><li>Individuals must have the option to withdraw their consent, and</li></ul>
<p>ClubSENsational will ensure systems accurately reflect such revocations.</p>
<h2><span class="cs-num">5.</span>DATA MINIMISATION</h2>
<p>ClubSENsational will ensure that personal data collected is relevant and limited to what is necessary for the intended purpose.</p>
<h2><span class="cs-num">6.</span>ACCURACY</h2>
<ul class="policy-list"><li>Reasonable steps will be taken to ensure data accuracy.</li><li>Where necessary, measures will be in place to keep personal data up to</li></ul>
<p>date.</p>
<h2><span class="cs-num">7.</span>ARCHIVING AND DATA RETENTION</h2>
<ul class="policy-list"><li>Personal data will be retained only for as long as necessary. An archiving</li></ul>
<p>policy will be in place to determine retention periods.</p>
<ul class="policy-list"><li>The archiving policy will outline what data must be retained, for how long,</li></ul>
<p>and the justification for retention.</p>
<h2><span class="cs-num">8.</span>SECURITY MEASURES</h2>
<ul class="policy-list"><li>Personal data will be stored securely using up-to-date software.</li></ul>
<ul class="policy-list"><li>Access to personal data will be restricted to authorised personnel only.</li></ul>
<ul class="policy-list"><li>Data deletion will be conducted securely to ensure irrecoverability.</li></ul>
<ul class="policy-list"><li>Appropriate back-up and disaster recovery systems will be maintained.</li></ul>
<h2><span class="cs-num">9.</span>DATA BREACH PROCEDURE</h2>
<p>In the event of a data breach, ClubSENsational will assess the risk to individuals' rights and freedoms and, where necessary, report the incident to the ICO in accordance with regulatory requirements.</p>
<p>This policy ensures compliance with GDPR and safeguards individuals' personal data effectively.</p>
  </div>

<div class="cs-policy" id="cs-policy-whistleblowing-policy">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="ELEMENTOR/MEDIOS/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Whistleblowing Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Created</strong>2026-04-21</div>
  </div>

  <div class="cs-body">
<h2><span class="cs-num">1.</span>Introduction</h2>
<p>All organisations face the risk of things going wrong or of unknowingly harbouring malpractice. clubSENsational has a duty to identify malpractice and take the appropriate measures to remedy the situation. By encouraging a culture of openness within our organisation, clubSENsational aims to prevent malpractice. We want to encourage all staff to raise issues that concern them at work.</p>
<h2><span class="cs-num">2.</span>Framework</h2>
<p>This policy applies to all staff within clubSENsational and covers all cases where members of staff wish to make disclosures in connection with their employment. For the purposes of this policy, &lsquo;staff&rsquo; includes employees, associates, contractors, agency staff, temporary and casual workers. This policy is designed to afford protection to staff who disclose information of a specified category to a specified individual in specified circumstances, in accordance with the Public Interest Disclosure Act 1998. It also enables them, if necessary, to make a complaint or assist in an investigation without fear of reprisal.</p>
<p>Raul Salvador Gallego has a responsibility to ensure that disclosures are dealt with fairly and as quickly as possible, addressing concerns at the most appropriate level.</p>
<h2><span class="cs-num">3.</span>Where the Policy Applies</h2>
<p>This policy applies in cases where a member of staff genuinely and in good faith believes that one of the following sets of circumstances is occurring, has occurred, or may occur within clubSENsational:</p>
<ul class="policy-list"><li>The health and safety of any individual has been, is being, or is likely to</li></ul>
<p>be endangered.</p>
<ul class="policy-list"><li>A person has failed, is failing, or is likely to fail to comply with any legal</li></ul>
<p>obligation.</p>
<ul class="policy-list"><li>A criminal offence has been committed, is being committed, or is likely</li></ul>
<p>to be committed.</p>
<ul class="policy-list"><li>A serious miscarriage of justice has occurred, is occurring, or is likely to</li></ul>
<p>occur.</p>
<ul class="policy-list"><li>The environment has been, is being, or is likely to be damaged.</li></ul>
<ul class="policy-list"><li>Information tending to show any of the above has been, is being, or is</li></ul>
<p>likely to be deliberately concealed.</p>
<p>A member of staff does not need to prove the malpractice or misconduct they are alleging but must raise a reasonable suspicion. However, disclosures that constitute a criminal offence will not be protected under this policy.</p>
<h2><span class="cs-num">4.</span>To Whom Should the Disclosure Be Made</h2>
<p>If a member of staff wishes to raise or discuss any issues that might fall into the above category, they should contact their Team Leaders or Managers in the first instance, who will treat the matter in confidence. If the concern involves the line manager, the concern should be raised with the human resources department or one of the Directors.</p>
<h2><span class="cs-num">5.</span>How the Disclosure Will Be Handled</h2>
<p>The complaint should be made orally or in writing, describing the incident(s) as fully as possible.</p>
<p>All complaints will be viewed seriously and treated confidentially. An investigation will be conducted, and relevant individuals will be interviewed in confidence. Appropriate steps will be taken to ensure that the working environment and relationships of the complainant are not prejudiced due to the disclosure.</p>
<p>The investigation should be concluded within four weeks of the disclosure being received. If this time limit is exceeded, the complainant will be advised and given a revised timeline.</p>
<p>If disciplinary action is justified, a disciplinary hearing will be arranged, and the staff member involved will have the right to be accompanied. Any disciplinary action taken will reflect the severity of the offence and may include dismissal.</p>
<p>If the complainant is dissatisfied with the outcome, a written request for reconsideration should be made to the chief executive within seven days of receiving the decision</p>
<h2><span class="cs-num">6.</span>Raising Disclosures Externally (Exceptional Cases)</h2>
<p>The main purpose of this policy is to provide staff with the opportunity and protection they need to raise concerns internally.</p>
<p>clubSENsational expects that in almost all cases, raising concerns internally will be the most appropriate course of action.</p>
<p>In some cases, wider disclosure to external parties such as the police may be considered. However, staff are strongly advised to seek legal guidance before taking this step, as protection from victimisation in such cases is limited under the law.</p>
<h2><span class="cs-num">7.</span>Disclosures Made in Bad Faith</h2>
<p>This policy applies where a disclosure is made in good faith, and the staff member reasonably believes the information disclosed and any allegations contained in it are substantially true.</p>
<p>If a disclosure is made in bad faith, for personal gain, or contains information the staff member does not believe is true, it may constitute a disciplinary offence, potentially leading to dismissal.</p>
<p>clubSENsational recognises that each case is unique and will be treated on its own merits. We hope that disclosures will rarely be necessary but encourage staff to raise concerns responsibly and in accordance with this policy.</p>
  </div>

<div class="cs-policy" id="cs-policy-disciplinary-policy">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="ELEMENTOR/MEDIOS/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Disciplinary Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Created</strong>2026-04-21</div>
  </div>

  <div class="cs-body">
<h2><span class="cs-num">1.</span>Introduction</h2>
<p>This policy sets out how clubSENsational manages concerns about staff conduct, performance, or behaviour that does not meet expected standards. It ensures matters are handled fairly, consistently, and in a timely manner. The aim is to encourage improvement and support employees while protecting the values and professional standards of our organisation.</p>
<h2><span class="cs-num">2.</span>Support and Wellbeing</h2>
<p>We understand that being subject to a disciplinary process can be stressful. We are committed to supporting your wellbeing throughout. Please speak to your line manager or a designated senior staff member if you need additional support. If you require reasonable adjustments, such as due to a disability, please let us know as early as possible.</p>
<h2><span class="cs-num">3.</span>Misconduct and Gross Misconduct</h2>
<p>Misconduct includes behaviours such as poor timekeeping, rudeness to colleagues, failure to follow procedures, or breach of confidentiality. Gross misconduct includes serious offences such as theft, violence, discrimination, serious breaches of trust, or behaviour likely to bring clubSENsational into disrepute. These may result in immediate dismissal without notice.</p>
<h2><span class="cs-num">4.</span>Informal Procedure</h2>
<p>Where appropriate, issues will first be addressed informally through a discussion with your line manager. The goal is to clarify expectations and agree on actions for improvement without initiating formal steps.</p>
<h2><span class="cs-num">5.</span>Formal Procedure</h2>
<p>If informal steps are not appropriate or fail to resolve the concern, the following formal process applies:</p>
<ul class="policy-list"><li>You will receive written notification outlining the concern and be</li></ul>
<p>invited to a disciplinary meeting.</p>
<ul class="policy-list"><li>An investigation may take place to establish facts before a decision is</li></ul>
<p>made.</p>
<ul class="policy-list"><li>You will attend a disciplinary meeting and have an opportunity to</li></ul>
<p>respond.</p>
<ul class="policy-list"><li>A decision will be made and communicated to you in writing.</li><li>You have the right to appeal the outcome.</li></ul>
<h2><span class="cs-num">6.</span>Right to Be Accompanied</h2>
<p>You may bring a fellow employee or certified trade union representative to any disciplinary or appeal meeting. If your chosen companion is unavailable, the meeting may be rescheduled for up to 5 working days. Companions can speak on your behalf but cannot answer questions for you.</p>
<h2><span class="cs-num">7.</span>Disciplinary Outcomes</h2>
<p>Depending on the seriousness of the issue, outcomes may include:</p>
<ul class="policy-list"><li>Improvement Note &ndash; for performance concerns, setting out</li></ul>
<p>expectations and timeframes for improvement.</p>
<ul class="policy-list"><li>Oral Warning &ndash; for minor conduct issues, confirmed in writing.</li><li>First Written Warning &ndash; for more serious matters or repeated</li></ul>
<p>misconduct.</p>
<ul class="policy-list"><li>Final Written Warning &ndash; issued if previous warnings have not led to</li></ul>
<p>improvement or for serious issues.</p>
<ul class="policy-list"><li>Dismissal or Serious Action &ndash; including termination, demotion or unpaid</li></ul>
<p>suspension, typically for gross misconduct or repeated failure to improve.</p>
<h2><span class="cs-num">8.</span>Suspension</h2>
<p>In some cases, you may be suspended on full pay during an investigation. This is not a disciplinary action and does not imply wrongdoing. Suspension will only be used when necessary, and your wellbeing will be considered throughout.</p>
<h2><span class="cs-num">9.</span>Appeals</h2>
<p>You may appeal any formal disciplinary decision within 5 working days of receiving the outcome. A senior manager, not previously involved in the matter, will hear your appeal. The appeal decision will be communicated in writing within 10 working days and is final.</p>
  </div>

<div class="cs-policy" id="cs-policy-grievance-policy">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="ELEMENTOR/MEDIOS/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Grievance Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Created</strong>2026-04-21</div>
  </div>

  <div class="cs-body">
<h2><span class="cs-num">1.</span>Grievance Policy and Procedure</h2>

<h2><span class="cs-num">2.</span>Introduction</h2>
<p>This procedure has been created by clubSENsational, It applies to all of our employees.The purpose of this procedure is to ensure that any grievances are dealt with properly, fairly and expeditiously by us.</p>
<p>This policy will also assist you in understanding how to raise a grievance and the steps which shall be followed thereafter.</p>
<h2><span class="cs-num">3.</span>Status</h2>
<p>This procedure does not form part of any contract of employment. We will consult with staff where appropriate, and the policy will be reviewed periodically. Any changes will be communicated to all staff.</p>
<p>WHAT IS A GRIEVANCE?</p>
<p>A grievance is a work-related concern, problem or complaint. Examples may include:</p>
<ul class="policy-list"><li>Poor working practices</li><li>Minor breaches of workplace procedures</li><li>Discrimination</li><li>Bullying or harassment</li><li>Concerns over pay, benefits, workload, or working conditions</li></ul>
<p>STEP ONE: INFORMAL GRIEVANCE</p>
<p>Where appropriate, staff should first try to resolve concerns informally with their line manager. This can be done through a conversation or informal written message (e.g. email).</p>
<p>If the concern relates to the line manager, it should be raised with another appropriate senior staff member. The aim is to resolve issues quickly and constructively. If informal resolution is not successful, proceed to the formal procedure.</p>
<p>STEP TWO: FORMAL GRIEVANCE</p>
<h2><span class="cs-num">4.</span>Submitting a Formal Grievance</h2>
<p>Formal grievances must be submitted in writing, clearly outlining the issue. They should be raised without undue delay following the incident(s). Normally, grievances should be submitted to your line manager, unless they are the subject of the complaint. In such cases, direct it to another senior team member.</p>
<h2><span class="cs-num">5.</span>Grievance Meeting</h2>
<p>A meeting will be arranged within 5 working days of receipt of the written grievance. You have the right to be accompanied (see section below). At this meeting, you can explain your concerns and suggest resolutions.</p>
<h2><span class="cs-num">6.</span>Investigations</h2>
<p>In some cases, a further investigation will be needed before or after the grievance meeting. This may include gathering evidence or interviewing witnesses. You are expected to cooperate fully. The grievance meeting may be adjourned until any investigation is completed.</p>
<h2><span class="cs-num">7.</span>Outcome of the Grievance Meeting</h2>
<p>You will receive a written outcome, normally within 5 working days of the meeting. This will include any proposed actions or decisions.</p>
<p>STEP THREE: APPEALS</p>
<p>If you disagree with the outcome, you may appeal in writing. Details of how to appeal will be provided with the written outcome. Appeals must be sent to the staff member named in the outcome letter. Wherever possible, the appeal will be handled by someone not previously involved.</p>
<h2><span class="cs-num">8.</span>Your Right to Be Accompanied</h2>
<p>You may be accompanied at any grievance or appeal meeting by:</p>
<ul class="policy-list"><li>A fellow colleague</li><li>An official employed by a trade union</li><li>A certified trade union representative (even if not an employee of the</li></ul>
<p>union)</p>
<p>You must request this in advance and provide the person&rsquo;s name and category. If your representative is unavailable at the proposed time, we will postpone the meeting by up to 5 working days, if reasonable.</p>
<h2><span class="cs-num">9.</span>Grievance and Disciplinary Cases</h2>
<p>If you raise a grievance during an ongoing disciplinary process, the disciplinary process may be suspended to address the grievance. If the issues are related, we may deal with both concurrently.</p>
<h2><span class="cs-num">10.</span>Confidentiality</h2>
<p>All grievance matters will be handled confidentially wherever possible. Information will only be shared with third parties where necessary to investigate or resolve the issue.</p>
  </div>

<div class="cs-policy" id="cs-policy-recruitment-policy">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="ELEMENTOR/MEDIOS/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Recruitment Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Created</strong>2026-04-21</div>
  </div>

  <div class="cs-body">
<h2><span class="cs-num">1.</span>Overview</h2>
<p>clubSENsational is committed to providing a supportive and flexible working environment for all its employees. To achieve these aims, it is essential to attract, recruit, and retain staff of the highest calibre who share this commitment.</p>
<p>This policy does not form part of the contract of employment, and we reserve the right to amend or withdraw it at any time.</p>
<h2><span class="cs-num">2.</span>PURPOSE</h2>
<p>This policy outlines the procedures that directors and employees must follow to ensure that clubSENsational adheres to best practices and complies with government legislation.</p>
<h2><span class="cs-num">3.</span>SCOPE</h2>
<p>This policy applies to all aspects of recruitment for all staff groups, including paid and short-term appointments.</p>
<h2><span class="cs-num">4.</span>AIMS</h2>
<p>clubSENsational&rsquo;s recruitment policy aims to:</p>
<ul class="policy-list"><li>Ensure that the best possible staff are recruited based on their merits,</li></ul>
<p>abilities, and suitability for the position.</p>
<ul class="policy-list"><li>Ensure that all job applicants are considered equitably and consistently.</li><li>Prevent discrimination against job applicants on any grounds, including</li></ul>
<p>race, nationality, ethnic or national origin, religion or belief, sex or sexual orientation, marital status, disability, or age.</p>
<ul class="policy-list"><li>Ensure compliance with relevant recommendations and guidance,</li></ul>
<p>including the Department for Education&rsquo;s guidance on Safeguarding Children and Safer Recruitment in Education Settings and the Code of Practice published by the Disclosure and Barring Service (DBS).</p>
<ul class="policy-list"><li>Fulfil clubSENsational&rsquo;s commitment to safeguarding and promoting the</li></ul>
<p>welfare of children and young people through rigorous pre-employment checks.</p>
<p>Employees involved in recruitment and selection are responsible for familiarising themselves with and adhering to this policy.</p>
<h2><span class="cs-num">5.</span>RECRUITMENT AND SELECTION PROCEDURE</h2>
<p>All applicants must complete an application form detailing their academic and employment history and suitability for the role. Incomplete application forms will be returned if the deadline has not yet passed. CVs will not be accepted in place of a completed application form.</p>
<p>A job description and person specification for the vacant role will be made available to applicants.</p>
<p>Shortlisted applicants may be invited to a formal interview to discuss their skills and experience in more detail.</p>
<p>Any offer of employment following the interview will be conditional upon:</p>
<ul class="policy-list"><li>Agreement on a mutually acceptable start date and the signing of a</li></ul>
<p>contract incorporating clubSENsational&rsquo;s standard terms and conditions of employment.</p>
<ul class="policy-list"><li>The receipt of two satisfactory references (one from the applicant&rsquo;s most</li></ul>
<p>recent employer), deemed satisfactory by clubSENsational.</p>
<ul class="policy-list"><li>The receipt of an enhanced DBS disclosure deemed satisfactory by</li></ul>
<p>clubSENsational.</p>
<p>clubSENsational is responsible for ensuring all employees meet the required physical and mental fitness standards before an appointment is confirmed.</p>
<p>All shortlisted applicants must complete a pre-employment health questionnaire, which will be reviewed against the job description and person specification. The information provided will be treated with strict confidentiality and will not form part of the selection process.</p>
<p>Upon acceptance of the offer and the satisfaction of all conditions, the applicant will be issued a Contract of Employment as confirmation of employment.</p>
<h2><span class="cs-num">6.</span>PRE-EMPLOYMENT CHECKS</h2>
<p>clubSENsational carries out several pre-employment checks for all prospective employees.</p>
<ul class="policy-list"><li>Verification of Identity and Address</li></ul>
<p>All new employees, including temporary and fixed-term staff, must satisfy clubSENsational that they are entitled to live and work in the UK. Under the Asylum and Immigration Act, clubSENsational is required to carry out checks on all new employees.</p>
<p>Applicants invited to interview must provide the following original documents:</p>
<ul class="policy-list"><li>A valid passport confirming British citizenship, European Economic Area</li></ul>
<p>(EEA) nationality, or entitlement to live and work in the UK.</p>
<ul class="policy-list"><li>Documentation confirming their National Insurance number (e.g., P45,</li></ul>
<p>P60, or National Insurance card).</p>
<ul class="policy-list"><li>Certificates confirming any educational and professional qualifications</li></ul>
<p>listed in their application form.</p>
<p>Applicants who have changed their name via deed poll or another legal mechanism (e.g., marriage, adoption, statutory declaration) must provide documentary evidence of the change.</p>
<p>clubSENsational requests applicants &rsquo;dates of birth in accordance with safeguarding guidance to verify identity and check for any unexplained discrepancies in employment and education history. Age will not be a factor in recruitment decisions.</p>
<ul class="policy-list"><li>References</li></ul>
<p>All offers of employment are subject to the receipt of at least two satisfactory references, one from the applicant&rsquo;s current or most recent employer. If this employment did not involve working with children, the second reference should come from the applicant&rsquo;s most recent employer in such a role. References must not be provided by relatives or friends.</p>
<p>Referees will be asked about the applicant&rsquo;s suitability for the role, including any concerns related to the safety and welfare of children. If the referee is a current or former employer, they will also be asked to confirm:</p>
<ul class="policy-list"><li>The applicant&rsquo;s dates of employment, job title, duties, reason for leaving,</li></ul>
<p>and disciplinary record.</p>
<ul class="policy-list"><li>Whether the applicant has been subject to disciplinary action related</li></ul>
<p>to child safety.</p>
<ul class="policy-list"><li>Any allegations or concerns regarding the applicant&rsquo;s behaviour</li></ul>
<p>towards children or young people.</p>
<p>References will be compared with the information provided in the application form. Any inconsistencies will be addressed before confirming an appointment.</p>
<ul class="policy-list"><li>Disclosure and Barring Service (DBS) Checks</li></ul>
<p>Due to the nature of the work, clubSENsational requests enhanced DBS disclosures for all prospective staff members. These disclosures include details of:</p>
<ul class="policy-list"><li>All convictions, including &ldquo;spent&rdquo; convictions under the Rehabilitation of</li></ul>
<p>Offenders Act 1974.</p>
<ul class="policy-list"><li>Cautions, reprimands, and warnings recorded on the Police National</li></ul>
<p>Computer.</p>
<ul class="policy-list"><li>Whether the applicant is barred from working with children or vulnerable</li></ul>
<p>adults.</p>
<ul class="policy-list"><li>Any relevant non-conviction information held by local police.</li></ul>
<p>Applicants with recent periods of overseas residence may also be required to obtain an equivalent disclosure from the relevant jurisdiction(s).</p>
<h2><span class="cs-num">7.</span>RECRUITMENT OF EX-OFFENDERS</h2>
<p>clubSENsational does not unfairly discriminate against applicants with a criminal record. Employment decisions are based on merit and ability. However, applicants must declare all previous convictions, including those deemed &ldquo;spent&rdquo; under the Rehabilitation of Offenders Act 1974. Failure to disclose relevant convictions may result in rejection or dismissal.</p>
<p>Certain convictions will normally be considered high-risk for roles involving regular contact with children, including but not limited to:</p>
<ul class="policy-list"><li>Murder, manslaughter, rape, grievous bodily harm, or other serious</li></ul>
<p>violent offences.</p>
<ul class="policy-list"><li>Serious drug-related offences.</li><li>Offences involving robbery, burglary, theft, deception, or fraud.</li></ul>
<h2><span class="cs-num">8.</span>DISPUTING DBS INFORMATION</h2>
<p>Applicants who dispute the information in a DBS disclosure should contact the DBS directly. If a dispute arises, clubSENsational may defer a final decision until the issue is resolved.</p>
<h2><span class="cs-num">9.</span>RETENTION AND SECURITY OF DBS INFORMATION</h2>
<p>clubSENsational follows DBS guidance on handling disclosure information:</p>
<ul class="policy-list"><li>Disclosure information and other confidential documents will be stored</li></ul>
<p>securely with restricted access.</p>
<ul class="policy-list"><li>Information will only be retained for as long as necessary and in line with</li></ul>
<p>DBS guidelines.</p>
<ul class="policy-list"><li>DBS information will not be shared with unauthorised individuals.</li></ul>
<h2><span class="cs-num">10.</span>RETENTION OF RECORDS</h2>
<p>For successful applicants, relevant information from their application form and supporting documents will be retained in their personnel file. If an application is unsuccessful, all related documentation will be securely destroyed within six months, in accordance with the Data Protection Act.</p>
<h2><span class="cs-num">11.</span>QUERIES</h2>
<p>Applicants with questions regarding the application process should contact the Operations Director.</p>
<h2><span class="cs-num">12.</span>MONITORING AND EVALUATION</h2>
<p>The Operations Director will periodically review and assess the implementation and effectiveness of this policy.</p>
<h2><span class="cs-num">13.</span>POLICY MAINTENANCE</h2>
<p>This policy will be reviewed regularly and updated as necessary.</p>
  </div>


  <p class="cs-foot">© clubSENsational LTD · Reference copy. Formal annual review and team sign-off apply to the Health &amp; Safety Policy only. Contact: info@clubsensational.org</p>
</div>

<div class="cs-policy" id="cs-policy-diversity-equality-inclusion">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="ELEMENTOR/MEDIOS/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Diversity, Equality and Inclusion Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Created</strong>2026-04-21</div>
  </div>

  <div class="cs-body">
<div class="cs-intro"><p>DIVERSITY, EQUALITY AND INCLUSION POLICY</p></div>
<h2><span class="cs-num">1.</span>INTRODUCTION</h2>
<p>We are committed to fostering a people-focused, inclusive culture, a diverse workforce, and a healthy working environment where every colleague is treated fairly, with dignity and respect.</p>
<p>It is the responsibility of all of us to ensure that diversity and difference do not create barriers to success or lead to less favourable treatment. Therefore, all employees must understand the expected standards of behaviour aligned with this policy, our values, and the law. It is equally important to know how to address or respond to any incidents of exclusion or discrimination we may witness or experience.</p>
<h2><span class="cs-num">2.</span>THE LAW</h2>
<p>The Equality Act 2010 makes it unlawful to discriminate, directly or indirectly, in recruitment or employment based on age, disability, sex, gender reassignment, pregnancy, maternity, race (including colour, nationality, and ethnic or national origins), sexual orientation, religion or belief, or marital or civil partnership status. These are known as "protected characteristics."</p>
<p>Additionally, the Health and Safety at Work Act 1974 requires all employers to take reasonable steps to protect workers from the risk of injury or harm in the workplace. More information on the types of unlawful discrimination is available in Appendix 1.</p>
<h2><span class="cs-num">3.</span>OUR COMMITMENT</h2>
<p>We strive to exceed our legal duties and ensure that all colleagues are treated fairly and given opportunities to reach their full potential, regardless of background.</p>
<p>This commitment applies to all employees, including Directors and Team Leaders, in understanding their rights and responsibilities under this policy and applying them in their working lives. We aim to create and maintain a workplace free from bullying, harassment, victimisation, and unlawful discrimination, where dignity and respect are upheld, and individual differences are valued.</p>
<p>We recognise the detrimental impact that discrimination, bullying, victimisation, and harassment can have on mental health and wellbeing. Any</p>
<p>breaches of this policy will be thoroughly investigated, with appropriate action taken, including providing ongoing wellbeing and mental health support to affected individuals.</p>
<p>All employees must understand that they, as well as the organisation, can be held liable for acts of bullying, harassment, victimisation, and unlawful discrimination against colleagues, customers, suppliers, or members of the public in the course of their employment.</p>
<p>We will:</p>
<ul class="policy-list"><li>Review all policies and procedures to eliminate any institutional bias.</li><li>Monitor workforce composition concerning age, sex, ethnicity, sexual</li></ul>
<p>orientation, religion or belief, and disability to promote equality, diversity, and inclusion.</p>
<h2><span class="cs-num">4.</span>BEHAVIOURAL EXPECTATIONS</h2>
<p>Each of us has a personal responsibility to avoid conduct that offends, discriminates, bullies, harasses, or victimises others. We must speak up if we experience, witness, or become aware of such behaviour, whether verbal, written, or online.</p>
<p>Non-compliance with this policy may result in formal action. Discriminatory behaviour constitutes gross misconduct, which may lead to termination of employment or contracts.</p>
<p>Each colleague is responsible for:</p>
<ul class="policy-list"><li>Supporting the implementation of this policy.</li><li>Communicating and collaborating respectfully.</li><li>Ensuring behaviour does not amount to discrimination, harassment,</li></ul>
<p>bullying, or victimisation.</p>
<ul class="policy-list"><li>Challenging any behaviour that does not align with this policy.</li></ul>
<p>Directors and Team Leaders are responsible for:</p>
<ul class="policy-list"><li>Promoting compliance with this policy and acting as role models for</li></ul>
<p>diversity, equity, and inclusion.</p>
<ul class="policy-list"><li>Ensuring teams understand their responsibilities and addressing potential</li></ul>
<p>infringements.</p>
<ul class="policy-list"><li>Providing reasonable adjustments for employees with disabilities or</li></ul>
<p>accessibility needs.</p>
<ul class="policy-list"><li>Addressing inappropriate behaviour and encouraging staff to report</li></ul>
<p>concerns.</p>
<h2><span class="cs-num">5.</span>GRIEVANCE AND DISCIPLINARY PROCEDURES</h2>
<p>Employees who believe they have been treated unfairly or subjected to direct or indirect discrimination can raise the issue through the grievance procedure. Employees are also encouraged to speak to a Director or Team Leader. Any individual making a complaint will be protected from victimisation.</p>
<h2><span class="cs-num">6.</span>RECRUITMENT</h2>
<p>We encourage applications from diverse candidates and are committed to an inclusive and equitable recruitment process:</p>
<ul class="policy-list"><li>Job descriptions and specifications will include only essential and</li></ul>
<p>justifiable requirements.</p>
<ul class="policy-list"><li>Advertisements will be clear and use inclusive language.</li><li>Where possible, diverse interview panels will be assembled, and all</li></ul>
<p>selection processes will be thorough and based on defined criteria.</p>
<h2><span class="cs-num">7.</span>EMPLOYMENT</h2>
<p>Employment terms and conditions will reflect this policy and ensure:</p>
<ul class="policy-list"><li>Fair treatment in compensation and benefits, irrespective of protected</li></ul>
<p>characteristics.</p>
<ul class="policy-list"><li>Protection from discrimination throughout employment, including</li></ul>
<p>standard references upon termination.</p>
<ul class="policy-list"><li>Fair and objective redundancy criteria and procedures.</li><li>Promotion and development opportunities based on merit and role</li></ul>
<p>requirements, free from discrimination.</p>
<h2><span class="cs-num">8.</span>REASONABLE ADJUSTMENTS</h2>
<p>We are committed to ensuring inclusion and accessibility for disabled employees by:</p>
<ul class="policy-list"><li>Encouraging disabled colleagues to discuss their needs with their team</li></ul>
<p>leaders.</p>
<ul class="policy-list"><li>Implementing reasonable adjustments wherever possible to support</li></ul>
<p>employees in their roles.</p>
<ul class="policy-list"><li>Providing explanations where an adjustment is deemed unreasonable</li></ul>
<p>and seeking alternative solutions.</p>
<h2><span class="cs-num">9.</span>TRAINING AND DEVELOPMENT</h2>
<p>We are committed to equal opportunities in training and development by:</p>
<ul class="policy-list"><li>Encouraging employees to discuss career aspirations and training</li></ul>
<p>needs.</p>
<ul class="policy-list"><li>Ensuring equal access to training and development opportunities,</li></ul>
<p>regardless of protected characteristics.</p>
<h2><span class="cs-num">10.</span>DISABILITY</h2>
<p>We recognise the value disabled individuals bring to the workplace and are committed to employing disabled candidates. As a Disability Confident employer, we guarantee interviews for disabled applicants who meet the minimum criteria for a role.</p>
<p>No applicant will be deemed unsuitable for a position without first considering reasonable adjustments that may accommodate their needs.</p>
<h2><span class="cs-num">11.</span>EQUALITY VS EQUITY</h2>
<p>Equality means providing the same resources or opportunities to all individuals. Equity recognises that different people have different circumstances and ensures they receive the necessary resources to achieve fair outcomes.</p>
<h2><span class="cs-num">12.</span>REHABILITATION OF OFFENDERS</h2>
<p>We do not discriminate against individuals with spent convictions under the Rehabilitation of Offenders Act 1974.</p>
<h2><span class="cs-num">13.</span>EQUAL PAY</h2>
<p>All employees undertaking substantially similar or equally valuable work are entitled to equal pay unless differences are based on factors such as seniority,</p>
<p>qualifications, or other justifiable reasons. We will continue to monitor and address any gender pay gaps.</p>
<h2><span class="cs-num">14.</span>WELLBEING</h2>
<p>Employees&rsquo; mental health and wellbeing are closely linked to their experiences of inclusion and diversity at work. We recognise the impact of microaggressions, unconscious bias, stereotypes, and other stressors on mental health and psychological safety.</p>
<p>ClubSENsational will balance business objectives with employee wellbeing to ensure a workplace free from unlawful discrimination.</p>
<h2><span class="cs-num">15.</span>POLICY COMMUNICATION</h2>
<p>This policy will be introduced during employee inductions and made available to stakeholders upon request.</p>
<h2><span class="cs-num">16.</span>REVIEW</h2>
<p>We will continuously improve our approach to diversity, equity, and inclusion by identifying best practices in employment and service delivery. ClubSENsational will implement an action plan in line with this policy and monitor progress. The policy will be reviewed every two years or sooner if required by legislative changes.</p>
<p>Appendix 1 &ndash; Types of Unlawful Discrimination</p>
<h2><span class="cs-num">17.</span>Direct discrimination is where a person is treated less favourably than</h2>
<p>another because of a protected characteristic. An example of direct discrimination would be refusing to employ a woman because they are pregnant. In limited circumstances, employers can directly discriminate against an individual for a reason related to any of the protected characteristics where there is an occupational requirement. The occupational requirement must be crucial to the post and a proportionate means of achieving a legitimate aim, i.e. the gender of an actor can be specified; a delivery driver job requires applicants to be able to drive.</p>
<h2><span class="cs-num">18.</span>Indirect discrimination is where a provision, criterion or practice is applied</h2>
<p>that is discriminatory in relation to individuals who have a relevant protected characteristic (although it does not explicitly include pregnancy and</p>
<p>maternity, which is covered by indirect sex discrimination), such that it would be to the detriment of people who share that protected characteristic compared with people who do not, and it cannot be shown to be a proportionate means of achieving a legitimate aim.</p>
<h2><span class="cs-num">19.</span>Harassment is where there is unwanted conduct, related to one of the</h2>
<p>protected characteristics (other than marriage and civil partnership, and pregnancy and maternity as these characteristics are covered separately), that has the purpose or effect of violating a person's dignity; or creating an intimidating, hostile, degrading, humiliating or offensive environment. It does not matter whether or not this effect was intended by the person responsible for the conduct.</p>
<h2><span class="cs-num">20.</span>Associative discrimination is where an individual is directly discriminated</h2>
<p>against or harassed for association with another individual who has a protected characteristic. For example: deciding not to offer a job because the candidate is a carer for an elderly parent and the employer thinks they will take too much time off work as a result.</p>
<h2><span class="cs-num">21.</span>Perceptive discrimination is where an individual is directly discriminated</h2>
<p>against or harassed based on a perception that they have a particular protected characteristic when they do not, in fact, have that protected characteristic.</p>
<h2><span class="cs-num">22.</span>Victimisation occurs where an employee is subjected to a detriment</h2>
<p>because they made or supported a complaint or raised a grievance under the Equality Act 2010, or because they are suspected of doing so. However, an employee is not protected from victimisation if they acted maliciously or made or supported an untrue complaint.</p>
  </div>
