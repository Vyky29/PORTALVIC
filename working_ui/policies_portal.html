<div class="cs-policy" id="cs-policy-safeguarding-policy">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="ELEMENTOR/MEDIOS/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Safeguarding Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Created</strong>2026-04-21</div>
  </div>

  <div class="cs-body">
<h2><span class="cs-num">1.</span>PURPOSE</h2>
<p>clubSENsational is committed to preventing and responding to risks of harm and to promoting the welfare of all that we work with. These individuals are referred to as the &lsquo;Beneficiaries&rsquo; of this Safeguarding Policy. clubSENsational works with children, young people, and adults with autism and learning difficulties by creating a nurturing and inclusive environment that supports their well-being and development.</p>
<p>We recognise the importance of this commitment to safety and welfare and, further, are committed to safeguarding all beneficiaries without discrimination due to an individual&rsquo;s age, disability, race, religion or belief, sex, gender reassignment, pregnancy or maternity leave status, marriage or civil partnership status, or sexual orientation.</p>
<p>This Safeguarding Policy is based on the safeguarding laws of England, Wales, and Scotland, including related guidance issued by the UK Government and relevant governmental departments, agencies, and public bodies. If this Policy is at any time inconsistent with this body of law, clubSENsational will act to meet the requirements of up-to-date safeguarding laws in priority to the requirements set out in this Policy.</p>
<p>clubSENsational has implemented this Safeguarding Policy in order to meet its obligations as an organisation working with children, young people, and adults with autism and learning difficulties.</p>
<h2><span class="cs-num">2.</span>SCOPE</h2>
<p>This Policy explains key aspects of how clubSENsational prevents harm in relation to its Beneficiaries via its practices and its Staff Members&rsquo; conduct. This Safeguarding Policy covers the organisation and operations of all clubSENsational&rsquo;s activities.</p>
<p>This Policy&rsquo;s guidelines and obligations apply to all individuals working for or acting on behalf of clubSENsational in the UK at all levels, including directors, team leaders, employees, casual workers, agency workers and volunteers. This Policy does not form part of any contract of employment or similar and clubSENsational may amend it at any time at our absolute discretion.</p>
<h2><span class="cs-num">3.</span>DEFINING SAFEGUARDING</h2>
<p>Safeguarding is an umbrella term that refers to work practices and procedures aimed at preventing or responding to harm or risks of harm posed to vulnerable individuals, and at promoting these individuals&rsquo; wider welfare. Safeguarding is particularly important for children and adults at risk. Most safeguarding legal obligations relate to the care of these groups. For safeguarding purposes:</p>
<p>The commitments and practices contained in this Safeguarding Policy apply to the safeguarding of clubSENsational&rsquo;s Beneficiaries from harm caused by either:</p>
<ul class="policy-list"><li>The activities and practices of clubSENsational and any conduct of its</li></ul>
<p>Staff Members, or</p>
<ul class="policy-list"><li>People and situations outside of clubSENsational&rsquo;s and its Staff</li></ul>
<p>Members&rsquo; control, where clubSENsational&rsquo;s Staff Members are aware of, ought to be aware of, or reasonably suspect the risks posed by a situation. For the purposes of this Policy, a Safeguarding Concern is any conduct or situation that is known or reasonably suspected by a Staff Member or another party that risks violating the safeguarding commitments set out above.</p>
<h2><span class="cs-num">4.</span>KEY MEASURES THAT CLUBSENSATIONAL IS COMMITTED TO IMPLEMENTING AND</h2>

<h2><span class="cs-num">5.</span>Maintaining to Safeguard Its Beneficiaries</h2>
<p>Ensuring that Staff Members are trained to, and encouraged to, report any Safeguarding Concerns that they identify. Staff Members will be encouraged to follow clubSENsational&rsquo;s safeguarding reporting procedures as closely as possible when reporting concerns.</p>
<p>Ensuring that all staff members listen to all safeguarding-related queries and concerns raised by other staff members, beneficiaries, or relevant other parties, with respect and professionalism. Staff members should be trained how to, and encouraged to, then assist with reporting any such concerns via clubSENsational&rsquo;s regular reporting procedures.</p>
<p>Ensuring that all reported safeguarding concerns are dealt with by appropriate individuals and teams and in accordance with clubSENsational&rsquo;s relevant procedures</p>
<p>Implementing and maintaining comprehensive, accessible, and efficient procedures for staff members to use when reporting and dealing with safeguarding concerns. These procedures will be made known and easily accessible to all Staff Members.</p>
<ul class="policy-list"><li>Procedures will be designed to ensure all safeguarding issues are dealt</li></ul>
<p>with fairly and objectively even when allegations are made against one of clubSENsational&rsquo;s Staff Members. Any such allegations will be treated in a manner that considers the gravity of the situation and the need for a thorough and impartial review.</p>
<ul class="policy-list"><li>Any reports that qualify as protected disclosures under whistleblowing</li></ul>
<p>law will be treated securely and in a protected manner, in line with whistleblowing law. Appointing a designated safeguarding officer to hold responsibility for managing safeguarding policies and procedures within clubSENsational. Following appropriate recruitment processes when recruiting new Staff Members, including volunteers. This includes:</p>
<ul class="policy-list"><li>Conducting all appropriate pre-employment checks such as Disclosure</li></ul>
<p>and Barring Service (DBS).</p>
<ul class="policy-list"><li>Ensuring new Staff Members take part in and understand the content of</li></ul>
<p>all necessary safeguarding training before having any contact with clubSENsational&rsquo;s beneficiaries.</p>
<ul class="policy-list"><li>Following clubSENsational&rsquo;s policies and procedures on hiring and</li></ul>
<p>recruitment. Providing appropriate safeguarding training for all relevant Staff Members. Every Staff Member should be provided with, and required to undertake, training that is appropriate to their role, responsibilities, and the degree and type of contact with Beneficiaries.</p>
<ul class="policy-list"><li>How to define and identify potential signs of different types of abuse,</li></ul>
<p>including physical abuse, emotional abuse, sexual abuse, exploitation, and neglect.</p>
<ul class="policy-list"><li>How to listen to and respond to concerns or disclosures about</li></ul>
<p>safeguarding issues during an initial conversation.</p>
<ul class="policy-list"><li>How to use clubSENsational&rsquo;s safeguarding reporting procedures and</li></ul>
<p>when doing so is appropriate.</p>
<ul class="policy-list"><li>Which additional resources are available to ensure Staff Members</li></ul>
<p>remain informed about safeguarding.</p>
<p>Ensuring that all information related to safeguarding concerns, including the content of reported concerns as well as the personal data of anybody involved, is handled safely and securely. This involves:</p>
<ul class="policy-list"><li>Following the requirements set out by the UK&rsquo;s data protection laws,</li></ul>
<p>including the General Data Protection Regulation (GDPR) and the Data Protection Act 2018.</p>
<ul class="policy-list"><li>Following clubSENsational&rsquo;s data protection policy and procedures.</li><li>Providing Staff Members with training on data protection and privacy,</li></ul>
<p>where appropriate.</p>
<ul class="policy-list"><li>Ensuring Staff Members always have an identifiable point of contact for</li></ul>
<p>questions or concerns about data protection and privacy.</p>
<ul class="policy-list"><li>Only sharing information about a safeguarding concern internally as far</li></ul>
<p>as is necessary to manage the concern for the relevant Beneficiary's benefit. Ensuring transparency and awareness regarding safeguarding information and procedures. For example by:</p>
<ul class="policy-list"><li>Providing information to beneficiaries about our safeguarding</li></ul>
<p>procedures so that they are aware of how to raise any concerns.</p>
<ul class="policy-list"><li>Ensuring all Staff Members are aware of safeguarding laws,</li></ul>
<p>clubSENsational&rsquo;s safeguarding commitments and procedures and Staff Members' responsibilities in relation to these.</p>
<ul class="policy-list"><li>Regularly reviewing all safeguarding policy and procedures to ensure</li></ul>
<p>that they are up-to-date with safeguarding law and that they remain suitable for clubSENsational&rsquo;s relevant activities and workforce, and meeting any review and evaluation requirements specific to and organisation type.</p>
<h2><span class="cs-num">6.</span>STAFF MEMBERS' RESPONSIBILITIES</h2>
<p>All Staff Members have a responsibility to promote the safety and wellbeing of all of clubSENsational 's beneficiaries. This means that all policies and procedures relevant to safeguarding and all UK laws relevant to safeguarding must be followed at all times.</p>
<p>All Staff Members must contribute to upholding the key measures that has committed to taking to safeguard its Beneficiaries (set out above) to an extent that is appropriate for their role, responsibilities&rsquo; degree and type of contact with Beneficiaries.</p>
<p>Specific ways that Staff Members should do this will be clarified during training. If a Staff Member is uncertain as to their responsibilities, it is their responsibility to raise this with clubSENsational&rsquo;s relevant team leader or Director.</p>
<p>Staff Members must actively participate in all safeguarding training they are assigned and if they do not understand any aspects of their training, must raise this with the relevant Team Leader or Director. Staff Members must never do anything to actively risk the safety or wellbeing of any of clubSENsational&rsquo;s Beneficiaries. This includes but is not limited to:</p>
<ul class="policy-list"><li>Subjecting them to or facilitating abuse of any sort.</li><li>Participating in or facilitating any activities that may commercially</li></ul>
<p>exploit Beneficiaries. For example, failing to report suspected child labour or trafficking. Staff Members must report all Safeguarding Concerns that they have regarding Beneficiaries regardless of whether the concerns relate to potential wrongdoing of other Staff Members and other Beneficiaries, or external parties.</p>
<h2><span class="cs-num">7.</span>PROCEDURES REPORTING</h2>
<p>Staff Members will receive safeguarding training that should enable them to identify Safeguarding Concerns relevant to clubSENsational&rsquo;s Beneficiaries.</p>
<p>If a Staff Member identifies a safeguarding concern, to report it they should follow the relevant procedure.</p>
<p>If a Staff Member feels unable to follow the above steps, they should report their concerns in a reasonable alternative manner. This may the case if, for example:</p>
<h2><span class="cs-num">8.</span>Following the above procedure would require disclosing the concern to</h2>
<p>somebody who is implicated in the Safeguarding Concern or who the Staff Member is otherwise uncomfortable contacting about this concern.</p>
<h2><span class="cs-num">9.</span>The matter is time sensitive and involves a risk of serious harm to</h2>
<p>somebody, in which case contacting an external agency (the police, the ambulance, service or a mental health crisis line)</p>
<p>Investigation and Response.</p>
<p>Staff Members who report a Safeguarding Concern will be kept informed about the progression of the matter they reported to an appropriate degree.</p>
<p>Note that, depending on the nature of the concern and consequent investigations, some information about matters may be kept confidential and not shared with the reporter.</p>
<p>If a Staff Member is found to be in breach of this Safeguarding Policy or safeguarding law in general, they will be treated fairly and will only be dismissed if appropriate in the circumstances and in accordance with employment law.</p>
<p>Referrals or notifications to external organisations will be made when, and only when, this is appropriate and will always be made in accordance with the law (e.g. data protection law).</p>
  </div>

</div>

<div class="cs-policy" id="cs-policy-mental-health-policy">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="ELEMENTOR/MEDIOS/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Mental Health Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Created</strong>2026-04-21</div>
  </div>

  <div class="cs-body">
<h2><span class="cs-num">1.</span>Policy Statement</h2>
<p>At clubSENsational, we are committed to protecting and promoting the mental health and wellbeing of all staff. We recognise that good mental health is essential to individual and organisational success, and we will work to create a culture that promotes psychological safety, dignity, inclusion, and support. We understand that workplace stress and poor mental health can affect performance, morale, and relationships. Our aim is to provide a supportive environment where concerns can be raised and addressed early, and where everyone feels empowered to thrive.</p>
<h2><span class="cs-num">2.</span>Policy Aims</h2>
<p>This policy seeks to:</p>
<ul class="policy-list"><li>Create a working culture that promotes positive mental health and</li></ul>
<p>wellbeing.</p>
<ul class="policy-list"><li>Prevent work-related stress through effective risk management.</li><li>Promote open and supportive conversations about mental health.</li><li>Provide targeted and specialist support when required.</li><li>Comply with relevant legal and regulatory duties.</li></ul>
<h2><span class="cs-num">3.</span>Scope</h2>
<p>This policy applies to all staff working at clubSENsational, including volunteers and contractors. It sits alongside our Health and Safety Policy and forms part of our commitment to ensuring a safe and inclusive working environment.</p>
<h2><span class="cs-num">4.</span>Responsibilities</h2>
<p>Javier Arranz Escorial</p>
<ul class="policy-list"><li>Holds overall responsibility for implementing this policy.</li><li>Monitors compliance, reviews incidents, and ensures escalation</li></ul>
<p>procedures are followed when mental health concerns arise.</p>
<ul class="policy-list"><li>Oversees emergency planning and supports the coordination of return-</li></ul>
<p>to-work processes related to mental ill health.</p>
<p>Victor Matilla Casanova</p>
<ul class="policy-list"><li>Leads on mental health risk assessments and ensures appropriate</li></ul>
<p>controls are in place.</p>
<ul class="policy-list"><li>Supports wellbeing promotion efforts across the organisation in</li></ul>
<p>collaboration with team leaders and staff.</p>
<p>Raul Salvador Gallego</p>
<ul class="policy-list"><li>Ensures the working environment, including equipment and facilities,</li></ul>
<p>supports staff wellbeing.</p>
<ul class="policy-list"><li>Embeds mental health awareness into training, supervision, and</li></ul>
<p>induction processes for all new and existing staff.</p>
<p>Team Leaders</p>
<ul class="policy-list"><li>Model positive behaviours and create an open, respectful culture.</li><li>Monitor team wellbeing.</li><li>Be approachable and take early action when concerns arise.</li><li>Encourage the use of wellbeing resources and reporting systems.</li></ul>
<p>Employees</p>
<ul class="policy-list"><li>Take care of their own mental health and support others where possible</li><li>Follow wellbeing-related procedures and training</li><li>Raise concerns early and engage with any reviews or support offered</li></ul>
<h2><span class="cs-num">5.</span>Prevention and Early Intervention</h2>
<p>clubSENsational will:</p>
<ul class="policy-list"><li>Conduct regular risk assessments to identify stressors or mental wellbeing</li></ul>
<p>issues</p>
<ul class="policy-list"><li>Consult staff before and after major changes to working conditions</li><li>Promote open communication and psychological safety</li><li>Provide training for managers to recognise early signs of mental ill health</li><li>Monitor workloads, hours, and leave to prevent burnout.</li></ul>
<h2><span class="cs-num">6.</span>Support for Staff</h2>
<p>Universal Support</p>
<ul class="policy-list"><li>Regular wellbeing check-ins</li><li>Wellbeing surveys and feedback opportunities</li><li>Scheduled breaks and fair workload planning</li><li>Access to quiet workspaces</li></ul>
<p>Targeted Support</p>
<ul class="policy-list"><li>One-to-one support with line managers or wellbeing leads</li><li>Adjustments to duties or hours when necessary</li><li>Referral to support resources</li></ul>
<p>Specialist Support</p>
<ul class="policy-list"><li>Help accessing professional mental health services</li><li>Return-to-work plans for those absent due to mental ill health</li><li>Access to trained mental health first aiders</li></ul>
<h2><span class="cs-num">7.</span>Communication and Training</h2>
<p>All staff will:</p>
<ul class="policy-list"><li>Be introduced to this policy during induction</li><li>Be reminded regularly about available support</li><li>Receive role-appropriate training on mental health and wellbeing</li></ul>
<h2><span class="cs-num">8.</span>Monitoring and Review</h2>
<p>This policy will be reviewed annually or earlier if there are significant changes. Javier Arranz Escorial will lead the review process with input from staff and stakeholders.</p>
  </div>

<div class="cs-policy" id="cs-policy-first-aid-policy">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="ELEMENTOR/MEDIOS/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>First Aid Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Created</strong>2026-04-21</div>
  </div>

  <div class="cs-body">
<h2><span class="cs-num">1.</span>Purpose</h2>
<p>In an emergency situation, first aid aims to maintain life, prevent further harm/injury, ease pain and prevent deterioration of the person's condition until professional medical help can be obtained.</p>
<p>To provide immediate care to an injured or ill person, carried out within a limited range of skills, until the injury or illness is managed or a higher level of care is required, such as a doctor, a paramedic, or a nurse.</p>
<h2><span class="cs-num">2.</span>Policy</h2>
<p>clubSENsational is committed to providing timely and appropriate first aid care to staff, clients, and visitors. clubSENsational will endeavour to have a suitable number of trained first aid officers for each site and provide first aid facilities to administer appropriate and adequate first aid treatment in the event of a person sustaining an injury or illness.</p>
<h2><span class="cs-num">3.</span>Procedure</h2>
<p>The First Aid Audit must be completed bi-annually:</p>
<ul class="policy-list"><li>In an emergency, first aid at ClubSensational aims to maintain life,</li></ul>
<p>prevent further harm, ease pain, and prevent deterioration until professional medical help can be obtained. Given the presence of children, physical activities, and the use of varied equipment, immediate care is critical to support an injured or ill person until managed by a paramedic, nurse, or doctor.</p>
<ul class="policy-list"><li>Selected staff will attend training for certification</li><li>Once the injured or ill person has been assisted, contact the relevant</li></ul>
<p>person.</p>
<ul class="policy-list"><li>If required, the most senior ClubSensational employee should prepare a</li></ul>
<p>Critical Incident Report.</p>
<ul class="policy-list"><li>All injuries will be recorded on the incident register for incidents or injuries.</li><li>Data will be reviewed on a regular basis to ensure there are no trends in</li></ul>
<p>injuries that need to be minimised.</p>
<h2><span class="cs-num">4.</span>First Aid Kits</h2>
<p>clubSENsational First Aid Kits are reviewed and restocked by the person responsible for Health and Safety management.</p>
<p>The responsible person must ensure there is a first aid sign above every first aid box, and a review will be completed each time the First Aid Kit is restocked.</p>
<h2><span class="cs-num">5.</span>Responsibility</h2>
<p>It is the responsibility of clubSENsational to ensure that:</p>
<ul class="policy-list"><li>Adequate and appropriate First Aid Facilities are provided.</li><li>Appropriate and adequate First Aid Officers training is arranged for staff.</li><li>First Aid Officers&rsquo; training is up to date, and the certificate is current.</li></ul>
<p>It is the responsibility of First Aid Officers to:</p>
<ul class="policy-list"><li>Assess if medical assistance is required.</li><li>Administer appropriate First Aid in accordance with their training.</li><li>Maintain First Aid records as outlined in this procedure.</li><li>Maintain confidentiality regarding information obtained as part of their</li></ul>
<p>role.</p>
  </div>

<div class="cs-policy" id="cs-policy-health-and-safety">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="ELEMENTOR/MEDIOS/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Health and Safety Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Effective from</strong><span class="pc-meta-effective-from">—</span></div>
  </div>

  <div class="cs-body">
<div class="cs-intro"><p>At ClubSENsational, we are committed to ensuring the health, safety, and well- being of our employees, contractors, customers, and third parties. Our approach is rooted in accident prevention, hazard identification, and risk reduction to create a safe working environment for all. This policy outlines our commitment to complying with all applicable health and safety regulations, laws, and obligations while aligning with best industry practices and relevant safety standards.</p></div>
<h2><span class="cs-num">1.</span>Our Commitments</h2>
<p>To uphold our commitment to health and safety, we will:</p>
<ul class="policy-list"><li>Prevent accidents and cases of work-related ill health by identifying and</li></ul>
<p>eliminating hazards and reducing occupational health and safety risks as low as reasonably achievable.</p>
<ul class="policy-list"><li>Manage health and safety risks in our workplace through systematic risk</li></ul>
<p>assessments and the implementation of effective control measures.</p>
<ul class="policy-list"><li>Provide clear instructions, information, and adequate training to ensure</li></ul>
<p>all employees are competent to perform their roles safely.</p>
<ul class="policy-list"><li>Provide personal protective equipment (PPE) to employees where</li></ul>
<p>necessary and ensure it is properly maintained and used correctly.</p>
<ul class="policy-list"><li>Consult with employees on matters affecting their health and safety by</li></ul>
<p>fostering a culture of participation and encouraging open communication through efficient consultation channels.</p>
<ul class="policy-list"><li>Provide and maintain safe plant and equipment by implementing</li></ul>
<p>regular inspections, maintenance, and necessary upgrades.</p>
<ul class="policy-list"><li>Maintain safe and healthy working conditions by ensuring compliance</li></ul>
<p>with all safety standards and continuously improving workplace environments.</p>
<ul class="policy-list"><li>Implement emergency procedures, including evacuation plans in case</li></ul>
<p>of fire or other significant incidents, ensuring all employees are trained and prepared for emergencies.</p>
<ul class="policy-list"><li>Integrate health and safety into top management decision-making by</li></ul>
<p>embedding H&amp;S considerations into strategic goals and operational planning.</p>
<ul class="policy-list"><li>Invest in learning from accidents and incidents by conducting thorough</li></ul>
<p>investigations, taking corrective actions, and preventing recurrence.</p>
<ul class="policy-list"><li>Define individual health and safety responsibilities and competencies to</li></ul>
<p>ensure everyone understands their role in maintaining a safe workplace and encourage personal responsibility for one&rsquo;s own safety and that of colleagues.</p>
<ul class="policy-list"><li>Increase health and safety awareness by providing the necessary</li></ul>
<p>equipment, resources, and training to promote safer behaviours.</p>
<ul class="policy-list"><li>Foster continuous improvement in all health and safety aspects through</li></ul>
<p>proactive review, monitoring, and collaboration with employees.</p>
<ul class="policy-list"><li>Review and revise this policy regularly, at least every year, or sooner if</li></ul>
<p>required, to ensure it remains relevant and effective.</p>
<h2><span class="cs-num">2.</span>Responsibilities for Health and Safety</h2>
<p>Overall and Final Responsibility</p>
<p>The overall and final responsibility for health and safety lies with Victor Matilla Casanova. He is accountable for ensuring that all aspects of this policy are effectively implemented and that ClubSensational maintains a safe and compliant working environment.</p>
<p>Day-to-Day Responsibility</p>
<p>The day-to-day responsibility for ensuring this policy is put into practice rests with Javier Arranz Escorial. He is responsible for overseeing daily health and safety operations, ensuring that procedures are followed, and addressing any concerns as they arise.</p>
<p>Specific Responsibilities</p>
<p>To ensure health and safety standards are maintained and improved, the following individuals have designated responsibilities:</p>
<ul class="policy-list"><li>Victor Matilla Casanova &amp; Javier Arranz Escorial &ndash; Safety management,</li></ul>
<p>conducting risk assessments, consulting employees, handling accident reports, first aid coordination, and managing work-related ill health.</p>
<ul class="policy-list"><li>Javier Arranz Escorial &ndash; Monitoring health and safety compliance, investigating</li></ul>
<p>accidents and ill-health incidents, implementing emergency procedures, and overseeing fire safety and evacuation protocols.</p>
<ul class="policy-list"><li>Raul Salvador Gallego &ndash; Maintaining equipment, providing information and</li></ul>
<p>instruction, supervising health and safety practices, recruitment and organising training programs.</p>
<p>Team Leaders &ndash; Actively promote a safe working environment by leading by example, identifying potential hazards, ensuring team members follow safety procedures, and addressing safety concerns promptly. They must also support employees in understanding health and safety expectations, encourage reporting of hazards, and foster a culture of safety within their teams.</p>
<p>Employees Responsibilities</p>
<ul class="policy-list"><li>Understand H&amp;S responsibilities</li><li>Follow training and only use equipment trained to use (and how)</li><li>Report accidents, incidents and near misses.</li><li>Ensure individual risk assessments for those being supported are understood</li></ul>
<p>and followed.</p>
<h2><span class="cs-num">3.</span>Implementation</h2>
<p>ClubSENsational Director, Victor Matilla Casanova, is responsible for overseeing the implementation of this policy and ensuring compliance across all operations. However, all employees, contractors, and management have a shared responsibility to adhere to health and safety guidelines and contribute to a safe working environment.</p>
<p>All employees should:</p>
<ul class="policy-list"><li>Co-operate with team leaders and directors on health and safety</li></ul>
<p>matters.</p>
<ul class="policy-list"><li>Take reasonable care of their own health and safety; and</li><li>Report all health and safety concerns to an appropriate person (as</li></ul>
<p>detailed above). This policy will be communicated to all employees and made available to stakeholders as required.</p>
<h2><span class="cs-num">4.</span>Risk Assessments</h2>
<ul class="policy-list"><li>We will conduct thorough risk assessments relevant to our work activities,</li></ul>
<p>identifying potential hazards, evaluating risks, and implementing appropriate control measures to mitigate them.</p>
<ul class="policy-list"><li>Risk assessments will be completed before work begins and will be</li></ul>
<p>documented to ensure transparency and accountability.</p>
<ul class="policy-list"><li>If there are changes in working habits, conditions, equipment, or</li></ul>
<p>legislation, we will review and update our risk assessments to reflect new risks and ensure ongoing compliance with health and safety standards.</p>
<ul class="policy-list"><li>Employees will be encouraged to report hazards and unsafe conditions</li></ul>
<p>to facilitate continuous improvement in risk management.</p>
<ul class="policy-list"><li>Risk assessments will be reviewed annually or earlier if there are</li></ul>
<p>significant changes such as new legislation, modifications to work processes, the introduction of new equipment, or incidents that highlight deficiencies in existing controls.</p>
<h2><span class="cs-num">5.</span>Training</h2>
<ul class="policy-list"><li>All staff and subcontractors will receive a structured health and safety</li></ul>
<p>induction upon joining the company, covering key workplace hazards, emergency procedures, and company policies.</p>
<ul class="policy-list"><li>A training needs analysis will be conducted to assess the skills,</li></ul>
<p>knowledge, and qualifications required for different roles. This will help identify any gaps and ensure employees receive the appropriate training.</p>
<ul class="policy-list"><li>We will maintain a training matrix to track completed training, upcoming</li></ul>
<p>refresher courses, and any overdue training requirements. This matrix will be reviewed annually to ensure accuracy and compliance with regulatory and industry standards.</p>
<ul class="policy-list"><li>If training has lapsed or is found to be insufficient, the affected employee</li></ul>
<p>will be identified and prioritised for retraining. Until training is completed, temporary restrictions may be placed on tasks requiring the lapsed qualification, with additional support such as mentoring or supervision provided to ensure safe working practices. If systemic issues are identified, the training programme will be reviewed and adjusted to improve effectiveness.</p>
<ul class="policy-list"><li>Remote workers will have access to health and safety guidance and</li></ul>
<p>resources tailored to their working environment, ensuring they are supported in maintaining a safe and healthy workspace.</p>
<ul class="policy-list"><li>Training needs and the training matrix will be reviewed annually or earlier</li></ul>
<p>if there are regulatory changes, new operational risks, significant incidents, updates to industry best practices, or employee feedback indicating gaps in knowledge or competency.</p>
<h2><span class="cs-num">6.</span>Consultation</h2>
<ul class="policy-list"><li>We will actively engage with staff on health and safety matters through</li></ul>
<p>open communication channels, safety meetings, and regular briefings to ensure their concerns and insights are considered.</p>
<ul class="policy-list"><li>Formal health and safety consultations will take place periodically,</li></ul>
<p>especially during policy reviews, risk assessment updates, or the introduction of new procedures, ensuring employee feedback shapes our approach.</p>
<ul class="policy-list"><li>Employees will be encouraged to contribute to discussions on</li></ul>
<p>workplace safety improvements and report concerns.</p>
<h2><span class="cs-num">7.</span>Evacuation</h2>
<p>We will ensure that all staff are familiar with the evacuation and emergency procedures of the venues we use, including designated escape routes, assembly points, and any specific safety protocols in place.</p>
<h2><span class="cs-num">8.</span>Reviewing and Updating the Policy</h2>
<p>This policy will be reviewed and updated annually or earlier if there are regulatory changes, new operational risks, significant incidents, updates to industry best practices, or employee feedback indicating gaps in knowledge or competency.</p>

<div class="cs-policy" id="cs-policy-equipment-uniform">
  <div class="cs-header">
    <div class="cs-logo">
      <img src="ELEMENTOR/MEDIOS/F-02-1.png" alt="clubSENsational" width="200" height="200" style="width:100%;height:auto;max-height:84px;object-fit:contain;display:block" loading="lazy" decoding="async" />
    </div>
    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Equipment and Uniform Policy</h1>
      <p class="cs-sub">Registered Company No. 13755417 · clubsensational.org</p>
    </div>
  </div>

  <div class="cs-meta cs-meta--simple">
    <div><strong>Created</strong>2026-04-21</div>
  </div>

  <div class="cs-body">
<h2><span class="cs-num">1.</span>Purpose</h2>
<p>This policy outlines the terms and conditions regarding the provision, use, and return of work uniforms and equipment at ClubSENsational. Instructors are required to adhere to these guidelines to ensure the proper management and maintenance of company property.</p>
<h2><span class="cs-num">2.</span>Issuance of Uniform and Equipment</h2>
<p>Upon commencement of employment, ClubSENsational provides instructors with the necessary uniform and equipment relevant to their role. This equipment is issued on a loan basis and must be returned upon termination of employment or when requested by the company. The provided equipment is strictly for use while working with ClubSENsational and should not be used for any other purpose.</p>
<p>Equipment Provided:</p>
<p>Support Worker conducting dry sessions (Total cost: £50)</p>
<ul class="policy-list"><li>1x Jacket</li><li>1x Sweatshirt</li><li>1x Polo shirt</li><li>1x T-shirt</li></ul>
<p>Climbing instructors (Total cost: £120)</p>
<ul class="policy-list"><li>1x harness</li><li>1x large Grigri</li><li>3x carabiners</li><li>1x keyring</li><li>Set of Toys</li><li>1x timer</li></ul>
<p>Swimming instructors (Total cost: £380)</p>
<ul class="policy-list"><li>1x wetsuit</li><li>1x swimming shirt</li><li>1x swimming cap</li><li>1x Pixtolearn Swimming Full Pack</li></ul>
<p>Pixtolearn Full Pack (Total cost: £350)</p>
<ul class="policy-list"><li>6 x plastic folders with 160 A5 PVC flashcards (printed on both sides) &ndash; It</li></ul>
<p>is the instructor's duty of care to dry the flashcards used during sessions to help prolong their durability.</p>
<ul class="policy-list"><li>Conference bag (polyester).</li><li>1 x small blue bag.</li><li>Pink highlighter.</li><li>6 x plastic folders.</li><li>1x mini microfibre towel.</li></ul>
<h2><span class="cs-num">3.</span>Responsibility and Care of Equipment</h2>
<p>Instructors are responsible for ensuring that all equipment and uniforms:</p>
<ul class="policy-list"><li>Remain in good condition.</li><li>Are used solely for their intended purposes.</li><li>Are returned upon request or at the termination of employment.</li></ul>
<p>Instructors must promptly report any damage, loss, or malfunction of equipment to the company. They must not attempt any unauthorised repairs or modifications.</p>
<h2><span class="cs-num">4.</span>Loss Or Damage of Equipment</h2>
<p>If an instructor loses any equipment, the following deductions will apply:</p>
<ul class="policy-list"><li>First occurrence: 70% of the item's value will be deducted from the</li></ul>
<p>instructor's salary.</p>
<ul class="policy-list"><li>Subsequent occurrences: The full cost of the lost items will be deducted</li></ul>
<p>from the instructor's salary.</p>
<h2><span class="cs-num">5.</span>Damage During Sessions</h2>
<p>If equipment is damaged during sessions due to normal wear and tear, ClubSENsational will cover the cost of replacement. Instructors must report how the material was damaged and provide details of the incident. However, if the equipment has been damaged due to the instructor failing to follow proper procedures or neglecting their responsibilities, a penalty may be applied.</p>
<p>Additionally, if any equipment is deemed unsafe or the uniform becomes unwearable due to usage, the company will provide a replacement.</p>
<h2><span class="cs-num">6.</span>Compliance and Consequences</h2>
<p>Failure to adhere to this policy may result in disciplinary action. Instructors may also be held financially liable for costs associated with damage caused by negligence or misuse.</p>
<p>By accepting company-issued equipment and uniform, instructors agree to comply with the terms of this policy.</p>

  <div class="cs-header">

    <div class="cs-title">
      <p class="cs-brand">clubSENsational · Autism Consultancy Services</p>
      <h1>Feedback Register & Incident Report Procedure</h1>
      <p class="cs-sub">Registered Company No. 13755417 · clubsensational.org</p>
    </div>

  <div class="cs-meta cs-meta--simple">

  <div class="cs-body">
<h2><span class="cs-num">1.</span>Session Feedback-Register &amp;</h2>
<p>INCIDENT REPORT PROCEDURE</p>
<p>Session Feedback-Register &amp; Incident Report Procedure</p>
<h2><span class="cs-num">2.</span>Purpose</h2>
<p>The Session Feedback - Register Form and Incident Report Procedure are essential for documenting each session, ensuring staff protection, and addressing any incidents appropriately.</p>
<h2><span class="cs-num">3.</span>Completion of the Feedback-Registration form</h2>
<p>Why It&rsquo;s Important</p>
<p>Completing the Feedback Form serves three key purposes:</p>
<h2><span class="cs-num">4.</span>Session Documentation &ndash; Records details of what occurred during the</h2>
<p>session. If everything went smoothly, the form should take no more than 1 minute per client to complete.</p>
<h2><span class="cs-num">5.</span>Staff Protection &ndash; Provides a written record that can clarify situations and</h2>
<p>protect staff in case of complaints or disputes.</p>
<h2><span class="cs-num">6.</span>Incident Reporting &ndash; Ensures that any unusual occurrences, such as</h2>
<p>accidents or unexpected challenges, are addressed appropriately.</p>
<p>When to Complete the Feedback- Registration Form</p>
<ul class="policy-list"><li>At the End of Your Working Day &ndash; Ideally, complete the form before</li></ul>
<p>leaving your shift. If not possible, submit it no later than 9:00 AM the following day. This ensures that the admin team is aware of session details to address any family inquiries.</p>
<ul class="policy-list"><li>Immediately After a Session if an Incident Occurs &ndash; If any incident takes</li></ul>
<p>place, the Feedback Form must be completed before finishing your shift.</p>
<ul class="policy-list"><li>If a Client Does Not Attend &ndash; Use the available time to complete any</li></ul>
<p>outstanding Feedback Forms.</p>
<p>Session Feedback-Register Link:</p>
<p>https://forms.gle/kMgvL71oiEMgied28</p>
<p>Session Feedback-Register &amp; Incident Report Procedure</p>
<h2><span class="cs-num">7.</span>Incident Reporting Procedure</h2>
<p>If an incident occurs, whether it involves an injury or not, follow these steps:</p>
<h2><span class="cs-num">8.</span>Complete an Incident Form &ndash; Mandatory for logging all details.</h2>

<h2><span class="cs-num">9.</span>Report the Incident &ndash; Notify the relevant manager immediately.</h2>

<h2><span class="cs-num">10.</span>Debriefing &amp; Prevention &ndash; Discuss the incident and implement strategies</h2>
<p>to prevent future occurrences.</p>
<p>Incident Report Form Link: https://forms.gle/uxfWWjJGsnxdvdR68</p>
<h2><span class="cs-num">11.</span>Any Other Relevant information Section</h2>
<p>Complete this section only if:</p>
<ul class="policy-list"><li>A parent raises a complaint.</li></ul>
<ul class="policy-list"><li>A behavioral issue arises during the session.</li></ul>
<ul class="policy-list"><li>The client presents a new challenge not previously identified.</li></ul>
<p>Your cooperation is vital in maintaining a professional and safe environment for both staff and clients. Please ensure all forms are completed promptly after each session.</p>
<p>Thank you for your support.</p>
  </div>

  <script>
    (function () {

      function isoDate(d) {
        var y = d.getFullYear();
        var m = d.getMonth() + 1;
        var day = d.getDate();
        return y + "-" + (m < 10 ? "0" : "") + m + "-" + (day < 10 ? "0" : "") + day;
      }

      function pickStr(val, fallback) {
        if (val != null && String(val).trim() !== "") return String(val).trim();
        return fallback != null ? String(fallback) : "";
      }

      function normalizeRecordFromStorage(raw, p) {
        if (!raw || typeof raw !== "object") raw = {};
        var baseV = p && p.version ? p.version : "";
        var baseN = p && p.nextReview ? p.nextReview : "";
        var defEff = p && p.id === "POL-011" ? "2026-04-21" : "";
        var st = pickStr(raw.status, "active") || "active";
        if (["active", "under_review", "superseded", "archived"].indexOf(st) < 0) st = "active";
        return {
          version: pickStr(raw.version, baseV),
          effectiveFrom: pickStr(raw.effectiveFrom, defEff),
          nextReview: pickStr(raw.nextReview, baseN),
          owner: pickStr(raw.owner, ""),
          status: st,
          notes: raw.notes != null ? String(raw.notes) : "",
          lastReviewedAt: pickStr(raw.lastReviewedAt, ""),
          lastReviewedBy: pickStr(raw.lastReviewedBy, ""),
          updatedAt: raw.updatedAt || ""
        };
      }

      function legacyOutcomeToNew(o) {
        if (o === "minor_amendment" || o === "major_revision" || o === "further_review") return o;
        if (o === "minor") return "minor_amendment";
        if (o === "major") return "major_revision";
        if (o === "approved" || o === "approved_no_change") return "approved_no_change";
        return "approved_no_change";
      }

      function migrateSchema2ToV3(e) {
        var oc = e.outcome;
        var qm = "approve";
        if (oc === "minor_amendment" || oc === "minor") qm = "minor";
        else if (oc === "major_revision" || oc === "major") qm = "major";
        var sum =
          (e.summaryAmendments || "").trim() ||
          (e.governanceNotes || "").trim() ||
          (e.summaryReview || "").trim();
        return {
          schema: 3,
          recordedAt: e.recordedAt || new Date().toISOString(),
          policyId: e.policyId,
          reviewDate: e.reviewDate || (e.recordedAt ? String(e.recordedAt).slice(0, 10) : ""),
          reviewedBy: e.reviewedBy || "",
          reviewerRole: e.reviewerRole || "",
          quickMode: qm,
          previousVersion: String(e.previousVersion || ""),
          newVersion: String(e.newVersion || e.previousVersion || ""),
          summary: sum,
          nextReviewDate: String(e.nextReviewDate || ""),
          governanceNotes: e.governanceNotes != null ? String(e.governanceNotes) : "",
          changeType: e.changeType || "none"
        };
      }

      function migrateLegacyAtToV3(e) {
        if (!e || !e.policyId) return null;
        var at = e.recordedAt || e.at || "";
        var rev = String(e.reviewer || "").trim();
        var parts = rev.split(",");
        var by = parts[0] ? parts[0].trim() : rev;
        var role = parts.length > 1 ? parts.slice(1).join(",").trim() : "";
        var leg = e.outcome;
        var newO = legacyOutcomeToNew(leg);
        var qm = "approve";
        if (newO === "minor_amendment") qm = "minor";
        else if (newO === "major_revision") qm = "major";
        return {
          schema: 3,
          recordedAt: at || new Date().toISOString(),
          policyId: e.policyId,
          reviewDate: at ? String(at).slice(0, 10) : "",
          reviewedBy: by,
          reviewerRole: role,
          quickMode: qm,
          previousVersion: String(e.version || ""),
          newVersion: String(e.version || ""),
          summary: e.notesSnapshot != null ? String(e.notesSnapshot) : "",
          nextReviewDate: String(e.nextReview || ""),
          governanceNotes: "",
          changeType: "none"
        };
      }

      function unifyEventToV3(e) {
        if (!e || typeof e !== "object") return null;
        if (e.schema === 3) return e;
        if (e.schema === 2) return migrateSchema2ToV3(e);
        if (e.at || e.reviewer || e.recordedAt) return migrateLegacyAtToV3(e);
        return null;
      }

      function loadReviewLogRaw() {
        return sessionReviewEvents.slice();
      }

      function loadReviewEvents() {
        return sessionReviewEvents.slice();
      }

      function saveReviewEvents(entries) {

      function appendReviewEventV3(evt) {

      function outcomeLineV3(e) {
        if (e.quickMode === "approve") return "Approved — No material change";

        if (e.quickMode === "major") return "Major revision";

      function formatDispDate(iso) {
        if (!iso) return "—";
        try {
          var p = iso.indexOf("T") >= 0 ? iso.slice(0, 10) : iso;
          var d = new Date(p + "T12:00:00");
          if (isNaN(d.getTime())) return iso;
          return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
        } catch (x) {
          return iso;
        }
      }

      function renderReviewHistoryForPolicy(policyId) {
        var host = document.getElementById("pcReviewHistoryCards");
        if (!host) return;
        while (host.firstChild) host.removeChild(host.firstChild);
        var items = loadReviewEvents().filter(function (e) {
          return e && e.policyId === policyId;
        });
        items.sort(function (a, b) {
          return String(b.recordedAt || "").localeCompare(String(a.recordedAt || ""));
        });
        if (!items.length) {
          var empty = document.createElement("p");
          empty.className = "pc-history-empty";
          empty.textContent = "No review history has been recorded for this policy yet.";
          host.appendChild(empty);
          return;
        }
        for (var i = 0; i < items.length; i++) {
          var e = items[i];
          var card = document.createElement("div");
          card.className = "pc-history-card";
          var d0 = document.createElement("div");
          d0.className = "pc-hc-date";
          d0.textContent = formatDispDate(
            e.reviewDate || (e.recordedAt ? String(e.recordedAt).slice(0, 10) : "")

          card.appendChild(l1);

          var nv = e.newVersion || pv;
          var verLine = document.createElement("div");
          verLine.className = "pc-hc-line";
          verLine.textContent = pv === nv ? "Version: " + pv : "Version: " + pv + " → " + nv;
          card.appendChild(verLine);
          if ((e.summary || "").trim()) {
            var ch = document.createElement("div");
            ch.className = "pc-hc-line";
            ch.textContent = "Changes: " + String(e.summary).trim();
            card.appendChild(ch);
          }
          var meta = document.createElement("div");
          meta.className = "pc-hc-meta";
          meta.textContent = "Reviewed by: " + (e.reviewedBy || DEFAULT_REVIEWER);
          card.appendChild(meta);
          host.appendChild(card);
        }
      }

      function getEmbeddedPolicies() {

      function getPolicyById(id) {

      /** Staff completions: this browser only (no My Documents / Supabase until you add a backend). */
      var PORTAL_POLICY_ACK_STORAGE_KEY = "portalPolicyStaffAcks_v1";

      var __portalPolicyRemoteSigned = {};

      function portalPolicyComplianceClient() {
        try {
          var ps = typeof window !== "undefined" && window.__PORTAL_SUPABASE__;
          return ps && ps.client ? ps.client : null;
        } catch (ePc) {
          return null;
        }
      }

      function portalPolicyComplianceUserId() {
        try {
          var ps = typeof window !== "undefined" && window.__PORTAL_SUPABASE__;
          var u = ps && ps.session && ps.session.user;
          return u && u.id ? String(u.id) : "";
        } catch (ePu) {
          return "";
        }
      }

      function portalPolicyComplianceUpsertSigned(policyId) {
        try {
          var pid = String(policyId || "").trim();
          if (!pid) return;
          var client = portalPolicyComplianceClient();
          var uid = portalPolicyComplianceUserId();
          if (!client || !uid) return;
          var nowIso = new Date().toISOString();
          client
            .from("user_compliance_acknowledgements")
            .upsert(
              {
                user_id: uid,
                item_type: "policy",
                item_id: pid,
                signed: true,
                signed_at: nowIso
              },
              { onConflict: "user_id,item_type,item_id" }
            )
            .then(function () {})
            .catch(function () {});
        } catch (eUps) {}
      }

      function portalPoliciesMergeRemoteComplianceAcks() {
        try {
          var client = portalPolicyComplianceClient();
          var uid = portalPolicyComplianceUserId();
          if (!client || !uid) return;
          client
            .from("user_compliance_acknowledgements")
            .select("item_id,signed,signed_at")
            .eq("item_type", "policy")
            .eq("signed", true)
            .then(function (res) {
              try {
                var rows = res && res.data ? res.data : [];
                var next = {};
                for (var i = 0; i < rows.length; i++) {
                  var r = rows[i];
                  if (!r || !r.item_id || !r.signed) continue;
                  next[String(r.item_id)] = { signed_at: r.signed_at || "" };
                }
                __portalPolicyRemoteSigned = next;
                if (mainHome) refreshIndexStats(mainHome);
              } catch (eIn) {}
            })
            .catch(function () {});
        } catch (eMr) {}
      }

      function loadPolicyAckMap() {
        try {
          var raw = localStorage.getItem(PORTAL_POLICY_ACK_STORAGE_KEY);
          if (!raw) return {};
          var o = JSON.parse(raw);
          return o && typeof o === "object" ? o : {};
        } catch (e) {
          return {};
        }
      }

      function savePolicyAckMap(map) {
        try {

      function portalPolicyHumanizeAppRole(raw) {
        var key = String(raw || "").trim().toLowerCase();
        if (!key) return "";
        var map = {
          staff: "Staff",
          lead: "Lead",
          admin: "Admin",
          ceo: "CEO",
          support: "Support",
          manager: "Manager"
        };
        if (map[key]) return map[key];
        return String(raw || "")
          .trim()
          .replace(/_/g, " ")
          .replace(/\b\w/g, function (ch) {
            return ch.toUpperCase();
          });
      }

      function getPortalPolicySignerMeta() {
        var name = "";
        var role = "";
        try {
          var u = new URL(window.location.href.split("#")[0]);
          name = String(u.searchParams.get("portalSignerName") || u.searchParams.get("signerName") || "").trim();
          role = String(u.searchParams.get("portalSignerRole") || u.searchParams.get("signerRole") || "").trim();
        } catch (e) {}
        if (!name && typeof window !== "undefined" && window.PORTAL_POLICY_SIGNER_NAME) {
          name = String(window.PORTAL_POLICY_SIGNER_NAME).trim();
        }
        if (!role && typeof window !== "undefined" && window.PORTAL_POLICY_SIGNER_ROLE) {
          role = String(window.PORTAL_POLICY_SIGNER_ROLE).trim();

              String(md.full_name || md.name || md.preferred_username || (user.email ? user.email.split("@")[0] : "") || "").trim();
            if (local) name = local;

          var dd = typeof window !== "undefined" && window.dashboardData;
          if (dd) {
            if (!name) name = String(dd.staffName || "").trim();

      function persistPolicyAck(policyId, policy, dateSigned, signaturePngDataUrl) {

          signaturePng: signaturePngDataUrl,
          signerName: sig.name || "",

        portalPolicyComplianceUpsertSigned(policyId);

      function escAckHtml(s) {
        return String(s || "")

      function policyCanvasHasInk(ctx, canvas) {
        try {
          var w = canvas.width;
          var h = canvas.height;
          var img = ctx.getImageData(0, 0, w, h).data;
          for (var p = 0; p < img.length; p += 16) {
            var a = img[p + 3];
            if (a < 40) continue;
            var r = img[p];
            var g = img[p + 1];
            var b = img[p + 2];
            if (r < 245 || g < 245 || b < 245) return true;
          }
        } catch (e) {}
        return false;
      }

      function submitStaffPolicyAck(policyId, policy, canvas, dateEl, btnSubmit) {
        var ctx = canvas.getContext("2d");
        if (!ctx) return;
        if (!dateEl || !String(dateEl.value || "").trim()) {
          alert("Please set the date signed.");
          return;
        }
        if (!policyCanvasHasInk(ctx, canvas)) {
          alert("Please sign in the box before submitting.");
          return;
        }
        btnSubmit.disabled = true;
        try {
          var sigPng = canvas.toDataURL("image/png");
          persistPolicyAck(policyId, policy, dateEl.value, sigPng);
          alert(
            "Completed. Saved on this device only. You can open this policy again anytime to read it; signing and submit stay locked. Your signed records appear in the list at the bottom of this page."
          );
          closeOverlay();
        } catch (err) {
          var msg = err && err.message ? String(err.message) : "Unknown error";
          console.error("[policies_portal] submit", err);
          alert("Could not save. " + msg);
        } finally {
          btnSubmit.disabled = false;
        }

      function addOneYear(iso) {
        if (!iso || String(iso).length < 8) {
          var t = new Date();
          t.setFullYear(t.getFullYear() + 1);
          return isoDate(t);
        }
        var y = parseInt(String(iso).slice(0, 4), 10);
        var mm = parseInt(String(iso).slice(5, 7), 10) - 1;
        var dd = parseInt(String(iso).slice(8, 10), 10);
        var d = new Date(y, mm, dd);
        if (isNaN(d.getTime())) {
          var t2 = new Date();
          t2.setFullYear(t2.getFullYear() + 1);
          return isoDate(t2);
        }
        d.setFullYear(d.getFullYear() + 1);
        return isoDate(d);
      }

      function suggestMinorBump(ver) {

        if (!nr) return fallback;

        });
        if (!ids.length) {

          "<table class=\"pc-ack-log-tbl\" role=\"grid\" aria-label=\"Signed policies\"><thead><tr><th>Policy</th><th>Version</th><th>Date signed</th><th>Signer</th><th>Role</th><th>Saved</th></tr></thead><tbody>";

          .map(function (id) {

            var sn = escAckHtml(r.signerName || "—");
            var sr = escAckHtml(r.signerRole || "—");
            var at = r.signedAt ? formatDispDate(String(r.signedAt).slice(0, 10)) + " " + String(r.signedAt).slice(11, 16) : "—";

              "<tr><td data-label=\"Policy\"><strong>" +

              escAckHtml(id) +
              "</div></td><td data-label=\"Version\">" +
              ver +
              "</td><td data-label=\"Date signed\">" +
              ds +
              "</td><td data-label=\"Signer\">" +
              sn +
              "</td><td data-label=\"Role\">" +
              sr +
              "</td><td class=\"muted\" style=\"font-size:13px\" data-label=\"Saved\">" +
              escAckHtml(at) +
              "</td></tr>"
            );
          })
          .join("");

      function refreshIndexStats(root) {
        var reviewMs = getEarliestPolicyReviewMs();
        var review = new Date(reviewMs);
        var now = new Date();
        var d = Math.ceil((review - now) / 86400000);

      function mountPolicyInOverlay(policyId) {
        var p = getPolicyById(policyId);
        var tpl = getPolicyEmbedTemplate(policyId);
        if (!p || !tpl || !tpl.content) {
          alert("Policy content not found for " + policyId + ". Re-run embed_policies_into_dashboard.py");
          return;
        }
        openPolicyId = policyId;
        var eff = mergeEffective(p);
        fillAdminForm(p, eff);
        setPolicyBodyEditing(false);
        overlayBody.innerHTML = "";
        var draftHtml = isAdminMode() ? loadPolicyBodyDraft(policyId) : null;
        if (draftHtml) {
          overlayBody.innerHTML = draftHtml;
        } else {
          overlayBody.appendChild(tpl.content.cloneNode(true));
        }
        stripAdminAcknowledgementBlocks();
        hydratePolicyMetaLastReviewed(overlayBody, eff);
        hydratePolicyMetaEffectiveFrom(overlayBody, eff);
        injectStaffAcknowledgmentBlock(policyId);
        if (!isAdminMode() && policyId !== "POL-000" && isPolicyAcked(policyId)) {
          applyReadOnlyAckedOverlay(policyId);
        } else {
          (function initStaffPolicySignIfPresent() {
            if (policyId === "POL-000") return;
            var canvas = overlayBody.querySelector("#hs-staff-sign-canvas");
            var dateEl = overlayBody.querySelector("#hs-staff-sign-date");
            var btnClear = overlayBody.querySelector("#hs-staff-sign-clear");
            if (!canvas || !canvas.getContext || !dateEl || !btnClear) return;
            var ctx = canvas.getContext("2d");
            if (!ctx) return;
            function pad2(n) {
              return (n < 10 ? "0" : "") + n;
            }
            function todayIso() {
              var d = new Date();
              return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
            }
            if (!dateEl.value) dateEl.value = todayIso();
            function fillWhite() {
              ctx.fillStyle = "#ffffff";
              ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            fillWhite();
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.strokeStyle = "#1f2937";
            ctx.lineWidth = 2.5;
            var drawing = false;
            function posFromEvent(e) {
              var r = canvas.getBoundingClientRect();
              var sx = canvas.width / r.width;
              var sy = canvas.height / r.height;
              return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
            }
            canvas.addEventListener("pointerdown", function (e) {
              if (e.pointerType === "mouse" && e.buttons !== 1) return;
              drawing = true;
              try {
                canvas.setPointerCapture(e.pointerId);
              } catch (ex2) {}
              var p = posFromEvent(e);
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
            });
            canvas.addEventListener("pointermove", function (e) {
              if (!drawing) return;
              var p = posFromEvent(e);
              ctx.lineTo(p.x, p.y);
              ctx.stroke();
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
            });
            function endStroke(e) {
              if (!drawing) return;
              drawing = false;
              try {
                canvas.releasePointerCapture(e.pointerId);
              } catch (ex3) {}
            }
            canvas.addEventListener("pointerup", endStroke);
            canvas.addEventListener("pointercancel", endStroke);
            canvas.addEventListener("pointerleave", function (e) {
              if (e.buttons === 0) drawing = false;
            });
            btnClear.addEventListener("click", function () {
              fillWhite();
            });
            var btnSubmit = overlayBody.querySelector("#hs-staff-sign-submit");
            if (btnSubmit) {
              btnSubmit.addEventListener("click", function () {
                submitStaffPolicyAck(policyId, p, canvas, dateEl, btnSubmit);
              });
            }
          })();
        }
        overlay.classList.add("is-open");
        overlay.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
        try {
          overlay.scrollTop = 0;
          overlayBody.scrollTop = 0;
        } catch (errScroll) {}
        try {
          var closeBtn = document.getElementById("pcBtnClose");
          if (isAdminMode()) {
            setAdminAccordionOpen("pcAccAnnual");
            requestAnimationFrame(function () {
              if (overlay) overlay.scrollTop = 0;
            });
          } else if (closeBtn) closeBtn.focus();
        } catch (err) {}
      }

        if (!newV) {
          if (pcSaveMetaStatus) pcSaveMetaStatus.textContent = "Enter the new version.";
          if (nvEl) nvEl.focus();
          return;
        }
        if (!sum) {
          if (pcSaveMetaStatus) pcSaveMetaStatus.textContent = "Enter a summary of changes.";
          if (sumEl) sumEl.focus();
          return;
        }
        var p = getPolicyById(openPolicyId);
        var eff = mergeEffective(p);
        var prevV = (pcAdmVersion && pcAdmVersion.value.trim()) || eff.version || "";
        if (newV === prevV) {
          if (pcSaveMetaStatus) pcSaveMetaStatus.textContent = "New version must differ from the current version.";
          return;
        }
        var nextY =
          nrEl && nrEl.value.trim()
            ? nrEl.value.trim()
            : addOneYear((pcAdmNext && pcAdmNext.value.trim()) || eff.nextReview || isoDate(new Date()));
        var today = isoDate(new Date());
        var reviewer = byEl && byEl.value.trim() ? byEl.value.trim() : DEFAULT_REVIEWER;
        var adv = collectAdvancedForEvent();
        var entry = {
          schema: 3,
          recordedAt: new Date().toISOString(),
          policyId: openPolicyId,
          reviewDate: today,
          reviewedBy: reviewer,
          reviewerRole: adv.role,
          quickMode: "major",
          previousVersion: prevV,
          newVersion: newV,
          summary: sum,
          nextReviewDate: nextY,
          governanceNotes: adv.govNotes,
          changeType: adv.changeType || "material"
        };
        appendReviewEventV3(entry);
        var map = loadMetaOverrides();
        var prev = map[openPolicyId] || {};
        map[openPolicyId] = Object.assign({}, prev, {
          version: newV,
          nextReview: nextY,
          lastReviewedAt: today,
          lastReviewedBy: reviewer,
          notes: pcAdmNotes ? pcAdmNotes.value.trim() : prev.notes || "",
          updatedAt: new Date().toISOString().slice(0, 19)
        });
        saveMetaOverrides(map);
        if (pcAdmVersion) pcAdmVersion.value = newV;
        if (pcAdmNext) pcAdmNext.value = nextY;
        var elEff = document.getElementById("pcAdmEffectiveFrom");
        if (elEff) elEff.value = today;
        setQuickPanelsClosed();
        setAdminAccordionOpen("pcAccHistory");
        if (pcSaveMetaStatus) pcSaveMetaStatus.textContent = "Major revision logged and version updated.";
        fillAdminForm(p, mergeEffective(p));
        focusPanelInView(document.getElementById("pcReviewHistoryCards"));
      }

      function exportFullReviewLog() {
        var events = loadReviewEvents().slice();
        events.sort(function (a, b) {
          return String(a.recordedAt || "").localeCompare(String(b.recordedAt || ""));
        });
        var payload = {
          schemaVersion: 3,
          exportedAt: new Date().toISOString(),
          organisation: "clubSENsational",
          reviewEvents: events
        };
        var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "clubsensational-policy-review-history.json";
        a.rel = "noopener";
        document.body.appendChild(a);
        a.click();
        setTimeout(function () {
          URL.revokeObjectURL(a.href);
          a.remove();
        }, 500);
        if (pcSaveMetaStatus) pcSaveMetaStatus.textContent = "Review history export started.";
      }

      (function initModeFromUrl() {
        if (!rootDash) return;
        rootDash.classList.remove("mode-admin", "mode-staff");
        rootDash.classList.add("mode-staff");
      })();

      applyModeBar();
      mountHomePortal();
      try {
        window.addEventListener("portal:supabase-ready", function __portalPolSupReady() {
          try {
            portalPoliciesMergeRemoteComplianceAcks();
          } catch (ePs) {}
        });
      } catch (ePe) {}
      setTimeout(function () {
        try {
          portalPoliciesMergeRemoteComplianceAcks();
        } catch (ePz) {}
      }, 0);

      document.getElementById("cs-pc-dashboard").addEventListener("click", function (e) {
        var link = e.target.closest("a.btn[data-pc-policy]");
        if (link) {
          e.preventDefault();
          var pid = link.getAttribute("data-pc-policy");
          if (pid) mountPolicyInOverlay(pid);
          return;
        }
        if (e.target.getAttribute("data-pc-close") === "1" || e.target.closest("[data-pc-close='1']")) {
          if (e.target.closest("#pcPolicyOverlay")) closeOverlay();
        }
      });

      var pcBtnApprove = document.getElementById("pcQuickApprove");
      if (pcBtnApprove) {
        pcBtnApprove.addEventListener("click", function (e) {
          e.stopPropagation();
          toggleQuickNoChangePanel();
        });
      }
      var pcBtnConfirmNoChange = document.getElementById("pcBtnConfirmNoChange");
      if (pcBtnConfirmNoChange) {
        pcBtnConfirmNoChange.addEventListener("click", function (e) {
          e.stopPropagation();
          quickApproveNoChange();
        });
      }
      var pcBtnMinor = document.getElementById("pcQuickMinor");
      if (pcBtnMinor) {
        pcBtnMinor.addEventListener("click", function (e) {
          e.stopPropagation();
          toggleQuickMinorPanel();
        });
      }
      var pcBtnMajor = document.getElementById("pcQuickMajor");
      if (pcBtnMajor) {
        pcBtnMajor.addEventListener("click", function (e) {
          e.stopPropagation();
          toggleQuickMajorPanel();
        });
      }
      var pcBtnSaveMinor = document.getElementById("pcBtnSaveMinorReview");
      if (pcBtnSaveMinor) {
        pcBtnSaveMinor.addEventListener("click", function (e) {
          e.stopPropagation();
          saveMinorReview();
        });
      }
      var pcBtnPublishMajor = document.getElementById("pcBtnPublishMajor");
      if (pcBtnPublishMajor) {
        pcBtnPublishMajor.addEventListener("click", function (e) {
          e.stopPropagation();
          saveMajorReview();
        });
      }

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && overlay.classList.contains("is-open")) closeOverlay();
      });
    })();
  </script>
  <script>
    (function () {
      var isElementorPreview =
        window.location.search.indexOf("elementor-preview=") !== -1 ||
        window.location.search.indexOf("preview=true") !== -1 ||
        document.documentElement.classList.contains("elementor-editor-active");
      if (isElementorPreview) return;

      var portalJsVer = "20260506-portal-interactions";
      var authUrl =
        "ELEMENTOR/MEDIOS/auth-handler.js?v=" +
        portalJsVer;

      var s = document.createElement("script");
      s.type = "module";
      s.textContent =
        'import { bootstrapDashboardSupabase } from "' +
        authUrl.replace(/\\/g, "\\\\").replace(/"/g, '\\"') +
        "\";\n" +
        'try { await bootstrapDashboardSupabase({ page: "staff" }); } catch (e) { console.warn("[policies_portal] auth bootstrap", e); }\n' +
        'try { window.dispatchEvent(new Event("portal:supabase-ready")); } catch (e2) {}\n';
      document.body.appendChild(s);
    })();
  </script>
