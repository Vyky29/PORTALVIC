<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>My Documents</title>
  <script>
    (function () { try { document.documentElement.classList.add("portal-app-shell"); } catch (_) {} })();
  </script>
  <style id="portal-hide-wp-chrome">
    html.portal-app-shell body.admin-bar{padding-top:0!important;margin-top:0!important}
    html.portal-app-shell #wpadminbar,html.portal-app-shell #masthead,html.portal-app-shell header#masthead,html.portal-app-shell .site-header,html.portal-app-shell #site-header,html.portal-app-shell .ast-primary-header-bar,html.portal-app-shell .ast-above-header,html.portal-app-shell .elementor-location-header,html.portal-app-shell .elementor-location-footer,html.portal-app-shell #colophon,html.portal-app-shell footer.site-footer,html.portal-app-shell .site-footer,html.portal-app-shell #footer,html.portal-app-shell .site-bottom-footer-inner-wrap,html.portal-app-shell .footer-widget-area{display:none!important;visibility:hidden!important;height:0!important;overflow:hidden!important;pointer-events:none!important}
    html.portal-app-shell .site-content,html.portal-app-shell #content,html.portal-app-shell .site-main,html.portal-app-shell #primary{margin-top:0!important;padding-top:0!important}
    html.portal-app-shell #page,html.portal-app-shell .site{margin-top:0!important;padding-top:0!important}
    body{font-family:Open Sans,Arial,sans-serif;background:#fff;color:#102238}
    .page{max-width:980px;margin:0 auto;padding:14px}
    .card{border:1px solid #e6ecf4;border-radius:14px;box-shadow:0 8px 24px rgba(17,24,39,.06);background:#fff}
    .head{padding:14px 16px;border-bottom:1px solid #e6ecf4}
    .head-back{
      display:inline-flex;align-items:center;gap:6px;margin:0 0 10px;padding:0;
      border:0;background:none;color:#2d84b3;font-size:14px;font-weight:700;cursor:pointer;font:inherit;text-decoration:none;
    }
    .head-back:hover,.head-back:focus-visible{text-decoration:underline}
    .head h1{margin:0;color:#0b2a5b;font-size:22px}
    .head-intro{margin:8px 0 0;font-size:13px;line-height:1.45;color:#62758a;max-width:40rem;overflow-wrap:break-word}
    .group{padding:14px 16px}
    .group h2{margin:0 0 8px;font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:#62758a}
    .row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border:1px solid #e6ecf4;border-radius:12px;padding:10px;margin-bottom:8px}
    .row-main{display:flex;gap:10px;align-items:flex-start;min-width:0}
    .row-text{min-width:0;flex:1}
    .doc-icon{
      display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:10px;flex-shrink:0;
      border:1px solid rgba(17,42,91,.12);
    }
    .doc-icon svg{display:block;width:22px;height:22px}
    .doc-icon--timesheet{background:#e8f1fb;color:#114f78;border-color:rgba(17,79,120,.2)}
    .doc-icon--expense{background:#fff7ed;color:#c2410c;border-color:rgba(194,65,12,.18)}
    .doc-icon--report{background:#ecfdf5;color:#047857;border-color:rgba(4,120,87,.2)}
    .doc-icon--training{background:#f5f3ff;color:#5b21b6;border-color:rgba(91,33,182,.18)}
    .doc-icon--payslip{background:#fff7ed;color:#c2410c;border-color:rgba(194,65,12,.18)}
    .doc-icon--file{background:#f4f7fb;color:#475569;border-color:rgba(71,85,105,.15)}
    .title{font-weight:700;color:#102238}
    .meta{font-size:12px;color:#62758a}
    .docs-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:stretch;justify-content:flex-end;min-width:0;max-width:100%}
    .btn-label-mob{display:none}
    .btn{border:0;border-radius:10px;padding:9px 12px;font-weight:700;cursor:pointer;font:inherit}
    /* Mismo criterio que timesheet Submit / Back (tema tiñe <button> en rosa) */
    .btn-outline{
      background:#e4edf8!important;
      background-color:#e4edf8!important;
      background-image:none!important;
      color:#0b2a5b!important;
      border:1px solid #b0c7e2!important;
      min-width:0;
    }
    .btn-outline:hover,.btn-outline:focus-visible{
      background:#0b2a5b!important;
      background-color:#0b2a5b!important;
      color:#fff!important;
      border-color:#0b2a5b!important;
    }
    .btn-outline:focus-visible{outline:2px solid rgba(11,42,91,.35);outline-offset:2px}
    .docs-actions .btn-outline{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }
    .empty{padding:16px;color:#62758a}
    *,*::before,*::after{box-sizing:border-box}
    html,body{overflow-x:hidden}
    .page{min-width:0;max-width:100%;padding-bottom:max(14px, env(safe-area-inset-bottom, 0px))}
    .card{min-width:0;max-width:100%}
    .row{min-width:0}
    .minw0{min-width:0}
    .title,.meta{min-width:0;overflow-wrap:break-word}
    .btn{min-height:44px;touch-action:manipulation}
    .doc-download-toast{
      display:none;
      margin:10px 16px 0;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(11,42,91,.14);
      background:#f0f7fc;
      color:#0b2a5b;
      font-size:13px;
      line-height:1.35;
      box-sizing:border-box;
      max-width:100%;
      min-width:0;
      overflow-wrap:break-word;
    }
    .doc-download-toast.is-visible{display:block}
    .doc-download-toast strong{display:block;font-size:13px;font-weight:700;margin:0 0 2px}
    .doc-download-toast-sub{display:block;font-size:12px;font-weight:600;color:#62758a;margin:0 0 4px}
    .doc-download-toast-hint{display:block;font-size:12px;color:#62758a;font-weight:400}
    .btn-label-mob .btn-mob-row2{font-size:11px;font-weight:700;opacity:0.95;min-height:1.2em;line-height:1.2}
    .doc-viewer-sheet{
      position:fixed;inset:0;z-index:1200;display:flex;align-items:stretch;justify-content:center;
      padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
    }
    .doc-viewer-sheet[hidden]{display:none!important}
    .doc-viewer-backdrop{position:absolute;inset:0;background:rgba(11,42,91,.45)}
    .doc-viewer-panel{
      position:relative;z-index:1;display:flex;flex-direction:column;width:min(980px,100%);max-height:100%;
      margin:auto;background:#fff;border-radius:14px 14px 0 0;box-shadow:0 12px 40px rgba(17,24,39,.18);
      min-width:0;overflow:hidden;
    }
    @media (min-width:561px){
      .doc-viewer-sheet{align-items:center;padding:16px}
      .doc-viewer-panel{border-radius:14px;max-height:calc(100vh - 32px)}
    }
    .doc-viewer-head{
      display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;
      border-bottom:1px solid #e6ecf4;min-width:0;
    }
    .doc-viewer-head h2{margin:0;font-size:17px;color:#0b2a5b;min-width:0;overflow-wrap:break-word}
    .doc-viewer-close{
      flex-shrink:0;border:0;background:#e4edf8;color:#0b2a5b;border-radius:10px;
      width:40px;height:40px;font-size:22px;line-height:1;cursor:pointer;font-weight:700;
    }
    .doc-viewer-body{flex:1;min-height:0;background:#f4f7fb;padding:10px;overflow:hidden}
    .doc-viewer-frame{
      display:block;width:100%;height:min(72vh,640px);min-height:280px;border:1px solid #e6ecf4;
      border-radius:10px;background:#fff;
    }
    .doc-viewer-html{
      display:block;width:100%;max-width:100%;height:min(72vh,640px);min-height:280px;
      border:1px solid #e6ecf4;border-radius:10px;background:#fff;
      overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;box-sizing:border-box;
    }
    .doc-viewer-html .contract-document{
      width:100%;max-width:100%;box-sizing:border-box;overflow-wrap:break-word;word-wrap:break-word;
    }
    .doc-viewer-html .contract-document *{min-width:0;max-width:100%;box-sizing:border-box}
    .doc-viewer-html .contract-parties p,
    .doc-viewer-html .contract-section p{overflow-wrap:break-word;word-wrap:break-word;white-space:pre-wrap}
    .doc-viewer-html .contract-letterhead{padding:1rem 1rem .85rem}
    .doc-viewer-html .contract-body{padding:1rem 1rem .85rem}
    .doc-viewer-foot{
      display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;padding:12px 14px;border-top:1px solid #e6ecf4;
    }
    .doc-viewer-foot .btn{min-width:0}
    @media (max-width:560px){
      .doc-viewer-panel{border-radius:0;max-height:100%;height:100%}
      .doc-viewer-frame{height:calc(100vh - 200px);min-height:200px}
      .doc-viewer-html{height:calc(100vh - 200px);min-height:200px}
      .doc-viewer-foot .btn{flex:1}
      .doc-download-toast{margin:8px 12px 0}
      .page{padding:10px}
      .head h1{font-size:19px}
      .group{padding:12px 14px}
      .row{grid-template-columns:1fr;gap:12px;padding:12px}
      .docs-actions{width:100%;justify-content:stretch;min-width:0}
      .docs-actions .btn-outline{
        flex:1;
        min-width:0;
        max-width:100%;
        white-space:normal;
        overflow:hidden;
        text-overflow:clip;
        padding:9px 8px;
        line-height:1.15;
      }
      .btn-label-desk{display:none}
      .btn-label-mob{
        display:inline-flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:2px;
        min-width:0;
        max-width:100%;
        text-align:center;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <article class="card">
      <header class="head">
        <a class="head-back" id="docsBackLink" href="staff_dashboard.html">← Back to dashboard</a>
        <h1 id="docsPageTitle">My Documents</h1>
        <p class="head-intro" id="docsPageIntro" hidden></p>
      </header>
      <div id="docDownloadToast" class="doc-download-toast" role="status" aria-live="polite" aria-atomic="true">
        <strong>Download</strong>
        <span class="doc-download-toast-sub">In progress</span>
        <span class="doc-download-toast-hint">Your PDF may take a moment. You can stay on this page.</span>
      </div>
      <section id="docsRoot"></section>
    </article>
  </main>

  <div id="docViewerSheet" class="doc-viewer-sheet" hidden aria-hidden="true">
    <div class="doc-viewer-backdrop" data-doc-viewer-close tabindex="-1"></div>
    <div class="doc-viewer-panel" role="dialog" aria-modal="true" aria-labelledby="docViewerTitle">
      <header class="doc-viewer-head">
        <h2 id="docViewerTitle">Document</h2>
        <button type="button" class="doc-viewer-close" data-doc-viewer-close aria-label="Close">×</button>
      </header>
      <div class="doc-viewer-body">
        <iframe id="docViewerFrame" class="doc-viewer-frame" title="Document preview"></iframe>
        <div id="docViewerHtml" class="doc-viewer-html" hidden></div>
      </div>
      <footer class="doc-viewer-foot">
        <button type="button" class="btn btn-outline" id="docViewerDownloadBtn">Download PDF</button>
        <button type="button" class="btn btn-outline" data-doc-viewer-close>Close</button>
      </footer>
    </div>
  </div>

  <link rel="stylesheet" href="/portal/portal_ghost_view.css?v=20260624-ghost-handoff" />
  <link rel="stylesheet" href="/portal/contract-preview.css?v=20260630-contract-html-view" />
  <script src="/portal/portal-ghost-view.js?v=20260624-ghost-handoff"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js?v=20260612-induction-view"></script>
  <script src="/portal/portal_induction.js?v=20260612-induction-view"></script>
  <script src="/portal/portal_induction_certificate.js?v=20260612-induction-view"></script>
  <script type="module">
    async function portalImportAuthModule() {
      const v = "20260612-induction-view";
      const bases = ["portal", "/portal"];
      for (const base of bases) {
        const url = `${base}/auth-handler.js?v=${v}`;
        try {
          return await import(url);
        } catch (e) {
          console.warn("[my_documents] auth import", url, e);
        }
      }
      return null;
    }

    async function portalImportDocumentsModule(tag) {
      const v = "20260624-ghost-handoff";
      const custom =
        typeof window !== "undefined" && window.PORTAL_WP_UPLOADS_BASE
          ? String(window.PORTAL_WP_UPLOADS_BASE).trim().replace(/\/$/, "")
          : "";
      const bases = [
        custom,
        typeof location !== "undefined" && location.href
          ? String(new URL("portal/", location.href).href).replace(/\/$/, "")
          : "",
        "portal",
      ].filter(Boolean);
      const uniq = [...new Set(bases)];
      for (const base of uniq) {
        const url = `${base}/portal_documents.js?v=${v}`;
        try {
          return await import(url);
        } catch (e) {
          console.warn("[portal]", tag, "import failed", url, e);
        }
      }
      throw new Error(
        "Could not load portal_documents.js. Add working_ui/portal/portal_documents.js to the deploy (same origin as this page). Optional later: window.PORTAL_WP_UPLOADS_BASE if you mirror files elsewhere."
      );
    }
    const { portalListMyDocuments, portalCreateDocumentSignedUrl, portalHideMyDocumentFromList } =
      await portalImportDocumentsModule("my_documents");

    const GROUPS = [
      {
        key: "documents",
        label: "Documents",
        intro: "Signed employment contracts and other HR documents from the portal."
      },
      {
        key: "finance",
        label: "Finance",
        intro: "Timesheet and expense PDFs."
      },
      {
        key: "reports",
        label: "Reports",
        intro: "Review reports you complete in the app (for example swimming term reviews)."
      },
      {
        key: "training",
        label: "Training",
        intro: "Certificates and records from internal training, safeguarding, and other completed modules."
      },
      {
        key: "payslips",
        label: "Payslips",
        intro: "Monthly payslip PDFs uploaded by payroll. View and download your payslips here."
      }
    ];

    function parseCategoryFilter() {
      try {
        const c = String(new URLSearchParams(location.search).get("category") || "")
          .trim()
          .toLowerCase();
        if (c === "documents" || c === "finance" || c === "reports" || c === "training" || c === "payslips") return c;
      } catch (_) {}
      return "";
    }

    function parseDashboardReturn() {
      try {
        const from = String(new URLSearchParams(location.search).get("from") || "")
          .trim()
          .toLowerCase();
        if (from === "lead") return "staff_dashboard.html";
        if (from === "office") return "office_portal.html";
      } catch (_) {}
      return "staff_dashboard.html";
    }

    function applyPageChrome() {
      const cat = parseCategoryFilter();
      const group = GROUPS.find((g) => g.key === cat);
      const back = document.getElementById("docsBackLink");
      const title = document.getElementById("docsPageTitle");
      const intro = document.getElementById("docsPageIntro");
      if (back) back.setAttribute("href", parseDashboardReturn());
      if (group && title) {
        document.title = group.label + " · My documents";
        title.textContent = group.label;
        if (intro) {
          intro.textContent = group.intro;
          intro.hidden = false;
        }
      } else if (title) {
        document.title = "My Documents";
        title.textContent = "My Documents";
        if (intro) intro.hidden = true;
      }
    }

    function esc(value) {
      return String(value || "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    }

    function prettyDate(iso) {
      if (!iso) return "-";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "-";
      return d.toLocaleDateString("en-GB");
    }
    function prettyDateTime(iso) {
      if (!iso) return "-";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "-";
      const day = d.toLocaleDateString("en-GB");
      const time = d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", hour12: false });
      return `${day} - ${time}`;
    }

    function workerFirstNameFromProfile(profile) {
      const name = String(
        (profile && (profile.full_name || profile.username)) || ""
      ).trim();
      if (!name) return "Your";
      const parts = name.split(/\s+/);
      return parts[0] || name;
    }

    function documentMonthKey(doc) {
      const base = doc && (doc.related_date || doc.created_at);
      if (!base) return "";
      const d = new Date(base);
      if (Number.isNaN(d.getTime())) return "";
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    }

    function documentMonthLabel(doc) {
      const base = doc && (doc.related_date || doc.created_at);
      if (!base) return "";
      const d = new Date(base);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleDateString("en-GB", { month: "long" });
    }

    function enrichWorkerFacingTitles(docs, staffProfile) {
      const firstName = workerFirstNameFromProfile(staffProfile);
      const list = Array.isArray(docs) ? docs.slice() : [];
      ["expense", "payslip"].forEach((type) => {
        const label = type === "expense" ? "Expenses" : "Payslip";
        const subset = list.filter(
          (d) => String((d && d.document_type) || "").toLowerCase() === type
        );
        const byMonth = {};
        subset.forEach((doc) => {
          const key = documentMonthKey(doc);
          if (!byMonth[key]) byMonth[key] = [];
          byMonth[key].push(doc);
        });
        Object.keys(byMonth).forEach((key) => {
          const arr = byMonth[key].sort(
            (a, b) => new Date(a.created_at || 0) - new Date(b.created_at || 0)
          );
          arr.forEach((doc, index) => {
            const month = documentMonthLabel(doc) || "Month";
            if (arr.length > 1) {
              doc._workerDisplayTitle = `${firstName}'s ${label} (${month} ${index + 1})`;
            } else {
              doc._workerDisplayTitle = `${firstName}'s ${label} (${month})`;
            }
          });
        });
      });
      return list;
    }

    function displayTitle(doc) {
      if (doc && doc._workerDisplayTitle) return doc._workerDisplayTitle;
      const type = String((doc && doc.document_type) || "").toLowerCase();
      if (type === "timesheet") {
        const base = doc.related_date || doc.created_at;
        const d = base ? new Date(base) : null;
        if (d && !Number.isNaN(d.getTime())) {
          const month = d.toLocaleDateString("en-GB", { month: "long" });
          return `${month}'s Timesheet`;
        }
        return "Timesheet";
      }
      if (type === "expense") {
        const t = String((doc && doc.title) || "").trim();
        if (t) return t;
        const base = doc.related_date || doc.created_at;
        const d = base ? new Date(base) : null;
        if (d && !Number.isNaN(d.getTime())) {
          const month = d.toLocaleDateString("en-GB", { month: "long" });
          return `${month}'s Expenses`;
        }
        return "Expenses";
      }
      if (type === "staff_policy_ack") {
        const t = String((doc && doc.title) || "").trim();
        if (t) return t.replace(/^Signed:\s*/i, "").trim() || t;
        return "Policy acknowledgment";
      }
      if (type === "payslip") {
        const t = String((doc && doc.title) || "").trim();
        if (t) return t;
        const base = doc.related_date || doc.created_at;
        const d = base ? new Date(base) : null;
        if (d && !Number.isNaN(d.getTime())) {
          const month = d.toLocaleDateString("en-GB", { month: "long", year: "numeric" });
          return month + " Payslip";
        }
        return "Payslip";
      }
      if (type === "induction_certificate") {
        return "clubSENsational General Induction Certificate";
      }
      if (type === "employment_contract") {
        const t = String((doc && doc.title) || "").trim();
        return t || "Employment contract";
      }
      return String((doc && doc.title) || "Document");
    }
    function displayMeta(doc) {
      const type = String((doc && doc.document_type) || "").toLowerCase();
      if (
        type === "timesheet" ||
        type === "expense" ||
        type === "swim_term_review" ||
        type === "staff_policy_ack" ||
        type === "payslip" ||
        type === "induction_certificate"
      ) {
        return prettyDateTime(doc.created_at);
      }
      return `${String(doc.document_type || "").toLowerCase()} • ${prettyDate(doc.related_date || doc.created_at)}`;
    }

    function docIconKind(doc) {
      const t = String((doc && doc.document_type) || "").toLowerCase();
      if (t === "timesheet") return "timesheet";
      if (t === "expense") return "expense";
      if (t === "staff_policy_ack") return "training";
      if (t === "payslip") return "payslip";
      if (t === "employment_contract") return "file";
      if (t === "swim_term_review") return "report";
      if (t.includes("report")) return "report";
      if (t === "induction_certificate" || t.includes("train") || t.includes("induction") || t.includes("safeguard"))
        return "training";
      const c = String((doc && doc.category) || "").toLowerCase();
      if (c === "reports") return "report";
      if (c === "training") return "training";
      if (c === "payslips") return "payslip";
      return "file";
    }

    const DOC_ICON_LABEL = {
      timesheet: "Timesheet",
      expense: "Expenses",
      report: "Report",
      training: "Training",
      payslip: "Payslip",
      file: "Document"
    };

    function docIconBlock(kind) {
      const k = DOC_ICON_LABEL[kind] ? kind : "file";
      const label = DOC_ICON_LABEL[k] || "Document";
      const svgs = {
        timesheet:
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
        expense:

    function sanitizeDownloadBasename(name) {
      let s = String(name || "document")
        .replace(/[<>:"/\\|?*]+/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .slice(0, 80);
      if (!s) s = "document";
      if (/\.pdf$/i.test(s)) s = s.slice(0, -4);
      return s || "document";
    }

    function fetchPdfBlobViaXHR(url, onProgress) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        xhr.responseType = "blob";
        xhr.withCredentials = false;
        xhr.onprogress = (e) => {
          if (typeof onProgress !== "function") return;
          if (e.lengthComputable && e.total > 0) {
            onProgress(Math.min(99, Math.round((100 * e.loaded) / e.total)));
          } else {
            onProgress(-1);
          }
        };
        xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) resolve(xhr.response);
          else reject(new Error(String(xhr.status)));
        };
        xhr.onerror = () => reject(new Error("Network error"));
        xhr.send();
      });
    }

    let docViewerCleanup = null;
    let docViewerDownloadHandler = null;

    function closeDocumentViewer() {
      const sheet = document.getElementById("docViewerSheet");
      const frame = document.getElementById("docViewerFrame");
      const htmlHost = document.getElementById("docViewerHtml");
      if (frame) frame.removeAttribute("src");
      if (htmlHost) {
        htmlHost.innerHTML = "";
        htmlHost.hidden = true;
        htmlHost.scrollTop = 0;
      }
      if (typeof docViewerCleanup === "function") {
        try {
          docViewerCleanup();
        } catch (_e) {}
      }
      docViewerCleanup = null;
      docViewerDownloadHandler = null;
      if (sheet) {
        sheet.hidden = true;
        sheet.setAttribute("aria-hidden", "true");
      }
      document.body.style.overflow = "";
    }

    /**
     * Show a document in the modal. When `src` is `{ html }` the contract is
     * rendered as responsive, vertically-scrollable HTML (fits the screen, no
     * horizontal cut-off); otherwise `src` is an iframe URL (PDF preview).
     */
    function openDocumentViewer(title, src, onDownload) {
      const sheet = document.getElementById("docViewerSheet");
      const titleEl = document.getElementById("docViewerTitle");
      const frame = document.getElementById("docViewerFrame");
      const htmlHost = document.getElementById("docViewerHtml");
      const dlBtn = document.getElementById("docViewerDownloadBtn");
      if (!sheet || !frame) return;
      if (titleEl) titleEl.textContent = String(title || "Document").trim() || "Document";
      const htmlMode = src && typeof src === "object" && typeof src.html === "string";
      if (htmlMode) {
        frame.removeAttribute("src");
        frame.hidden = true;
        if (htmlHost) {
          htmlHost.innerHTML = src.html;
          htmlHost.hidden = false;
          htmlHost.scrollTop = 0;
        }
      } else {
        if (htmlHost) {
          htmlHost.innerHTML = "";
          htmlHost.hidden = true;
        }
        frame.hidden = false;
        frame.src = src;
      }
      docViewerDownloadHandler = typeof onDownload === "function" ? onDownload : null;
      if (dlBtn) dlBtn.style.display = docViewerDownloadHandler ? "" : "none";
      sheet.hidden = false;
      sheet.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function bindDocumentViewerChrome() {
      document.querySelectorAll("[data-doc-viewer-close]").forEach((el) => {
        el.addEventListener("click", closeDocumentViewer);
      });
      const dlBtn = document.getElementById("docViewerDownloadBtn");
      if (dlBtn) {
        dlBtn.addEventListener("click", async () => {
          if (!docViewerDownloadHandler) return;
          const orig = dlBtn.textContent;
          dlBtn.disabled = true;
          dlBtn.textContent = "Preparing…";
          try {
            await docViewerDownloadHandler();
          } catch (err) {
            console.warn("[my_documents] viewer download", err);
            alert("Could not download this document right now.");
          } finally {
            dlBtn.disabled = false;
            dlBtn.textContent = orig || "Download PDF";
          }
        });
      }
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          const sheet = document.getElementById("docViewerSheet");
          if (sheet && !sheet.hidden) closeDocumentViewer();
        }
      });
    }

    /** Employment contracts: in-app viewer + auto-regenerate blank or legacy PDFs. */
    async function openEmploymentContractDocument(btn) {
      const fileUrl = String(btn.getAttribute("data-file-url") || "").trim();
      const docId = String(btn.getAttribute("data-doc-id") || "").trim();
      const pdfLayout = String(btn.getAttribute("data-pdf-version") || "").trim();
      const title = btn.getAttribute("data-download-name") || "Employment contract";
      const desk = btn.querySelector(".btn-label-desk");
      const origDesk = desk ? desk.textContent : "";
      btn.disabled = true;
      if (desk) desk.textContent = "Opening…";
      try {
        let currentPath = fileUrl;
        const needsRegen =
          pdfLayout !== PORTAL_CONTRACT_PDF_LAYOUT &&
          docId &&
          typeof html2pdf !== "undefined";
        if ((needsRegen || !currentPath) && docId && typeof html2pdf !== "undefined") {
          if (desk) desk.textContent = "Preparing PDF…";
          const mod = await import("./portal/portal_employment_contract.js?v=20260630-contract-html-view");
          await mod.portalRepairEmploymentContractByDocumentId(docId);
          const docs = await portalListMyDocuments();
          const fresh = (docs || []).find((d) => String(d.id || "") === docId);
          if (fresh && fresh.file_url) currentPath = String(fresh.file_url);
        }
        let signed = await portalCreateDocumentSignedUrl(currentPath, 3600);
        if (!signed) throw new Error("No URL");
        let blob = await fetchPdfBlobViaXHR(signed);
        if (blob.size <= 8000 && docId && typeof html2pdf !== "undefined") {
          const mod = await import("./portal/portal_employment_contract.js?v=20260630-contract-html-view");
          await mod.portalRepairEmploymentContractByDocumentId(docId);
          const docs = await portalListMyDocuments();
          const fresh = (docs || []).find((d) => String(d.id || "") === docId);
          if (fresh && fresh.file_url) {
            currentPath = String(fresh.file_url);
            signed = await portalCreateDocumentSignedUrl(currentPath, 3600);
            if (signed) blob = await fetchPdfBlobViaXHR(signed);
          }
        }
        if (!blob || blob.size <= 8000) {
          alert(
            "This contract PDF looks empty. Open the contract sign page once to regenerate it, then try again."
          );
          return;
        }
        const pdfBlob =
          blob.type === "application/pdf" ? blob : new Blob([blob], { type: "application/pdf" });
        const previewUrl = URL.createObjectURL(pdfBlob);
        if (typeof docViewerCleanup === "function") {
          try {
            docViewerCleanup();
          } catch (_e) {}
        }
        docViewerCleanup = () => URL.revokeObjectURL(previewUrl);
        const downloadFn = async () => {
          const base = sanitizeDownloadBasename(title);
          const a = document.createElement("a");
          a.href = previewUrl;
          a.download = `${base}.pdf`;
          a.rel = "noopener";
          document.body.appendChild(a);
          a.click();
          a.remove();
        };
        let contractHtml = null;
        try {
          contractHtml = await mod.portalRenderContractHtmlByDocumentId(docId);
        } catch (_htmlErr) {
          contractHtml = null;
        }
        if (contractHtml) {
          openDocumentViewer(title, { html: contractHtml }, downloadFn);
        } else {
          openDocumentViewer(title, previewUrl, downloadFn);
        }
      } catch (err) {
        console.warn("[my_documents] employment contract view", err);
        alert("Could not open this contract right now.");
      } finally {
        btn.disabled = false;
        if (desk) desk.textContent = origDesk || "View / Download";
      }
    }

    /** Escritorio: nueva pestaña. Móvil: XHR + blob + download (progreso en el botón; fallback: pestaña). */
    async function openOrDownloadDocument(fileUrl, downloadName, btn) {
      const mobLab = btn && btn.querySelector ? btn.querySelector(".btn-label-mob") : null;
      const mobRow2 = btn && btn.querySelector ? btn.querySelector(".btn-mob-row2") : null;
      const deskLab = btn && btn.querySelector ? btn.querySelector(".btn-label-desk") : null;
      const origDesk = deskLab ? deskLab.textContent : "";
      const setDeskBusy = (t) => {
        if (deskLab) deskLab.textContent = t;
      };
      const setMobProgressLine = (line2) => {
        if (mobRow2) mobRow2.textContent = line2;
        else if (mobLab) mobLab.textContent = line2;
      };
      const restoreLabels = () => {
        const r2 = btn && btn.querySelector ? btn.querySelector(".btn-mob-row2") : null;
        if (r2) r2.textContent = "";
        const r1 = btn && btn.querySelector ? btn.querySelector(".btn-mob-row1") : null;
        if (r1) r1.textContent = "Download";
        else if (mobLab) mobLab.textContent = "Download";
        if (deskLab) deskLab.textContent = origDesk || "View / Download";
      };
      try {
        const signed = await portalCreateDocumentSignedUrl(fileUrl, 3600);
        if (!signed) throw new Error("No URL");
        if (!isMobileMyDocumentsLayout()) {
          window.open(signed, "_blank", "noopener");
          return;
        }
        if (btn) btn.disabled = true;
        setDeskBusy("Downloading…");
        setMobProgressLine("In progress");
        showDocDownloadToast();
        const base = sanitizeDownloadBasename(downloadName);
        try {
          let blob = await fetchPdfBlobViaXHR(signed, (pct) => {
            if (pct >= 0) {
              setDeskBusy(`Downloading ${pct}%`);
              setMobProgressLine(`${pct}%`);
            } else {
              setDeskBusy("Downloading…");
              setMobProgressLine("In progress");
            }
          });
          if (!blob.type || blob.type === "application/octet-stream") {
            blob = new Blob([blob], { type: "application/pdf" });
          }
          const objUrl = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = objUrl;
          a.download = `${base}.pdf`;
          a.rel = "noopener";
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(objUrl), 90_000);
        } catch (err) {
          console.warn("[my_documents] blob download failed, opening in browser", err);
          window.open(signed, "_blank", "noopener");
        }
      } catch (_) {
        alert("Could not open this document right now.");
      } finally {
        if (btn) {
          restoreLabels();
          btn.disabled = false;
        }
        setTimeout(() => hideDocDownloadToast(), 450);
      }
    }

    function docMatchesCategory(doc, categoryKey) {
      const cat = String((doc && doc.category) || "").toLowerCase();
      if (cat === categoryKey) return true;
      const t = String((doc && doc.document_type) || "").toLowerCase();
      if (categoryKey === "documents" && (t === "employment_contract" || t === "calendar_2026_27" || cat === "documents" || cat === "hr")) return true;
      if (categoryKey === "finance" && (t === "timesheet" || t === "expense" || t === "payslip")) return true;
      if (categoryKey === "reports" && (t === "swim_term_review" || t.includes("report"))) return true;
      if (
        categoryKey === "training" &&
        (t === "staff_policy_ack" ||
          t === "induction_certificate" ||
          t.includes("train") ||
          t.includes("induction") ||
          t.includes("safeguard"))
      ) {
        return true;
      }
      if (categoryKey === "payslips" && (t === "payslip" || t === "contractor_invoice")) return true;
      return false;
    }

    function emptyCopyForCategory(key) {
      if (key === "documents") {
        return "No documents yet. Signed employment contracts will appear here after you complete signing.";
      }
      if (key === "finance") {
        return "No finance documents yet. Submit a timesheet or expense claim to generate a PDF here.";
      }
      if (key === "reports") {
        return "No reports yet. Completed review reports (for example swimming term reviews) will appear here.";
      }
      if (key === "training") {
        return "No training documents yet. Certificates and completed training records will appear here.";
      }
      if (key === "payslips") {
        return "No payslips yet. Monthly payslip PDFs from payroll will appear here when uploaded.";
      }
      return "No documents yet.";
    }

    function renderGroups(list) {
      const root = document.getElementById("docsRoot");
      if (!root) return;
      const filterCat = parseCategoryFilter();
      const ghostReadOnly =
        typeof window.portalIsGhostViewMode === "function" && window.portalIsGhostViewMode();
      const grouped = { documents: [], finance: [], reports: [], training: [], payslips: [] };
      (list || []).forEach((doc) => {
        const t = String((doc && doc.document_type) || "").toLowerCase();
        if (t === "employment_contract") {
          grouped.documents.push(doc);
          return;
        }
        const cat = String(doc.category || "").toLowerCase();
        if (grouped[cat]) {
          grouped[cat].push(doc);
          return;
        }
        for (let i = 0; i < GROUPS.length; i++) {
          if (docMatchesCategory(doc, GROUPS[i].key)) {
            grouped[GROUPS[i].key].push(doc);
            break;
          }
        }
      });

      const groupsToRender = filterCat
        ? GROUPS.filter((g) => g.key === filterCat)
        : GROUPS;

      let html = "";
      groupsToRender.forEach((group) => {
        const items = grouped[group.key] || [];
        const showHeading = !filterCat;
        html += `<section class="group">`;
        if (showHeading) html += `<h2>${esc(group.label)}</h2>`;
        if (!items.length) {
          html += `<div class="empty">${esc(emptyCopyForCategory(group.key))}</div></section>`;
          return;
        }
        items.forEach((doc) => {
          const docId = esc(doc.id || "");
          const iconKind = docIconKind(doc);
          const isPayslip =
            String((doc && doc.document_type) || "").toLowerCase() === "payslip" ||
            String((doc && doc.category) || "").toLowerCase() === "payslips";
          const isInductionCert =
            String((doc && doc.document_type) || "").toLowerCase() === "induction_certificate" ||
            docId === "portal-induction-certificate";
          const isEmploymentContract =
            String((doc && doc.document_type) || "").toLowerCase() === "employment_contract";
          html += `
            <div class="row">
              <div class="row-main minw0">
                ${docIconBlock(iconKind)}
                <div class="row-text minw0">
                  <div class="title">${esc(displayTitle(doc))}</div>
                  <div class="meta">${esc(displayMeta(doc))}</div>
                </div>
              </div>
              <div class="docs-actions">
                <button type="button" class="btn btn-outline" ${
                  isInductionCert
                    ? `data-induction-cert="1" data-file-url="${esc(doc.file_url || "")}" data-learner-name="${esc(doc.learnerName || "")}" data-issued-iso="${esc(doc.created_at || "")}" data-download-name="${esc(displayTitle(doc))}"`
                    : isEmploymentContract
                      ? `data-employment-contract="1" data-doc-id="${docId}" data-pdf-version="${esc(doc.related_client || "")}" data-file-url="${esc(doc.file_url || "")}" data-download-name="${esc(displayTitle(doc))}"`
                      : `data-file-url="${esc(doc.file_url)}" data-download-name="${esc(displayTitle(doc))}"`
                }>
                  <span class="btn-label-desk">${isInductionCert ? "View certificate" : "View / Download"}</span><span class="btn-label-mob"><span class="btn-mob-row1">${isInductionCert ? "View" : "Download"}</span><span class="btn-mob-row2" aria-live="polite"></span></span>
                </button>
                ${isPayslip || isInductionCert || isEmploymentContract || ghostReadOnly ? "" : `<button type="button" class="btn btn-outline" data-doc-id="${docId}">Delete</button>`}
              </div>
            </div>
          `;
        });
        html += `</section>`;
      });
      root.innerHTML = html;
      root.querySelectorAll("button[data-induction-cert]").forEach((btn) => {
        btn.addEventListener("click", () => openInductionCertificateInApp(btn));
      });
      root.querySelectorAll("button[data-employment-contract]").forEach((btn) => {
        btn.addEventListener("click", () => openEmploymentContractDocument(btn));
      });
      root.querySelectorAll("button[data-file-url]:not([data-employment-contract]):not([data-induction-cert])").forEach((btn) => {
        btn.addEventListener("click", () =>
          openOrDownloadDocument(
            btn.getAttribute("data-file-url") || "",
            btn.getAttribute("data-download-name") || "document",
            btn
          )
        );
      });
      root.querySelectorAll("button[data-doc-id]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-doc-id") || "";
          if (!id) return;
          const rowEl = btn.closest(".row");
          const isContractRow =
            rowEl &&
            rowEl.querySelector("button[data-employment-contract]");
          if (isContractRow) {
            alert("Employment contracts stay in My Documents and cannot be removed.");
            return;
          }
          if (
            !confirm(
              "Remove this document from your list? It will stay on file for records but will no longer appear here."
            )
          ) {
            return;
          }
          btn.disabled = true;
          try {
            await portalHideMyDocumentFromList(id);
            const ctx = window.__PORTAL_SUPABASE__ || {};
            let docs = await portalListMyDocuments();
            docs = enrichWorkerFacingTitles(docs, ctx.staff_profile || null);
            renderGroups(docs);
          } catch (err) {
            console.error("[my_documents] hide failed:", err);
            const msg = err && err.message ? String(err.message) : "Unknown error";
            alert("Could not remove this document. " + msg);
            btn.disabled = false;
          }
        });
      });
    }

    async function mergeInductionCertificateRow(docs) {

      let email = "";
      try {
        const auth = await portalImportAuthModule();
        if (auth && typeof auth.bootstrapDashboardSupabase === "function") {
          await auth.bootstrapDashboardSupabase({ page: "staff" });
          const ctx = window.__PORTAL_SUPABASE__ || {};
          profile = ctx.staff_profile || null;
          email = String((ctx.session && ctx.session.user && ctx.session.user.email) || "");
        }
      } catch (e) {
        console.warn("[my_documents] induction auth bootstrap", e);
      }
      if (typeof window.portalInductionApplyGrandfather === "function") {
        window.portalInductionApplyGrandfather(profile, email);
      }
      if (typeof window.portalInductionGetCertificateMeta !== "function") return list;
      const meta = window.portalInductionGetCertificateMeta(profile, email);
      if (!meta) return list;
      if (list.some((d) => String(d.id || "") === meta.id)) return list;
      return [meta, ...list];
    }

    (async function init() {
      applyPageChrome();
      bindDocumentViewerChrome();
      const root = document.getElementById("docsRoot");
      if (root) root.innerHTML = `<div class="empty">Loading your documents...</div>`;
      try {
        await ensurePortalStaffContext();
        const ctx = window.__PORTAL_SUPABASE__ || {};
        let docs = await portalListMyDocuments();
        docs = enrichWorkerFacingTitles(docs, ctx.staff_profile || null);
        docs = await mergeInductionCertificateRow(docs);
        docs = enrichInductionCertificateRows(docs);
        renderGroups(docs);
      } catch (_) {
        if (root) root.innerHTML = `<div class="empty">Could not load documents. Please sign in again.</div>`;
      }
    })();
  </script>
</body>
</html>
