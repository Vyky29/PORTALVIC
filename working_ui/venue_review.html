    <section class="venue-review-intro">
      <h2>Opening &amp; Closing </h2>

      <p>When completing this review, staff members must carefully observe the condition of the venue and confirm that all areas meet the expected standards.</p>

  <div class="page">
    <div class="single-page">
      <div class="page-header">
        <h1>Venue Review</h1>
      </div>
      <div class="page-body">

  <form id="form">
    <div
      id="venueContextSummary"
      aria-live="polite"
      style="margin-bottom:14px;padding:12px 14px;border:1px solid rgba(11,18,32,.12);border-radius:12px;background:#f8fbfc;"
    >
      <div style="line-height:1.45;color:#0b1220;"><strong>Completed by:</strong> <span id="venueContextCompletedBy"></span></div>
      <div style="line-height:1.45;color:#0b1220;"><strong>Venue:</strong> <span id="venueContextVenue"></span></div>
      <div style="line-height:1.45;color:#0b1220;"><strong>Date:</strong> <span id="venueContextDate"></span></div>
      <div style="line-height:1.45;color:#0b1220;"><strong>Time:</strong> <span id="venueContextTime"></span></div>
    </div>

    <input type="hidden" id="time" name="time" />

    <div class="issues-section" id="issuesSection">
      <p class="issues-question">📝 Any issues, damages or incidents to report?</p>
      <div class="btn-group">
        <button type="button" class="btn no" id="btnNoReady" data-value="no" aria-pressed="false">No</button>
        <button type="button" class="btn yes" id="btnYesIssues" data-value="yes" aria-pressed="false">Yes</button>
      </div>

      <div class="issues-cell" id="issuesCell">
        <div
          class="venue-notes-panel"
          id="venueNotesPanel"
          aria-hidden="true"
        >
          <p class="venue-notes-hint" id="venueNotesHint" hidden></p>
          <label for="issues" id="issuesLabel">📝 Describe issues, damages or incidents</label>
          <textarea
            id="issues"
            name="issues"
            rows="5"
            placeholder="Describe any issues..."
          ></textarea>
        </div>
      </div>
    </div>

    <button type="submit" class="submit-btn">Submit</button>
  </form>
      </div>
    </div>
  </div>

  <script type="module" src="ELEMENTOR/MEDIOS/venue_review_app.js?v=20260510-portal-admin"></script>
  <script>
    (function () {
      function ensureVenueIssueToggleBehavior() {
        var form = document.getElementById("form");
        var btnYes = document.getElementById("btnYesIssues");
        var btnNo = document.getElementById("btnNoReady");
        var issuesCell = document.getElementById("issuesCell");
        var notesPanel = document.getElementById("venueNotesPanel");
        var issuesInput = document.getElementById("issues");
        if (!form || !btnYes || !btnNo || !issuesCell || !issuesInput) return false;

        function applyYes() {
          form.dataset.issueMode = "yes";
          issuesCell.classList.add("visible");
          if (notesPanel) notesPanel.setAttribute("aria-hidden", "false");
          issuesInput.setAttribute("required", "required");
        }
        function applyNo() {
          form.dataset.issueMode = "no";
          issuesCell.classList.remove("visible");
          if (notesPanel) notesPanel.setAttribute("aria-hidden", "true");
          issuesInput.removeAttribute("required");
          issuesInput.value = "";
        }

        btnYes.addEventListener("click", function () {
          setTimeout(applyYes, 0);
        });
        btnNo.addEventListener("click", function () {
          setTimeout(applyNo, 0);
        });
        form.addEventListener("submit", function (e) {
          var mode = String(form.dataset.issueMode || "").toLowerCase();
          if (mode === "yes" && !String(issuesInput.value || "").trim()) {
            e.preventDefault();
            issuesCell.classList.add("visible");
            if (notesPanel) notesPanel.setAttribute("aria-hidden", "false");
            try { issuesInput.focus(); } catch (_) {}
          }
        });
        return true;
      }

      if (!ensureVenueIssueToggleBehavior()) {
        var retries = 0;
        var t = setInterval(function () {
          retries += 1;
          if (ensureVenueIssueToggleBehavior() || retries > 25) clearInterval(t);
        }, 120);
      }
    })();
  </script>
