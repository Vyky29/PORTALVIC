    var STORAGE_KEY = 'portalMigrationReview_v1';

    function loadDecisions() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch (e) { return {}; }
    }
    function saveDecisions(d) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
    }

    var decisions = loadDecisions();
    var root = document.getElementById('root');
    var statsEl = document.getElementById('stats');
    var footer = document.getElementById('footerSummary');

    function esc(s) {
      return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function setDecision(id, value) {
      if (!value) delete decisions[id]; else decisions[id] = value;
      saveDecisions(decisions);
      render();
    }

    function counts() {
      var keep = 0, defer = 0, unset = 0;
      DATA.days.forEach(function(day) {
        day.items.forEach(function(it) {
          var d = decisions[it.id];
          if (d === 'keep') keep++;
          else if (d === 'defer') defer++;
          else unset++;
        });
      });
      return { keep: keep, defer: defer, unset: unset, total: DATA.total };
    }

    function renderStats() {
      var c = counts();
      statsEl.innerHTML =
        '<div class="stat"><strong>' + c.total + '</strong> migraciones</div>' +
        '<div class="stat"><strong style="color:var(--keep)">' + c.keep + '</strong> Keep</div>' +
        '<div class="stat"><strong style="color:var(--defer)">' + c.defer + '</strong> Guardar sin usar</div>' +
        '<div class="stat"><strong>' + c.unset + '</strong> Sin decidir</div>';
      footer.innerHTML =
        '<span><strong>Keep:</strong> ' + c.keep + ' · <strong>Sin usar:</strong> ' + c.defer + ' · <strong>Pendiente:</strong> ' + c.unset + '</span>' +
        '<span style="opacity:.85">Exporta JSON cuando termines para compartir con el push a prod.</span>';
    }

    function matchesFilter(it) {
      var q = (document.getElementById('search').value || '').trim().toLowerCase();
      var fd = document.getElementById('filterDecision').value;
      var fk = document.getElementById('filterKind').value;
      var d = decisions[it.id] || 'unset';
      if (fd && fd !== d) return false;
      if (fk && it.kind !== fk) return false;
      if (!q) return true;
      var hay = (it.file + ' ' + it.summary + ' ' + it.purpose + ' ' + it.tags.join(' ')).toLowerCase();
      return hay.indexOf(q) >= 0;
    }

    function render() {
      renderStats();
      var html = '';
      DATA.days.forEach(function(day) {
        var visible = day.items.filter(matchesFilter);
        if (!visible.length) return;
        var decided = day.items.filter(function(it) { return decisions[it.id]; }).length;
        var pct = day.items.length ? Math.round((decided / day.items.length) * 100) : 0;
        html += '<section class="day-block" data-day="' + esc(day.day) + '">';
        html += '<div class="day-head"><h2>' + esc(day.label) + '</h2>';
        html += '<span class="count">' + visible.length + ' / ' + day.items.length + ' visibles · ' + decided + ' decididas</span>';
        html += '<div class="day-progress" title="' + pct + '%"><span style="width:' + pct + '%"></span></div></div>';
        html += '<table><thead><tr>';
        html += '<th>Archivo</th><th class="col-time">Hora</th><th>Qué hace</th><th>Para qué sirve</th><th>Decisión</th>';
        html += '</tr></thead><tbody>';
        visible.forEach(function(it) {
          var dec = decisions[it.id] || '';
          var rowCls = dec === 'keep' ? 'row--keep' : dec === 'defer' ? 'row--defer' : '';
          html += '<tr class="' + rowCls + '" data-id="' + esc(it.id) + '">';
          html += '<td><div class="file">' + esc(it.file) + '</div>';
          html += '<div class="tags">';
          html += '<span class="tag tag--' + esc(it.kind) + '">' + esc(it.kind) + '</span>';
          it.tags.forEach(function(t) {
            html += '<span class="tag">' + esc(t) + '</span>';
          });
          html += '</div></td>';
          html += '<td class="col-time time">' + esc(it.time) + '</td>';
          html += '<td><p class="summary">' + esc(it.summary) + '</p></td>';
          html += '<td><p class="purpose">' + esc(it.purpose) + '</p></td>';
          html += '<td class="actions"><div class="actions-inner">';
          html += '<button type="button" class="act act--keep' + (dec === 'keep' ? ' is-on' : '') + '" data-act="keep" data-id="' + esc(it.id) + '">Keep</button>';
          html += '<button type="button" class="act act--defer' + (dec === 'defer' ? ' is-on' : '') + '" data-act="defer" data-id="' + esc(it.id) + '">Guardar sin usar</button>';
          if (dec) html += '<button type="button" class="act act--clear" data-act="clear" data-id="' + esc(it.id) + '">Quitar</button>';
          html += '</div></td></tr>';
        });
        html += '</tbody></table></section>';
      });
      root.innerHTML = html || '<p style="padding:24px;color:var(--muted)">Ninguna migración coincide con el filtro.</p>';
    }

    root.addEventListener('click', function(ev) {
      var btn = ev.target.closest('[data-act]');
      if (!btn) return;
      var id = btn.getAttribute('data-id');
      var act = btn.getAttribute('data-act');
      if (act === 'keep') setDecision(id, decisions[id] === 'keep' ? null : 'keep');
      else if (act === 'defer') setDecision(id, decisions[id] === 'defer' ? null : 'defer');
      else if (act === 'clear') setDecision(id, null);
    });

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('filterDecision').addEventListener('change', render);
    document.getElementById('filterKind').addEventListener('change', render);

    document.getElementById('exportJson').addEventListener('click', function() {
      var out = {
        exportedAt: new Date().toISOString(),
        source: 'supabase/migrations',
        decisions: decisions,
        summary: counts(),
        keep: Object.keys(decisions).filter(function(k) { return decisions[k] === 'keep'; }).sort(),
        defer: Object.keys(decisions).filter(function(k) { return decisions[k] === 'defer'; }).sort()
      };
      var blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'portal-migration-decisions-' + new Date().toISOString().slice(0, 10) + '.json';
      a.click();
    });

    document.getElementById('clearAll').addEventListener('click', function() {
      if (!confirm('¿Borrar todas las decisiones guardadas en este navegador?')) return;
      decisions = {};
      saveDecisions(decisions);
      render();
    });

    render();
  </script>
</body>
</html>
