<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <script src="/portal/portal_auth_page_gate.js?v=20260609-auth-gate"></script>
  <script src="/portal/portal_brand.js?v=20260520-brand"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f8fb" />
  <title>clubSENsational Portal — Choose workspace</title>
  <style>
    :root{
      --blue:#2d84b3;
      --blueSoft:#eaf5fb;
      --gold:#f4b740;
      --sen-gold:#f9bf2e;
      --ink:#173247;
      --text:#314555;
      --muted:#728290;
      --line:rgba(23,50,71,.12);
      --white:#ffffff;
      --shadow:0 18px 50px rgba(23,50,71,.08);
      --radius:22px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;min-height:100%;min-height:100dvh;
      font-family:Arial,Helvetica,sans-serif;color:var(--text);
      background:linear-gradient(180deg,#f7fbff 0%,#edf4fb 100%);
    }
    body{
      display:flex;align-items:center;justify-content:center;
      padding:max(20px, env(safe-area-inset-top)) 18px max(20px, env(safe-area-inset-bottom));
    }
    .wrap{width:100%;max-width:440px}
    .card{
      background:var(--white);border-radius:var(--radius);
      box-shadow:var(--shadow);border:1px solid var(--line);
      padding:clamp(24px,5vw,36px) clamp(20px,4vw,32px);
    }
    .brand{text-align:center;margin:0 0 8px}
    .brand h1{margin:0;font-size:1.15rem;color:var(--ink);font-weight:700}
    .sub{margin:0 0 22px;text-align:center;font-size:.9rem;color:var(--muted);line-height:1.45}
    .who{
      margin:0 0 18px;padding:10px 12px;border-radius:14px;
      background:var(--blueSoft);font-size:.85rem;color:var(--ink);
      text-align:center;overflow-wrap:break-word;
    }
    .choices{display:flex;flex-direction:column;gap:12px}
    .choice{
      display:flex;align-items:flex-start;gap:14px;width:100%;
      padding:14px 16px;border-radius:16px;border:1px solid var(--line);
      background:var(--white);cursor:pointer;text-align:left;
      transition:border-color .2s,box-shadow .2s,transform .15s;
      min-width:0;
    }
    .choice:hover{border-color:rgba(45,132,179,.35);box-shadow:0 8px 24px rgba(23,50,71,.06)}
    .choice:active{transform:scale(.99)}
    .choice:focus-visible{outline:2px solid var(--sen-gold);outline-offset:2px}
    .choice-ico{
      flex:0 0 44px;width:44px;height:44px;border-radius:12px;
      display:grid;place-items:center;font-size:1.35rem;
      background:var(--blueSoft);
    }
    .choice--lead .choice-ico{background:#fff4df}
    .choice--admin .choice-ico{background:#e8f5ee}
    .choice--ceo .choice-ico{background:#eef0ff}
    .choice-copy{min-width:0;flex:1}
    .choice-copy strong{display:block;font-size:1rem;color:var(--ink);margin-bottom:4px}
    .choice-copy span{display:block;font-size:.82rem;color:var(--muted);line-height:1.4;overflow-wrap:break-word}
    .foot{margin-top:18px;text-align:center}
    .link-btn{
      background:none;border:none;padding:8px 12px;
      font-size:.85rem;color:var(--muted);cursor:pointer;text-decoration:underline;
    }
    .link-btn:hover{color:var(--ink)}
    .loading{text-align:center;padding:40px 12px;color:var(--muted);font-size:.95rem}
    .err{
      margin-top:12px;padding:10px 12px;border-radius:12px;
      background:#fff1f1;color:#c0392b;font-size:.875rem;
      display:none;overflow-wrap:break-word;
    }
    .err.visible{display:block}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="main">
      <header class="brand">
        <h1>Where do you want to go?</h1>
      </header>
      <p class="sub">You have access to more than one portal. Pick the workspace you need right now.</p>
      <p id="whoLine" class="who" hidden></p>
      <div id="loadingState" class="loading">Checking your session…</div>
      <div id="choicesHost" class="choices" hidden>
        <button type="button" class="choice choice--staff" id="goStaff" data-dest="staff">
          <span class="choice-ico" aria-hidden="true">👤</span>
          <span class="choice-copy">
            <strong>Staff portal</strong>
            <span>Your shifts, sessions, feedback, cancellations and daily roster.</span>
          </span>
        </button>
        <button type="button" class="choice choice--lead" id="goLead" data-dest="lead">
          <span class="choice-ico" aria-hidden="true">📋</span>
          <span class="choice-copy">
            <strong>Lead portal</strong>
            <span>Team overview, lead reports and support workflows.</span>
          </span>
        </button>
        <button type="button" class="choice choice--admin" id="goAdmin" data-dest="admin">
          <span class="choice-ico" aria-hidden="true">⚙️</span>
          <span class="choice-copy">
            <strong>Admin portal</strong>
            <span>Day operations, roster and feedback — for Victor, Javi and Raúl.</span>
          </span>
        </button>
        <button type="button" class="choice choice--ceo" id="goCeo" data-dest="ceo" hidden>
          <span class="choice-ico" aria-hidden="true">📊</span>
          <span class="choice-copy">
            <strong>CEO portal</strong>
            <span>Executive overview, organisation-wide reports and insights.</span>
          </span>
        </button>
      </div>
      <p id="errMsg" class="err" role="alert"></p>
      <div class="foot">
        <button type="button" class="link-btn" id="btnSignOut">Sign out</button>
      </div>
    </div>
  </div>
  <script>
    window.PORTAL_STAFF_DASHBOARD_URL = "staff_dashboard.html";
    window.PORTAL_LEAD_DASHBOARD_URL = "staff_dashboard.html";
    window.PORTAL_ADMIN_DASHBOARD_URL = "admin_dashboard.html";
    window.PORTAL_CEO_DASHBOARD_URL = "ceo_dashboard.html";
    window.PORTAL_LOGIN_REDIRECT_URL = "login.html";
    window.PORTAL_AUTO_REDIRECT_FROM_LOGIN = true;
  </script>
  <script type="module">
    import {
      bootstrapDashboardSupabase,
      portalCanAccessAdminDashboard,
      portalCanAccessCeoDashboard,
      portalInferEffectiveRole,
      portalLogout,
    } from "/portal/auth-handler.js?v=20260609-sevitha-admin-direct";

    const loadingEl = document.getElementById("loadingState");
    const choicesHost = document.getElementById("choicesHost");
    const whoLine = document.getElementById("whoLine");
    const errMsg = document.getElementById("errMsg");

    function showErr(msg) {
      errMsg.textContent = msg || "";
      errMsg.classList.toggle("visible", !!msg);
    }

    function destUrl(kind) {
      if (kind === "staff") return window.PORTAL_STAFF_DASHBOARD_URL || "staff_dashboard.html";
      if (kind === "lead") return window.PORTAL_LEAD_DASHBOARD_URL || "staff_dashboard.html";
      if (kind === "ceo") return window.PORTAL_CEO_DASHBOARD_URL || "ceo_dashboard.html";
      return window.PORTAL_ADMIN_DASHBOARD_URL || "admin_dashboard.html";
    }

    function go(kind) {
      const raw = destUrl(kind);
      try {
        window.location.href = new URL(raw, window.location.href).href;
      } catch {
        window.location.href = raw;
      }
    }

    document.getElementById("goStaff").addEventListener("click", () => go("staff"));
    document.getElementById("goLead").addEventListener("click", () => go("lead"));
    document.getElementById("goAdmin").addEventListener("click", () => go("admin"));
    document.getElementById("goCeo").addEventListener("click", () => go("ceo"));
    document.getElementById("btnSignOut").addEventListener("click", async () => {
      try {
        await portalLogout();
      } catch (_) {}
      window.location.replace(window.PORTAL_LOGIN_REDIRECT_URL || "login.html");
    });

    try {
      await bootstrapDashboardSupabase({ page: "choose" });
      const ctx = window.__PORTAL_SUPABASE__ || {};
      const profile = ctx.staff_profile || {};
      const session = ctx.session || {};
      const name =
        String(profile.full_name || profile.username || "").trim() ||
        String(session.user?.email || "").trim();
      if (name) {
        whoLine.textContent = "Signed in as " + name;
        whoLine.hidden = false;
      }
      const email = String(session.user?.email || "").trim();
      const adminBtn = document.getElementById("goAdmin");
      if (!portalCanAccessAdminDashboard(profile, email)) {
        adminBtn.hidden = true;
      }
      const ceoBtn = document.getElementById("goCeo");
      if (portalCanAccessCeoDashboard(profile, email)) {
        ceoBtn.hidden = false;
      }
      loadingEl.hidden = true;
      choicesHost.hidden = false;
    } catch (e) {
      loadingEl.textContent = "";
      showErr(e instanceof Error ? e.message : "Could not verify your session.");
    }
  </script>
</body>
</html>
