<body class="cs-cliq-app-body">
  <div id="csCliqAppRoot" class="cs-cliq-app-root" aria-live="polite">
    <p class="cs-cliq-app-loading">Loading CS Cliq…</p>
  </div>
  <script src="/portal-static-bootstrap.js?v=20260601-annual-profile-sync"></script>
  <script type="module">
    import { bootstrapDashboardSupabase, portalLogout } from "/portal/auth-handler.js?v=20260609-bootfix";

    function releaseGate() {
      try {
        window.dispatchEvent(new Event("portal:auth-gate-release"));
      } catch (_e) {}
    }

    window.portalResolveLoginHref = function () {
      try {
        var login = new URL("login.html", location.href);
        login.searchParams.set("next", location.href);
        login.searchParams.set("app", "cs_cliq");
        return login.href;
      } catch (_e) {
        return "login.html?app=cs_cliq&next=" + encodeURIComponent("cs_cliq.html");
      }
    };

    window.portalLogoutRedirectToLogin = async function () {
      try {
        await portalLogout();
      } catch (_lo) {}
      window.location.replace(window.portalResolveLoginHref());
    };

    async function boot() {
      try {
        await bootstrapDashboardSupabase({ page: "cs_cliq" });
        if (!window.__PORTAL_SUPABASE__ || !window.__PORTAL_SUPABASE__.session) {
          window.location.replace(window.portalResolveLoginHref());
          return;
        }
      } catch (_auth) {
        window.location.replace("login.html");
        return;
      } finally {
        releaseGate();
      }

      if (typeof window.portalCsCliqAppBoot === "function") {
        var started = await window.portalCsCliqAppBoot();
        if (started) return;
      } else {
        await new Promise(function (r) {
          setTimeout(r, 120);
        });
        if (typeof window.portalCsCliqAppBoot === "function") {
          var startedRetry = await window.portalCsCliqAppBoot();
          if (startedRetry) return;
        }
      }

      var host = document.getElementById("csCliqAppRoot");
      if (host) {
        host.innerHTML =
          '<p class="cs-cliq-app-loading">CS Cliq could not start. Try refreshing or use Operations admin.</p>';
      }
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", boot);
    } else {
      boot();
    }
  </script>
