<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign employment contract | clubSENsational Portal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="portal/contract-core.js?v=20260622-sign"></script>
  <link rel="stylesheet" href="portal/contract-preview.css?v=20260622-sign">
  <style>
    :root { --navy:#0f2744; --gold:#c9a227; --grey-100:#f7f9fb; --grey-200:#e2e8f0; --grey-500:#64748b; --radius:8px; }
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:var(--grey-100);color:#334155}
    .header{background:#fff;border-bottom:4px solid var(--gold);padding:1rem;text-align:center}
    .header img{max-width:200px;height:auto}
    .wrap{max-width:1100px;margin:0 auto;padding:1rem 1.25rem 2rem}
    .grid{display:grid;gap:1rem}
    @media(min-width:900px){.grid{grid-template-columns:1fr 1.2fr}}
    .panel{background:#fff;border-radius:var(--radius);padding:1.25rem;box-shadow:0 2px 8px rgba(15,39,68,.08)}
    .panel h2{margin:0 0 1rem;font-size:1.1rem;color:var(--navy);border-bottom:2px solid #e8f0f6;padding-bottom:.5rem}
    canvas{width:100%;display:block;border:2px dashed var(--grey-200);border-radius:var(--radius);background:#f7f9fb;touch-action:none;cursor:crosshair}
    .btn{padding:.65rem 1.2rem;border:none;border-radius:var(--radius);font-weight:600;cursor:pointer;font-size:1rem}
    .btn-gold{background:var(--gold);color:var(--navy);width:100%}
    .btn-gold:disabled{opacity:.5;cursor:not-allowed}
    .btn-sec{background:var(--grey-200);color:var(--navy);margin-top:.5rem;width:100%}
    .preview{padding:0}
    .err{background:#fef2f2;border:1px solid #fecaca;padding:1rem;border-radius:var(--radius);color:#b91c1c}
    .ok{background:#ecfdf5;border:1px solid #86efac;padding:1rem;border-radius:var(--radius);color:#166534}
    .hidden{display:none!important}
    label.ack{display:flex;gap:.5rem;align-items:flex-start;margin:1rem 0;font-size:.95rem}
    input[type=text]{width:100%;padding:.6rem;border:1px solid var(--grey-200);border-radius:var(--radius);margin:.35rem 0 .5rem}
    .field-hint{margin:0 0 .75rem;font-size:.82rem;color:var(--grey-500);line-height:1.4}
    .submit-hint{margin:.75rem 0 0;font-size:.85rem;color:var(--grey-500);min-height:1.2em}
    .submit-hint.ready{color:#166534}
  </style>
</head>
<body>
  <header class="header">
    <img src="assets/clubsensational-logo.png?v=2" alt="clubSENsational" width="200">
    <h1 style="margin:.5rem 0 0;font-size:1.2rem;color:var(--navy)">Sign employment contract</h1>
    <p id="subRef" style="margin:0;font-size:.9rem;color:var(--grey-500)"></p>
  </header>
  <div class="wrap">
    <div id="loading"><p>Loading…</p></div>
    <div id="errorBox" class="err hidden"></div>
    <div id="doneBox" class="ok hidden">
      <strong>Contract signed.</strong>
      <p style="margin:.5rem 0 0">Your PDF is in <a href="my_documents.html?category=finance&amp;from=staff">Finance documents</a>. You can close this page and return to your <a href="staff_dashboard.html">dashboard</a>.</p>
    </div>
    <div id="signGrid" class="grid hidden">
      <div class="panel">
        <h2>Your signature</h2>
        <label for="typedName">Typed full name</label>
        <input type="text" id="typedName" autocomplete="name">
        <p class="field-hint" id="nameHint">Type your name as shown on the contract (first name is enough if it matches).</p>
        <label class="ack"><input type="checkbox" id="ack"> <span>I have read and agree to this employment contract.</span></label>
        <canvas id="sigCanvas" height="150" aria-label="Signature"></canvas>
        <button type="button" class="btn-sec" id="clearSig">Clear signature</button>
        <p class="submit-hint" id="submitHint" aria-live="polite"></p>
        <button type="button" class="btn btn-gold" id="submitBtn" disabled style="margin-top:.5rem">Sign and save to My Documents</button>
      </div>
      <div class="panel">
        <h2>Contract</h2>
        <div class="preview contract-preview-shell" id="preview"></div>
      </div>
    </div>
  </div>
  <script type="module">
    import {
      portalFetchMyContract,
      portalCompleteEmploymentContract
    } from "./portal/portal_employment_contract.js?v=20260622-sign";

    const C = window.ContractCore;
    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const contractId = params.get("contract_id") || "";

    let sigUrl = "";
    let padApi = null;
    let contractRow = null;
    let filledText = "";
    let contractKind = "zero_hours";

    function show(id) {
      ["loading", "errorBox", "doneBox", "signGrid"].forEach((x) => {
        $(x).classList.toggle("hidden", x !== id);
      });
    }

    function contractNamesMatch(typed, expected) {
      const norm = (s) => String(s || "").trim().toLowerCase().replace(/\s+/g, " ");
      const t = norm(typed);
      const e = norm(expected);
      if (!t || !e) return false;
      if (t === e) return true;
      const tParts = t.split(" ");
      const eParts = e.split(" ");
      if (tParts.length <= eParts.length) {
        return tParts.every((part, i) => eParts[i] === part);
      }
      return false;
    }

    function renderPreview(employeeSig) {
      if (!filledText) return;
      $("preview").innerHTML = C.renderContractHtml(filledText, false, {
        directorSignatureDataUrl: contractRow.director_signature,
        employeeSignatureDataUrl: employeeSig || ""
      }, contractKind);
    }

    function updateSubmit() {
      const missing = [];
      const typed = $("typedName").value.trim();
      const expected = contractRow ? contractRow.employee_name : "";
      if (!typed) missing.push("type your name");
      else if (!contractNamesMatch(typed, expected)) {
        missing.push('name must match "' + expected + '" (first name is OK)');
      }
      if (!sigUrl) missing.push("draw your signature");
      if (!$("ack").checked) missing.push("tick the agreement box");
      const hint = $("submitHint");
      const ok = contractRow && sigUrl && $("ack").checked && contractNamesMatch(typed, expected);
      if (hint) {
        hint.textContent = ok ? "Ready to sign." : "Still needed: " + missing.join("; ") + ".";
        hint.classList.toggle("ready", ok);
      }
      $("submitBtn").disabled = !ok;
    }

    async function init() {
      if (!contractId) {
        $("errorBox").textContent = "Missing contract. Open this page from your Portal dashboard.";
        show("errorBox");
        return;
      }
      try {
        const logo = await C.loadLogo();
        if (logo) C.logoDataUrl = logo;
        const res = await portalFetchMyContract(contractId);
        if (res.completed) {
          $("doneBox").querySelector("p").textContent =
            "This contract was already signed. See My Documents.";
          show("doneBox");
          return;
        }
        contractRow = res.contract;
        $("subRef").textContent = "Reference: " + (contractRow.contract_reference || "");
        const td = contractRow.template_data || {};
        contractKind =
          td.CONTRACT_KIND ||
          (contractRow.form_payload && contractRow.form_payload.contractKind) ||
          "zero_hours";
        filledText = C.fillTemplate(td, contractKind);
        renderPreview("");
        $("typedName").placeholder = contractRow.employee_name;
        $("nameHint").textContent =
          'Type your name as on the contract: "' + contractRow.employee_name + '". First name alone is fine.';
        show("signGrid");
        requestAnimationFrame(() => {
          padApi = C.setupSignaturePad($("sigCanvas"), { drawing: false }, (url) => {
            sigUrl = url;
            renderPreview(sigUrl);
            updateSubmit();
          });
          if (padApi && padApi.resize) padApi.resize();
          updateSubmit();
        });
      } catch (e) {
        $("errorBox").textContent = e.message || String(e);
        show("errorBox");
      }
    }

    $("typedName").addEventListener("input", updateSubmit);
    $("ack").addEventListener("change", updateSubmit);
    $("clearSig").addEventListener("click", () => {
      if (padApi) padApi.clear();
      sigUrl = "";
      renderPreview("");
      updateSubmit();
    });
    $("submitBtn").addEventListener("click", async () => {
      $("submitBtn").disabled = true;
      try {
        await portalCompleteEmploymentContract({
          contractId,
          employeeSignature: sigUrl,
          employeeTypedName: $("typedName").value.trim()
        });
        try {
          const ackKey = contractRow.announcement_id
            ? "portal-ann:" + contractRow.announcement_id
            : "portal-ann:contract:" + contractId;
          const ack = JSON.parse(localStorage.getItem("portalAnnouncementAckMap_v1") || "{}");
          ack[ackKey] = {
            title: "Employment contract signed",
            text: contractRow.contract_reference || "",
            signedAt: Date.now()
          };
          localStorage.setItem("portalAnnouncementAckMap_v1", JSON.stringify(ack));
        } catch (_) {}
        show("doneBox");
      } catch (e) {
        alert(e.message || e);
        updateSubmit();
      }
    });

    init();
  </script>
</body>
</html>
