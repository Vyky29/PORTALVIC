  <script type="module">
    async function portalImportDocumentsModule(tag) {
      const v = "20260518-bridge-hub-first";
      const custom =
        typeof window !== "undefined" && window.PORTAL_DOCUMENTS_BASE
          ? String(window.PORTAL_DOCUMENTS_BASE).trim().replace(/\/$/, "")
          : "";
      const originBase =
        typeof location !== "undefined" && location.origin
          ? String(location.origin).replace(/\/$/, "") + "/portal-shared-js"
          : "/portal-shared-js";
      const bases = [custom, originBase].filter(Boolean);
      const uniq = [...new Set(bases)];
      for (const base of uniq) {
        const url = `${base}/portal_documents.js?v=${v}`;
        try {
          return await import(url);
        } catch (e) {
          console.warn("[portal]", tag, "import failed", url, e);
        }
      }
      throw new Error(
        "Could not load portal_documents.js from /portal-shared-js/. Ensure portal-shared-js/portal_documents.js is deployed."
      );
    }
    const { portalUploadPdfAndCreateDocument, portalRequireUser } = await portalImportDocumentsModule("expenses");

    const MAX_ROWS = 12;
    const STAFF_CODE_FALLBACK = {
      stf001: { name: "Sandra", role: "Fitness Instructor 1" },
      stf002: { name: "Roberto", role: "Swimming Instructor 2" },
      stf003: { name: "Dan", role: "Swimming Instructor 3" },
      stf004: { name: "Angel", role: "Swimming Instructor 3" },
      stf005: { name: "Youssef", role: "Swimming Instructor 2" },
      stf006: { name: "John", role: "Service Lead" },
      stf007: { name: "Bismark", role: "Support Worker 3" },
      stf008: { name: "Giuseppe", role: "Support Worker 2" },
      stf009: { name: "Godsway", role: "Support Worker 1" },
      stf010: { name: "Javier Marquez", role: "Swimming Instructor 3" },
      stf011: { name: "Aurora", role: "Swimming Instructor 3" },
      stf012: { name: "Berta", role: "Service Lead" },
      stf013: { name: "Victor", role: "Manager" },
      stf014: { name: "Carlos", role: "Climbing Instructor 3" },
      stf015: { name: "Alex", role: "Climbing Instructor 3" },
      stf017: { name: "Javi", role: "CEO" },
      stf018: { name: "Raul", role: "Manager" },
      stf019: { name: "Sevitha", role: "Admin" },
      stf020: { name: "Teflon", role: "Staff" }
    };
        const form = document.getElementById("expenseForm");
    const bodyEl = document.getElementById("expenseBody");
    const totalEl = document.getElementById("grandTotal");
        const submitBtn = document.getElementById("submitBtn");

    function money(v) { return (Math.round((Number(v) + Number.EPSILON) * 100) / 100).toFixed(2); }
    function esc(value) { return String(value || "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
    function sanitizeFileName(fileName) {
      return String(fileName || "expenses.pdf").replace(/[^a-zA-Z0-9._-]/g, "_");
    }
    function hubLabelName(fullName) {
      const raw = String(fullName || "").trim();
      if (!raw || raw === "-") return "-";
      const H = window.PortalHubAuth;
      if (H && H.hubShortDisplayName) return H.hubShortDisplayName(raw);
      const first = raw.split(/\s+/)[0];
      return first ? first.charAt(0).toUpperCase() + first.slice(1) : raw;
    }
    let latestPdfBlob = null;
    let latestPdfFileName = "";

    function downloadPdfBlob(blob, fileName) {
      const blobUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = blobUrl;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(blobUrl), 1500);
    }

    function returnToPortalDashboard() {
      try {
        if (
          typeof window.portalGetPortalReturnUrl === "function" &&
          window.portalGetPortalReturnUrl() &&
          typeof window.portalRedirectToPortalReturn === "function"
        ) {
          window.portalRedirectToPortalReturn();
          return;
        }
      } catch (_) {}
      try {
        if (typeof window.portalGetPortalReturnUrl === "function") {
          const ret = window.portalGetPortalReturnUrl();
          if (ret) {
            window.location.replace(ret);
            return;
          }
        }
      } catch (_) {}
      const hub =
        typeof window.portalResolveHubUrl === "function"
          ? window.portalResolveHubUrl()
          : (typeof portalResolveHubUrl === "function" ? portalResolveHubUrl() : "staff_dashboard.html");
      try {
        window.location.replace(hub);
      } catch (_) {
        window.location.href = hub;
      }
    }

    function enableExpensesCloseAfterDownload() {
      const closeBtn = document.getElementById("expenses-close-portal");
      const hint = document.getElementById("expenses-download-hint");
      if (closeBtn) {
        closeBtn.hidden = false;
        closeBtn.disabled = false;
      }
      if (hint) {
        hint.textContent =
          "PDF downloaded. Close this screen when you are ready to return to the dashboard.";
      }
    }

    function showExpensesPostSubmitSummary(payload, pdfFileName) {
      const formEl = document.getElementById("expenseForm");
      const wrapper = document.getElementById("expensesSummaryWrapper");
      if (!wrapper) return;
      if (formEl) formEl.hidden = true;
      wrapper.hidden = false;

      const emp = hubLabelName(payload.employeeName);
      const rowsHtml = (payload.items || [])
        .map(
          (item) =>
            "<tr><td>" +
            esc(item.desc || "-") +
            '</td><td class="num">£' +
            esc(money(item.amount || 0)) +
            "</td><td>" +
            esc(item.receiptName || "-") +
            "</td></tr>"
        )
        .join("");

      wrapper.innerHTML =
        '<div class="ex-summary-container">' +
        '<div class="ex-summary-body">' +
        '<div class="ex-summary-logo"><img src="/assets/logoazul.png" alt="clubSENsational" /></div>' +
        "<h2>Expense claim submitted</h2>" +
        '<p class="ex-summary-kicker">Employee: <strong>' +
        esc(emp) +
        "</strong> · " +
        esc(payload.monthName || "-") +
        (payload.roleName && payload.roleName !== "-"
          ? " · Role: " + esc(payload.roleName)
          : "") +
        "</p>" +
        '<div class="ex-summary-table-wrap"><table class="ex-summary-table">' +
        "<thead><tr><th>Description</th><th>Amount (GBP)</th><th>Receipt</th></tr></thead>" +
        "<tbody>" +
        rowsHtml +
        "</tbody></table></div>" +
        '<div class="ex-summary-total-card">' +
        '<span class="ex-summary-total-label">Total claimed</span>' +
        '<span class="ex-summary-total-value">£' +
        esc(money(payload.total || 0)) +
        "</span></div>" +
        '<div class="ex-summary-actions">' +
        '<p class="ex-summary-hint" id="expenses-download-hint">Download your PDF to keep a copy. After downloading, you can return to the staff or lead dashboard.</p>' +
        '<div class="ex-summary-actions__buttons">' +
        '<button type="button" id="expenses-download-pdf">Download PDF</button>' +
        '<button type="button" id="expenses-close-portal" hidden disabled>Close &amp; return to dashboard</button>' +
        "</div></div></div></div>";

      document.getElementById("expenses-download-pdf").addEventListener("click", async () => {
        const btn = document.getElementById("expenses-download-pdf");
        const originalLabel = btn.textContent;
        btn.disabled = true;
        btn.textContent = "Preparing PDF…";
        try {
          if (!latestPdfBlob) throw new Error("PDF is not ready.");
          downloadPdfBlob(latestPdfBlob, latestPdfFileName || pdfFileName);
          enableExpensesCloseAfterDownload();
        } catch (err) {
          alert("PDF download error: " + (err && err.message ? err.message : err));
        } finally {
          btn.disabled = false;
          btn.textContent = originalLabel;
        }
      });

      document.getElementById("expenses-close-portal").addEventListener("click", () => {
        returnToPortalDashboard();
      });
    }
    function rows() { return Array.from(bodyEl.querySelectorAll("tr")); }
    function monthLabelFromNow() {
      const d = new Date();
      return d.toLocaleDateString("en-GB", { month: "long", year: "numeric" });
    }
    function firstNonEmpty(values, fallback = "") {
      for (let i = 0; i < values.length; i++) {
        const v = String(values[i] || "").trim();
        if (v) return v;
      }
      return fallback;
    }

    function readPinIdentityExpenses() {
      try {
        const pin = window.__PORTAL_PIN_IDENTITY__;
        const n = String((pin && pin.displayName) || "").trim();
        if (!n) return null;
        const src = String((pin && pin.source) || "").toLowerCase();
        const roleHint = src === "lead" ? "Lead" : "Staff";
        return { name: n, roleHint };
      } catch (_) {
        return null;
      }
    }

    function readSessionStaffExpenses() {
      const keys = [
        { key: "clubsens_staff_session_v2", role: "Staff" },
        { key: "clubsens_lead_session_v2", role: "Lead" },
      ];
      for (let i = 0; i < keys.length; i++) {
        try {
          const raw = localStorage.getItem(keys[i].key);
          if (!raw) continue;
          const o = JSON.parse(raw);
          const n = String((o && o.displayName) || "").trim();
          if (n) return { name: n, roleHint: keys[i].role };
        } catch (_) {}
      }
      return null;
    }

    function readUrlEmployeeNameExpenses() {
      try {
        const p = new URLSearchParams(location.search);
        const keys = ["full_name", "staff", "name", "reporter", "instructor"];
        for (let i = 0; i < keys.length; i++) {
          let v = p.get(keys[i]);
          if (!v) continue;
          try {
            if (v.indexOf("%") !== -1) v = decodeURIComponent(v);
          } catch (_) {}
          v = String(v || "").replace(/\+/g, " ").trim();
          if (v && v.indexOf("@") === -1) return v;
        }
        return "";
      } catch (_) {
        return "";
      }
    }

    function roleOverrideForExpenseName(name) {
      const n = String(name || "").toLowerCase();
      if (n.includes("arranz") || n === "javi" || n.includes("javier arranz")) return "CEO";
      return "";
    }

    /** Month + employee in UI; role kept in hidden #roleName for PDF / payload. */
    function hydrateExpenseHeaderSoft() {
      const monthEl = document.getElementById("monthName");
      const empEl = document.getElementById("employeeName");
      const roleEl = document.getElementById("roleName");
      if (monthEl) monthEl.textContent = monthLabelFromNow();
      const urlN = readUrlEmployeeNameExpenses();
      const pin = readPinIdentityExpenses();
      const sess = readSessionStaffExpenses();
      const name = firstNonEmpty([urlN, pin && pin.name, sess && sess.name], "");
      let role = firstNonEmpty([roleOverrideForExpenseName(name), sess && sess.roleHint, pin && pin.roleHint], "");
      if (name && !role) role = "Staff";
      if (empEl) empEl.textContent = name || "-";
      if (roleEl) roleEl.textContent = role || "-";
    }

    function addRow() {
      if (rows().length >= MAX_ROWS) return;
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><input class="ctl ex-desc" type="text" placeholder="Merchant / purpose" required></td>
        <td class="num"><input class="ctl ex-amount" type="number" min="0" step="0.01" placeholder="0.00" required></td>
        <td><input class="ctl ex-receipt" type="file" accept="image/*,application/pdf"></td>
      `;
      bodyEl.appendChild(tr);
    }

    function removeRow() {
      if (rows().length > 1) bodyEl.lastElementChild.remove();
      recalc();
    }

    function collect() {
      return rows().map((r) => {
        const desc = r.querySelector(".ex-desc")?.value || "";
        const amount = Number(r.querySelector(".ex-amount")?.value || 0);
        const receipt = r.querySelector(".ex-receipt")?.files?.[0] || null;
        return { desc, amount: Number.isFinite(amount) ? amount : 0, receiptName: receipt ? receipt.name : "", receiptFile: receipt };
      }).filter((x) => x.desc || x.amount > 0);
    }

    function recalc() {
      const total = collect().reduce((sum, row) => sum + row.amount, 0);
      totalEl.textContent = money(total);
      return Number(money(total));
    }

    async function hydrateEmployee() {
      hydrateExpenseHeaderSoft();
      try {
        const { user, supabase } = await portalRequireUser();
        const { data } = await supabase
          .from("staff_profiles")
          .select("full_name, username, role_track, role, app_role")
          .eq("id", user.id)
          .maybeSingle();
        const { data: rateData } = await supabase
          .from("staff_pay_rates")
          .select("role_label")
          .eq("user_id", user.id)
          .maybeSingle();
        const profile = data || {};
        const meta = (user && user.user_metadata) || {};
        const emailLocal = String((user && user.email) || "").split("@")[0].trim().toLowerCase();
        const codeFallback = STAFF_CODE_FALLBACK[emailLocal] || null;
        const nameResolved = firstNonEmpty(
          [
            profile.full_name,
            profile.username,
            meta.full_name,
            meta.name,
            meta.preferred_username,
            codeFallback && codeFallback.name,
          ],
          ""
        );
        const roleResolved = firstNonEmpty(
          [
            profile.role_track,
            profile.role,
            rateData && rateData.role_label,
            codeFallback && codeFallback.role,
            profile.app_role,
          ],
          ""
        );
        const monthEl = document.getElementById("monthName");
        const empEl = document.getElementById("employeeName");
        const roleEl = document.getElementById("roleName");
        if (monthEl) monthEl.textContent = monthLabelFromNow();
        if (nameResolved && empEl) empEl.textContent = nameResolved;
        if (roleResolved && roleEl) {
          let rd = String(roleResolved).trim();
          if (/^(staff|lead)$/i.test(rd)) {
            rd = rd.charAt(0).toUpperCase() + rd.slice(1).toLowerCase();
          }
          roleEl.textContent = rd;
        }
      } catch (_) {}
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve) => {
        try {
          if (!file || !(file instanceof File)) { resolve(""); return; }
            const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => resolve("");
            reader.readAsDataURL(file);
        } catch (_) {
          resolve("");
        }
      });
    }

    async function readImageUrlAsDataUrl(url) {
      try {
        const res = await fetch(url, { mode: "cors" });
        if (!res.ok) return "";
        const blob = await res.blob();
        return await new Promise((resolve) => {
          const r = new FileReader();
          r.onload = () => resolve(String(r.result || ""));
          r.onerror = () => resolve("");
          r.readAsDataURL(blob);
        });
      } catch (_) {
        return "";
      }
    }

    /** Logo para PDF: azul (mismo que timesheet) — assets/logoazul.png */
    async function readPdfLogoDataUrl() {
      const list = [];
      try {
        if (typeof location !== "undefined" && location.href) {
          list.push(new URL("assets/logoazul.png", location.href).href);
        }
      } catch (_) {}
      list.push("/assets/logoazul.png");
      const seen = new Set();
      for (let i = 0; i < list.length; i++) {
        const url = list[i];
        if (!url || seen.has(url)) continue;
        seen.add(url);
        const data = await readImageUrlAsDataUrl(url);
        if (data) return data;
      }
      return "";
    }

    /** Receipt/logo embed: downscale only when above maxEdgePx; JPEG quality tuned for sharp PDF output. */
    async function shrinkDataUrlAsJpegForPdf(dataUrl, maxEdgePx, quality) {
      if (!dataUrl || !String(dataUrl).startsWith("data:")) return "";
      const maxE = maxEdgePx > 0 ? maxEdgePx : 380;
      const q = typeof quality === "number" ? quality : 0.8;
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          try {
            const w = img.naturalWidth || img.width || 1;
            const h = img.naturalHeight || img.height || 1;
            const scale = Math.min(1, maxE / Math.max(w, h));
            const cw = Math.max(1, Math.round(w * scale));
            const ch = Math.max(1, Math.round(h * scale));
            const canvas = document.createElement("canvas");
            canvas.width = cw;
            canvas.height = ch;
            const ctx = canvas.getContext("2d");
            if (!ctx) {
              resolve("");
              return;
            }
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, cw, ch);
            ctx.drawImage(img, 0, 0, cw, ch);
            resolve(canvas.toDataURL("image/jpeg", q));
          } catch (_) {
            resolve("");
          }
        };
        img.onerror = () => resolve("");
        img.src = dataUrl;
      });
    }

    async function prepareExpenseReceiptImageForPdf(file) {
      let dataUrl = await readFileAsDataURL(file);
      if (!dataUrl) return null;
      const compact = await shrinkDataUrlAsJpegForPdf(dataUrl, 2400, 0.93);
      if (compact) dataUrl = compact;
      const type = /^data:image\/jpe?g/i.test(dataUrl) ? "JPEG" : "PNG";
      return { dataUrl, type };
    }

    function layoutExpenseReceiptImage(doc, image, receiptColL, receiptColW, maxImgH) {
      if (!image || !image.dataUrl) return null;
      const pad = 2;
      const innerW = Math.max(8, receiptColW - pad * 2);
      const maxH = maxImgH > 0 ? maxImgH : 58;
      try {
        const props = doc.getImageProperties(image.dataUrl);
        const iw = props.width || 1;
        const ih = props.height || 1;
        const sc = Math.min(innerW / iw, maxH / ih);
        const drawW = iw * sc;
        const drawH = ih * sc;
        return {
          dataUrl: image.dataUrl,
          type: image.type,
          drawW,
          drawH,
          imgX: receiptColL + (receiptColW - drawW) / 2,
          imgYPad: pad,
          captionMaxW: innerW,
          captionCenterX: receiptColL + receiptColW / 2,
        };
      } catch (_) {
        return null;
      }
    }

    async function generatePdfBlob(payload) {
      const JsPDFCtor = window.jspdf && window.jspdf.jsPDF ? window.jspdf.jsPDF : null;
      if (!JsPDFCtor) throw new Error("jsPDF is not available.");
      const doc = new JsPDFCtor({ unit: "mm", format: "a4", orientation: "portrait" });
      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const tableW = 184;
      const left = (pageW - tableW) / 2;
      const right = left + tableW;
      const colWDesc = 84;
      const colWAmt = 30;
      const colX = [left, left + colWDesc, left + colWDesc + colWAmt, right];
      let y = 12;

      function labeledLine(label, value, size = 11) {
        const labelTxt = `${label}: `;
        doc.setFont("helvetica", "bold");
        doc.setFontSize(size);
        doc.text(labelTxt, left, y);
        const x = left + doc.getTextWidth(labelTxt);
        doc.setFont("helvetica", "normal");
        doc.text(String(value || "-"), x, y);
        y += size * 0.42 + 2;
      }

      function ensureRoom(h) {
        if (y + h > pageH - 10) {
          doc.addPage();
          y = 12;
        }
      }

      const logoRaw = await readPdfLogoDataUrl();
      let logoData = logoRaw;
      if (logoRaw) {
        const compact = await shrinkDataUrlAsJpegForPdf(logoRaw, 380, 0.8);
        if (compact) logoData = compact;
      }
      if (logoData) {
        const logoW = 32;
        const logoH = 32;
        const logoX = (pageW - logoW) / 2;
        const logoFmt = /^data:image\/jpe?g/i.test(logoData) ? "JPEG" : "PNG";
        doc.addImage(logoData, logoFmt, logoX, y, logoW, logoH);
        y += logoH + 6;
      }
      doc.setFont("helvetica", "bold");
      doc.setFontSize(16);
      doc.setTextColor(10, 61, 98);
      doc.text("EXPENSE CLAIM", pageW / 2, y, { align: "center" });
      y += 7;
      doc.setFontSize(10);
      doc.setFont("helvetica", "normal");
      doc.setTextColor(95, 113, 133);
      doc.text("clubSENsational LTD", pageW / 2, y, { align: "center" });
      y += 7;
      doc.setTextColor(16, 34, 56);
      labeledLine("Employee", hubLabelName(payload.employeeName) || "-", 11);
      labeledLine("Role", payload.roleName || "-", 11);
      labeledLine("Month", payload.monthName || "-", 11);
      labeledLine("Submitted", payload.submittedDate || "-", 11);
      y += 1;

      doc.setFillColor(248, 251, 255);
      doc.setDrawColor(217, 227, 239);
      const headH = 8;
      doc.rect(colX[0], y, colX[3] - colX[0], headH, "FD");
      doc.setFont("helvetica", "bold");
      doc.setFontSize(10);
      doc.text("Description", (colX[0] + colX[1]) / 2, y + 5.2, { align: "center" });
      doc.text("Amount (GBP)", (colX[1] + colX[2]) / 2, y + 5.2, { align: "center" });
      doc.text("Receipt", (colX[2] + colX[3]) / 2, y + 5.2, { align: "center" });
      y += headH;

      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);
      doc.setTextColor(16, 34, 56);
      for (let i = 0; i < payload.items.length; i++) {
        const item = payload.items[i];
        const hasImage = item.receiptFile && String(item.receiptFile.type || "").toLowerCase().startsWith("image/");
        const descW = Math.max(12, colX[1] - colX[0] - 3);
        const descLines = doc.splitTextToSize(String(item.desc || "-"), descW);
        const textBlockH = 5 + Math.max(1, descLines.length) * 4.35;
        const rTxt = hasImage ? String(item.receiptName || "") : String(item.receiptName || "-");
        const receiptColL = colX[2];
        const receiptColW = colX[3] - receiptColL;
        const receiptInnerW = Math.max(8, receiptColW - 4);
        const rLines = doc.splitTextToSize(rTxt, receiptInnerW);
        const receiptHNoImg = 6 + rLines.length * 4.35 + 2;
        let receiptImg = null;
        if (hasImage) {
          const prepared = await prepareExpenseReceiptImageForPdf(item.receiptFile);
          receiptImg = layoutExpenseReceiptImage(doc, prepared, receiptColL, receiptColW, 72);
        }
        const receiptHImg = receiptImg
          ? receiptImg.imgYPad + receiptImg.drawH + 4 + rLines.length * 3.5 + 2
          : receiptHNoImg;
        const rowH = hasImage
          ? Math.max(receiptHImg, textBlockH + 4, receiptImg ? receiptImg.drawH + 10 : 36)
          : Math.max(11, textBlockH, receiptHNoImg);
        ensureRoom(rowH + 1);
        doc.rect(colX[0], y, colX[3] - colX[0], rowH, "S");
        doc.line(colX[1], y, colX[1], y + rowH);
        doc.line(colX[2], y, colX[2], y + rowH);
        doc.text(descLines, colX[0] + 1.5, y + 6);
        doc.text(money(item.amount || 0), (colX[1] + colX[2]) / 2, y + 6, { align: "center" });
        if (receiptImg) {
          try {
            doc.addImage(
              receiptImg.dataUrl,
              receiptImg.type,
              receiptImg.imgX,
              y + receiptImg.imgYPad,
              receiptImg.drawW,
              receiptImg.drawH
            );
          } catch (_) {}
          doc.setFontSize(8);
          doc.text(rLines, receiptImg.captionCenterX, y + receiptImg.imgYPad + receiptImg.drawH + 4, {
            align: "center",
            maxWidth: receiptImg.captionMaxW,
          });
          doc.setFontSize(10);
        } else if (hasImage) {
          doc.setFontSize(8);
          doc.text(rLines, receiptColL + receiptColW / 2, y + 6, {
            align: "center",
            maxWidth: receiptInnerW,
          });
          doc.setFontSize(10);
        } else {
          doc.text(rLines, receiptColL + receiptColW / 2, y + 6, {
            align: "center",
            maxWidth: receiptInnerW,
          });
        }
        y += rowH;
      }

      ensureRoom(12);
      const totH = 10;
      doc.setFillColor(248, 251, 255);
      doc.rect(colX[0], y, colX[3] - colX[0], totH, "FD");
      doc.line(colX[1], y, colX[1], y + totH);
      doc.line(colX[2], y, colX[2], y + totH);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(11);
      doc.setTextColor(10, 61, 98);
      doc.text("Total (GBP)", colX[0] + 1.5, y + 6.5);
      doc.text(money(payload.total || 0), (colX[1] + colX[2]) / 2, y + 6.5, { align: "center" });

      const pdfBytes = doc.output("arraybuffer");
      return new Blob([pdfBytes], { type: "application/pdf" });
    }

    document.getElementById("addRowBtn").addEventListener("click", () => addRow());
    document.getElementById("removeRowBtn").addEventListener("click", removeRow);
    bodyEl.addEventListener("input", recalc);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!form.reportValidity()) return;
      const items = collect();
      if (!items.length) { alert("Please add at least one expense row."); return; }

      submitBtn.disabled = true;
      try {
        const currentMonth = document.getElementById("monthName").textContent || monthLabelFromNow();
        const empDisplay = (document.getElementById("employeeName").textContent || "").trim();
        const monthTag = String(currentMonth).split(/\s+/)[0] || "Expenses";
        const payload = {
          employeeName: empDisplay || "-",
          roleName: (document.getElementById("roleName").textContent || "").trim() || "-",
          monthName: currentMonth,
          submittedDate: new Date().toLocaleDateString("en-GB"),
          items,
          total: recalc()
        };
        const pdfBlob = await generatePdfBlob(payload);
        const pdfFileName =
          sanitizeFileName(
            (hubLabelName(empDisplay) || "Employee") +
              "_" +
              String(monthTag).replace(/\s+/g, "_") +
              "_Expenses.pdf"
          );
        latestPdfBlob = pdfBlob;
        latestPdfFileName = pdfFileName;
        const relatedDate = new Date().toISOString().slice(0, 10);
        await portalUploadPdfAndCreateDocument({
          blob: pdfBlob,
          full_name: empDisplay && empDisplay !== "-" ? empDisplay : "",
          document_type: "expense",
          category: "finance",
          title: `${empDisplay && empDisplay !== "-" ? empDisplay + " · " : ""}${monthTag}'s Expenses`,
          related_date: relatedDate,
          source_page: "expenses",
        });
        if (typeof window.portalShowSubmitSuccessBanner === "function") {
          window.portalShowSubmitSuccessBanner("Expenses submitted successfully.");
        }
        showExpensesPostSubmitSummary(payload, pdfFileName);
        return;
      } catch (_) {
        const msg = _ && _.message ? String(_.message) : "Unknown error";
        console.error("[expenses] submit failed:", _);
        alert("Expenses submission failed. " + msg);
        submitBtn.disabled = false;
      }
    });

    function expensesNavigateBack() {
      if (typeof portalUnlockOrientation === "function") void portalUnlockOrientation();
      returnToPortalDashboard();
    }
    document.getElementById("expensesBackBtn")?.addEventListener("click", expensesNavigateBack);

    addRow();
    recalc();
    hydrateEmployee();
    setTimeout(function () {
      const el = document.getElementById("employeeName");
      if (el && (!String(el.textContent || "").trim() || String(el.textContent).trim() === "-")) {
        hydrateExpenseHeaderSoft();
      }
    }, 400);
    </script>

      function unlockExpensesOrientation() {

      window.addEventListener("beforeunload", unlockExpensesOrientation);
      var closeBtn = document.getElementById("expenses-close-portal");
      if (closeBtn) {
        closeBtn.addEventListener("click", unlockExpensesOrientation);
      }
    })();
  </script>
