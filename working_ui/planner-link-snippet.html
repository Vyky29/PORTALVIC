<!-- Portal staff/lead dashboards — Planner via Supabase session handoff (visualVIC). -->
<!-- Wired in portal-static-bootstrap.js: portalOpenRoutinesPlanner() on Plan topbar + quick menu. -->
<!-- Handoff: https://visual-vic.vercel.app/planner/auth/handoff#access_token=…&refresh_token=… -->

<button type="button" id="open-planner-btn" class="your-dashboard-button-class">
  Planner
</button>
<script>
  (function () {
    var btn = document.getElementById("open-planner-btn");
    if (!btn) return;
    btn.addEventListener("click", function () {
      if (typeof window.portalOpenRoutinesPlanner === "function") {
        void window.portalOpenRoutinesPlanner();
      } else {
        window.open("https://visual-vic.vercel.app/planner/login", "_blank", "noopener,noreferrer");
      }
    });
  })();
</script>
