<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Job application — clubSENsational Portal</title>
  <script src="/portal-static-bootstrap.js"></script>
  <script type="module">
    window.__portalOnboardingFormReady = (async function () {
      const { bootstrapDashboardSupabase } = await import("/portal/auth-handler.js?v=20260614-onboarding-session");
      await bootstrapDashboardSupabase({ page: "onboarding" });
    })();
  </script>
  <link rel="stylesheet" href="/portal/onboarding_applicant_form.css?v=20260614-full-fields" />
</head>
<body>
  <main class="ob-form-page">
    <header class="ob-form-head">
      <a class="ob-form-back" id="obFormBack" href="staff_dashboard.html">← Back</a>
      <h1>Job application</h1>
      <p>Complete in order. Right to work only if you are not British / UK. Bank details at the end.</p>
      <p id="obFormSession" class="ob-form-session" hidden aria-live="polite"></p>
    </header>
    <form id="jobForm" class="ob-form-card">
      <label>Name<input name="name" required autocomplete="given-name" /></label>
      <label>Surname<input name="surname" required autocomplete="family-name" /></label>
      <label>Address<textarea name="address" rows="3" autocomplete="street-address"></textarea></label>
      <label>Date of birth<input name="dob" type="date" autocomplete="bday" /></label>
      <label>Nationality
        <input name="nationality" required list="jobNationalityList" autocomplete="country-name" placeholder="e.g. British, Spanish" />
      </label>
      <datalist id="jobNationalityList">
        <option value="British"></option>
        <option value="English"></option>
        <option value="Scottish"></option>
        <option value="Welsh"></option>
        <option value="Irish"></option>
        <option value="Spanish"></option>
        <option value="Italian"></option>
        <option value="Portuguese"></option>
        <option value="French"></option>
        <option value="Polish"></option>
        <option value="Romanian"></option>
        <option value="Indian"></option>
        <option value="Pakistani"></option>
        <option value="Bangladeshi"></option>
        <option value="Nigerian"></option>
        <option value="Ghanaian"></option>
        <option value="American"></option>
      </datalist>
      <p class="ob-form-hint">British / UK nationals skip right to work below.</p>

      <fieldset id="jobRtwSection" hidden aria-hidden="true">
        <p class="ob-form-section">Right to work</p>
        <label>RTWork<textarea name="rtwork" rows="3" placeholder="Visa type, passport, expiry, etc."></textarea></label>
        <label>RTWork code<input name="rtwork_code" autocomplete="off" placeholder="Home Office share code" /></label>
      </fieldset>

      <label>Phone<input name="phone" type="tel" autocomplete="tel" /></label>
      <label>Role<input name="role" autocomplete="organization-title" /></label>
      <label>Status<input name="status" placeholder="Employment status" /></label>
      <label>Availability<textarea name="availability" rows="2"></textarea></label>
      <label>Education<textarea name="education" rows="2"></textarea></label>
      <label>Location<input name="location" autocomplete="address-level2" /></label>
      <label>Qualifications<textarea name="qualifications" rows="2"></textarea></label>
      <label>Date<input name="date" type="date" title="Qualifications or certification date" /></label>
      <label>Additional certifications<textarea name="additional_certifications" rows="2"></textarea></label>
      <label>Employment history<textarea name="employment_history" rows="4"></textarea></label>
      <label>Gaps in employment<textarea name="gaps" rows="2"></textarea></label>
      <label>Additional skills<textarea name="additional_skills" rows="2"></textarea></label>

      <label>Criminal record
        <select name="criminal_record">
          <option value="">Select…</option>
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>
      </label>
      <div id="jobCriminalInfoWrap" class="ob-form-detail" hidden aria-hidden="true">
        <label>Criminal record info<textarea name="criminal_record_info" rows="3"></textarea></label>
      </div>

      <label>Reference 1<textarea name="reference_1" rows="3" placeholder="Name, relationship, contact details"></textarea></label>
      <label>Reference 2<textarea name="reference_2" rows="3" placeholder="Name, relationship, contact details"></textarea></label>

      <p class="ob-form-section">Bank details (payroll)</p>
      <label>Bank account<input name="bank_account" autocomplete="off" /></label>
      <label>Sort code<input name="sort_code" inputmode="numeric" autocomplete="off" placeholder="00-00-00" /></label>
      <label>Account number<input name="account_number" inputmode="numeric" autocomplete="off" /></label>

      <label class="ob-form-check"><input type="checkbox" name="confirm" required /> I confirm the information above is accurate.</label>
      <p id="jobStatus" class="ob-form-status" hidden></p>
      <div class="ob-form-actions">
        <button type="button" class="ob-btn ob-btn--ghost" id="jobSaveDraft">Save draft</button>
        <button type="submit" class="ob-btn ob-btn--primary">Submit application</button>
      </div>
    </form>
  </main>
  <script src="/portal/onboarding_make_webhooks.js?v=20260601-make"></script>
  <script src="/portal/onboarding_job_form.js?v=20260614-full-fields"></script>
  <script src="/portal/onboarding_applicant_form.js?v=20260614-full-fields"></script>
  <script>
    (function () {
      var form = document.getElementById("jobForm");
      var statusEl = document.getElementById("jobStatus");
      function showStatus(msg, isErr) {
        if (!statusEl) return;
        statusEl.hidden = !msg;
        statusEl.textContent = msg || "";
        statusEl.classList.toggle("is-error", !!isErr);
      }
      async function init() {
        portalJobFormBind(form);
        var sessionEl = document.getElementById("obFormSession");
        var token = await portalOnboardingFormEnsureSession();
        if (!token) {
          if (sessionEl) {
            sessionEl.hidden = false;
            sessionEl.classList.add("is-error");
            sessionEl.textContent = "Not signed in — redirecting to login…";
          }
          return;
        }
        if (sessionEl) {
          var who = portalOnboardingFormSessionLabel();
          sessionEl.hidden = false;
          sessionEl.classList.remove("is-error");
          sessionEl.textContent = who ? "Connected as " + who : "Connected";
        }
        if (typeof portalOnboardingFormApplyBackLink === "function") portalOnboardingFormApplyBackLink();
        portalJobFormPrefillFromProfile(form);
        try {
          var res = await portalOnboardingFormLoadJob();
          if (res && res.draft && res.draft.payload) portalJobFormFill(form, res.draft.payload);
        } catch (e) {
          console.warn("[job application] draft load", e);
        }
      }
      document.getElementById("jobSaveDraft").addEventListener("click", async function () {
        showStatus("Saving…");
        try {
          await portalOnboardingFormSaveJob(portalJobFormReadPayload(form), { submit: false });
          showStatus("Draft saved.");
        } catch (e) {
          showStatus("Save failed. Try again.", true);
        }
      });
      form.addEventListener("submit", async function (ev) {
        ev.preventDefault();
        var msg = portalJobFormValidate(form, { submit: true });
        if (msg) {
          showStatus(msg, true);
          return;
        }
        showStatus("Submitting…");
        try {
          await portalOnboardingFormSaveJob(portalJobFormReadPayload(form), { submit: true });
          showStatus("Application submitted. You can close this page.");
        } catch (e) {
          showStatus("Submit failed. Try again.", true);
        }
      });
      init();
    })();
  </script>
</body>
</html>
