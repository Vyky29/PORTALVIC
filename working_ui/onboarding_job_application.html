<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Job application — clubSENsational Portal</title>
  <script src="/portal-static-bootstrap.js"></script>
  <script type="module">
    window.__portalOnboardingFormReady = (async function () {
      const { bootstrapDashboardSupabase } = await import("/portal/auth-handler.js?v=20260610-profile-bridge");
      await bootstrapDashboardSupabase({ page: "onboarding" });
    })();
  </script>
  <link rel="stylesheet" href="/portal/onboarding_applicant_form.css?v=20260601" />
</head>
<body>
  <main class="ob-form-page">
    <header class="ob-form-head">
      <a class="ob-form-back" id="obFormBack" href="staff_dashboard.html">← Back</a>
      <h1>Job application</h1>
      <p>Complete your pre-employment application. You can save and return later.</p>
      <p id="obFormSession" class="ob-form-session" hidden aria-live="polite"></p>
    </header>
    <form id="jobForm" class="ob-form-card">
      <label>Full name<input name="full_name" required autocomplete="name" /></label>
      <label>Email<input name="email" type="email" autocomplete="email" /></label>
      <label>Mobile<input name="mobile" type="tel" autocomplete="tel" /></label>
      <label>Home address<textarea name="address" rows="3"></textarea></label>
      <label>Right to work in the UK (details)<textarea name="right_to_work" rows="2"></textarea></label>
      <label>Bank account name<input name="bank_account_name" autocomplete="off" /></label>
      <label>Sort code<input name="bank_sort_code" inputmode="numeric" autocomplete="off" /></label>
      <label>Account number<input name="bank_account_number" inputmode="numeric" autocomplete="off" /></label>
      <label class="ob-form-check"><input type="checkbox" name="confirm" required /> I confirm the information above is accurate.</label>
      <p id="jobStatus" class="ob-form-status" hidden></p>
      <div class="ob-form-actions">
        <button type="button" class="ob-btn ob-btn--ghost" id="jobSaveDraft">Save draft</button>
        <button type="submit" class="ob-btn ob-btn--primary">Submit application</button>
      </div>
    </form>
  </main>
  <script src="/portal/onboarding_make_webhooks.js?v=20260601-make"></script>
  <script src="/portal/onboarding_applicant_form.js?v=20260614-session-touch"></script>
  <script>
    (function () {
      var form = document.getElementById("jobForm");
      var statusEl = document.getElementById("jobStatus");
      function showStatus(msg, isErr) {
        if (!statusEl) return;
        statusEl.hidden = !msg;
        statusEl.textContent = msg || "";
        statusEl.classList.toggle("is-error", !!isErr);
      }
      function readPayload() {
        var fd = new FormData(form);
        var out = {};
        fd.forEach(function (v, k) {
          if (k === "confirm") return;
          out[k] = String(v || "").trim();
        });
        return out;
      }
      function fillForm(payload) {
        if (!payload || typeof payload !== "object") return;
        Object.keys(payload).forEach(function (k) {
          var el = form.elements.namedItem(k);
          if (el && "value" in el && k !== "confirm") el.value = payload[k] || "";
        });
      }
      async function init() {
        var sessionEl = document.getElementById("obFormSession");
        var token = await portalOnboardingFormEnsureSession();
        if (!token) {
          if (sessionEl) {
            sessionEl.hidden = false;
            sessionEl.classList.add("is-error");
            sessionEl.textContent = "Not signed in — redirecting to login…";
          }
          return;
        }
        if (sessionEl) {
          var who = portalOnboardingFormSessionLabel();
          sessionEl.hidden = false;
          sessionEl.classList.remove("is-error");
          sessionEl.textContent = who ? "Connected as " + who : "Connected";
        }
        if (typeof portalOnboardingFormApplyBackLink === "function") portalOnboardingFormApplyBackLink();
        try {
          var res = await portalOnboardingFormLoadJob();
          fillForm(res.draft && res.draft.payload);
        } catch (e) {
          showStatus("Could not load saved draft.", true);
        }
      }
      document.getElementById("jobSaveDraft").addEventListener("click", async function () {
        showStatus("Saving…");
        try {
          await portalOnboardingFormSaveJob(readPayload(), { submit: false });
          showStatus("Draft saved.");
        } catch (e) {
          showStatus("Save failed. Try again.", true);
        }
      });
      form.addEventListener("submit", async function (ev) {
        ev.preventDefault();
        showStatus("Submitting…");
        try {
          await portalOnboardingFormSaveJob(readPayload(), { submit: true });
          showStatus("Application submitted. You can close this page.");
        } catch (e) {
          showStatus("Submit failed. Try again.", true);
        }
      });
      init();
    })();
  </script>
</body>
</html>
