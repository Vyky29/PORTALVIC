<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Health questionnaire — clubSENsational Portal</title>
  <script src="/portal-static-bootstrap.js"></script>
  <script type="module">
    window.__portalOnboardingFormReady = (async function () {
      const { bootstrapDashboardSupabase } = await import("/portal/auth-handler.js?v=20260610-profile-bridge");
      await bootstrapDashboardSupabase({ page: "staff" });
    })();
  </script>
  <link rel="stylesheet" href="/portal/onboarding_applicant_form.css?v=20260601" />
</head>
<body>
  <main class="ob-form-page">
    <header class="ob-form-head">
      <a class="ob-form-back" id="obFormBack" href="staff_dashboard.html">← Back</a>
      <h1>Health questionnaire</h1>
      <p>Pre-employment health form. Save a draft or submit when complete.</p>
    </header>
    <form id="healthForm" class="ob-form-card">
      <label>Full name<input name="full_name" required autocomplete="name" /></label>
      <label>GP name and surgery<textarea name="gp_details" rows="2"></textarea></label>
      <label>Current medical conditions<textarea name="medical_conditions" rows="3"></textarea></label>
      <label>Current medications<textarea name="medications" rows="2"></textarea></label>
      <label>Allergies<textarea name="allergies" rows="2"></textarea></label>
      <label>Recent illness or injury (last 12 months)<textarea name="recent_illness" rows="2"></textarea></label>
      <label class="ob-form-check"><input type="checkbox" name="confirm" required /> I confirm this information is complete and accurate.</label>
      <p id="healthStatus" class="ob-form-status" hidden></p>
      <div class="ob-form-actions">
        <button type="button" class="ob-btn ob-btn--ghost" id="healthSaveDraft">Save draft</button>
        <button type="submit" class="ob-btn ob-btn--primary">Submit questionnaire</button>
      </div>
    </form>
  </main>
  <script src="/portal/onboarding_applicant_form.js?v=20260601-lead-back"></script>
  <script>
    (function () {
      var form = document.getElementById("healthForm");
      var statusEl = document.getElementById("healthStatus");
      function showStatus(msg, isErr) {
        if (!statusEl) return;
        statusEl.hidden = !msg;
        statusEl.textContent = msg || "";
        statusEl.classList.toggle("is-error", !!isErr);
      }
      function readPayload() {
        var fd = new FormData(form);
        var out = {};
        fd.forEach(function (v, k) {
          if (k === "confirm") return;
          out[k] = String(v || "").trim();
        });
        return out;
      }
      function fillForm(payload) {
        if (!payload || typeof payload !== "object") return;
        Object.keys(payload).forEach(function (k) {
          var el = form.elements.namedItem(k);
          if (el && "value" in el && k !== "confirm") el.value = payload[k] || "";
        });
      }
      async function init() {
        await portalOnboardingFormEnsureSession();
        if (typeof portalOnboardingFormApplyBackLink === "function") portalOnboardingFormApplyBackLink();
        try {
          var res = await portalOnboardingFormLoadHealth();
          fillForm(res.draft && res.draft.payload);
        } catch (e) {
          showStatus("Could not load saved draft.", true);
        }
      }
      document.getElementById("healthSaveDraft").addEventListener("click", async function () {
        showStatus("Saving…");
        try {
          await portalOnboardingFormSaveHealth(readPayload(), { submit: false });
          showStatus("Draft saved.");
        } catch (e) {
          showStatus("Save failed. Try again.", true);
        }
      });
      form.addEventListener("submit", async function (ev) {
        ev.preventDefault();
        showStatus("Submitting…");
        try {
          await portalOnboardingFormSaveHealth(readPayload(), { submit: true });
          showStatus("Questionnaire submitted. You can close this page.");
        } catch (e) {
          showStatus("Submit failed. Try again.", true);
        }
      });
      init();
    })();
  </script>
</body>
</html>
