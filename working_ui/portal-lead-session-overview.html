<!DOCTYPE html>
<html lang="en-GB">
<head>
  <script src="/portal-static-bootstrap.js?v=20260605-form-redirect"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Session overview · Programme lead</title>
  <link rel="stylesheet" href="/portal/admin-sessions-hub.css?v=20260526-lead-overview" />
  <link rel="stylesheet" href="/portal/admin-portal-forms.css?v=20260603-form-record-modal" />
  <link rel="stylesheet" href="/portal/portal-lead-session-overview.css?v=20260622-next-chip-client" />
  <script src="/portal/portal_orientation_lock.js?v=20260622-next-chip-client"></script>
  <script src="/portal/admin-portal-form-record-modal.js?v=20260603-form-record-modal"></script>
  <script src="/portal/admin-portal-day-ops.js?v=20260603-form-record-modal"></script>
  <script src="/portal/admin-sessions-hub.js?v=20260605-feedback-instructor-own"></script>
  <script src="/portal/session_feedback_portal_data.js?v=20260527-ma-apr-may"></script>
  <script src="/portal/session_feedback_status_portal_data.js?v=20260527-ma-apr-may"></script>
</head>
<body class="portal-lead-session-overview-page">
  <header class="plso-topbar">
    <a class="plso-back" href="lead_dashboard.html">← Lead dashboard</a>
    <h1>Session overview</h1>
  </header>
  <p class="plso-scope-hint" id="plsoScopeHint" hidden></p>
  <main class="plso-shell">
    <div class="c4k-sessions-hub portal-day-ops-embed">
      <div class="c4k-sessions-hub__head" id="plsoHubHead">
        <div class="c4k-sessions-hub__title-row">
          <span class="c4k-sessions-hub__ico" aria-hidden="true">📋</span>
          <div style="min-width:0">
            <h1 class="c4k-sessions-hub__title">SESSION FEEDBACKS</h1>
            <p class="c4k-sessions-hub__sub">Staff feedback and awaiting sessions for your programme days.</p>
          </div>
        </div>
      </div>
      <div class="c4k-sessions-hub-tabs" role="tablist" aria-label="Session overview">
        <button type="button" class="c4k-sessions-hub-tab is-active" data-plso-tab="feedback">Feedbacks</button>
        <button type="button" class="c4k-sessions-hub-tab" data-plso-tab="absents">Absents</button>
        <button type="button" class="c4k-sessions-hub-tab" data-plso-tab="incidents">Incidents</button>
        <button type="button" class="c4k-sessions-hub-tab" data-plso-tab="lead">Lead reports</button>
      </div>
      <div id="portalDayOpsStatus" class="portal-forms-status" aria-live="polite"></div>
      <div id="c4kHubPanelFeedback" class="c4k-sessions-hub-panel">
        <div
          id="adminSessionFeedbacksRoot"
          class="admin-sessions-hub-root admin-session-feedbacks-root"
          role="region"
          aria-label="Session feedback"
        >
          <p class="muted" style="margin:0 0 12px;font-size:13px">Loading session feedback…</p>
        </div>
      </div>
      <div id="c4kHubPanelAbsents" class="c4k-sessions-hub-panel" hidden>
        <div
          id="adminSessionsAbsentsRoot"
          class="admin-sessions-hub-root admin-sessions-absents-root"
          role="region"
          aria-label="Session absents"
        ></div>
      </div>
      <div id="c4kHubPanelIncidents" class="c4k-sessions-hub-panel" hidden>
        <div
          id="adminSessionsIncidentsRoot"
          class="admin-sessions-hub-root admin-sessions-incidents-root"
          role="region"
          aria-label="Session incidents"
        ></div>
      </div>
      <div id="c4kHubPanelLead" class="c4k-sessions-hub-panel" hidden>
        <h2 class="portal-forms-heading">Lead reports</h2>
        <div class="files-table-wrap portal-forms-table-wrap">
          <table class="files-table portal-forms-table portal-forms-table--lead-reports">
            <thead>
              <tr>
                <th class="col-date">When</th>
                <th>Submitted by</th>
                <th>Service</th>
                <th>Activity</th>
                <th class="col-brief-desc">Brief description</th>
                <th class="col-actions">View</th>
              </tr>
            </thead>
            <tbody id="portalFormsLeadTbody">
              <tr>
                <td colspan="6"><div class="submission-state"><strong>Loading…</strong></div></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  <script type="module">
    import { portalInitLeadSessionOverviewPage } from "/portal/portal_lead_session_overview_page.js?v=20260610-feedback-stats-parity";
    if (typeof portalLockLandscape === "function") void portalLockLandscape();
    window.addEventListener("pagehide", function () {
      if (typeof portalUnlockOrientation === "function") void portalUnlockOrientation();
    });
    portalInitLeadSessionOverviewPage().catch(function (e) {
      console.error(e);
      alert("Could not load session overview. Try again or return to the lead dashboard.");
    });
  </script>
</body>
</html>
