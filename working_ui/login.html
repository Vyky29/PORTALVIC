  <style>
    :root{
      --blue:#2d84b3;
      --blueSoft:#eaf5fb;
      --gold:#f4b740;
      --sen-gold:#f9bf2e;
      --goldSoft:#fff4df;
      --ink:#173247;
      --text:#314555;
      --muted:#728290;
      --line:rgba(23,50,71,.12);
      --white:#ffffff;
      --bg:#f4f8fb;
      --shadow:0 18px 50px rgba(23,50,71,.08);
      --radius:22px;
      --danger:#d9534f;
      --dangerSoft:#fff1f1;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      min-height:100dvh;
      max-width:100%;
      overflow-x:hidden;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      -webkit-text-size-adjust:100%;
      overscroll-behavior-x:none;
    }
    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:max(20px, env(safe-area-inset-top, 0px)) 18px max(20px, env(safe-area-inset-bottom, 0px));
      background:linear-gradient(180deg,#f7fbff 0%,#edf4fb 100%);
    }

    .login-wrap{
      width:100%;
      max-width:420px;
    }

    .login-card{
      background:var(--white);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      border:1px solid var(--line);
      padding:clamp(28px,5vw,40px) clamp(22px,4vw,36px);
      transition:box-shadow .25s ease, transform .25s ease;
    }
    .login-card:focus-within{
      box-shadow:0 22px 56px rgba(23,50,71,.1);
    }

    .login-brand{
      margin:0 0 20px;
      text-align:center;
    }
    /* Stage: room for orbital SVG around the mark */
    .login-logo-stage{
      position:relative;
      width:min(240px,64vw);
      max-width:100%;
      aspect-ratio:1;
      margin:0 auto 12px;
      display:grid;
      place-items:center;
    }
    .login-orbit-svg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:0;
      overflow:visible;
    }
    .orbit-layer--cw{
      transform-origin:0 0;
      animation:orbit-cw 18s linear infinite;
    }
    .orbit-layer--ccw{
      transform-origin:0 0;
      animation:orbit-ccw 14s linear infinite;
    }
    .orbit-layer--slow-ccw{
      transform-origin:0 0;
      animation:orbit-ccw 26s linear infinite;
    }
    @keyframes orbit-cw{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }
    @keyframes orbit-ccw{
      from{transform:rotate(0deg)}
      to{transform:rotate(-360deg)}
    }
    @media (prefers-reduced-motion:reduce){
      .orbit-layer--cw,.orbit-layer--ccw,.orbit-layer--slow-ccw{animation:none}
    }

    /* Official PNG has a black square canvas around the round mark — crop to the circle */
    .login-logo-shell{
      position:relative;
      z-index:1;
      width:70%;
      max-width:168px;
      aspect-ratio:1;
      border-radius:50%;
      overflow:hidden;
      background:var(--white);
      display:grid;
      place-items:center;
      box-shadow:
        0 0 0 2px rgba(249,191,46,.5),
        0 0 18px rgba(249,191,46,.45),
        0 0 36px rgba(244,183,64,.32),
        0 0 56px rgba(249,191,46,.22),
        0 0 80px rgba(45,132,179,.12);
    }
    .login-logo-shell .login-logo{
      width:100%;
      height:100%;
      margin:0;
      object-fit:cover;
      transform:scale(1.32);
      transform-origin:center center;
    }
    .login-logo{
      display:block;
      max-width:100%;
      height:auto;
    }
    .login-portal-text{
      display:block;
      margin:0;
      font-size:clamp(1.05rem,3.2vw,1.2rem);
      font-weight:700;
      color:var(--ink);
      letter-spacing:-.02em;
    }
    .field{
      margin-bottom:16px;
    }
    .field label{
      display:block;
      font-size:.8rem;
      font-weight:600;
      color:var(--ink);
      margin-bottom:6px;
    }
    .field input{
      width:100%;
      padding:12px 14px;
      font-size:1rem;
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--white);
      color:var(--text);
      transition:border-color .2s ease, box-shadow .2s ease;
    }
    .field input::placeholder{color:var(--muted);opacity:.75}
    .field input:focus{
      outline:none;
      border-color:rgba(45,132,179,.45);
      box-shadow:0 0 0 3px var(--blueSoft);
    }

    .btn-login{
      width:100%;
      margin-top:8px;
      padding:14px 18px;
      font-size:1rem;
      font-weight:700;
      color:var(--white);
      background:linear-gradient(180deg,var(--blue) 0%,#2676a0 100%);
      border:none;
      border-radius:14px;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .2s ease, filter .2s ease;
      box-shadow:0 4px 14px rgba(45,132,179,.28);
    }
    .btn-login:hover{filter:brightness(1.03)}
    .btn-login:active{transform:scale(.985)}
    .btn-login:disabled{
      opacity:.65;
      cursor:wait;
      transform:none;
    }

    .error-msg{
      margin-top:14px;
      padding:10px 12px;
      font-size:.875rem;
      color:var(--danger);
      background:var(--dangerSoft);
      border:1px solid rgba(217,83,79,.25);
      border-radius:12px;
      text-align:center;
      opacity:0;
      max-height:0;
      overflow:hidden;
      padding-top:0;
      padding-bottom:0;
      margin-top:0;
      border-width:0;
      transition:opacity .25s ease, max-height .3s ease, margin-top .25s ease, padding .25s ease, border-width .2s ease;
    }
    .error-msg.visible{
      opacity:1;
      max-height:min(42vh,280px);
      margin-top:14px;
      padding:10px 12px;
      border-width:1px;
      overflow-y:auto;
      text-align:left;
      white-space:pre-wrap;
      overflow-wrap:break-word;
    }
    .login-updated-msg{
      margin:0 0 14px;
      padding:0 12px;
      font-size:.875rem;
      line-height:1.45;
      color:var(--ink);
      background:var(--goldSoft);
      border:1px solid rgba(244,183,64,.45);
      border-radius:12px;
      text-align:center;
      opacity:0;
      max-height:0;
      overflow:hidden;
      transition:opacity .25s ease,max-height .3s ease,padding .25s ease,margin .25s ease;
    }
    .login-updated-msg.visible{
      opacity:1;
      max-height:6rem;
      padding:10px 12px;
    }
    .login-active-session{
      margin:0 0 14px;
      padding:10px 12px;
      border-radius:12px;
      background:#fff8e6;
      border:1px solid #f4b740;
      font-size:13px;
      line-height:1.45;
      color:var(--ink);
    }
    .login-active-session a{
      color:var(--blue);
      font-weight:700;
      text-decoration:underline;
    }

    @media (min-width: 900px) {
      body{
        padding:32px 40px;
        align-items:stretch;
        background:linear-gradient(135deg,#f7fbff 0%,#e8f2fa 48%,#edf4fb 100%);
      }
      .login-wrap{
        max-width:min(980px,94vw);
        margin:0 auto;
        display:flex;
        align-items:center;
        min-height:calc(100dvh - 64px);
      }
      .login-card{
        display:grid;
        grid-template-columns:minmax(300px,1fr) minmax(340px,1fr);
        align-items:stretch;
        width:100%;
        padding:0;
        overflow:hidden;
        min-height:min(640px, calc(100dvh - 80px));
      }
      .login-brand{
        margin:0;
        padding:48px 40px 40px;
        display:flex;
        flex-direction:column;
        justify-content:center;
        text-align:center;
        background:linear-gradient(180deg,#fbfdff 0%,#eef6fc 100%);
        border-right:1px solid var(--line);
      }
      .login-logo-stage{
        width:min(280px,78%);
        margin-bottom:16px;
      }
      .login-portal-text{
        font-size:1.75rem;
      }
      .login-panel{
        padding:44px 48px 40px;
        display:flex;
        flex-direction:column;
        justify-content:center;
        min-width:0;
      }
      .login-updated-msg.visible{

      .field label{

        font-size:1.02rem;
      }
      .btn-login{
        margin-top:12px;
        padding:15px 18px;
        font-size:1.05rem;
      }
    }

      var m = document.createElement('meta');
      m.setAttribute('name', name);
      m.setAttribute('content', content);
      (document.head || document.documentElement).appendChild(m);

      if(!document.head) return;
      ensureMeta('apple-mobile-web-app-capable', 'yes');
      ensureMeta('mobile-web-app-capable', 'yes');
      ensureMeta('apple-mobile-web-app-title', 'Portal');
      ensureMeta('apple-mobile-web-app-status-bar-style', 'default');

  })();

  <script>
    (function () {
      var form = document.getElementById("login-form");
      if (!form) return;
      var btn = document.getElementById("btn-login");
      var err = document.getElementById("error-msg");
      var waitPoll = null;

      function resetLoginBtn() {
        if (btn) {
          btn.disabled = false;
          btn.textContent = "Login";
        }
      }

      function showLoginWait() {
        if (err) {
          err.textContent = "Preparing sign-in…";
          err.classList.add("visible");
        }
        if (btn) {
          btn.disabled = true;
          btn.textContent = "Preparing…";
        }
      }

      function showLoginBootError(message) {
        resetLoginBtn();
        if (err) {
          err.textContent =
            message ||
            "Sign-in could not start. Check your connection, refresh the page, and try again.";
          err.classList.add("visible");
        }
      }

      form.addEventListener(
        "submit",
        function (e) {
          if (window.__PORTAL_LOGIN_HANDLER_READY__) return;
          e.preventDefault();
          e.stopPropagation();
          if (window.__PORTAL_LOGIN_BOOT_FAILED__) {
            showLoginBootError(window.__PORTAL_LOGIN_BOOT_FAILED__);
            return;
          }
          showLoginWait();
          if (waitPoll) return;
          var attempts = 0;
          waitPoll = window.setInterval(function () {
            attempts += 1;
            if (window.__PORTAL_LOGIN_HANDLER_READY__) {
              window.clearInterval(waitPoll);
              waitPoll = null;
              if (err) {
                err.textContent = "";
                err.classList.remove("visible");
              }
              resetLoginBtn();
              try {
                form.requestSubmit();
              } catch (_rs) {
                form.dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));
              }
              return;
            }
            if (window.__PORTAL_LOGIN_BOOT_FAILED__) {
              window.clearInterval(waitPoll);
              waitPoll = null;
              showLoginBootError(window.__PORTAL_LOGIN_BOOT_FAILED__);
              return;
            }
            if (attempts >= 150) {
              window.clearInterval(waitPoll);
              waitPoll = null;
              showLoginBootError(
                "Sign-in is taking too long. Check your connection, refresh the page, and try again."
              );
            }
          }, 100);
        },
        true
      );
    })();
  </script>

  <script>
    (function () {
      try {
        var u = new URL(window.location.href);
        var raw = (
          u.searchParams.get("staff") ||
          u.searchParams.get("name") ||
          u.searchParams.get("user") ||
          ""
        ).trim();
        if (!raw) return;
        var el = document.getElementById("name");
        if (!el) return;
        var strip = function (s) {
          return String(s || "")
            .trim()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase();
        };
        var want = strip(raw);
        var map = window.PORTAL_STAFF_LOGIN_MAP && window.PORTAL_STAFF_LOGIN_MAP.staff_username_to_email;
        if (map && typeof map === "object") {
          for (var k in map) {
            if (!Object.prototype.hasOwnProperty.call(map, k)) continue;
            if (strip(k) === want) {
              el.value = k;
              break;
            }
          }
        }
        if (!el.value) {
          el.value = raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase();
        }
        var pw = document.getElementById("password");
        if (pw) {
          window.setTimeout(function () {
            try {
              pw.focus();
            } catch (e2) {}
          }, 80);
        }
      } catch (e) {}
    })();
  </script>

      var portalJsBase = new URL("portal/", window.location.href).href;
      var portalAuthModuleUrl = portalJsBase + "auth-handler.js?v=" + portalJsVer;
      void (async function bootPortalLoginModule() {

          window.__PORTAL_LOGIN_BOOT_FAILED__ =
            "Could not load sign-in. Please refresh and try again.";
        }
        if (!window.__PORTAL_LOGIN_HANDLER_READY__ && !window.__PORTAL_LOGIN_BOOT_FAILED__) {
          window.__PORTAL_LOGIN_BOOT_FAILED__ =
            "Could not start sign-in. Please refresh and try again.";
        }
      })();
    })();
  </script>
