<!DOCTYPE html>
<!--

<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f8fb" />
  <meta name="description" content="Browse clubSENsational services and weekly session times. See the full offer — including fully booked slots." />
  <link rel="canonical" href="https://www.clubsensational.org/bookingservice" />
  <title>Book a service — clubSENsational</title>
  <script src="/portal-static-bootstrap.js"></script>
  <script src="/portal/portal_brand.js?v=20260714-booking-ui2"></script>
  <link rel="icon" type="image/png" sizes="192x192" href="/portal/app-icon/icon-192.png" />
  <style>
    :root {
      --blue: #2d84b3;
      --blueDeep: #1f6a94;
      --blueSoft: #eaf5fb;
      --gold: #f4b740;
      --sen-gold: #f9bf2e;
      --ink: #173247;
      --text: #314555;
      --muted: #728290;
      --line: rgba(23, 50, 71, 0.12);
      --white: #ffffff;
      --bg0: #f7fbff;
      --bg1: #edf4fb;
      --danger: #b42318;
      --dangerSoft: #fef3f2;
      --ok: #157347;
      --okSoft: #e8f7ef;
      --radius: 20px;
      --pad-x: clamp(16px, 3.5vw, 48px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    [hidden] { display: none !important; }
    html, body {
      margin: 0;
      min-height: 100dvh;
      max-width: 100%;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 520px at 8% -8%, rgba(45, 132, 179, 0.16), transparent 55%),
        radial-gradient(900px 420px at 100% 0%, rgba(244, 183, 64, 0.18), transparent 50%),
        linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 100%);
      line-height: 1.45;
    }

    /* Full-bleed page — no narrow column */
    .page {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: max(16px, env(safe-area-inset-top)) var(--pad-x) max(48px, env(safe-area-inset-bottom));
      min-width: 0;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
      margin: 0 0 22px;
      min-width: 0;
      padding: 8px 0 4px;
    }
    .brand-logo-stage {
      position: relative;
      width: min(280px, 72vw);
      max-width: 100%;
      aspect-ratio: 1;
      margin: 0 auto;
      display: grid;
      place-items: center;
    }
    .brand-orbit-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: visible;
    }
    .orbit-layer--cw { transform-origin: 0 0; animation: orbit-cw 18s linear infinite; }
    .orbit-layer--ccw { transform-origin: 0 0; animation: orbit-ccw 14s linear infinite; }
    .orbit-layer--slow-ccw { transform-origin: 0 0; animation: orbit-ccw 26s linear infinite; }
    @keyframes orbit-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes orbit-ccw {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .orbit-layer--cw, .orbit-layer--ccw, .orbit-layer--slow-ccw { animation: none; }
    }
    .brand-logo-shell {
      position: relative;
      z-index: 1;
      width: 70%;
      max-width: 196px;
      aspect-ratio: 1;
      border-radius: 50%;
      overflow: hidden;
      background: var(--white);
      display: grid;
      place-items: center;
      box-shadow:
        0 0 0 2px rgba(249, 191, 46, 0.5),
        0 0 22px rgba(249, 191, 46, 0.45),
        0 0 44px rgba(244, 183, 64, 0.32),
        0 0 70px rgba(45, 132, 179, 0.14);
    }
    .brand-logo-shell img {
      width: 100%;
      height: 100%;
      margin: 0;
      object-fit: cover;
      transform: scale(1.32);
      transform-origin: center center;
    }
    .brand h1 {
      margin: 0;
      font-size: clamp(1.65rem, 4.5vw, 2.35rem);
      color: var(--ink);
      font-weight: 800;
      letter-spacing: -0.03em;
      overflow-wrap: break-word;
    }
    .brand .lede {
      margin: 0;
      max-width: 42rem;
      width: 100%;
      color: var(--muted);
      font-size: clamp(0.95rem, 2vw, 1.05rem);
      overflow-wrap: break-word;
    }

    .offer-banner {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 0 0 18px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(45, 132, 179, 0.28);
      background: rgba(234, 245, 251, 0.9);
      color: var(--ink);
      font-size: 0.9rem;
      overflow-wrap: break-word;
      min-width: 0;
    }
    .offer-banner--error {
      border-color: rgba(180, 35, 24, 0.28);
      background: var(--dangerSoft);
      color: var(--danger);
    }
    .offer-banner svg {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      color: var(--blueDeep);
      margin-top: 1px;
    }
    .offer-banner--error svg { color: var(--danger); }
    .offer-banner span { min-width: 0; overflow-wrap: break-word; }

    .filters {
      position: sticky;
      top: 0;
      z-index: 5;
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 16px 12px;
      margin: 0 0 20px;
      box-shadow: 0 10px 28px rgba(23, 50, 71, 0.06);
      min-width: 0;
    }
    .filters__title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 12px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-weight: 800;
    }
    /* Inline SVG icons without width/height otherwise explode to huge defaults */
    .page svg:not(.brand-orbit-svg) {
      width: 1em;
      height: 1em;
      max-width: 28px;
      max-height: 28px;
      flex-shrink: 0;
      display: inline-block;
      vertical-align: middle;
      overflow: hidden;
    }
    .svc__icon svg {
      width: 28px;
      height: 28px;
      max-width: 28px;
      max-height: 28px;
    }
    .day-acc > summary svg,
    .venue-block__title svg,
    .filters__title svg,
    .offer-block__title svg,
    .chip svg,
    .badge svg,
    .btn svg,
    .btn-ghost svg,
    .svc-card__cta svg,
    .offer-banner svg,
    label.field .field-label svg {
      width: 16px;
      height: 16px;
      max-width: 16px;
      max-height: 16px;
    }
    .offer-banner svg { width: 22px; height: 22px; max-width: 22px; max-height: 22px; }
    .chip svg { width: 13px; height: 13px; max-width: 13px; max-height: 13px; color: var(--blue); }
    .badge svg { width: 12px; height: 12px; max-width: 12px; max-height: 12px; }
    .filters__title svg { color: var(--blue); }
    label.field .field-label svg { color: var(--blue); }
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }
    @media (min-width: 900px) {
      .filter-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
    label.field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--ink);
    }
    label.field .field-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    label.field select {
      width: 100%;
      min-width: 0;
      font: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--white);
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      min-width: 0;
    }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--ink);
      font-weight: 600;
      min-width: 0;
      overflow-wrap: break-word;
    }
    .toggle input { width: 16px; height: 16px; accent-color: var(--blue); }
    .btn-ghost {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 0;
      background: transparent;
      color: var(--blueDeep);
      font: inherit;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 6px 4px;
    }
    .btn-ghost svg { width: 16px; height: 16px; }

    .services {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin: 0 0 22px;
      width: 100%;
      min-width: 0;
    }
    .services__group { min-width: 0; width: 100%; }
    .services__label {
      margin: 0 0 10px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .services__grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      width: 100%;
      min-width: 0;
    }
    @media (min-width: 640px) {
      .services__grid--core { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .services__grid--more { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (min-width: 960px) {
      .services__grid--more { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
    .svc-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px 14px 16px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-shadow: 0 6px 18px rgba(23, 50, 71, 0.04);
      width: 100%;
      text-align: center;
      cursor: pointer;
      font: inherit;
      color: inherit;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }
    .svc-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 28px rgba(23, 50, 71, 0.1);
      border-color: rgba(45, 132, 179, 0.35);
    }
    .svc-card:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }
    .svc-card.is-active {
      border-color: rgba(45, 132, 179, 0.55);
      box-shadow: 0 0 0 3px rgba(45, 132, 179, 0.18);
    }
    @media (prefers-reduced-motion: reduce) {
      .svc-card { transition: none; }
      .svc-card:hover { transform: none; }
    }
    .svc__icon {
      flex: 0 0 auto;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      margin: 0 auto;
      background: var(--blueSoft);
      color: var(--blueDeep);
    }
    .svc__icon svg {
      width: 28px !important;
      height: 28px !important;
      max-width: 28px !important;
      max-height: 28px !important;
    }
    .svc__icon--climb { background: #fff6e5; color: #b7791f; }
    .svc__icon--physical { background: #f3e8ff; color: #7c3aed; }
    .svc__icon--multi { background: #e8f0fe; color: #1d4ed8; }
    .svc__icon--bespoke { background: #fff1e8; color: #c2410c; }
    .svc__icon--dc { background: #eef6f2; color: #1f6b4a; }
    .svc__icon--intensive { background: #fce7f3; color: #be185d; }
    .svc-card h3 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.02rem, 2vw, 1.2rem);
      font-weight: 800;
      overflow-wrap: break-word;
      min-width: 0;
      width: 100%;
      text-align: center;
    }
    .svc-card__hint {
      margin: 0;
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 700;
      overflow-wrap: break-word;
      width: 100%;
      text-align: center;
      line-height: 1.3;
    }
    .svc-card__blurb {
      margin: 0;
      font-size: 0.9rem;
      color: var(--text);
      overflow-wrap: break-word;
      flex: 1 1 auto;
      width: 100%;
      text-align: center;
      line-height: 1.4;
    }
    .svc-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 0;
      min-width: 0;
      width: 100%;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #f3f7fb;
      border: 1px solid var(--line);
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--muted);
      max-width: 100%;
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .chip svg { width: 13px; height: 13px; flex: 0 0 auto; color: var(--blue); }
    .svc-card__cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 2px;
      padding: 11px 14px;
      border-radius: 12px;
      background: var(--blue);
      color: #fff;
      font-weight: 800;
      font-size: 0.9rem;
      width: 100%;
    }
    .svc-card__cta svg { width: 16px; height: 16px; }
    .svc-card.is-active .svc-card__cta { background: var(--blueDeep); }

    .offer-block {
      scroll-margin-top: 96px;
      margin: 8px 0 0;
      min-width: 0;
      width: 100%;
    }
    .offer-block__title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 14px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-weight: 800;
    }
    .offer-block__title svg { width: 18px; height: 18px; color: var(--blue); }

    .timetable {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 16px 16px;
      margin: 0 0 18px;
      min-width: 0;
      width: 100%;
      box-shadow: 0 6px 18px rgba(23, 50, 71, 0.04);
      scroll-margin-top: 100px;
    }
    .timetable__head {
      margin: 0 0 4px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .term-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 11px;
      border-radius: 999px;
      background: var(--gold);
      color: #173247;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      flex: 0 0 auto;
      max-width: 100%;
      min-width: 0;
      overflow-wrap: break-word;
      white-space: normal;
      line-height: 1.2;
      border: 1px solid rgba(23, 50, 71, 0.08);
    }
    .term-badge--summer {
      background: #fff6cc;
      border-color: rgba(244, 183, 64, 0.45);
      color: #8a6500;
    }
    .term-badge--summer svg { color: #c49212; }
    .term-badge--leaf {
      background: #e8f4ec;
      border-color: rgba(21, 115, 71, 0.22);
      color: #0f5132;
    }
    .term-badge--leaf svg { color: #157347; }
    .intensive-block {
      margin: 16px 0 0;
      padding: 14px 12px 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fbfdff;
      min-width: 0;
    }
    .intensive-block:first-of-type { margin-top: 12px; }
    .intensive-block__head {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin: 0 0 10px;
      min-width: 0;
    }
    .intensive-block__title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--ink);
      overflow-wrap: break-word;
    }
    .intensive-block__range {
      margin: 0;
      font-size: 0.86rem;
      color: var(--muted);
      font-weight: 600;
      overflow-wrap: break-word;
    }
    .intensive-block__chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      min-width: 0;
      width: 100%;
      margin-top: 2px;
    }
    .term-badge svg {
      width: 14px !important;
      height: 14px !important;
      max-width: 14px !important;
      max-height: 14px !important;
      flex: 0 0 auto;
      color: #173247;
    }
    .timetable__title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 12px;
      min-width: 0;
      margin: 0;
      width: 100%;
    }
    .timetable__title-main {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      width: 100%;
    }
    .timetable__icon {
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--blueSoft);
      color: var(--blueDeep);
    }
    .timetable__icon svg {
      width: 24px !important;
      height: 24px !important;
      max-width: 24px !important;
      max-height: 24px !important;
    }
    .timetable__icon.svc__icon--climb { background: #fff6e5; color: #b7791f; }
    .timetable__icon.svc__icon--physical { background: #f3e8ff; color: #7c3aed; }
    .timetable__icon.svc__icon--multi { background: #e8f0fe; color: #1d4ed8; }
    .timetable__icon.svc__icon--bespoke { background: #fff1e8; color: #c2410c; }
    .timetable__icon.svc__icon--dc { background: #eef6f2; color: #1f6b4a; }
    .timetable__icon.svc__icon--intensive { background: #fce7f3; color: #be185d; }
    .timetable__head h3 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.15rem, 2.6vw, 1.45rem);
      font-weight: 800;
      overflow-wrap: break-word;
      min-width: 0;
    }
    .timetable__range {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 600;
      overflow-wrap: break-word;
      padding-left: 54px;
    }
    @media (max-width: 480px) {
      .timetable__range { padding-left: 0; }
    }
    .venue-block {
      margin: 18px 0 0;
      min-width: 0;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }
    .venue-block:first-of-type {
      border-top: 0;
      padding-top: 8px;
      margin-top: 12px;
    }
    .venue-block__title {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 10px;
      font-size: clamp(1.15rem, 2.4vw, 1.35rem);
      font-weight: 800;
      color: var(--ink);
      min-width: 0;
      overflow-wrap: break-word;
    }
    .venue-block__title svg { width: 22px; height: 22px; max-width: 22px; max-height: 22px; color: var(--blue); flex: 0 0 auto; }
    .venue-block__activity {
      font-size: 0.78em;
      font-weight: 800;
      color: var(--blueDeep);
      background: var(--blueSoft);
      border: 1px solid rgba(45, 132, 179, 0.22);
      border-radius: 999px;
      padding: 3px 10px;
      line-height: 1.2;
      max-width: 100%;
      overflow-wrap: break-word;
    }
    .slot-time__main {
      display: block;
      font-weight: 800;
      color: var(--ink);
    }
    .slot-time__pack {
      display: block;
      margin-top: 2px;
      font-size: 0.84em;
      font-weight: 700;
      color: var(--muted);
    }
    .slot-venue__activity {
      display: block;
      margin-top: 2px;
      font-size: 0.86em;
      font-weight: 700;
      color: var(--blueDeep);
    }

    .day-acc {
      border: 1px solid var(--line);
      border-radius: 12px;
      margin: 0 0 8px;
      background: #f8fbfd;
      min-width: 0;
      overflow: hidden;
    }
    .day-acc > summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding: 12px 14px;
      font-weight: 800;
      color: var(--ink);
      min-width: 0;
      overflow-wrap: break-word;
      user-select: none;
      position: relative;
      padding-right: 28px;
    }
    .day-acc > summary::-webkit-details-marker { display: none; }
    .day-acc > summary::after {
      content: "";
      position: absolute;
      top: 16px;
      right: 14px;
      width: 8px;
      height: 8px;
      border-right: 2px solid var(--muted);
      border-bottom: 2px solid var(--muted);
      transform: rotate(45deg);
      flex: 0 0 auto;
      transition: transform 0.15s ease;
    }
    .day-acc[open] > summary::after { transform: rotate(-135deg); }
    .day-acc > summary svg {
      width: 16px !important;
      height: 16px !important;
      max-width: 16px !important;
      max-height: 16px !important;
      color: var(--blue);
    }
    .day-acc__label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
      font-weight: 800;
      min-width: 0;
      padding-right: 8px;
    }
    .day-acc__count {
      font-size: 0.78rem;

    if (id === "physical") return { svg: ICONS.physical, cls: "svc__icon--physical" };
    if (id === "multi") return { svg: ICONS.multi, cls: "svc__icon--multi" };
    if (id === "bespoke") return { svg: ICONS.bespoke, cls: "svc__icon--bespoke" };
    if (id === "day_centre") return { svg: ICONS.dc, cls: "svc__icon--dc" };
    if (id === "intensive") return { svg: ICONS.intensive, cls: "svc__icon--intensive" };
    return { svg: ICONS.swim, cls: "" };
  }

  function fillSelect(sel, values, allLabel) {
    var keep = sel.value;
    sel.innerHTML = '<option value="">' + esc(allLabel) + "</option>";
    values.forEach(function (v) {
      var o = document.createElement("option");
      o.value = typeof v === "object" ? v.id : v;
      o.textContent = typeof v === "object" ? v.name : v;
      sel.appendChild(o);
    });
    if (keep) sel.value = keep;
  }

  var fService = document.getElementById("fService");
  var fVenue = document.getElementById("fVenue");
  var fDay = document.getElementById("fDay");
  var fTime = document.getElementById("fTime");
  var fHideFull = document.getElementById("fHideFull");
  var offerBanner = document.getElementById("offerBanner");
  var offerBannerText = document.getElementById("offerBannerText");

  function fillFilterSelects() {
    var opts = mock.filterOptions();
    fillSelect(fService, opts.services, "All services");
    fillSelect(fVenue, opts.venues, "All venues");
    fillSelect(fDay, opts.days, "All days");
    fillSelect(fTime, opts.times, "All times");
  }

  function setBanner(kind, text) {
    if (!offerBanner || !offerBannerText) return;
    if (!text) {
      offerBanner.hidden = true;
      return;
    }
    offerBanner.hidden = false;
    offerBanner.className =
      "offer-banner" + (kind === "error" ? " offer-banner--error" : "");
    offerBannerText.textContent = text;
  }

  function currentFilters() {
    return {
      serviceId: fService.value || "",
      venue: fVenue.value || "",
      day: fDay.value || "",
      timeLabel: fTime.value || "",
      hideFull: !!fHideFull.checked,
    };
  }

  function dayAbbrev(day) {
    var map = {
      Monday: "Mon",
      Tuesday: "Tue",
      Wednesday: "Wed",
      Thursday: "Thu",
      Friday: "Fri",
      Saturday: "Sat",
      Sunday: "Sun",
    };
    return map[day] || day;
  }

  function serviceCardHtml(s, active) {
    var pack = serviceIconPack(s.id);
    var allSlots = mock.filterSlots({ serviceId: s.id, hideFull: false });
    var openN = allSlots.filter(function (slot) {
      return !mock.isFull(slot);
    }).length;
    var chips =
      '<span class="chip">' +
      ICONS.clock +
      esc(s.durationHint) +
      "</span>" +
      '<span class="chip">' +
      ICONS.pound +
      esc(s.priceHint) +
      "</span>" +
      (s.venues && s.venues.length
        ? '<span class="chip">' +
          ICONS.pin +
          esc(s.venues.map(mock.venueLabel).join(", ")) +
          "</span>"
        : "");
    return (
      '<button type="button" class="svc-card' +
      (active === s.id ? " is-active" : "") +
      '" data-jump-service="' +
      esc(s.id) +
      '" aria-controls="timetable-' +
      esc(s.id) +
      '">' +
      '<div class="svc__icon ' +
      pack.cls +
      '">' +
      pack.svg +
      "</div>" +
      "<h3>" +
      esc(s.name) +
      "</h3>" +
      '<p class="svc-card__hint">' +
      allSlots.length +
      " weekly time" +
      (allSlots.length === 1 ? "" : "s") +
      " · " +
      openN +
      " with places" +
      (openN < allSlots.length ? " · fully booked shown below" : "") +
      "</p>" +
      '<p class="svc-card__blurb">' +
      esc(s.blurb) +
      "</p>" +
      '<div class="svc-meta">' +
      chips +
      "</div>" +
      '<span class="svc-card__cta">' +
      "See weekly times " +
      ICONS.arrow +
      "</span>" +
      "</button>"
    );
  }

  function renderServiceCards() {
    var host = document.getElementById("serviceCards");
    var active = fService.value || "";
    var core = mock.SERVICES.filter(function (s) {
      return s.tier !== "more";
    });
    var more = mock.SERVICES.filter(function (s) {
      return s.tier === "more";
    });
    host.innerHTML =
      '<div class="services__group">' +
      '<p class="services__label">Core services</p>' +
      '<div class="services__grid services__grid--core">' +
      core.map(function (s) {
        return serviceCardHtml(s, active);
      }).join("") +
      "</div></div>" +
      '<div class="services__group">' +
      '<p class="services__label">Programmes &amp; extras</p>' +
      '<div class="services__grid services__grid--more">' +
      more.map(function (s) {
        return serviceCardHtml(s, active);
      }).join("") +
      "</div></div>";
  }

  function slotHeadHtml() {
    return (
      '<div class="slot-head" aria-hidden="true">' +
      '<span class="slot-head__cell">' +
      ICONS.clock +
      " Time</span>" +
      '<span class="slot-head__cell">' +
      ICONS.pin +
      " Venue</span>" +
      '<span class="slot-head__cell">' +
      ICONS.users +
      " Age</span>" +
      '<span class="slot-head__cell">' +
      ICONS.check +
      " Availability</span>" +
      '<span class="slot-head__cell">' +
      ICONS.arrow +
      " Action</span>" +
      "</div>"
    );
  }

  function slotRowHtml(slot, svc) {
    var full = mock.isFull(slot);
    var left = mock.seatsLeft(slot);
    var enquireOnly = !!(slot.enquireOnly || (svc && svc.enquireOnly));
    var badge = enquireOnly
      ? '<span class="badge badge--open">' + ICONS.info + " Enquire</span>"
      : full
        ? '<span class="badge badge--full">' + ICONS.x + " Fully booked</span>"
        : '<span class="badge badge--open">' + ICONS.check + " " + left + " left</span>";
    var canBook = !enquireOnly && !full;
    var cta = enquireOnly
      ? "Enquire"
      : slot.bookingMode === "weekly_pack"
        ? full
          ? "Join waiting list"
          : "Book week pack"
        : full
          ? "Join waiting list"
          : "Book place";
    var ageLabel = (svc && svc.ageHint) || "From 3 years+";
    var packLabel = String(slot.packLabel || "").trim();
    var timeCell;
    if (packLabel) {
      timeCell =
        '<span class="slot-time__main">' +
        esc(slot.timeLabel) +
        "</span>" +
        '<span class="slot-time__pack">' +
        esc(packLabel) +
        "</span>";
    } else if (slot.blockId) {
      timeCell = esc(slot.timeLabel);
    } else {
      timeCell = esc(dayAbbrev(slot.day)) + " " + esc(slot.timeLabel);
    }
    var venueCell = esc(mock.venueLabel(slot.venue));
    return (
      '<div class="slot-row' +
      (full && !enquireOnly ? " slot-row--full" : "") +
      '">' +
      '<div class="slot-col">' +
      '<span class="slot-col__label">Time</span>' +
      '<div class="slot-col__value">' +
      timeCell +
      "</div></div>" +
      '<div class="slot-col">' +
      '<span class="slot-col__label">Venue</span>' +
      '<div class="slot-col__value">' +
      venueCell +
      "</div></div>" +
      '<div class="slot-col">' +
      '<span class="slot-col__label">Age</span>' +
      '<div class="slot-col__value">' +
      esc(ageLabel) +
      "</div></div>" +
      '<div class="slot-col slot-col--avail">' +
      '<span class="slot-col__label">Availability</span>' +
      badge +
      "</div>" +
      '<div class="slot-col slot-col--action">' +
      '<span class="slot-col__label">Action</span>' +
      '<button type="button" class="btn' +
      (canBook ? " btn--book" : " btn--wait") +
      '" ' +
      (canBook ? "data-book" : "data-enquire") +
      '="' +
      esc(slot.id) +
      '">' +
      ICONS.info +
      " " +
      esc(cta) +
      "</button>" +
      "</div></div>"
    );
  }

  function dateChipsHtml(dates) {
    if (!dates || !dates.length) return "";
    return (
      '<div class="day-acc__chips intensive-block__chips">' +
      dates
        .map(function (d) {
          return (
            '<span class="date-chip' +
            (d.past ? " date-chip--past" : "") +
            '" title="' +
            esc(d.iso) +
            (d.past ? " · past" : " · remaining") +
            '">' +
            esc(d.label) +
            "</span>"
          );
        })
        .join("") +
      "</div>"
    );
  }

  function daySummaryExtrasHtml(s, dayName) {
    if (!s || s.intensiveBlocks) return "";
    if (!mock.remainingTermPrice) return "";
    if (!/^(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)$/.test(dayName)) {
      return "";
    }
    var stats = mock.remainingTermPrice(dayName, s.pricePerSession, null, s.id);
    if (!stats.dates.length) return "";
    var money = mock.formatPounds(stats.remainingTotal);
    var remLine =
      '<p class="day-acc__remaining">' +
      "<strong>" +
      stats.remainingCount +
      "</strong> of " +
      stats.totalDates +
      " sessions remaining" +
      (money
        ? " · term due now <strong>" +
          esc(money) +
          "</strong> (remaining only · " +
          esc(mock.formatPounds(stats.pricePerSession)) +
          "/session)"
        : " · price by arrangement") +
      "</p>";
    return dateChipsHtml(stats.dates) + remLine;
  }

  function venuesAccordionHtml(s, venues, openFirst) {
    if (!venues.length) {
      return '<p class="empty">No times match the filters for this block.</p>';
    }
    return venues
      .map(function (vg, vi) {
        var daysHtml = vg.days
          .map(function (dg, di) {
            var openAttr = openFirst && di === 0 && vi === 0 ? " open" : "";
            return (
              '<details class="day-acc"' +
              openAttr +
              ">" +
              "<summary>" +
              '<span class="day-acc__label">' +
              ICONS.day +
              esc(dg.day) +
              ' <span class="day-acc__count">(' +
              dg.slots.length +
              ")</span></span>" +
              daySummaryExtrasHtml(s, dg.day) +
              "</summary>" +
              '<div class="slot-table">' +
              slotHeadHtml() +
              dg.slots
                .map(function (slot) {
                  return slotRowHtml(slot, s);
                })
                .join("") +
              "</div></details>"
            );
          })
          .join("");
        return (
          '<div class="venue-block">' +
          '<h4 class="venue-block__title">' +
          ICONS.pin +
          esc(vg.venueLabel) +
          (function () {
            var act = "";
            (vg.days || []).some(function (dg) {
              return (dg.slots || []).some(function (slot) {
                if (slot.activityName) {
                  act = String(slot.activityName);
                  return true;
                }
                return false;
              });
            });
            return act
              ? '<span class="venue-block__activity">' + esc(act) + "</span>"
              : "";
          })() +
          "</h4>" +
          daysHtml +
          "</div>"
        );
      })
      .join("");
  }

  function renderIntensiveTimetable(s, filters, pack) {
    var slots = mock.filterSlots({
      serviceId: s.id,
      venue: filters.venue,
      day: filters.day,
      timeLabel: filters.timeLabel,
      hideFull: filters.hideFull,
    });
    var blocks = mock.groupIntensiveByBlock(slots);
    var body;
    if (!blocks.length) {
      body =
        '<p class="empty">No intensive times match the filters. Clear filters to see summer + half-term blocks.</p>';
    } else {
      body = blocks
        .map(function (row, bi) {
          var block = row.block;
          var badgeIcon = block.badgeIcon === "sun" ? ICONS.sun : ICONS.leaf;
          var badgeCls =
            block.badgeIcon === "sun"
              ? " term-badge--summer"
              : " term-badge--leaf";
          var blockChips = mock.intensiveBlockDateChips
            ? mock.intensiveBlockDateChips(block)
            : [];
          var rem = blockChips.filter(function (d) {
            return !d.past;
          }).length;
          return (
            '<section class="intensive-block" id="intensive-' +
            esc(block.id) +
            '">' +
            '<div class="intensive-block__head">' +
            '<span class="term-badge' +
            badgeCls +
            '">' +
            badgeIcon +
            " " +
            esc(block.badge) +
            "</span>" +
            '<h4 class="intensive-block__title">' +
            esc(block.title) +
            "</h4>" +
            '<p class="intensive-block__range">' +
            esc(block.range) +
            "</p>" +
            dateChipsHtml(blockChips) +
            (blockChips.length
              ? '<p class="day-acc__remaining"><strong>' +
                rem +
                "</strong> of " +
                blockChips.length +
                " camp days remaining</p>"
              : "") +
            "</div>" +
            venuesAccordionHtml(s, row.venues, bi === 0) +
            "</section>"
          );
        })
        .join("");
    }
    return (
      '<article class="timetable" id="timetable-' +
      esc(s.id) +
      '">' +
      '<div class="timetable__head">' +
      '<div class="timetable__title-row">' +
      '<div class="timetable__title-main">' +
      '<div class="timetable__icon ' +
      pack.cls +
      '" aria-hidden="true">' +
      pack.svg +
      "</div>" +
      "<h3>" +
      esc(s.name) +
      "</h3>" +
      "</div></div>" +
      '<p class="timetable__range">Currently open: Week 1 Tue–Fri 21–24 July. Week 2 (28–31 July) opens when Week 1 reaches 80% of places. Then each half term.</p>' +
      "</div>" +
      body +
      "</article>"
    );
  }

  function renderTimetables() {
    var host = document.getElementById("timetableHost");
    var filters = currentFilters();
    var services = mock.SERVICES.filter(function (s) {
      return !filters.serviceId || s.id === filters.serviceId;
    });

    if (!services.length) {
      host.innerHTML = '<p class="page-empty">No services match these filters.</p>';
      return;
    }

    var html = services
      .map(function (s) {
        var pack = serviceIconPack(s.id);
        if (s.intensiveBlocks) {
          return renderIntensiveTimetable(s, filters, pack);
        }
        var slots = mock.filterSlots({
          serviceId: s.id,
          venue: filters.venue,
          day: filters.day,
          timeLabel: filters.timeLabel,
          hideFull: filters.hideFull,
        });
        var venues = mock.groupSlotsByVenueThenDay(slots);
        var body = venues.length
          ? venuesAccordionHtml(s, venues, true)
          : '<p class="empty">No times match the filters for this service. Clear filters to see the full offer (including fully booked).</p>';
        return (
          '<article class="timetable" id="timetable-' +
          esc(s.id) +
          '">' +
          '<div class="timetable__head">' +
          '<span class="term-badge term-badge--leaf">' +
          ICONS.leaf +
          " " +
          esc(mock.TERM_BADGE || "AUTUMN TERM 2026") +
          "</span>" +
          '<div class="timetable__title-row">' +
          '<div class="timetable__title-main">' +
          '<div class="timetable__icon ' +
          pack.cls +
          '" aria-hidden="true">' +
          pack.svg +
          "</div>" +
          "<h3>" +
          esc(s.name) +
          (filters.venue ? " (" + esc(mock.venueLabel(filters.venue)) + ")" : "") +
          "</h3>" +
          "</div>" +
          "</div>" +
          '<p class="timetable__range">' +
          esc(
            s.id === "day_centre"
              ? "Tue 1 September 2026 – Fri 18 December 2026"
              : mock.TERM_RANGE || "Sat 5 September 2026 – Fri 18 December 2026"
          ) +
          "</p></div>" +
          body +
          "</article>"
        );
      })
      .join("");

    host.innerHTML = html;
  }

  function registrationUrlForSlot(slot) {
    var svc = mock.serviceById(slot.serviceId);
    var q = new URLSearchParams();
    q.set("from", "bookingservice");
    if (slot.id) q.set("slot_id", slot.id);
    if (slot.serviceId) q.set("service", slot.serviceId);
    if (svc && svc.name) q.set("service_name", svc.name);
    if (slot.activityName) q.set("activity", slot.activityName);
    if (slot.crashActivity) q.set("crash_activity", slot.crashActivity);
    if (slot.venue) q.set("venue", slot.venue);
    if (slot.day) q.set("day", slot.day);
    if (slot.timeLabel) q.set("time", slot.timeLabel);
    if (slot.packLabel) q.set("pack", slot.packLabel);
    if (slot.bookingMode) q.set("booking_mode", slot.bookingMode);
    if (slot.weekId) q.set("week_id", slot.weekId);
    if (slot.blockId) q.set("block_id", slot.blockId);
    if (slot.dateIso) q.set("date", slot.dateIso);
    // Client questionnaire / registration form (slot context travels in the query string).
    var path = "/parent/registration";
    if (typeof window.portalFamilyPortalUrl === "function") {
      try {
        var abs = window.portalFamilyPortalUrl("registration");
        if (abs) return abs + (abs.indexOf("?") >= 0 ? "&" : "?") + q.toString();
      } catch (_e) {}
    }
    return path + "?" + q.toString();
  }

  function goToRegistration(slot) {
    try {
      if (window.PortalBookingServicePresence) {
        var bits = [slot && slot.serviceId, slot && slot.day, slot && slot.timeLabel]
          .filter(Boolean)
          .join(" · ");
        void window.PortalBookingServicePresence.ping("book_cta", bits || null);
      }
    } catch (_e) {
      /* ignore */
    }
    window.location.href = registrationUrlForSlot(slot);
  }

  function openSheet(slot) {
    var svc = mock.serviceById(slot.serviceId);
    var enquireOnly = !!(slot.enquireOnly || (svc && svc.enquireOnly));
    var sheet = document.getElementById("actionSheet");
    var title = document.getElementById("sheetTitle");
    var body = document.getElementById("sheetBody");
    var mail = document.getElementById("sheetMail");
    title.textContent = enquireOnly
      ? "Enquire about this course"
      : "Join waiting list / enquire";
    body.textContent =
      (svc ? svc.name : "Session") +
      " · " +
      slot.day +
      " · " +
      slot.timeLabel +
      " · " +
      mock.venueLabel(slot.venue) +
      (enquireOnly
        ? " — email the office to register interest. Times open closer to the dates."
        : " — currently fully booked. Tell us you’d like to join the waiting list.");
    var subject = encodeURIComponent(
      "Waiting list enquiry — " +
        (svc ? svc.name : "session") +
        " · " +
        slot.day +
        " " +
        slot.timeLabel +
        " · " +
        mock.venueLabel(slot.venue)
    );
    var text = encodeURIComponent(
      "Hello,\n\nI’d like to join the waiting list / enquire about:\n" +
        (svc ? svc.name : "Session") +
        "\n" +
        slot.day +
        " " +
        slot.timeLabel +
        " at " +
        mock.venueLabel(slot.venue) +
        "\nSlot ref: " +
        slot.id +
        "\nStatus: " +
        (enquireOnly ? "Enquire / half-term interest" : "Fully booked / waiting list") +
        "\n\nChild name:\nParent name:\nPhone:\n\nThanks"
    );
    mail.href = "mailto:info@clubsensational.org?subject=" + subject + "&body=" + text;
    mail.innerHTML = ICONS.mail + " Email the office";
    sheet.hidden = false;
  }

  function refresh() {
    renderServiceCards();
    renderTimetables();
  }

  function jumpToService(serviceId) {
    fService.value = serviceId || "";
    refresh();
    var el = document.getElementById("timetable-" + serviceId);
    if (el && typeof el.scrollIntoView === "function") {
      el.scrollIntoView({ behavior: "smooth", block: "start" });
    } else {
      document.getElementById("offerTimes").scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }

  document.getElementById("serviceCards").addEventListener("click", function (e) {
    var card = e.target && e.target.closest && e.target.closest("[data-jump-service]");
    if (!card) return;
    jumpToService(card.getAttribute("data-jump-service"));
  });

  document.getElementById("timetableHost").addEventListener("click", function (e) {
    var bookBtn = e.target && e.target.closest && e.target.closest("[data-book]");
    if (bookBtn) {
      var bookId = bookBtn.getAttribute("data-book");
      var bookSlot = mock.MOCK_SLOTS.find(function (s) {
        return s.id === bookId;
      });
      if (bookSlot) goToRegistration(bookSlot);
      return;
    }
    var btn = e.target && e.target.closest && e.target.closest("[data-enquire]");
    if (!btn) return;
    var id = btn.getAttribute("data-enquire");
    var slot = mock.MOCK_SLOTS.find(function (s) {
      return s.id === id;
    });
    if (slot) openSheet(slot);
  });

  document.getElementById("sheetClose").addEventListener("click", function () {
    document.getElementById("actionSheet").hidden = true;
  });
  document.getElementById("actionSheet").addEventListener("click", function (e) {
    if (e.target === e.currentTarget) e.currentTarget.hidden = true;
  });

  document.getElementById("btnClearFilters").addEventListener("click", function () {
    fService.value = "";
    fVenue.value = "";
    fDay.value = "";
    fTime.value = "";
    fHideFull.checked = false;
    refresh();
  });

  [fService, fVenue, fDay, fTime, fHideFull].forEach(function (el) {
    el.addEventListener("change", refresh);
  });

  mock
    .load()
    .then(function () {
      fillFilterSelects();
      refresh();
      var n = (mock.MOCK_SLOTS || []).length;
      var weekly = mock.stats && mock.stats.weekly_slots;
      setBanner(
        "info",
        "Live places from the club roster" +
          (weekly != null ? " · " + weekly + " weekly times" : n ? " · " + n + " times" : "") +
          (mock.TERM_LABEL ? " · " + mock.TERM_LABEL : "") +
          ". Book opens the registration questionnaire; full slots can join a waiting list by email."
      );
    })
    .catch(function () {
      document.getElementById("serviceCards").innerHTML = "";
      document.getElementById("timetableHost").innerHTML =
        '<p class="page-empty">We couldn’t load live times just now. Please refresh the page or email info@clubsensational.org.</p>';
      setBanner(
        "error",
        "Couldn’t load live availability. Refresh to try again, or contact the office."
      );
    });
  try {
    if (window.PortalBookingServicePresence) window.PortalBookingServicePresence.bootOffer();
  } catch (_e) {
    /* ignore */
  }
})();
  </script>
</body>
</html>
