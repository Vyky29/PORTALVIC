<!DOCTYPE html>
<html lang="en-GB">
<head>
  <!-- Portal app shell: hide WordPress theme header/footer when this markup is embedded on clubsensational.org -->
  <script>
    (function () {
      try {
        document.documentElement.classList.add("portal-app-shell");
      } catch (e) {}
    })();
  </script>
  <style id="portal-hide-wp-chrome">
    html.portal-app-shell body.admin-bar {
      padding-top: 0 !important;
      margin-top: 0 !important;
    }
    html.portal-app-shell #wpadminbar,
    html.portal-app-shell #masthead,
    html.portal-app-shell header#masthead,
    html.portal-app-shell .site-header,
    html.portal-app-shell #site-header,
    html.portal-app-shell .ast-primary-header-bar,
    html.portal-app-shell .ast-above-header,
    html.portal-app-shell .elementor-location-header,
    html.portal-app-shell .elementor-location-footer,
    html.portal-app-shell #colophon,
    html.portal-app-shell footer.site-footer,
    html.portal-app-shell .site-footer,
    html.portal-app-shell #footer,
    html.portal-app-shell .site-bottom-footer-inner-wrap,
    html.portal-app-shell .footer-widget-area {
      display: none !important;
      visibility: hidden !important;
      height: 0 !important;
      overflow: hidden !important;
      pointer-events: none !important;
    }
    html.portal-app-shell .site-content,
    html.portal-app-shell #content,
    html.portal-app-shell .site-main,
    html.portal-app-shell #primary {
      margin-top: 0 !important;
      padding-top: 0 !important;
    }
    html.portal-app-shell #page,
    html.portal-app-shell .site {
      margin-top: 0 !important;
      padding-top: 0 !important;
    }
    html.portal-app-shell,
    html.portal-app-shell body {
      max-width: 100vw !important;
      overflow-x: hidden !important;
    }
    html.portal-app-shell #page,
    html.portal-app-shell .site,
    html.portal-app-shell .site-content,
    html.portal-app-shell #content,
    html.portal-app-shell #primary,
    html.portal-app-shell .site-main {
      max-width: 100vw !important;
      overflow-x: hidden !important;
    }
  </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>clubSENsational · Operations Control</title>
  <style>
    :root{
      --blue:#2d84b3;--blueSoft:#eaf5fb;--gold:#f4b740;--sen-gold:#f9bf2e;--goldSoft:#fff4df;
      --ink:#0f172a;--text:#334155;--muted:#64748b;--line:#e2e8f0;--white:#fff;
      --bg:#f1f5f9;--surface:#ffffff;--sidebar:#0f172a;--sidebarHover:#1e293b;--sidebarText:#94a3b8;--sidebarActive:#38bdf8;
      --danger:#dc2626;--dangerSoft:#fef2f2;--success:#15803d;--successSoft:#f0fdf4;--warn:#d97706;--warnSoft:#fffbeb;
      --hoverUnifiedBg:#dbeeff;--hoverUnifiedBorder:#7fb2d8;--hoverUnifiedShadow:0 0 0 2px rgba(45,132,179,.18);
      --radius:12px;--radiusLg:16px;--shadow:0 1px 3px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.06);
      --sidebarW:260px;--topH:56px;--font:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      --layout-max-mobile:390px;
    }
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0;max-width:100%;overflow-x:hidden;-webkit-text-size-adjust:100%;overscroll-behavior-x:none}
    body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);overflow:hidden}
    html:has(body.dev-mobile-preview){background:var(--bg)}
    body.dev-mobile-preview .admin-shell{max-width:100%;width:100%;margin:0;box-shadow:none;border-radius:0}
    body.dev-mobile-preview .admin-sidebar{position:static;z-index:auto}
    body.dev-mobile-preview:not(.sidebar-open) .admin-sidebar{transform:none}

    .admin-shell{display:flex;height:100dvh;max-height:100dvh;width:100%;min-width:0}
    .admin-sidebar{
      width:var(--sidebarW);min-width:var(--sidebarW);background:var(--sidebar);color:#e2e8f0;
      display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid rgba(255,255,255,.06);
      transition:transform .22s ease;
      overflow:hidden;
    }
    .admin-sidebar-brand{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08);text-align:center;overflow:visible}
    .admin-sidebar-logo{
      width:100%;display:flex;justify-content:center;align-items:center;margin-bottom:10px;
      background:transparent;padding:0;min-width:0;overflow:visible;
    }
    /* Same logo lockup as login page (stage + 3 orbit layers + cropped PNG shell). */
    .admin-brand-wrap{
      position:relative;
      width:152px;
      height:152px;
      margin:0 auto;
      display:grid;
      place-items:center;
      flex-shrink:0;
      overflow:visible;
    }
    .admin-brand-orbit{
      position:absolute;
      inset:0;
      transform:none;
      pointer-events:none;
      z-index:0;
      overflow:visible;
    }
    .admin-brand-orbit-svg{
      width:100%;
      height:100%;
      display:block;
      overflow:visible;
    }
    .admin-brand-orbit-layer--cw{
      transform-origin:0 0;
      animation:admin-orbit-cw 18s linear infinite;
    }
    .admin-brand-orbit-layer--ccw{
      transform-origin:0 0;
      animation:admin-orbit-ccw 14s linear infinite;
    }
    .admin-brand-orbit-layer--slow-ccw{
      transform-origin:0 0;
      animation:admin-orbit-ccw 26s linear infinite;
    }
    @keyframes admin-orbit-cw{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes admin-orbit-ccw{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
    @media (prefers-reduced-motion:reduce){
      .admin-brand-orbit-layer--cw,.admin-brand-orbit-layer--ccw,.admin-brand-orbit-layer--slow-ccw{animation:none}
    }
    .admin-brand-mark{
      position:relative;
      z-index:1;
      width:102px;
      height:102px;
      border-radius:50%;
      overflow:hidden;
      background:var(--white);
      display:grid;
      place-items:center;
      box-shadow:
        0 0 0 2px rgba(249,191,46,.5),
        0 0 14px rgba(249,191,46,.4),
        0 0 28px rgba(244,183,64,.28),
        0 0 44px rgba(249,191,46,.18),
        0 0 64px rgba(45,132,179,.1);
      flex-shrink:0;
    }
    .admin-brand-mark img{
      width:100%;
      height:100%;
      margin:0;
      display:block;
      object-fit:contain;
      transform:scale(1.02);
      transform-origin:center center;
    }
    .admin-sidebar-brand strong{display:block;font-size:15px;font-weight:700;letter-spacing:-.02em;color:#fff;text-align:center}
    .admin-sidebar-brand span{font-size:12px;color:var(--sidebarText);margin-top:4px;display:block;text-align:center}
    @keyframes logoFloat{
      0%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-4px) scale(1.02)}
      100%{transform:translateY(0) scale(1)}
    }
    .admin-nav{flex:1;overflow:hidden;padding:8px}
    .admin-nav button{
      width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;margin:2px 0;border:none;border-radius:8px;
      background:transparent;color:var(--sidebarText);font:inherit;font-size:13px;font-weight:500;text-align:left;cursor:pointer;
    }
    .admin-nav button:hover{background:var(--sidebarHover);color:#e2e8f0}
    .admin-nav button.is-active{background:rgba(56,189,248,.12);color:var(--sidebarActive);font-weight:600}
    .admin-nav-ico{width:18px;height:18px;opacity:.85;flex-shrink:0}
    .admin-nav-group{margin-bottom:6px;border:1px solid rgba(255,255,255,.08);border-radius:10px;background:rgba(255,255,255,.02)}
    .admin-nav-group-toggle{justify-content:space-between;font-weight:700;color:#e2e8f0;padding:9px 10px}
    .admin-nav-group-toggle .admin-nav-ico{opacity:1}
    .admin-nav-group-caret{opacity:.8;font-size:11px;transition:transform .2s ease}
    .admin-nav-group.is-open .admin-nav-group-caret{transform:rotate(90deg)}
    .admin-nav-group-body{padding:2px 4px 6px}
    .admin-nav-group-body.is-collapsed{display:none}
    .admin-nav-group-body button{margin:1px 0;padding:8px 10px;font-size:12px}
    .admin-sidebar-foot{padding:12px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:var(--sidebarText)}

    .admin-main{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0}
    .admin-bottom-nav{
      display:none;
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:260;
      padding:6px max(8px, env(safe-area-inset-left, 0px)) calc(6px + env(safe-area-inset-bottom, 0px)) max(8px, env(safe-area-inset-right, 0px));
      background:rgba(255,255,255,.96);
      border-top:1px solid var(--line);
      box-shadow:0 -8px 24px rgba(15,23,42,.1);
      gap:6px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-x:contain;
    }
    .admin-bottom-nav button{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:10px;
      padding:7px 10px;
      font:inherit;
      font-size:12px;
      font-weight:600;
      white-space:nowrap;
      cursor:pointer;
      flex:0 0 auto;
    }
    .admin-bottom-nav button.is-active{
      border-color:var(--blue);
      background:var(--blueSoft);
      color:var(--blue);
      box-shadow:0 0 0 1px rgba(45,132,179,.15);
    }
    .admin-topbar{
      height:var(--topH);min-height:var(--topH);flex-shrink:0;display:flex;align-items:center;gap:12px;
      padding:0 20px;background:var(--surface);border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(15,23,42,.04);
    }
    .admin-menu-mob{display:none;width:40px;height:40px;border:1px solid var(--line);border-radius:10px;background:var(--surface);cursor:pointer;align-items:center;justify-content:center}
    .admin-search-wrap{flex:1;max-width:420px;min-width:0;position:relative}
    .admin-search-wrap input{
      width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 14px 9px 38px;font:inherit;font-size:13px;background:#f8fafc;
    }
    .admin-search-wrap input:focus{outline:2px solid rgba(45,132,179,.25);border-color:var(--blue);background:#fff}
    .admin-search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.45;font-size:14px}
    .admin-topbar-meta{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .admin-date{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap}
    .admin-icon-btn{
      position:relative;width:40px;height:40px;border:1px solid var(--line);border-radius:10px;background:var(--surface);cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:16px;
    }
    .admin-icon-btn:hover{background:#f8fafc}
    .admin-badge{position:absolute;top:6px;right:6px;min-width:16px;height:16px;padding:0 4px;border-radius:99px;background:var(--danger);color:#fff;font-size:9px;font-weight:800;line-height:16px;text-align:center}
    .admin-profile{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:10px;border:1px solid var(--line);cursor:pointer;background:var(--surface)}
    .admin-profile:hover{background:#f8fafc}
    .admin-av{width:32px;height:32px;border-radius:8px;background:var(--blueSoft);color:var(--blue);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
    .admin-profile span{font-size:12px;font-weight:600;color:var(--ink);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .view-toggle{width:44px;height:26px;border-radius:99px;border:1px solid var(--line);background:#e2e8f0;padding:0;cursor:pointer;position:relative;flex-shrink:0}
    .view-toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.12);transition:transform .2s}
    .view-toggle[aria-checked="true"]{background:var(--blue);border-color:var(--blue)}
    .view-toggle[aria-checked="true"]::after{transform:translateX(18px)}

    .admin-workspace{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px 24px 32px;-webkit-overflow-scrolling:touch}
    .view-panel{display:none}
    .view-panel.is-visible{display:block}
    .page-title{margin:0 0 4px;font-size:22px;font-weight:700;letter-spacing:-.03em;color:var(--ink)}
    .page-desc{margin:0 0 22px;font-size:13px;color:var(--muted);max-width:720px;line-height:1.5}

    .grid-kpi{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:14px;margin-bottom:22px}
    @media (max-width:1400px){.grid-kpi{grid-template-columns:repeat(3,minmax(0,1fr))}}
    @media (max-width:900px){.grid-kpi{grid-template-columns:repeat(2,minmax(0,1fr))}}
    .kpi{
      background:var(--surface);border:1px solid var(--line);border-radius:var(--radiusLg);padding:16px 18px;box-shadow:var(--shadow);
      text-align:center;display:flex;flex-direction:column;justify-content:center;
    }
    .kpi-l{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:6px}
    .kpi-v{font-size:26px;font-weight:700;color:var(--ink);line-height:1.1}
    .kpi-s{font-size:12px;color:var(--muted);margin-top:6px}
    .kpi--alert{border-color:#fecaca;background:linear-gradient(180deg,#fff,#fef2f2)}
    .kpi--alert .kpi-v{color:var(--danger)}

    .section{margin-bottom:22px}
    .section-h{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap}
    .section-h h2{margin:0;font-size:15px;font-weight:700;color:var(--ink)}
    .section-h p{margin:4px 0 0;font-size:12px;color:var(--muted);max-width:560px}

    .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radiusLg);box-shadow:var(--shadow);overflow:hidden}
    .card-pad{padding:16px 18px}
    .card-h{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .card-h h3{margin:0;font-size:14px;font-weight:700;color:var(--ink)}

    .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    @media (max-width:1200px){.grid-4{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}

    .tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl th,.tbl td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);vertical-align:middle}
    .tbl th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:#f8fafc}
    .tbl tr:hover td{background:#fafbfc}
    .tbl--center th,.tbl--center td{text-align:center}

    .chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
    .chip--ok{background:var(--successSoft);color:var(--success)}
    .chip--pend{background:var(--warnSoft);color:var(--warn)}
    .chip--urg{background:var(--dangerSoft);color:var(--danger)}
    .chip--info{background:var(--blueSoft);color:var(--blue)}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:10px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;text-decoration:none}
    .btn--pri{background:var(--blue);color:#fff;border-color:var(--blue)}
    .btn--sec{background:var(--surface);color:var(--ink);border-color:var(--line)}
    .btn--ghost{background:transparent;color:var(--muted)}
    .btn--sm{padding:6px 10px;font-size:12px}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .tbl td .toolbar{justify-content:center}
    #bookingBaseTable th,#bookingBaseTable td{padding:7px 8px;font-size:11px;line-height:1.2}
    #bookingBaseTable th{position:sticky;top:0;z-index:2}
    #bookingBaseTable td .btn{padding:4px 8px;font-size:11px}
    #bookingBaseTable th:nth-last-child(1),#bookingBaseTable td:nth-last-child(1){
      position:sticky;right:0;z-index:3;background:#fff;min-width:280px;
    }
    #bookingBaseTable th:nth-last-child(2),#bookingBaseTable td:nth-last-child(2){
      position:sticky;right:280px;z-index:3;background:#fff;min-width:120px;
    }
    #bookingBaseTable th:nth-last-child(3),#bookingBaseTable td:nth-last-child(3){
      position:sticky;right:400px;z-index:3;background:#fff;min-width:110px;
    }
    #bookingBaseTable td:nth-last-child(1){box-shadow:-6px 0 10px rgba(15,23,42,.06)}

    #bookingWeekCapacity{min-width:0;margin-bottom:14px}
    .booking-capacity{min-width:0;overflow:hidden}
    .booking-capacity-h{
      display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:16px;
      border-bottom:1px solid var(--line);
    }
    .booking-capacity-t{margin:0;font-size:15px;color:var(--ink)}
    .booking-cap-donut-wrap{
      flex-shrink:0;width:112px;display:flex;flex-direction:column;align-items:center;min-width:0;
    }
    .booking-cap-donut{
      position:relative;width:88px;height:88px;border-radius:50%;
    }
    .booking-cap-donut-ring{
      position:absolute;inset:0;border-radius:50%;
    }
    .booking-cap-donut-hole{
      position:absolute;inset:11px;border-radius:50%;background:var(--surface);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;font-size:11px;line-height:1.15;box-shadow:0 0 0 1px rgba(15,23,42,.06) inset;
    }
    .booking-cap-donut-hole strong{font-size:17px;color:var(--ink);display:block}
    .booking-cap-donut-hole small{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
    .booking-cap-legend{font-size:11px;margin-top:6px;text-align:center;min-width:0;max-width:100%;overflow-wrap:break-word}
    .booking-capacity-bars{
      display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;padding-top:4px;
      -webkit-overflow-scrolling:touch;
    }
    .booking-cap-col{
      flex:1 1 0;min-width:0;max-width:140px;display:flex;flex-direction:column;gap:6px;
      cursor:pointer;border-radius:10px;padding:8px 6px;border:1px solid transparent;min-height:0;
    }
    .booking-cap-col:hover{background:#f8fafc;border-color:var(--line)}
    .booking-cap-col:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
    .booking-cap-day{display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:700;font-size:11px;min-width:0}
    .booking-cap-day.is-selected .booking-cap-day-lbl{color:var(--blue)}
    .booking-cap-day-date{font-weight:600;font-size:10px}
    .booking-cap-bar{display:flex;height:11px;border-radius:99px;overflow:hidden;background:#f1f5f9;border:1px solid var(--line);min-width:0}
    .booking-cap-seg{min-width:0;min-height:0}
    .booking-cap-seg--booked{background:linear-gradient(180deg,#14b8a6,#0d9488)}
    .booking-cap-seg--open{background:#e2e8f0}
    .booking-cap-seg--closed{background:#94a3b8}
    .booking-cap-meta{text-align:center;font-size:10px;line-height:1.2;min-width:0;overflow-wrap:break-word}

    .filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
    .subtabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
    .subtab-btn{
      border:1px solid var(--line);background:#fff;color:var(--text);
      border-radius:10px;padding:7px 11px;font:inherit;font-size:12px;font-weight:700;cursor:pointer;
    }
    .subtab-btn.is-active{border-color:var(--blue);background:var(--blueSoft);color:var(--blue)}
    .subtab-panel{display:none}
    .subtab-panel.is-active{display:block}
    .inp,.sel{width:100%;max-width:220px;border:1px solid var(--line);border-radius:10px;padding:8px 11px;font:inherit;font-size:13px;background:#fff}
    .inp:focus,.sel:focus,.txa:focus{outline:2px solid rgba(45,132,179,.2);border-color:var(--blue)}
    .txa{width:100%;min-height:140px;border:1px solid var(--line);border-radius:10px;padding:12px;font:inherit;font-size:13px;resize:vertical}

    .drawer-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s}
    .drawer-backdrop.open{opacity:1;pointer-events:auto}
    .drawer{
      position:fixed;top:0;right:0;width:min(440px,100%);max-width:100%;height:100dvh;background:var(--surface);z-index:310;
      box-shadow:-12px 0 40px rgba(15,23,42,.12);transform:translateX(100%);transition:transform .28s ease;display:flex;flex-direction:column;
    }
    .drawer.open{transform:translateX(0)}
    .drawer-h{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .drawer-h h2{margin:0;font-size:17px;font-weight:700;color:var(--ink)}
    .drawer-body{padding:16px 18px;overflow-y:auto;flex:1}
    .drawer-actions{display:flex;flex-wrap:wrap;gap:8px;padding:14px 18px;border-top:1px solid var(--line);background:#f8fafc}

    /** Parse YYYY-MM-DD to local noon Date (stable weekday vs UTC shift). */
    function bookingParseIsoLocal(iso){
      var p = String(iso || '').split('-');
      if(p.length !== 3) return null;
      var y = parseInt(p[0], 10), m = parseInt(p[1], 10) - 1, d = parseInt(p[2], 10);
      if(!Number.isFinite(y) || !Number.isFinite(m) || !Number.isFinite(d)) return null;
      return new Date(y, m, d, 12, 0, 0);
    }
    /** ISO dates Mon→Sun for the calendar week containing anchorIso (UK-style week starting Monday). */
    function bookingWeekIsoRangeMonSun(anchorIso){
      var d = bookingParseIsoLocal(anchorIso);
      if(!d || !Number.isFinite(d.getTime())) return [];
      var dow = d.getDay();
      var mon = new Date(d);
      mon.setDate(d.getDate() - ((dow + 6) % 7));
      var out = [];
      for(var i = 0; i < 7; i++){
        var x = new Date(mon.getFullYear(), mon.getMonth(), mon.getDate() + i, 12, 0, 0);
        out.push(isoDateLocal(x));
      }
      return out;
    }
    function bookingIsBookedClientSlug(slug){

      return true;

    /**
     * Roster-derived counts for one calendar date (weekday of iso must match session.day in merged model).
     * Same source as slotsForSelectedDate — no Supabase overrides in this pass (fast week overview).
     */
    function bookingRosterStatsForIsoCalendarDay(iso){
      var pack = adminMergeSpreadsheetSessions();
      var wd = portalWeekdayLongFromIsoDate(iso);
      var want = normDayLabel(wd);
      var total = 0, booked = 0, open = 0, closed = 0;
      var uniqClients = {};
      var serviceKeys = 0;
      var svcSeen = {};
      for(var i = 0; i < pack.sessions.length; i++){
        var s = pack.sessions[i];
        if(normDayLabel(s.day) !== want) continue;
        total++;
        var cid = String(s.clientId || '').trim().toLowerCase();
        if(cid === 'closed'){
          closed++;
          continue;
        }
        if(bookingIsBookedClientSlug(cid)){
          booked++;
          uniqClients[cid] = true;
          var prog = String(s.rosterService || s.activity || '').trim();
          if(prog && !svcSeen[prog]){
            svcSeen[prog] = true;
            serviceKeys++;
          }
          continue;
        }
        open++;
      }
      return {
        total: total,
        booked: booked,
        open: open,
        closed: closed,
        uniqClients: Object.keys(uniqClients).length,
        serviceKinds: serviceKeys
      };
    }

     * Export

    function bookingIsoShiftDays(iso, days){
      var d = new Date(String(iso || '') + 'T12:00:00');
      if(!Number.isFinite(d.getTime())) d = new Date();
      d.setDate(d.getDate() + (days || 0));
      return isoDateLocal(d);
    }
    function bookingIsoShiftMonths(iso, months){
      var d = new Date(String(iso || '') + 'T12:00:00');

    function bookingFinanceForSlot(slot){
      var id = String(slot && slot.demoId || '');
      var saved = (booking.financeById && booking.financeById[id]) ? booking.financeById[id] : {};
      var tx = Array.isArray(saved.transactions) ? saved.transactions : [];
      return {
        arrangement: String(saved.arrangement || 'one_off_bank_transfer'),
        termMonths: Math.max(1, Math.round(bookingNum(saved.termMonths, 3))),
        installments: Math.max(1, Math.round(bookingNum(saved.installments, 1))),
        totalDue: Math.max(0, bookingNum(saved.totalDue, 0)),
        reminderChannel: String(saved.reminderChannel || 'email'),
        reEnrolmentStatus: String(saved.reEnrolmentStatus || 'not_sent'),
        transactions: tx.map(function(t){
          return {
            paidAt: String(t && t.paidAt || '').trim(),
            amount: Math.max(0, bookingNum(t && t.amount, 0)),
            method: String(t && t.method || 'bank_transfer'),
            note: String(t && t.note || '')
          };
        })
      };
    }
    function bookingInstallmentCount(fin){
      if(String(fin.arrangement) === 'monthly_direct_debit_gocardless'){
        return Math.max(1, fin.termMonths);
      }
      if(String(fin.arrangement) === 'two_installments_bank_transfer'){
        return 2;
      }
      return 1;
    }
    function bookingGenerateSchedule(fin, anchorDate){
      var count = bookingInstallmentCount(fin);
      var total = bookingNum(fin.totalDue, 0);
      if(total <= 0) return [];
      var part = total / count;
      var out = [];
      for(var i=0;i<count;i++){
        var due = i === 0 ? anchorDate : (String(fin.arrangement) === 'monthly_direct_debit_gocardless'
          ? bookingIsoShiftMonths(anchorDate, i)
          : bookingIsoShiftDays(anchorDate, i*30));
        var amt = (i === count-1) ? (total - part*(count-1)) : part;
        out.push({ idx:i+1, dueDate: due, amount: Number(amt.toFixed(2)) });
      }
      return out;
    }
    function bookingFinanceSnapshot(slot){
      var fin = bookingFinanceForSlot(slot);
      var anchor = (bookingMetaForSlot(slot, findOverrideForSlot(slot, booking.overrides)).startDate || booking.selectedDate || isoDateLocal(new Date()));
      var schedule = bookingGenerateSchedule(fin, anchor);
      var paidTotal = fin.transactions.reduce(function(a,t){ return a + bookingNum(t.amount,0); }, 0);
      var expected = bookingNum(fin.totalDue,0);
      var outstanding = Math.max(0, expected - paidTotal);
      var credit = Math.max(0, paidTotal - expected);
      var now = new Date();
      var rem = paidTotal;
      var rows = schedule.map(function(s){
        var applied = Math.min(rem, s.amount);
        rem -= applied;
        var dueDt = new Date(String(s.dueDate)+'T12:00:00');
        var left = Math.max(0, s.amount - applied);
        var st = 'Pending';
        if(left <= 0.0001) st = 'Paid';
        else if(applied > 0) st = 'Partial';
        else if(Number.isFinite(dueDt.getTime()) && dueDt.getTime() < now.getTime()) st = 'Overdue';
        else if(Number.isFinite(dueDt.getTime()) && (dueDt.getTime()-now.getTime()) <= (7*24*60*60*1000)) st = 'Due Soon';
        return { idx:s.idx, dueDate:s.dueDate, amount:s.amount, applied:applied, left:left, status:st };
      });
      var nextDue = rows.find(function(r){ return r.left > 0.0001; }) || null;
      var health = 'On Track';
      if(credit > 0.0001) health = 'In Credit';
      else if(rows.some(function(r){ return r.status === 'Overdue'; })) health = 'Behind';
      else if(fin.transactions.length > bookingInstallmentCount(fin)) health = 'Irregular';
      var reminders = [];
      rows.forEach(function(r){
        if(r.left <= 0.0001) return;
        ['-7','-2','0','+3','+7'].forEach(function(tag){
          var shift = Number(tag);
          var d = bookingIsoShiftDays(r.dueDate, shift);
          reminders.push({ when:d, installment:r.idx, type: (shift<0?'Before due':(shift===0?'Due date':'Overdue follow-up')) });
        });
      });
      reminders.sort(function(a,b){ return String(a.when).localeCompare(String(b.when)); });
      return {
        fin: fin,
        schedule: rows,
        paidTotal: paidTotal,
        expected: expected,
        outstanding: outstanding,
        credit: credit,
        nextDue: nextDue,
        health: health,
        reminders: reminders
      };
    }

    function openParentNotifyModal(opts){

      var pack = null;
      try{
        pack = bookingWithLoadedDate(dateIso, function(){
          var ov = findOverrideForSlot(slot, booking.overrides);
          var meta = bookingMetaForSlot(slot, ov);
          var snap = kind === 'payment_due' ? bookingFinanceSnapshot(slot) : null;
          var newName = (opts && opts.newInstructorName) ? String(opts.newInstructorName).trim() : '';
          if(kind === 'instructor_change' && !newName){
            var ci = $('schedFormCoverInput');
            if(ci && ci.value) newName = String(ci.value).trim();
          }
          var body = kind === 'instructor_change'
            ? notifyParentMessageInstructor(slot, ov, meta, newName)
            : notifyParentMessagePayment(slot, ov, meta, snap || { outstanding:0, nextDue:null });
          return { ov: ov, meta: meta, snap: snap, body: body };
        });

        '</div>'+

        '<textarea class="txa" id="pnBody" style="min-height:200px;max-width:100%">'+esc(pack.body)+'</textarea>'+
        '<label style="display:flex;align-items:center;gap:8px;margin-top:10px"><input type="checkbox" id="pnSaveContact" /> <span class="muted">Save parent contact on this booking slot ('+esc(dateIso)+')</span></label>'+
        '</div>'+
        '<div class="modal-f" style="flex-wrap:wrap;gap:8px">'+

    function schedGetPortalClientRows(){

    function schedSlugifyDisplayName(nm){
      return String(nm || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '');
    }
    function schedBuildReplacementPickList(){
      var bySlug = {};
      function add(slug, display){
        var s = String(slug == null ? '' : slug).trim().toLowerCase();
        if(!s || s === 'available' || s === 'closed') return;
        var d = String(display == null ? '' : display).trim() || s;
        if(!bySlug[s]) bySlug[s] = { slug: s, display: d };
      }
      if(adminSpreadsheetAdapterAvailable()){
        try{
          var pack = adminMergeSpreadsheetSessions();
          var notes = pack.notes || {};
          Object.keys(notes).forEach(function(k){
            var n = notes[k];
            add(k, n && n.name ? n.name : k);
          });
        }catch(e){}
      }
      schedGetPortalClientRows().forEach(function(r){
        var nm = String(r && r.client_name != null ? r.client_name : '').trim();
        if(!nm) return;
        var lo = nm.toLowerCase();
        var matched = false;
        for(var sk in bySlug){
          if(bySlug[sk].display.toLowerCase() === lo){
            matched = true;
            break;
          }
        }
        if(matched) return;
        var guess = schedSlugifyDisplayName(nm);
        if(guess && !bySlug[guess]) add(guess, nm);
      });
      var list = [];
      for(var key in bySlug){
        if(Object.prototype.hasOwnProperty.call(bySlug, key)) list.push(bySlug[key]);
      }
      list.sort(function(a, b){
        return a.display.localeCompare(b.display, undefined, { sensitivity: 'base' });
      });
      return list;
    }
    function schedResolveReplacementSlugFromTyped(list, typed){
      var t = String(typed == null ? '' : typed).trim();
      if(!t) return '';
      var tl = t.toLowerCase();
      for(var i = 0; i < list.length; i++){
        if(String(list[i].slug).toLowerCase() === tl) return list[i].slug;
      }
      for(var j = 0; j < list.length; j++){
        if(String(list[j].display).toLowerCase() === tl) return list[j].slug;
      }
      return '';
    }

    async function undoSchedOverrideFromDrawer(slot){

        if(msgEl) msgEl.textContent = 'No active override to undo.';

      var p = window.__PORTAL_SUPABASE__ && window.__PORTAL_SUPABASE__.staff_profile;
      var role = String(p && p.app_role || '').toLowerCase();
      if(role !== 'admin' && role !== 'ceo'){
        if(msgEl) msgEl.textContent = 'Only admin or CEO profiles can undo schedule overrides (RLS).';
        return;
      }

      try{ beforeSnap = JSON.parse(JSON.stringify(ov)); }catch(_e){ beforeSnap = ov; }

    async function saveSchedOverrideFromDrawer(){

        return;
      }
      var ovTypeRaw = ($('schedFormOvType') && $('schedFormOvType').value) || '';

        for(pi = 0; pi < pickList.length; pi++){

          }
        }
        if(!repName) repName = repTyped;
      }
      var coverSlug = ($('schedFormCoverSlug') && $('schedFormCoverSlug').value.trim()) || '';
      var coverTyped = ($('schedFormCoverInput') && $('schedFormCoverInput').value.trim()) || '';
      if(ovType === 'client_replace_in_slot' && !repSlug){
        if(msgEl) msgEl.textContent = 'Choose a replacement participant from the suggestions, or type until your choice matches exactly.';
        return;
      }
      if(ovType === 'instructor_reassign' && !coverSlug){
        coverSlug = schedResolveInstructorSlugFromTyped(schedBuildInstructorPickList(), coverTyped);
      }
      if(ovType === 'instructor_reassign' && !coverSlug){
        if(msgEl) msgEl.textContent = 'Covering instructor is required for instructor_reassign.';
        return;
      }
      var payload = {};

        payload.cancelled_by_admin = true;

        payload.replacement_client_id = repSlug;
        payload.to_client_id = repSlug;
      }
      if(repName){
        payload.replacement_client_name = repName;
        payload.to_client_name = repName;

      var anchor_staff_id = normalizeSchedAnchorStaffId(slot.staffRosterId);
      var covering_staff_id = '';
      if(coverSlug){
        covering_staff_id = normalizeSchedAnchorStaffId(coverSlug);
        payload.covering_staff_id = covering_staff_id;
      }
      var row = {
        session_date: slot.sessionDate,
        anchor_staff_id: anchor_staff_id,
        anchor_start: slot.anchorStart,
        anchor_end: slot.anchorEnd,
        anchor_venue: slot.venue,
        anchor_client_id: slot.clientSlug,
        anchor_time_slot_label: slot.whenLabel || slot.anchorTimeLabel || '',
        override_type: ovType,
        payload: payload,
        reason: reason || null,
        status: 'active',
        superseded_by: null,
        spreadsheet_revision: 'admin-dashboard:staff_dashboard_spreadsheet_bundle'
      };
      var beforeSnap = { slot: slot, previous_override: findOverrideForSlot(slot) };
      var insRes = await client.from('schedule_overrides').insert([row]).select('id,created_at,created_by');
      if(insRes.error){
        if(msgEl) msgEl.textContent = 'Save failed: '+esc(String(insRes.error.message||insRes.error))+(insRes.error.hint?(' — '+esc(insRes.error.hint)):'');
        return;
      }
      var ins0 = insRes.data && insRes.data[0];
      if(!ins0 || !ins0.id){
        if(msgEl) msgEl.textContent = 'Save did not return a row (check RLS: admin or CEO profile required).';
        return;
      }
      var evRow = {
        override_id: ins0.id,
        action: 'create',
        before_snapshot: beforeSnap,
        after_snapshot: { row: row, inserted: ins0 },
        client_context: { page: 'admin_dashboard', module: 'scheduling_cover' }
      };
      var evRes = await client.from('schedule_override_events').insert([evRow]);
      if(evRes.error){
        if(msgEl) msgEl.textContent = 'Override saved but audit log failed: '+esc(String(evRes.error.message||evRes.error))+'. Check RLS on schedule_override_events.';
        await refreshSchedulingModule();
        return;
      }
      closeSchedDrawer();
      sched.lastMsg = 'Override saved.';
      await refreshSchedulingModule();
    }
    function fillSchedFilterSelects(slots){

      if(!vSel || !sSel) return;

        if(s.staffRosterId) staffs[s.staffRosterId+'|'+s.staffName] = { id:s.staffRosterId, name:s.staffName };
      });

      }).join('');

        var o = staffs[k];
        return '<option value="'+esc(o.id)+'">'+esc(o.name)+'</option>';
      }).join('');
      vSel.value = vVal && venues[vVal]!==undefined ? vVal : '';
      sSel.value = sVal && Object.keys(staffs).some(function(k){ return staffs[k].id===sVal; }) ? sVal : '';

    function renderSchedBaseRows(slots){
      var reviewMap = (function(){
        try{
          var raw = localStorage.getItem('portalSessionReviewMap_v1');
          var parsed = raw ? JSON.parse(raw) : {};
          return parsed && typeof parsed === 'object' ? parsed : {};
        }catch(_){ return {}; }
      })();
      function hmFromPgTime(t){
        return String(t || '').slice(0, 5);
      }
      function sessionKeyFor(slot, clientSlug){
        var c = String(clientSlug || '').trim().toLowerCase();
        if(!c) return '';
        return String(slot.sessionDate || '') + '|' + hmFromPgTime(slot.anchorStart) + '|' + c;
      }
      function hasReviewedRecord(slot, ov){
        var baseKey = sessionKeyFor(slot, slot.clientSlug);
        var rec = baseKey ? reviewMap[baseKey] : null;
        if(rec && (rec.feedbackDone || rec.absent || rec.cancelled)) return true;
        if(ov && String(ov.override_type || '').trim() === 'client_replace_in_slot'){
          var rep = String(ov.payload && (ov.payload.to_client_id || ov.payload.replacement_client_id) || '').trim().toLowerCase();
          var repKey = sessionKeyFor(slot, rep);
          var recRep = repKey ? reviewMap[repKey] : null;
          if(recRep && (recRep.feedbackDone || recRep.absent || recRep.cancelled)) return true;
        }
        return false;
      }
      function schedOperationalStatus(slot, ov){
        var now = Date.now();
        var start = new Date(String(slot.sessionDate || '') + 'T' + hmFromPgTime(slot.anchorStart) + ':00').getTime();
        var end = new Date(String(slot.sessionDate || '') + 'T' + hmFromPgTime(slot.anchorEnd) + ':00').getTime();
        if(!Number.isFinite(start) || !Number.isFinite(end)) return 'Scheduled';
        if(now < start) return 'Scheduled';
        if(now >= start && now < end) return 'In Progress';
        var t = String(ov && ov.override_type || '').trim();
        if(t === 'client_absence_announced' || t === 'slot_close' || t === 'slot_clear_client') return 'Reviewed';
        if(hasReviewedRecord(slot, ov)) return 'Reviewed';
        return 'Completed/Feedback Pending';
      }
      function schedClientDisplayWithOverride(slot, ov){
        if(!(ov && String(ov.override_type || '').trim() === 'client_replace_in_slot')) return String(slot.clientDisplay || '');
        var original = String(slot.clientDisplay || '').trim() || String(slot.clientSlug || '').trim();
        var replName = String(ov.payload && (ov.payload.to_client_name || ov.payload.replacement_client_name) || '').trim();
        var replSlug = String(ov.payload && (ov.payload.to_client_id || ov.payload.replacement_client_id) || '').trim().toLowerCase();
        var repl = replName || replSlug || 'replacement';
        return original + ' / ' + repl;
      }
      return slots.map(function(slot){
        var ov = findOverrideForSlot(slot);
        var hasOv = !!ov;
        var ovChip = hasOv
          ? '<span class="override-chip ' + esc(schedOverrideTypeClass(ov.override_type)) + '">' + esc(schedOverrideLabelForRow(ov)) + '</span>'
          : '<span class="chip chip--ok">—</span>';
        var clientCell = schedClientDisplayWithOverride(slot, ov);
        var statusCell = schedOperationalStatus(slot, ov);
        return '<tr class="sched-slot-row" data-sched-demo-id="'+esc(slot.demoId)+'" data-venue="'+esc(slot.venue)+'" data-staff="'+esc(slot.staffRosterId)+'" data-has-ov="'+(hasOv?'1':'0')+'">'+
          '<td style="white-space:nowrap">'+esc(slot.anchorTimeLabel||normTimeShort(slot.anchorStart))+'</td>'+
          '<td>'+esc(slot.venue)+'</td>'+
          '<td>'+esc(slot.staffName)+'</td>'+
          '<td>'+esc(clientCell)+'</td>'+
          '<td>'+esc(statusCell)+'</td><td>'+ovChip+'</td></tr>';
      }).join('');
    }
    function renderSchedLogRows(){
      return (sched.overrides||[]).map(function(o){
        var t = o.created_at ? new Date(o.created_at).toLocaleString('en-GB',{ day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '—';
        var cb = o.created_by ? String(o.created_by).slice(0,8)+'…' : '—';

        var res = await client.from('schedule_overrides')
          .select('id,created_at,created_by,session_date,anchor_start,anchor_end,anchor_staff_id,anchor_venue,anchor_client_id,override_type,reason,status,payload')
          .eq('session_date', iso)

    function invoiceTaxLabel(t){
      return String(t||'').toLowerCase()==='exempt' ? 'Exempt' : '20%';
    }
    function invoiceCompute(lines){
      var subtotal = 0;
      var vat = 0;
      (lines||[]).forEach(function(l){
        var q = Math.max(0, bookingNum(l.quantity, 0));
        var u = Math.max(0, bookingNum(l.unitPrice, 0));
        var net = q*u;
        subtotal += net;
        if(String(l.taxType||'').toLowerCase() !== 'exempt') vat += net*0.2;
      });
      var total = subtotal + vat;
      return { subtotal: subtotal, vat: vat, total: total };
    }

    function dashboardCollectBookingMetaAllDates(){
      var out = [];
      var prefix = 'portal_booking_meta_v1_';
      try{
        for(var i=0;i<localStorage.length;i++){
          var key = localStorage.key(i);
          if(!key || key.indexOf(prefix)!==0) continue;
          var iso = key.slice(prefix.length);
          var raw = localStorage.getItem(key);
          var parsed = raw ? JSON.parse(raw) : {};
          if(!parsed || typeof parsed !== 'object') continue;
          Object.keys(parsed).forEach(function(slotId){
            var m = parsed[slotId] || {};
            out.push({
              date: iso,
              slotId: slotId,
              source: String(m.source || 'parent').toLowerCase(),
              funding: String(m.funding || 'private').toLowerCase(),
              intake: String(m.intake || 'pending').toLowerCase(),
              startMode: String(m.startMode || 'immediate').toLowerCase(),
              startDate: String(m.startDate || '').trim(),
              holdReason: String(m.holdReason || '').trim(),
              slotStatus: String(m.slotStatus || 'provisional').toLowerCase(),
              hasEhcp: !!m.hasEhcp
            });
          });
        }
      }catch(_){}
      return out;
    }
    function dashboardBookingSnapshot(){
      var todayIso = isoDateLocal(new Date());
      var all = dashboardCollectBookingMetaAllDates();
      var todayRows = all.filter(function(x){ return x.date === todayIso; });
      var now = new Date();
      var ms14 = 14*24*60*60*1000;
      var next14Starts = 0;
      var onHold = 0;
      var intakePending48h = 0;
      var confirmedNotStarted = 0;
      var noStartDate = 0;
      var byFunding = { private:0, direct_payments_la:0, la_referral:0 };
      var bySource = { parent:0, la:0, social_worker:0 };
      var ehcpCount = 0;
      all.forEach(function(x){
        if(byFunding[x.funding] != null) byFunding[x.funding] += 1;
        if(bySource[x.source] != null) bySource[x.source] += 1;
        if(x.hasEhcp) ehcpCount += 1;
        if(x.holdReason) onHold += 1;
        if(x.slotStatus === 'confirmed' && x.startMode === 'deferred') confirmedNotStarted += 1;
        if((x.slotStatus === 'confirmed' || x.slotStatus === 'provisional') && !x.startDate) noStartDate += 1;
        if(x.intake === 'pending'){
          var d = x.date ? new Date(x.date + 'T12:00:00') : null;
          if(d && Number.isFinite(d.getTime()) && (now.getTime() - d.getTime()) > (48*60*60*1000)) intakePending48h += 1;
        }
        if(x.startDate){
          var sd = new Date(x.startDate + 'T12:00:00');
          if(Number.isFinite(sd.getTime())){
            var dt = sd.getTime() - now.getTime();
            if(dt >= 0 && dt <= ms14) next14Starts += 1;
          }
        }
      });
      return {
        all: all,
        today: todayRows,
        unassignedToday: todayRows.filter(function(x){ return x.slotStatus !== 'active' && (x.holdReason || x.startMode === 'deferred'); }).length,
        onHold: onHold,
        intakePending48h: intakePending48h,
        confirmedNotStarted: confirmedNotStarted,
        next14Starts: next14Starts,
        noStartDate: noStartDate,
        byFunding: byFunding,
        bySource: bySource,
        ehcpCount: ehcpCount
      };
    }

    function bindOperatorLight(){

          var id = b.getAttribute('data-op-suggest');
          var s = MOCK.operatorSuggestions.find(function(x){ return x.id===id; });
          if(!s) return;
          if(s.action==='notify') openComposeModal('reminder');
          else if(s.action==='session') openShiftModal('');
          else if(s.action==='jump' && s.target) setView(s.target);
          else if(s.action==='client' && s.clientId){ setView('clients'); setTimeout(function(){ openClientDrawer(s.clientId); }, 0); }

        '<label class="muted">Staff focus</label><select class="sel" style="max-width:100%;margin-bottom:8px" id="shStaffId">'+staffOpts+'</select>'+
        '<label class="muted">Change summary</label><input class="inp" style="max-width:100%" id="shSum" placeholder="e.g. Swap Thu PM with…" value="'+esc(sumDef)+'" />'+
        '<label class="muted" style="display:block;margin-top:10px">Notes</label><textarea class="txa" id="shNote" style="min-height:72px" placeholder="Handover, parent call, cover name…"></textarea>'+
        '<label class="op-check" style="border:none;padding-top:12px"><input type="checkbox" id="shNotify" checked /> <span>Queue <strong>shift change</strong> to internal outbox (leads)</span></label>'+
        '<input type="hidden" id="shSessId" value="'+esc(sess?sess.id:'')+'" /></div>'+
        '<div class="modal-f"><button type="button" class="btn btn--ghost" id="shX">Close</button>'+
        '<button type="button" class="btn btn--sec" id="shN">Open composer</button><button type="button" class="btn btn--pri" id="shS">Save &amp; log (demo)</button></div>'
      );
      $('shX').onclick = closeModal;
      $('shN').onclick = function(){
        var sn = ($('shSum')&&$('shSum').value)||'';
        closeModal();
        setTimeout(function(){
          openComposeModal('shift');
          var cb = $('cmpBody');
          if(cb && sn) cb.value = '[Shift] '+sn;
        }, 0);
      };
      $('shS').onclick = function(){
        var sid = ($('shSessId')&&$('shSessId').value)||'';
        var summary = (($('shSum')&&$('shSum').value)||'').trim()||'Roster update';
        var note = (($('shNote')&&$('shNote').value)||'').trim();
        var staffId = ($('shStaffId')&&$('shStaffId').value)||'';
        var st = MOCK.staff.find(function(x){ return x.id===staffId; });
        var staffName = st?st.name:'Staff';
        var sObj = sid ? MOCK.operationalSessions.find(function(x){ return x.id===sid; }) : null;
        if(sObj){
          sObj.status = 'Updated';
          if(note) sObj.lastNote = note;
        }
        MOCK.sessionChanges.unshift({ t:staffName+' · '+summary, by:'Admin', st:'logged' });
        pushCommsHistory('Shift change', staffName+' — '+summary);
        if($('shNotify') && $('shNotify').checked){
          MOCK.internalFeed.unshift({
            type:'shift change', audience:'leads', pri:'high',
            body:'[Demo] '+staffName+': '+summary+(note?' — '+note:''),
            at:new Date().toISOString(), source:'Shift control'
          });
        }
        logAction('manual', 'Shift/session saved · '+summary, MOCK.profile.name);
        refreshKpisFromDemo();
        recomputeOperatorSuggestions();
        closeModal();
        setView(state.view==='communications'?'communications':state.view==='staffhr'?'staffhr':'operations');
      };
      $('modalBackdrop').onclick = function(e){ if(e.target=== $('modalBackdrop')) closeModal(); };
    }

    function openNoteModal(){
      var cid = state.drawerClient;
      openModal(
        '<div class="modal-h"><h2 id="modalTitle">Admin note</h2></div><div class="modal-b">'+
        '<textarea class="txa" id="admNote" placeholder="Note attached to client / case…"></textarea></div>'+
        '<div class="modal-f"><button type="button" class="btn btn--ghost" id="nx">Cancel</button><button type="button" class="btn btn--pri" id="ns">Save (demo)</button></div>'
      );
      $('nx').onclick = closeModal;
      $('ns').onclick = function(){
        var t = ($('admNote')&&$('admNote').value||'').trim();
        if(cid && t && MOCK.clientsById[cid]){
          MOCK.clientsById[cid].notes.push(t);
          logAction('manual', 'Admin note added · '+MOCK.clientsById[cid].name, MOCK.profile.name);
        }
        closeModal();
        if(cid) openClientDrawer(cid);
        else if(t) alert('Demo: note saved to general record.');
      };
      $('modalBackdrop').onclick = function(e){ if(e.target=== $('modalBackdrop')) closeModal(); };
    }

    function renderNav(){
      var navHtml = NAV_GROUPS.map(function(group){
        var childHtml = (group.children || []).map(function(cid){
          var item = navGetItem(cid);
          if(!item) return '';
          return '<button type="button" data-view="'+item.id+'"><span class="admin-nav-ico">'+item.ico+'</span> '+esc(item.label)+'</button>';
        }).join('');
        var open = !!(state.navGroupsOpen && state.navGroupsOpen[group.id]);
        return '<div class="admin-nav-group'+(open?' is-open':'')+'" data-group-id="'+esc(group.id)+'">'+
          '<button type="button" class="admin-nav-group-toggle" data-nav-group-toggle="'+esc(group.id)+'"><span><span class="admin-nav-ico">'+esc(group.ico)+'</span> '+esc(group.label)+'</span><span class="admin-nav-group-caret">▸</span></button>'+
          '<div class="admin-nav-group-body'+(open?'':' is-collapsed')+'">'+childHtml+'</div>'+
          '</div>';
      }).join('');
      $('adminNav').innerHTML = navHtml;
      $('adminBottomNav').innerHTML = NAV.map(function(item){
        return '<button type="button" data-view="'+item.id+'">'+esc(item.label)+'</button>';
      }).join('');
      $('adminNav').querySelectorAll('[data-nav-group-toggle]').forEach(function(b){
        b.addEventListener('click', function(){
          var gid = b.getAttribute('data-nav-group-toggle');
          state.navGroupsOpen[gid] = !state.navGroupsOpen[gid];
          syncNavGroupsUi();
        });
      });
      $('adminNav').querySelectorAll('button').forEach(function(b){
        if(!b.hasAttribute('data-view')) return;
        b.addEventListener('click', function(){ setView(b.getAttribute('data-view')); closeSidebarMob(); });
      });
      $('adminBottomNav').querySelectorAll('button').forEach(function(b){
        b.addEventListener('click', function(){ setView(b.getAttribute('data-view')); closeSidebarMob(); });
      });
    }

    function closeSidebarMob(){ document.body.classList.remove('sidebar-open'); }

    function renderAlerts(){
      var pop = $('alertsPop');
      var venueList = (typeof window.__PORTAL_VENUE_REVIEW_ALERTS__ !== 'undefined' && window.__PORTAL_VENUE_REVIEW_ALERTS__) ? window.__PORTAL_VENUE_REVIEW_ALERTS__ : [];
      var venueHtml = (venueList || []).map(function(a){
        var t = '';
        try{
          if(a.created_at) t = new Date(a.created_at).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
        }catch(e){}
        var body = a.body || '';
        return '<div class="line-item"><div><strong>'+esc(a.headline || 'Venue review')+'</strong><div class="muted" style="white-space:pre-wrap;margin-top:6px;font-size:12px;line-height:1.45">'+esc(body)+'</div></div><span class="chip chip--urg">'+(t?esc(t):'New')+'</span></div>';
      }).join('');
      var mockHtml = MOCK.alerts.map(function(a){
        return '<div class="line-item"><div><strong>'+esc(a.title)+'</strong><div class="muted">'+esc(a.sub)+'</div></div><span class="chip chip--urg">'+esc(a.t)+'</span></div>';
      }).join('');
      pop.innerHTML = '<div class="card-h" style="border-radius:var(--radiusLg) var(--radiusLg) 0 0"><h3 style="margin:0;font-size:14px">Alerts</h3></div>'+venueHtml+mockHtml;
      $('alertBadge').textContent = String((venueList||[]).length + MOCK.alerts.length);
    }
    try{ window.__portalAdminRenderAlerts = renderAlerts; }catch(e){}

    window.addEventListener('portal:supabase-ready', function portalVenueReviewAlertsFetch(){
      try{
        var p = window.__PORTAL_SUPABASE__ && window.__PORTAL_SUPABASE__.staff_profile;
        var role = String(p && p.app_role || '').toLowerCase();
        if(role !== 'admin') return;
        var client = window.__PORTAL_SUPABASE__ && window.__PORTAL_SUPABASE__.client;
        if(!client || !client.from) return;
        client.from('venue_review_admin_notifications').select('id,created_at,headline,body').is('read_at',null).order('created_at',{ascending:false}).limit(40).then(function(res){
          if(res.error){ console.warn(res.error); return; }
          window.__PORTAL_VENUE_REVIEW_ALERTS__ = res.data || [];
          if(typeof window.__portalAdminRenderAlerts === 'function') window.__portalAdminRenderAlerts();
        });
      }catch(err){ console.warn(err); }
    });

    function toggleAlerts(){ $('alertsPop').classList.toggle('open'); }

    function applyMobilePreview(on, persist){
      var b = document.body, h = document.documentElement;
      h.classList.remove('dev-mobile-preview');
      b.classList.remove('dev-mobile-preview');
      $('viewToggle').setAttribute('aria-checked','false');
      if(persist){ try{ sessionStorage.setItem(KEY_MOBILE,'0'); }catch(e){} }
    }

    function initMobileToggle(){
      applyMobilePreview(false, true);
      $('viewToggle').addEventListener('click', function(){
        applyMobilePreview(false, true);
      });
    }

    function globalSearch(){
      var q = ($('globalSearch').value||'').trim().toLowerCase();
      if(!q) return;
      var hit = Object.keys(MOCK.clientsById).find(function(k){ return MOCK.clientsById[k].name.toLowerCase().indexOf(q)>=0; });
      if(hit){ setView('clients'); setTimeout(function(){ openClientDrawer(hit); }, 0); return; }
      var st = MOCK.staff.find(function(s){ return s.name.toLowerCase().indexOf(q)>=0; });
      if(st){ setView('staffhr'); setTimeout(function(){ openStaffDrawer(st.id); }, 0); return; }
      setView('dashboard');
      alert('Demo: no exact match — try a client or staff name from mock data.');
    }

    function init(){
      $('topDate').textContent = new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
      $('miniAv').textContent = MOCK.profile.initial;
      $('miniName').textContent = MOCK.profile.name;
      refreshKpisFromDemo();
      recomputeOperatorSuggestions();
      renderNav();
      renderAlerts();
      var params = new URLSearchParams(location.search);
      var qp = params.get('view');
      var hash = (location.hash||'').replace(/^#/,'');
      var initial = 'dashboard';
      if(qp && NAV.some(function(n){ return n.id===qp; })) initial = qp;
      else if(hash && NAV.some(function(n){ return n.id===hash; })) initial = hash;
      if(qp === 'ceo' || hash === 'ceo') initial = 'dashboard';
      setView(initial);
      if(!window.__portalAdminProfileRefreshBound){
        window.__portalAdminProfileRefreshBound = true;
        window.addEventListener('portal:supabase-ready', function(){
          if(state.view === 'settings') setView('settings');
        });
      }
      initMobileToggle();
      $('btnMenuMob').addEventListener('click', function(){ document.body.classList.toggle('sidebar-open'); });
      $('sidebarBackdrop').addEventListener('click', closeSidebarMob);
      $('btnAlerts').addEventListener('click', function(e){
        e.stopPropagation();
        toggleAlerts();
      });
      document.addEventListener('click', function(){ $('alertsPop').classList.remove('open'); });
      $('alertsPop').addEventListener('click', function(e){ e.stopPropagation(); });
      $('globalSearch').addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); globalSearch(); }});
      $('btnCloseDrawer').addEventListener('click', closeDrawer);
      $('drawerBackdrop').addEventListener('click', closeDrawer);
      $('btnProfileMini').addEventListener('click', function(){ alert('Demo: admin profile / sign-out later.'); });
      var sdc = $('schedDrawerClose');
      if(sdc) sdc.onclick = closeSchedDrawer;
      var sdb = $('schedDrawerBackdrop');
      if(sdb) sdb.onclick = function(e){ if(e.target=== $('schedDrawerBackdrop')) closeSchedDrawer(); };
      document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeModal(); closeDrawer(); closeSchedDrawer(); $('alertsPop').classList.remove('open'); }});
    }

    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
    else init();
  })();
  </script>
  <script>
    (function () {
      var isElementorPreview =
        window.location.search.indexOf("elementor-preview=") !== -1 ||
        window.location.search.indexOf("preview=true") !== -1 ||
        document.documentElement.classList.contains("elementor-editor-active");
      if (isElementorPreview) return;

      var s = document.createElement("script");
      s.type = "module";
      s.textContent = `
        import { portalLogout, bootstrapDashboardSupabase } from "https://www.clubsensational.org/wp-content/uploads/2026/04/auth-handler.js?v=20260419-99";
        try { await bootstrapDashboardSupabase({ page: "admin" }); } catch {}
        const profile = window.__PORTAL_SUPABASE__ && window.__PORTAL_SUPABASE__.staff_profile;
        if (profile) {
          const displayName = String(profile.full_name || profile.username || "").trim();
          if (displayName) {
            const nameEl = document.getElementById("miniName");
            if (nameEl) nameEl.textContent = displayName;
          }
        }
        const now = new Date();
        const dateEl = document.getElementById("topDate");
        if (dateEl) {
          dateEl.textContent = now.toLocaleDateString("en-GB", {
            weekday: "short",
            day: "numeric",
            month: "short",
            year: "numeric"
          });
        }
        document.addEventListener("click", async (e) => {
          const btn = e.target && e.target.closest ? e.target.closest("[data-portal-logout]") : null;
          if (!btn) return;
          e.preventDefault();
          try { await portalLogout(); } catch {}
          window.location.href = "https://www.clubsensational.org/l0/";
        });
      `;
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
