<!DOCTYPE html>
<html lang="en-GB">
<head>
  <script>
    (function () {
      try {
        document.documentElement.classList.add("portal-app-shell");
      } catch (e) {}
    })();
  </script>
  <style id="portal-hide-wp-chrome">
    html.portal-app-shell body.admin-bar {
      padding-top: 0 !important;
      margin-top: 0 !important;
    }
    html.portal-app-shell #wpadminbar,
    html.portal-app-shell #masthead,
    html.portal-app-shell header#masthead,
    html.portal-app-shell .site-header,
    html.portal-app-shell #site-header,
    html.portal-app-shell .ast-primary-header-bar,
    html.portal-app-shell .ast-above-header,
    html.portal-app-shell .elementor-location-header,
    html.portal-app-shell .elementor-location-footer,
    html.portal-app-shell #colophon,
    html.portal-app-shell footer.site-footer,
    html.portal-app-shell .site-footer,
    html.portal-app-shell #footer,
    html.portal-app-shell .site-bottom-footer-inner-wrap,
    html.portal-app-shell .footer-widget-area {
      display: none !important;
      visibility: hidden !important;
      height: 0 !important;
      overflow: hidden !important;
      pointer-events: none !important;
    }
    html.portal-app-shell .site-content,
    html.portal-app-shell #content,
    html.portal-app-shell .site-main,
    html.portal-app-shell #primary {
      margin-top: 0 !important;
      padding-top: 0 !important;
    }
    html.portal-app-shell #page,
    html.portal-app-shell .site {
      margin-top: 0 !important;
      padding-top: 0 !important;
    }
    html.portal-app-shell,
    html.portal-app-shell body {
      max-width: 100vw !important;
      overflow-x: hidden !important;
    }
    html.portal-app-shell #page,
    html.portal-app-shell .site,
    html.portal-app-shell .site-content,
    html.portal-app-shell #content,
    html.portal-app-shell #primary,
    html.portal-app-shell .site-main {
      max-width: 100vw !important;
      overflow-x: hidden !important;
    }
  </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>clubSENsational Portal — CEO</title>
  <style>
    :root {
      --blue: #2d84b3;
      --blueSoft: #eaf5fb;
      --ink: #173247;
      --text: #314555;
      --muted: #728290;
      --line: rgba(23, 50, 71, 0.12);
      --white: #ffffff;
      --shadow: 0 18px 50px rgba(23, 50, 71, 0.08);
      --radius: 22px;
    }
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      min-height: 100dvh;
      max-width: 100%;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-x: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(20px, env(safe-area-inset-top, 0px)) 18px max(24px, env(safe-area-inset-bottom, 0px));
      background: linear-gradient(180deg, #f7fbff 0%, #edf4fb 100%);
    }
    .ceo-wrap {
      width: 100%;
      max-width: 420px;
    }
    .ceo-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      padding: 26px 22px 22px;
      text-align: center;
    }
    .ceo-card h1 {
      margin: 0 0 8px;
      font-size: clamp(1.25rem, 4vw, 1.45rem);
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .ceo-card .ceo-greet {
      margin: 0 0 18px;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .ceo-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ceo-actions a {
      display: block;
      width: 100%;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.2s ease, box-shadow 0.2s ease;
    }
    .ceo-actions a:active {
      transform: scale(0.985);
    }
    .ceo-btn--staff {
      color: var(--white);
      background: linear-gradient(180deg, var(--blue) 0%, #2676a0 100%);
      border: none;
      box-shadow: 0 4px 14px rgba(45, 132, 179, 0.28);
    }
    .ceo-btn--staff:hover {
      filter: brightness(1.03);
    }
    .ceo-btn--admin {
      color: var(--ink);
      background: var(--blueSoft);
      border: 1px solid rgba(45, 132, 179, 0.35);
    }
    .ceo-btn--admin:hover {
      border-color: rgba(45, 132, 179, 0.55);
      background: #dff0fb;
    }
    .ceo-btn--strategic {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--blue);
      background: transparent;
      border: 1px dashed rgba(45, 132, 179, 0.45);
    }
    .ceo-foot {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }
    .ceo-foot button {
      font: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .ceo-foot button:hover {
      color: var(--ink);
    }
    .ceo-note {
      margin: 14px 0 0;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="ceo-wrap">
    <div class="ceo-card" role="main">
      <h1>CEO portal</h1>
      <p class="ceo-greet" id="ceoGreet">Signed in — open your staff rota or operations console.</p>
      <div class="ceo-actions">
        <a class="ceo-btn--staff" id="portalCeoNavStaff" href="https://www.clubsensational.org/p1/">Staff dashboard</a>
        <a class="ceo-btn--admin" id="portalCeoNavAdmin" href="https://www.clubsensational.org/a1/">Admin &amp; operations</a>
        <a class="ceo-btn--strategic" id="portalCeoNavStrategic" href="https://www.clubsensational.org/a1/#ceo">Strategic CEO view</a>
        <a class="ceo-btn--strategic" id="portalCeoNavInsights" href="https://www.clubsensational.org/portal-company-insights">Company insights (data map)</a>
      </div>
      <p class="ceo-note">Same login session: use these links to move between tools. Your shifts stay on the staff dashboard.</p>
      <div class="ceo-foot">
        <button type="button" id="ceoLogout">Log out</button>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var path = (typeof location !== "undefined" && location.pathname) ? String(location.pathname).toLowerCase() : "";
      var isWorkingUi = path.indexOf("/working_ui/") !== -1;
      if (isWorkingUi) {
        var staff = document.getElementById("portalCeoNavStaff");
        var adm = document.getElementById("portalCeoNavAdmin");
        var strat = document.getElementById("portalCeoNavStrategic");
        if (staff) staff.href = "staff_dashboard.html";
        if (adm) adm.href = "admin_dashboard.html";
        if (strat) strat.href = "admin_dashboard.html#ceo";
        var ins = document.getElementById("portalCeoNavInsights");
        if (ins) ins.href = "company_insights.html";
      }
    })();
  </script>
  <script>
    (function () {
      var isElementorPreview =
        window.location.search.indexOf("elementor-preview=") !== -1 ||
        window.location.search.indexOf("preview=true") !== -1 ||
        document.documentElement.classList.contains("elementor-editor-active");
      if (isElementorPreview) return;

      var path = (typeof location !== "undefined" && location.pathname) ? String(location.pathname).toLowerCase() : "";
      var isWorkingUi = path.indexOf("/working_ui/") !== -1;
      var portalCeoLogoutUrl = isWorkingUi ? "login.html" : "https://www.clubsensational.org/l0/";

      var portalJsVer = "20260419-99";
      var portalJsBase = "https://www.clubsensational.org/wp-content/uploads/2026/04/";
      var s = document.createElement("script");
      s.type = "module";
      s.textContent =
        "import { portalLogout, bootstrapDashboardSupabase } from \"" +
        portalJsBase +
        "auth-handler.js?v=" +
        portalJsVer +
        "\";\n" +
        "await bootstrapDashboardSupabase({ page: \"ceo\" });\n" +
        "const p = window.__PORTAL_SUPABASE__ && window.__PORTAL_SUPABASE__.staff_profile;\n" +
        "const greet = document.getElementById(\"ceoGreet\");\n" +
        "if (greet && p) {\n" +
        "  const n = String(p.full_name || p.username || \"\").trim();\n" +
        "  if (n) greet.textContent = \"Hello, \" + n + \" — choose where to continue.\";\n" +
        "}\n" +
        "document.getElementById(\"ceoLogout\")?.addEventListener(\"click\", async () => {\n" +
        "  try { await portalLogout(); } catch (e) {}\n" +
        "  window.location.href = \"" +
        portalCeoLogoutUrl.replace(/\\/g, "\\\\").replace(/"/g, '\\"') +
        "\";\n" +
        "});\n";
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
